    <script type="text/babel">
const { useState, useEffect, useMemo } = React;

class CurrencyService {
    static ratesCache = {};
    static API_KEY = null;
    
    static supportedCurrencies = {
        'GBP': { name: 'British Pound', symbol: '£' },
        'EUR': { name: 'Euro', symbol: '€' },
        'INR': { name: 'Indian Rupee', symbol: '₹' },
        'USD': { name: 'US Dollar', symbol: '$' }
    };

    static fallbackRates = {
        'GBP': { 'EUR': 1.17, 'USD': 1.27, 'INR': 106.5, 'GBP': 1 },
        'EUR': { 'GBP': 0.85, 'USD': 1.08, 'INR': 91.2, 'EUR': 1 },
        'USD': { 'GBP': 0.79, 'EUR': 0.92, 'INR': 84.1, 'USD': 1 },
        'INR': { 'GBP': 0.0094, 'EUR': 0.011, 'USD': 0.012, 'INR': 1 }
    };

    static async fetchExchangeRates(baseCurrency = 'GBP') {
        const cacheTime = 30 * 60 * 1000;
        const now = Date.now();
        if (this.ratesCache[baseCurrency] && (now - this.ratesCache[baseCurrency].timestamp) < cacheTime) {
            return this.ratesCache[baseCurrency].rates;
        }
        try {
            const response = await fetch('https://api.exchangerate-api.com/v4/latest/' + baseCurrency);
            if (response.ok) {
                const data = await response.json();
                this.ratesCache[baseCurrency] = { rates: data.rates, timestamp: now };
                localStorage.setItem('exchangeRates_' + baseCurrency, JSON.stringify({
                    rates: data.rates, timestamp: now
                }));
                return data.rates;
            }
        } catch (error) {
            console.warn('Failed to fetch live exchange rates for ' + baseCurrency + ':', error);
        }
        try {
            const cached = localStorage.getItem('exchangeRates_' + baseCurrency);
            if (cached) {
                const { rates, timestamp } = JSON.parse(cached);
                if ((now - timestamp) < 24 * 60 * 60 * 1000) {
                    this.ratesCache[baseCurrency] = { rates, timestamp };
                    return rates;
                }
            }
        } catch (error) {
            console.warn('Failed to load cached exchange rates:', error);
        }
        const fallback = this.fallbackRates[baseCurrency] || this.fallbackRates['GBP'];
        this.ratesCache[baseCurrency] = { rates: fallback, timestamp: now };
        return fallback;
    }

    static async convertCurrency(amount, fromCurrency, toCurrency) {
        if (fromCurrency === toCurrency) return amount;
        try {
            const rates = await this.fetchExchangeRates(fromCurrency);
            if (rates[toCurrency]) {
                return Math.round(amount * rates[toCurrency] * 100) / 100;
            }
            const fallback = this.fallbackRates[fromCurrency];
            if (fallback && fallback[toCurrency]) {
                return Math.round(amount * fallback[toCurrency] * 100) / 100;
            }
            return amount;
        } catch (error) {
            console.error('Currency conversion failed:', error);
            const fallback = this.fallbackRates[fromCurrency];
            if (fallback && fallback[toCurrency]) {
                return Math.round(amount * fallback[toCurrency] * 100) / 100;
            }
            return amount;
        }
    }

    static getCurrencySymbol(currencyCode) {
        const c = this.supportedCurrencies[currencyCode];
        return c ? c.symbol : currencyCode;
    }

    static getCurrencyName(currencyCode) {
        const c = this.supportedCurrencies[currencyCode];
        return c ? c.name : currencyCode;
    }

    static formatCurrency(amount, currencyCode) {
        const symbol = this.getCurrencySymbol(currencyCode);
        return symbol + amount.toFixed(2);
    }

    static async getConversionRate(fromCurrency, toCurrency) {
        if (fromCurrency === toCurrency) return 1;
        try {
            return await this.convertCurrency(1, fromCurrency, toCurrency);
        } catch (error) {
            return 1;
        }
    }
}
window.CurrencyService = CurrencyService;

const ValidationUtils = {
    validateExpense: (expense) => {
        const errors = {};
        if (!expense.amount || expense.amount <= 0) errors.amount = 'Amount must be greater than 0';
        if (!expense.date) { errors.date = 'Date is required'; } else { const date = new Date(expense.date); if (date > new Date()) errors.date = 'Date cannot be in the future'; }
        if (expense.description && expense.description.trim().length > 0 && expense.description.trim().length < 3) errors.description = 'Description must be at least 3 characters if provided';
        if (!expense.categoryId) errors.categoryId = 'Category is required';
        if (!expense.subcategory) errors.subcategory = 'Subcategory is required';
        if (expense.paidBy && expense.paidBy.trim().length > 0 && expense.paidBy.trim().length < 2) errors.paidBy = 'Name must be at least 2 characters if provided';
        return { isValid: Object.keys(errors).length === 0, errors };
    },
    validateIncome: (income) => {
        const errors = {};
        if (!income.amount || income.amount <= 0) errors.amount = 'Amount must be greater than 0';
        if (!income.date) errors.date = 'Date is required';
        if (!income.source || income.source.trim().length === 0) errors.source = 'Income source is required';
        return { isValid: Object.keys(errors).length === 0, errors };
    },
    validateCategory: (category) => {
        const errors = {};
        if (!category.name || category.name.trim().length === 0) errors.name = 'Category name is required';
        else if (category.name.trim().length < 2) errors.name = 'Category name must be at least 2 characters';
        return { isValid: Object.keys(errors).length === 0, errors };
    },
    formatCurrency: (amount, currency = 'USD') => {
        const currencyMap = {
            'USD': { locale: 'en-US', currency: 'USD' },
            'GBP': { locale: 'en-GB', currency: 'GBP' },
            'EUR': { locale: 'en-EU', currency: 'EUR' },
            'INR': { locale: 'en-IN', currency: 'INR' }
        };
        const config = currencyMap[currency] || currencyMap['USD'];
        return new Intl.NumberFormat(config.locale, { style: 'currency', currency: config.currency }).format(amount);
    },
    getCurrencySymbol: (currency = 'USD') => {
        const symbols = { 'USD': '$', 'GBP': '£', 'EUR': '€', 'INR': '₹' };
        return symbols[currency] || '$';
    },
    formatDate: (date) => {
        return new Date(date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    },
    getPasswordStrength: (password) => {
        if (!password) return { label: '', className: '', percent: 0 };
        let categories = 0;
        if (/[a-z]/.test(password)) categories++;
        if (/[A-Z]/.test(password)) categories++;
        if (/[0-9]/.test(password)) categories++;
        if (/[^A-Za-z0-9]/.test(password)) categories++;
        let score = 0;
        if (password.length >= 8) score++;
        if (password.length >= 12) score++;
        if (categories >= 2) score++;
        if (categories >= 3) score++;
        if (score <= 1) return { label: 'Weak', className: 'weak', percent: 33 };
        if (score <= 3) return { label: 'Fair', className: 'fair', percent: 66 };
        return { label: 'Strong', className: 'strong', percent: 100 };
    }
};
window.ValidationUtils = ValidationUtils;

// Given a list of cloud history files (each { id, name }) sorted newest-first
// (name is date-prefixed and zero-padded, so lexicographic order == chronological
// order), returns the subset to delete under the user's chosen retention policy —
// shared by GDriveService and OneDriveService since both use the same
// `financetracker-YYYY-MM-DD-HHMMSS.json` naming convention and the same setting.
// The single newest file (index 0) is never returned, regardless of policy or age,
// so a long-idle device under a day-based policy can never prune away every backup.
function selectHistoryFilesToPrune(files) {
    if (!files || files.length <= 1) return [];
    const retention = (JSON.parse(localStorage.getItem('financeApp_settings') || '{}').cloudBackupRetention) || 'count5';
    if (retention === 'count5') return files.length > 5 ? files.slice(5) : [];
    const days = { '7d': 7, '30d': 30, '90d': 90 }[retention] || 30;
    const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
    return files.slice(1).filter(f => {
        const m = f.name.match(/financetracker-(\d{4})-(\d{2})-(\d{2})-(\d{2})(\d{2})(\d{2})\.json/);
        if (!m) return false;
        const t = Date.UTC(+m[1], +m[2] - 1, +m[3], +m[4], +m[5], +m[6]);
        return t < cutoff;
    });
}

// ── Google Drive OAuth + REST API ──────────────────────────────────────────
const GDriveService = {
    SCOPES: 'https://www.googleapis.com/auth/drive.file',
    get FOLDER() { return (window.__OAUTH_CONFIG && window.__OAUTH_CONFIG.isProduction) ? 'FinanceTracker Backups' : 'FinanceTracker Backups (Dev)'; },
    FILE: 'financetracker-data.json',
    get clientId() { return (window.__OAUTH_CONFIG && window.__OAUTH_CONFIG.googleClientId) || ''; },
    isConfigured() { return !!this.clientId; },
    getToken() { return sessionStorage.getItem('ftGdToken'); },
    isTokenValid() { const e = sessionStorage.getItem('ftGdExp'); return !!(this.getToken() && e && Date.now() < +e); },
    _storeToken(t, sec) { sessionStorage.setItem('ftGdToken', t); sessionStorage.setItem('ftGdExp', String(Date.now() + ((sec||3600)-60)*1000)); },
    clearToken() { ['ftGdToken','ftGdExp'].forEach(k => sessionStorage.removeItem(k)); localStorage.removeItem('ftGdFileId'); },
    requestToken() {
        return new Promise((resolve, reject) => {
            if (!this.isConfigured()) { reject(new Error('not_configured')); return; }
            if (!window.google || !window.google.accounts) { reject(new Error('gis_not_loaded')); return; }
            const client = window.google.accounts.oauth2.initTokenClient({
                client_id: this.clientId, scope: this.SCOPES,
                callback: resp => { if (resp.error) { reject(new Error(resp.error)); return; } this._storeToken(resp.access_token, resp.expires_in); resolve(resp.access_token); }
            });
            client.requestAccessToken();
        });
    },
    async _tok() { if (this.isTokenValid()) return this.getToken(); return this.requestToken(); },
    async _folder(tok) {
        const q = encodeURIComponent(`name='${this.FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
        const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`, { headers: { Authorization: `Bearer ${tok}` } });
        if (!r.ok) throw new Error('gdrive_folder:' + r.status);
        const { files } = await r.json();
        if (files && files.length) return files[0].id;
        const cr = await fetch('https://www.googleapis.com/drive/v3/files', {
            method: 'POST', headers: { Authorization: `Bearer ${tok}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: this.FOLDER, mimeType: 'application/vnd.google-apps.folder' })
        });
        if (!cr.ok) throw new Error('gdrive_mkdir:' + cr.status);
        return (await cr.json()).id;
    },
    // Takes the token from the caller instead of re-acquiring it — a caller like upload()
    // already fetched one token for the whole operation; having this call _tok() again
    // per-request could independently decide the token needs renewing and pop a second,
    // unexpected OAuth prompt mid-save (and silently hang the upload if popups are blocked).
    async _doForm(tok, method, url, meta, body) {
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
        form.append('file', new Blob([body], { type: 'application/json' }));
        return { tok, res: await fetch(url, { method, headers: { Authorization: `Bearer ${tok}` }, body: form }) };
    },
    _histName() {
        // Seconds included — minute-only precision let two saves in the same minute produce
        // the identical filename, so Drive/OneDrive kept both as separate files instead of
        // one: version history showed duplicate timestamps, the 5-snapshot prune cap filled
        // up with near-duplicates faster than expected, and storage grew accordingly.
        const n = new Date(); const p = x => String(x).padStart(2,'0');
        return `financetracker-${n.getUTCFullYear()}-${p(n.getUTCMonth()+1)}-${p(n.getUTCDate())}-${p(n.getUTCHours())}${p(n.getUTCMinutes())}${p(n.getUTCSeconds())}.json`;
    },
    async _pruneGdHistory(tok, fid) {
        try {
            const q = encodeURIComponent(`'${fid}' in parents and name contains 'financetracker-20' and trashed=false`);
            const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&orderBy=name desc`, { headers: { Authorization: `Bearer ${tok}` } });
            if (!r.ok) return;
            const { files } = await r.json();
            const toDelete = selectHistoryFilesToPrune(files);
            for (const f of toDelete) {
                await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${tok}` } });
            }
        } catch (_) {}
    },
    async upload(json) {
        const tok = await this._tok();
        const fid = await this._folder(tok);
        const body = JSON.stringify(json);
        const cached = localStorage.getItem('ftGdFileId');
        if (cached) {
            const { res } = await this._doForm(tok, 'PATCH', `https://www.googleapis.com/upload/drive/v3/files/${cached}?uploadType=multipart`, { name: this.FILE }, body);
            if (res.status === 404) { localStorage.removeItem('ftGdFileId'); return this.upload(json); }
            if (!res.ok) throw new Error('gdrive_upload:' + res.status);
        } else {
            const q = encodeURIComponent(`'${fid}' in parents and name='${this.FILE}' and trashed=false`);
            const sr = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`, { headers: { Authorization: `Bearer ${tok}` } });
            const { files } = await sr.json();
            if (files && files.length) {
                localStorage.setItem('ftGdFileId', files[0].id);
                const { res } = await this._doForm(tok, 'PATCH', `https://www.googleapis.com/upload/drive/v3/files/${files[0].id}?uploadType=multipart`, { name: this.FILE }, body);
                if (!res.ok) throw new Error('gdrive_upload:' + res.status);
            } else {
                const { res } = await this._doForm(tok, 'POST', `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`, { name: this.FILE, parents: [fid] }, body);
                if (!res.ok) throw new Error('gdrive_upload:' + res.status);
                const f = await res.json(); if (f.id) localStorage.setItem('ftGdFileId', f.id);
            }
        }
        // versioned snapshot — best-effort, never fails the main upload
        try {
            const { res: sr } = await this._doForm(tok, 'POST', `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`, { name: this._histName(), parents: [fid] }, body);
            if (sr.ok) this._pruneGdHistory(tok, fid);
        } catch (_) {}
    },
    async download() {
        const tok = await this._tok();
        const fid = await this._folder(tok);
        let fileId = localStorage.getItem('ftGdFileId');
        if (!fileId) {
            const q = encodeURIComponent(`'${fid}' in parents and name='${this.FILE}' and trashed=false`);
            const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`, { headers: { Authorization: `Bearer ${tok}` } });
            if (!r.ok) return null;
            const { files } = await r.json();
            if (!files || !files.length) return null;
            fileId = files[0].id; localStorage.setItem('ftGdFileId', fileId);
        }
        const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${tok}` } });
        if (r.status === 404) { localStorage.removeItem('ftGdFileId'); return null; }
        if (!r.ok) throw new Error('gdrive_download:' + r.status);
        return r.json();
    },
    async listHistory() {
        const tok = await this._tok();
        const fid = await this._folder(tok);
        const q = encodeURIComponent(`'${fid}' in parents and name contains 'financetracker-20' and trashed=false`);
        const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,size)&orderBy=name desc`, { headers: { Authorization: `Bearer ${tok}` } });
        if (!r.ok) return [];
        const { files } = await r.json();
        return (files || []).map(f => ({ id: f.id, name: f.name, size: f.size }));
    },
    async downloadById(fileId) {
        const tok = await this._tok();
        const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${tok}` } });
        if (!r.ok) throw new Error('gdrive_download:' + r.status);
        return r.json();
    }
};

// ── Microsoft OneDrive (Graph API via MSAL.js v2) ──────────────────────────
const OneDriveService = {
    get clientId() { return (window.__OAUTH_CONFIG && window.__OAUTH_CONFIG.msClientId) || ''; },
    SCOPES: ['Files.ReadWrite.AppFolder'],
    FILE: 'financetracker-data.json',
    _app: null, _account: null, _msalReadyPromise: null,
    isConfigured() { return !!this.clientId; },
    isTokenValid() { const a = this._getApp(); return !!(a && a.getAllAccounts().length > 0); },
    // msal-browser.min.js is loaded with async+defer, so it can still be missing the moment
    // the app checks for an existing session right after a fresh page load (window.msal is
    // undefined for a beat), which used to make isTokenValid() report false and pop the
    // reconnect gate even though the session was actually still valid in storage. Bound-poll
    // for the script to finish loading before trusting a negative isTokenValid() result.
    waitUntilReady(timeoutMs = 3000) {
        if (window.msal) return Promise.resolve(true);
        if (this._msalReadyPromise) return this._msalReadyPromise;
        this._msalReadyPromise = new Promise(resolve => {
            const start = Date.now();
            const poll = () => {
                if (window.msal) { resolve(true); return; }
                if (Date.now() - start >= timeoutMs) { resolve(false); return; }
                setTimeout(poll, 50);
            };
            poll();
        });
        return this._msalReadyPromise;
    },
    _getApp() {
        if (!window.msal || !this.clientId) return null;
        if (!this._app) {
            try { this._app = new window.msal.PublicClientApplication({ auth: { clientId: this.clientId, redirectUri: window.location.origin } }); } catch { return null; }
        }
        return this._app;
    },
    async requestToken() {
        const app = this._getApp();
        if (!app) throw new Error('not_configured');
        const r = await app.acquireTokenPopup({ scopes: this.SCOPES });
        this._account = r.account; return r.accessToken;
    },
    async _tok() {
        const app = this._getApp();
        if (!app) throw new Error('not_configured');
        const accounts = app.getAllAccounts();
        if (accounts.length) {
            try { const r = await app.acquireTokenSilent({ scopes: this.SCOPES, account: accounts[0] }); this._account = r.account; return r.accessToken; } catch {}
        }
        return this.requestToken();
    },
    clearToken() { this._account = null; this._app = null; },
    _histName() {
        // Seconds included — minute-only precision let two saves in the same minute produce
        // the identical filename, so Drive/OneDrive kept both as separate files instead of
        // one: version history showed duplicate timestamps, the 5-snapshot prune cap filled
        // up with near-duplicates faster than expected, and storage grew accordingly.
        const n = new Date(); const p = x => String(x).padStart(2,'0');
        return `financetracker-${n.getUTCFullYear()}-${p(n.getUTCMonth()+1)}-${p(n.getUTCDate())}-${p(n.getUTCHours())}${p(n.getUTCMinutes())}${p(n.getUTCSeconds())}.json`;
    },
    async _pruneOdHistory(tok) {
        try {
            const r = await fetch(`https://graph.microsoft.com/v1.0/me/drive/special/approot/children`, { headers: { Authorization: `Bearer ${tok}` } });
            if (!r.ok) return;
            const { value } = await r.json();
            const hist = (value || []).filter(f => /^financetracker-\d{4}/.test(f.name)).sort((a,b) => b.name.localeCompare(a.name));
            const toDelete = selectHistoryFilesToPrune(hist);
            for (const f of toDelete) {
                await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${f.id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${tok}` } });
            }
        } catch (_) {}
    },
    async upload(json) {
        const tok = await this._tok();
        const body = JSON.stringify(json);
        const r = await fetch(`https://graph.microsoft.com/v1.0/me/drive/special/approot:/${encodeURIComponent(this.FILE)}:/content`, {
            method: 'PUT', headers: { Authorization: `Bearer ${tok}`, 'Content-Type': 'application/json' }, body
        });
        if (!r.ok) throw new Error('onedrive_upload:' + r.status);
        // versioned snapshot — best-effort
        try {
            const sr = await fetch(`https://graph.microsoft.com/v1.0/me/drive/special/approot:/${encodeURIComponent(this._histName())}:/content`, {
                method: 'PUT', headers: { Authorization: `Bearer ${tok}`, 'Content-Type': 'application/json' }, body
            });
            if (sr.ok) this._pruneOdHistory(tok);
        } catch (_) {}
    },
    async download() {
        const tok = await this._tok();
        const r = await fetch(`https://graph.microsoft.com/v1.0/me/drive/special/approot:/${encodeURIComponent(this.FILE)}:/content`, { headers: { Authorization: `Bearer ${tok}` } });
        if (r.status === 404) return null;
        if (!r.ok) throw new Error('onedrive_download:' + r.status);
        return r.json();
    },
    async listHistory() {
        const tok = await this._tok();
        const r = await fetch(`https://graph.microsoft.com/v1.0/me/drive/special/approot/children`, { headers: { Authorization: `Bearer ${tok}` } });
        if (!r.ok) return [];
        const { value } = await r.json();
        return (value || []).filter(f => /^financetracker-\d{4}/.test(f.name)).sort((a,b) => b.name.localeCompare(a.name)).map(f => ({ id: f.id, name: f.name, size: f.size }));
    },
    async downloadById(fileId) {
        const tok = await this._tok();
        const r = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/content`, { headers: { Authorization: `Bearer ${tok}` } });
        if (!r.ok) throw new Error('onedrive_download:' + r.status);
        return r.json();
    }
};

// ── Unified SyncService ────────────────────────────────────────────────────
const SyncService = {
    DOWNLOAD_TIMEOUT_MS: 15000,
    pref() { return localStorage.getItem('financeApp_storagePreference') || 'local'; },
    isCloudEnabled() { const p = this.pref(); return p === 'gdrive' || p === 'onedrive'; },
    svc() { const p = this.pref(); if (p === 'gdrive') return GDriveService; if (p === 'onedrive') return OneDriveService; return null; },
    // Cloud downloads use plain fetch(), which has no built-in timeout — an unresponsive
    // provider (dead connection, slow mobile network) leaves the promise pending forever,
    // so any UI gated on it (e.g. the login "checking" spinner) never resolves.
    _withTimeout(promise, ms) {
        return new Promise((resolve, reject) => {
            const timer = setTimeout(() => reject(new Error('sync_timeout')), ms);
            promise.then(
                v => { clearTimeout(timer); resolve(v); },
                e => { clearTimeout(timer); reject(e); }
            );
        });
    },
    async upload(json) {
        const s = this.svc(); if (!s) return { status: 'local' };
        if (!s.isConfigured()) return { status: 'not_configured' };
        // For GDrive, only upload if we already have a session token (no popup mid-update)
        if (s === GDriveService && !GDriveService.isTokenValid()) return { status: 'reconnect-needed' };
        try {
            await s.upload(json);
            const now = new Date().toISOString();
            localStorage.setItem('financeApp_lastCloudSync', now);
            return { status: 'success', syncedAt: now };
        } catch (err) {
            const m = err.message || '';
            if (m.includes('popup') || m.includes('interaction_required') || m.includes('not_configured') || m.includes('gis_not_loaded')) return { status: 'reconnect-needed' };
            return { status: 'error' };
        }
    },
    async download() { const s = this.svc(); if (!s || !s.isConfigured()) return null; return this._withTimeout(s.download(), this.DOWNLOAD_TIMEOUT_MS); },
    async listHistory() { const s = this.svc(); if (!s || !s.isConfigured()) return []; try { return await this._withTimeout(s.listHistory(), this.DOWNLOAD_TIMEOUT_MS); } catch (_) { return []; } },
    async downloadVersion(id) { const s = this.svc(); if (!s) return null; return this._withTimeout(s.downloadById(id), this.DOWNLOAD_TIMEOUT_MS); }
};

// ── Cloud Restore Modal ────────────────────────────────────────────────────
function CloudRestoreModal({ backupData, currentUser, onRestore, onKeepLocal }) {
    const [restoring, setRestoring] = React.useState(false);
    const [restoreError, setRestoreError] = React.useState('');
    // TOFU: unsigned backup requires explicit user acknowledgement before restoring
    const isUnsigned = !backupData.backupSignature;
    const [tofuConfirmed, setTofuConfirmed] = React.useState(!isUnsigned);
    const exp = (backupData.data && backupData.data.expenses && backupData.data.expenses.length) || 0;
    const inc = (backupData.data && backupData.data.income && backupData.data.income.length) || 0;
    const dateStr = backupData.createdAt ? new Date(backupData.createdAt).toLocaleString() : 'Unknown date';
    const handleRestore = async () => {
        if (!tofuConfirmed) return;
        setRestoring(true);
        setRestoreError('');
        try {
            // Re-validate ownership and signature before restoring (prevents TOCTOU bypass)
            if (!isBackupOwnedByCurrentUser(backupData, currentUser)) {
                setRestoreError('This backup does not belong to your account.');
                setRestoring(false); return;
            }
            const sigResult = await verifyBackupSignature(backupData, currentUser);
            // For TOFU flow: if the user confirmed, allow requiresConfirmation; block tampered
            if (!isSignatureAcceptable(sigResult) || sigResult.tampered) {
                setRestoreError('Backup integrity check failed — restore blocked.');
                setRestoring(false); return;
            }
            DataService.restoreBackup(backupData);
        } catch (e) {
            console.error(e);
            setRestoreError('Restore failed: ' + (e && e.message ? e.message : 'unknown error') + '. Your existing data was not replaced.');
            setRestoring(false);
            return;
        }
        onRestore();
    };
    return (
        <div style={{position:'fixed',inset:0,zIndex:9998,background:'rgba(0,0,0,0.72)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
            <div style={{background:'#fff',borderRadius:'16px',padding:'1.5rem',maxWidth:'400px',width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
                <div className="text-center mb-3">
                    <div style={{fontSize:'2.5rem',marginBottom:'0.5rem',color:'#4a6cf7'}}><i className="fas fa-cloud-download-alt"></i></div>
                    <h4 className="fw-bold mb-1">Cloud Backup Found</h4>
                    <p className="text-muted mb-0" style={{fontSize:'0.88rem'}}>A newer backup was found in your cloud storage.</p>
                </div>
                <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'10px',padding:'0.75rem',marginBottom:'1.25rem'}}>
                    <div style={{fontSize:'0.82rem',color:'#166534',fontWeight:'600',marginBottom:'2px'}}><i className="fas fa-calendar-alt me-2"></i>{dateStr}</div>
                    <div style={{fontSize:'0.8rem',color:'#15803d'}}>{exp} expense{exp!==1?'s':''} · {inc} income record{inc!==1?'s':''}</div>
                </div>
                {isUnsigned && (
                    <div className="alert alert-warning py-2 mb-2" style={{fontSize:'0.82rem'}}>
                        <i className="fas fa-exclamation-triangle me-2"></i>
                        <strong>No integrity signature.</strong> This backup was created before cryptographic signing was enabled (or the signature was removed). Verify you trust its source before restoring.
                        <div className="form-check mt-2 mb-0">
                            <input className="form-check-input" type="checkbox" id="tofuCheckbox" checked={tofuConfirmed} onChange={e => setTofuConfirmed(e.target.checked)} />
                            <label className="form-check-label" htmlFor="tofuCheckbox" style={{fontSize:'0.78rem'}}>I understand and want to restore this unsigned backup</label>
                        </div>
                    </div>
                )}
                {restoreError && <div className="alert alert-danger py-2 mb-2" style={{fontSize:'0.82rem'}}><i className="fas fa-shield-alt me-2"></i>{restoreError}</div>}
                <div className="d-grid gap-2">
                    <button className="btn btn-primary" onClick={handleRestore} disabled={restoring || !tofuConfirmed}>
                        {restoring ? <><span className="spinner-border spinner-border-sm me-2"></span>Restoring…</> : <><i className="fas fa-cloud-download-alt me-2"></i>Use Cloud Backup</>}
                    </button>
                    <button className="btn btn-outline-secondary" onClick={onKeepLocal} disabled={restoring}><i className="fas fa-mobile-alt me-2"></i>Keep This Device's Data</button>
                </div>
                <p className="text-muted text-center mt-2 mb-0" style={{fontSize:'0.72rem'}}>Restoring will reload the app with cloud data</p>
            </div>
        </div>
    );
}

// ── Cloud History Modal ────────────────────────────────────────────────────
function CloudHistoryModal({ onClose, onRestored, currentUser }) {
    const [loading, setLoading] = React.useState(true);
    const [snapshots, setSnapshots] = React.useState([]);
    const [error, setError] = React.useState('');
    const [restoring, setRestoring] = React.useState(null); // id of snapshot being restored
    const [confirmed, setConfirmed] = React.useState(null); // snapshot awaiting confirm
    const [confirmText, setConfirmText] = React.useState('');

    React.useEffect(() => {
        SyncService.listHistory().then(files => { setSnapshots(files); setLoading(false); })
            .catch(e => { setError('Could not load history: ' + e.message); setLoading(false); });
    }, []);

    const parseName = (name) => {
        // financetracker-2026-06-27-143045.json
        const m = name.match(/financetracker-(\d{4})-(\d{2})-(\d{2})-(\d{2})(\d{2})(\d{2})\.json/);
        if (!m) return null;
        return new Date(Date.UTC(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]));
    };

    const retention = (JSON.parse(localStorage.getItem('financeApp_settings') || '{}').cloudBackupRetention) || 'count5';
    const retentionLabel = { count5: 'max 5 kept', '7d': 'kept for 7 days', '30d': 'kept for 30 days', '90d': 'kept for 90 days' }[retention] || 'max 5 kept';

    const doRestore = async (snap) => {
        setConfirmed(null);
        setConfirmText('');
        setRestoring(snap.id);
        try {
            const data = await SyncService.downloadVersion(snap.id);
            if (!data) throw new Error('Empty response');
            // Fail-closed: reject snapshots that don't belong to the current user
            if (!isBackupOwnedByCurrentUser(data, currentUser)) {
                throw new Error('This snapshot belongs to a different account and cannot be restored.');
            }
            // Reject if signature is missing, requires confirmation, or is invalid.
            // CloudHistoryModal has no TOFU confirmation UI, so requiresConfirmation is also blocked.
            const sigResult = await verifyBackupSignature(data, currentUser);
            if (!isSignatureAcceptable(sigResult) || sigResult.requiresConfirmation) {
                throw new Error('This snapshot failed integrity verification. Use the main restore flow to restore unsigned backups.');
            }
            DataService.restoreBackup(data);
            onRestored();
        } catch (e) {
            setError('Restore failed: ' + e.message);
            setRestoring(null);
        }
    };

    return (
        <div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.72)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
            <div style={{background:'#fff',borderRadius:'16px',padding:'1.5rem',maxWidth:'420px',width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,0.3)',maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
                <div className="d-flex align-items-center justify-content-between mb-3">
                    <div>
                        <h5 className="fw-bold mb-0"><i className="fas fa-history me-2 text-primary"></i>Version History</h5>
                        <div style={{fontSize:'0.78rem',color:'#6c757d'}}>Your cloud snapshots</div>
                    </div>
                    <button className="btn btn-sm btn-outline-secondary" onClick={onClose}><i className="fas fa-times"></i></button>
                </div>

                {loading && <div className="text-center py-4"><span className="spinner-border spinner-border-sm me-2"></span>Loading snapshots…</div>}
                {error && <div className="alert alert-danger py-2 mb-0" style={{fontSize:'0.85rem'}}><i className="fas fa-exclamation-circle me-1"></i>{error}</div>}

                {!loading && !error && snapshots.length === 0 && (
                    <div className="text-center py-4 text-muted">
                        <i className="fas fa-cloud" style={{fontSize:'2rem',opacity:0.3,marginBottom:'0.5rem',display:'block'}}></i>
                        No snapshots yet. They appear after your next sync.
                    </div>
                )}

                {!loading && snapshots.length > 0 && (
                    <div style={{overflowY:'auto',flex:1}}>
                        {snapshots.map((snap, i) => {
                            const date = parseName(snap.name);
                            const isRestoring = restoring === snap.id;
                            const isConfirming = confirmed && confirmed.id === snap.id;
                            return (
                                <div key={snap.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0.65rem 0.75rem',background: i===0 ? '#f0fdf4' : '#f8f9fa',borderRadius:'10px',marginBottom:'0.5rem',border: i===0 ? '1px solid #bbf7d0' : '1px solid #e9ecef'}}>
                                    <div>
                                        {i === 0 && <span style={{fontSize:'0.65rem',fontWeight:'700',background:'#16a34a',color:'#fff',borderRadius:'4px',padding:'1px 5px',marginRight:'6px'}}>LATEST</span>}
                                        <div style={{fontWeight:'600',fontSize:'0.88rem',display:'inline'}}>
                                            {date ? date.toLocaleDateString([], {day:'numeric',month:'short',year:'numeric'}) : snap.name}
                                        </div>
                                        {date && <div style={{fontSize:'0.75rem',color:'#6c757d'}}>{date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} UTC</div>}
                                    </div>
                                    <div>
                                        {isConfirming ? (
                                            <div className="d-flex flex-column align-items-end gap-1">
                                                <input type="text" className="form-control form-control-sm" style={{fontSize:'0.7rem', width:'112px'}} placeholder="Type RESTORE" value={confirmText} onChange={e => setConfirmText(e.target.value)} autoFocus />
                                                <div className="d-flex gap-1">
                                                    <button className="btn btn-danger btn-sm" style={{fontSize:'0.75rem'}} onClick={() => doRestore(snap)} disabled={!!restoring || confirmText.trim().toUpperCase() !== 'RESTORE'}>Restore</button>
                                                    <button className="btn btn-outline-secondary btn-sm" style={{fontSize:'0.75rem'}} onClick={() => { setConfirmed(null); setConfirmText(''); }}>Cancel</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <button className="btn btn-sm btn-outline-primary" style={{fontSize:'0.75rem'}} onClick={() => { setConfirmed(snap); setConfirmText(''); }} disabled={!!restoring}>
                                                {isRestoring ? <span className="spinner-border spinner-border-sm"></span> : <><i className="fas fa-undo me-1"></i>Restore</>}
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}
                <div className="mt-3 pt-2" style={{borderTop:'1px solid #e9ecef',fontSize:'0.72rem',color:'#9ca3af',textAlign:'center'}}>
                    Snapshots are saved automatically on every sync · {retentionLabel}
                </div>
            </div>
        </div>
    );
}

class DataService {
    static data = { expenses: [], income: [], settings: { currency: 'GBP' }, categories: [] };
    static isInitialized = false;

    static async initialize() {
        if (this.isInitialized) return;
        try {
            const savedExpenses = localStorage.getItem('financeApp_expenses');
            const savedIncome = localStorage.getItem('financeApp_income');
            const savedCategories = localStorage.getItem('financeApp_categories');
            const savedSettings = localStorage.getItem('financeApp_settings');
            if (savedExpenses) this.data.expenses = JSON.parse(savedExpenses);
            if (savedIncome) this.data.income = JSON.parse(savedIncome);
            if (savedCategories) {
                this.data.categories = JSON.parse(savedCategories);
            } else {
                this.data.categories = [
                    { id: 1, name: 'Food & Dining', subcategories: ['Restaurants', 'Groceries', 'Coffee', 'Fast Food'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 2, name: 'Transportation', subcategories: ['Gas', 'Public Transit', 'Parking', 'Uber/Lyft'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 3, name: 'Shopping', subcategories: ['Clothing', 'Electronics', 'Home', 'Personal Care'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 4, name: 'Entertainment', subcategories: ['Movies', 'Sports', 'Music', 'Games'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 5, name: 'Bills & Utilities', subcategories: ['Electric', 'Water', 'Internet', 'Phone'], monthlyBudget: 0, subcategoryBudgets: {} }
                ];
                this.saveCategories();
            }
            if (savedSettings) {
                const parsed = JSON.parse(savedSettings);
                if (parsed.defaultCurrency && !parsed.currency) { parsed.currency = parsed.defaultCurrency; delete parsed.defaultCurrency; }
                this.data.settings = { ...this.data.settings, ...parsed };
                this.saveSettings();
            }
            this.isInitialized = true;
        } catch (error) {
            console.error('Error initializing DataService:', error);
            this.initializeDefaultData();
            this.isInitialized = true;
        }
    }

    static initializeDefaultData() {
        this.data.categories = [
            { id: 1, name: 'Food & Dining', subcategories: ['Restaurants', 'Groceries', 'Coffee', 'Fast Food'] },
            { id: 2, name: 'Transportation', subcategories: ['Gas', 'Public Transit', 'Parking', 'Uber/Lyft'] },
            { id: 3, name: 'Shopping', subcategories: ['Clothing', 'Electronics', 'Home', 'Personal Care'] },
            { id: 4, name: 'Entertainment', subcategories: ['Movies', 'Sports', 'Music', 'Games'] },
            { id: 5, name: 'Bills & Utilities', subcategories: ['Electric', 'Water', 'Internet', 'Phone'] }
        ];
        this.saveCategories();
    }

    static saveExpenses() { localStorage.setItem('financeApp_expenses', JSON.stringify(this.data.expenses)); }
    static saveIncome() { localStorage.setItem('financeApp_income', JSON.stringify(this.data.income)); }
    static saveCategories() { localStorage.setItem('financeApp_categories', JSON.stringify(this.data.categories)); }
    static saveSettings() { localStorage.setItem('financeApp_settings', JSON.stringify(this.data.settings)); }

    static getPeople() { return (this.data.settings.people || []).slice().sort((a, b) => a.name.localeCompare(b.name)); }
    static addPerson({ name, relationship, isDefault, systemManaged }) {
        if (!name || name.trim().length < 2) throw new Error('Person name must be at least 2 characters');
        if (!this.data.settings.people) this.data.settings.people = [];
        const trimmed = name.trim();
        const duplicate = this.data.settings.people.find(p => p.name.toLowerCase() === trimmed.toLowerCase());
        if (duplicate) throw new Error('A person with this name already exists');
        if (isDefault) this.data.settings.people.forEach(p => { p.isDefault = false; });
        const person = { id: DataService._uniqueId(), name: trimmed, relationship: (relationship || '').trim(), isDefault: !!isDefault, systemManaged: !!systemManaged };
        this.data.settings.people.push(person);
        this.saveSettings();
        return person;
    }
    static updatePerson(id, updates) {
        if (!this.data.settings.people) return null;
        const person = this.data.settings.people.find(p => p.id === id);
        if (!person) return null;
        const oldName = person.name;
        if (updates.name !== undefined) {
            const trimmed = updates.name.trim();
            if (trimmed.length < 2) throw new Error('Person name must be at least 2 characters');
            const duplicate = this.data.settings.people.find(p => p.id !== id && p.name.toLowerCase() === trimmed.toLowerCase());
            if (duplicate) throw new Error('A person with this name already exists');
            person.name = trimmed;
            if (oldName !== trimmed) this.migratePersonName(oldName, trimmed);
        }
        if (updates.relationship !== undefined) person.relationship = updates.relationship.trim();
        if (updates.isDefault) {
            this.data.settings.people.forEach(p => { p.isDefault = false; });
            person.isDefault = true;
        } else if (updates.isDefault === false) {
            person.isDefault = false;
        }
        this.saveSettings();
        return person;
    }
    static deletePerson(id) {
        if (!this.data.settings.people) return null;
        const index = this.data.settings.people.findIndex(p => p.id === id);
        if (index === -1) return null;
        const deleted = this.data.settings.people.splice(index, 1)[0];
        this.saveSettings();
        return deleted;
    }
    static migratePersonName(oldName, newName) {
        this.data.expenses.forEach(exp => { if (exp.paidBy === oldName) exp.paidBy = newName; });
        this.data.income.forEach(inc => { if (inc.paidBy === oldName) inc.paidBy = newName; });
        this.saveExpenses();
        this.saveIncome();
    }
    static setDefaultPerson(id) {
        if (!this.data.settings.people) return;
        this.data.settings.people.forEach(p => { p.isDefault = (p.id === id); });
        this.saveSettings();
    }

    static async getExpenses() { await this.initialize(); return [...this.data.expenses].sort((a, b) => new Date(b.date) - new Date(a.date)); }
    static _lastId = 0;
    static _uniqueId() {
        const now = Date.now();
        DataService._lastId = now > DataService._lastId ? now : DataService._lastId + 1;
        return DataService._lastId;
    }
    static async addExpense(expense) {
        await this.initialize();
        const newExpense = { ...expense, id: DataService._uniqueId(), createdAt: new Date().toISOString() };
        this.data.expenses.push(newExpense);
        this.saveExpenses();
        return newExpense;
    }
    static async addExpenseWithConversion(expense) {
        await this.initialize();
        const expenseData = { ...expense, id: DataService._uniqueId(), createdAt: new Date().toISOString() };
        this.data.expenses.push(expenseData);
        this.saveExpenses();
        return expenseData;
    }
    static async updateExpense(id, updates) {
        await this.initialize();
        const index = this.data.expenses.findIndex(expense => expense.id === id);
        if (index !== -1) { this.data.expenses[index] = { ...this.data.expenses[index], ...updates }; this.saveExpenses(); return this.data.expenses[index]; }
        return null;
    }
    static async deleteExpense(id) {
        await this.initialize();
        const index = this.data.expenses.findIndex(expense => expense.id === id);
        if (index !== -1) { const deleted = this.data.expenses.splice(index, 1)[0]; this.saveExpenses(); this.recordDeletion('expenses', id); return deleted; }
        return null;
    }
    static async deleteExpensesBySplitGroup(splitGroupId) {
        await this.initialize();
        const toDelete = this.data.expenses.filter(expense => expense.splitGroupId === splitGroupId);
        this.data.expenses = this.data.expenses.filter(expense => expense.splitGroupId !== splitGroupId);
        this.saveExpenses();
        toDelete.forEach(expense => this.recordDeletion('expenses', expense.id));
        return toDelete.length;
    }
    static clearAllExpenses() { this.data.expenses = []; this.saveExpenses(); }
    static clearAllIncome() { this.data.income = []; this.saveIncome(); }
    static async getExpensesByCategory(categoryId, subcategory = null) {
        await this.initialize();
        return this.data.expenses.filter(expense => {
            const matchesCategory = expense.categoryId === categoryId;
            const matchesSubcategory = !subcategory || expense.subcategory === subcategory;
            return matchesCategory && matchesSubcategory;
        });
    }
    static async getIncome() { await this.initialize(); return [...this.data.income].sort((a, b) => new Date(b.date) - new Date(a.date)); }
    static async addIncome(income) {
        await this.initialize();
        const newIncome = { id: DataService._uniqueId(), ...income, createdAt: new Date().toISOString() };
        this.data.income.push(newIncome);
        this.saveIncome();
        return newIncome;
    }
    static async addIncomeWithConversion(income) {
        await this.initialize();
        const incomeData = { ...income, id: DataService._uniqueId(), createdAt: new Date().toISOString() };
        this.data.income.push(incomeData);
        this.saveIncome();
        return incomeData;
    }
    static async updateIncome(id, updates) {
        await this.initialize();
        const index = this.data.income.findIndex(income => income.id === id);
        if (index !== -1) { this.data.income[index] = { ...this.data.income[index], ...updates }; this.saveIncome(); return this.data.income[index]; }
        return null;
    }
    static async deleteIncome(id) {

    static async getBudgetSummary() {
        await this.initialize();

        const budgetSummary = [];
        this.data.categories.forEach(category => {
            const categoryExpenses = monthlyExpenses.filter(expense => expense.categoryId === category.id);
            const totalSpent = categoryExpenses.reduce((sum, expense) => sum + expense.amount, 0);
            const categoryData = { id: category.id, name: category.name, budget: category.monthlyBudget || 0, spent: totalSpent, remaining: (category.monthlyBudget || 0) - totalSpent, percentage: category.monthlyBudget > 0 ? (totalSpent / category.monthlyBudget) * 100 : 0, notificationThreshold: category.notificationThreshold || 80, subcategories: [] };

                const subcatExpenses = categoryExpenses.filter(expense => expense.subcategory === subcatName);
                const subcatSpent = subcatExpenses.reduce((sum, expense) => sum + expense.amount, 0);
                const subcatBudget = (category.subcategoryBudgets && category.subcategoryBudgets[subcatName]) || 0;
                if (subcatBudget > 0 || subcatSpent > 0) { categoryData.subcategories.push({ name: subcatName, budget: subcatBudget, spent: subcatSpent, remaining: subcatBudget - subcatSpent, percentage: subcatBudget > 0 ? (subcatSpent / subcatBudget) * 100 : 0 }); }
            });
            if (categoryData.budget > 0 || categoryData.spent > 0) budgetSummary.push(categoryData);
        });
        return budgetSummary;
    }

    static async processRecurringSchedules() {
        const schedules = this.getRecurring();
        const today = new Date().toISOString().split('T')[0];
        let changed = false;
        for (const schedule of schedules) {
            if (!schedule.isActive) continue;
            if (schedule.endDate && today > schedule.endDate) continue;
            while (schedule.nextDue <= today) {
                const instance = { ...schedule.templateExpense, id: DataService._uniqueId(), date: schedule.nextDue, createdAt: new Date().toISOString() };
                if (schedule.type === 'expense') await this.addExpense(instance);
                else await this.addIncome(instance);
                schedule.lastGenerated = schedule.nextDue;
                schedule.nextDue = computeNextDue(schedule.nextDue, schedule.frequency);
                changed = true;
            }
        }
        if (changed) this.saveRecurring(schedules);

        const data = {};

        const storedUser = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null'); } catch(_) { return null; } })();

    static restoreBackup(backupData) {
        if (!backupData || !backupData.version || !backupData.data) throw new Error('Invalid backup structure');
        const entries = Object.entries(backupData.data).filter(([, value]) => value !== null && value !== undefined);
        // Stamp lastSaveTime so the cloud-vs-local check after reload sees equal timestamps
        // and never re-prompts for the same backup
        const saveTime = backupData.createdAt || new Date().toISOString();
        const writes = [
            ...entries.map(([key, value]) => ['financeApp_' + key, JSON.stringify(value)]),
            ['financeApp_lastSaveTime', saveTime],
            ['financeApp_latestBackup', JSON.stringify(backupData)],
        ];
        // Snapshot pre-restore values so a failure partway through (e.g. quota exceeded)
        // can be rolled back instead of leaving localStorage half-old/half-new
        const previous = writes.map(([key]) => [key, localStorage.getItem(key)]);
        try {
            writes.forEach(([key, value]) => localStorage.setItem(key, value));
            return entries.length;
        } catch (e) {
            previous.forEach(([key, value]) => {
                try { if (value === null) localStorage.removeItem(key); else localStorage.setItem(key, value); }
                catch (_) { /* best-effort rollback */ }
            });
            throw e;
        }
    }

    static mergeBackups(localBackup, cloudBackup) {
        // Union two backups by record ID — neither device loses data.
        // For the same ID, whichever record has the newer createdAt/updatedAt wins.
        // Deletion log entries from both devices are unioned so deletes propagate.
        const mergeById = (localArr, cloudArr) => {
            const a = Array.isArray(localArr) ? localArr : [];
            const b = Array.isArray(cloudArr) ? cloudArr : [];
            const map = new Map();
            for (const item of b) { if (item && item.id != null) map.set(String(item.id), item); }
            for (const item of a) {
                if (!item || item.id == null) continue;
                const key = String(item.id);
                if (!map.has(key)) { map.set(key, item); }
                else {
                    const lt = new Date(item.updatedAt || item.createdAt || 0).getTime();
                    const ct = new Date(map.get(key).updatedAt || map.get(key).createdAt || 0).getTime();
                    if (lt >= ct) map.set(key, item);
                }
            }
            return Array.from(map.values());
        };
        const mergeDeletionLogs = (l, c) => {
            const lo = l || {}, co = c || {}, out = {};
            new Set([...Object.keys(lo), ...Object.keys(co)]).forEach(type => {
                out[type] = {};
                Object.keys(co[type] || {}).forEach(id => { out[type][id] = co[type][id]; });
                Object.keys(lo[type] || {}).forEach(id => {
                    if (!out[type][id] || lo[type][id] > out[type][id]) out[type][id] = lo[type][id];
                });
            });
            return out;
        };
        const ld = (localBackup && localBackup.data) || {};
        const cd = (cloudBackup && cloudBackup.data) || {};
        const merged = { ...cd };
        ['expenses','income','goals','bills','recurring','debts','netWorthHistory','categories','networth'].forEach(k => { merged[k] = mergeById(ld[k], cd[k]); });
        // Apply merged deletion log — items deleted on either device are removed
        const deletionLog = mergeDeletionLogs(ld._deletionLog, cd._deletionLog);
        ['expenses','income','goals','bills','recurring','debts','categories','networth'].forEach(key => {
            if (deletionLog[key] && merged[key]) {
                merged[key] = merged[key].filter(item => !deletionLog[key][String(item.id)]);
            }
        });
        merged._deletionLog = deletionLog;
        // mergeById's union order is cloud-items-then-local-only-items, not chronological —
        // the history table reads adjacent entries as consecutive-in-time, so restore date order
        if (Array.isArray(merged.netWorthHistory)) merged.netWorthHistory.sort((a, b) => new Date(a.date) - new Date(b.date));
        // For scalar blobs (settings, notifSettings), prefer the newer backup's version
        const cloudNewer = new Date(cloudBackup.createdAt || 0) >= new Date(localBackup.createdAt || 0);
        if (!cloudNewer) { if (ld.settings) merged.settings = ld.settings; if (ld.notifSettings) merged.notifSettings = ld.notifSettings; }
        // Only advance the timestamp if the merge actually added something cloud didn't
        // already have — otherwise every no-op merge re-stamps "now" and looks newer to
        // the other device, triggering an unnecessary re-merge on its very next edit.
        const addedNothingNew = JSON.stringify(merged) === JSON.stringify(cd);
        const createdAt = addedNothingNew ? (cloudBackup.createdAt || new Date().toISOString()) : new Date().toISOString();
        return { version: '1.0', createdAt, userId: cloudBackup.userId, data: merged };
    }

    // Reconciles the persisted notification list with whatever alert conditions are currently
    // true (activeAlerts: [{key, type, title, message, screen}]). Entries whose condition is no
    // longer active are dropped; still-active ones keep their existing id/read/createdAt so
    // re-running this on every data change doesn't spam duplicates or reset read state.
    static syncNotifications(activeAlerts) {
        const existing = this.getNotifications();
        const activeKeys = new Set(activeAlerts.map(a => a.key));
        const kept = existing.filter(n => activeKeys.has(n.key));
        const now = new Date().toISOString();
        activeAlerts.forEach(a => {
            const idx = kept.findIndex(n => n.key === a.key);
            if (idx !== -1) { kept[idx] = { ...kept[idx], type: a.type, title: a.title, message: a.message, screen: a.screen }; }
            else { kept.unshift({ id: this._uniqueId(), key: a.key, type: a.type, title: a.title, message: a.message, screen: a.screen, createdAt: now, read: false }); }
        });
        this.saveNotifications(kept.slice(0, 100));
        return kept;
    }

    static getDebts() { return JSON.parse(localStorage.getItem('financeApp_debts') || '[]'); }
    static saveDebts(d) { localStorage.setItem('financeApp_debts', JSON.stringify(d)); }
    static addDebt({ counterparty, amount, currency, direction, notes, dueDate, person }) {
        const debt = { id: DataService._uniqueId(), counterparty, amount: parseFloat(amount), currency, direction, notes: notes||'', dueDate: dueDate||'', person: person||'own', isSettled: false, createdAt: new Date().toISOString() };
        const debts = this.getDebts(); debts.push(debt); this.saveDebts(debts); return debt;
    }
    static updateDebt(id, updates) {
        const debts = this.getDebts(); const i = debts.findIndex(x => x.id === id);
        if (i !== -1) { debts[i] = { ...debts[i], ...updates }; this.saveDebts(debts); }
    }
    static settleDebt(id) { const debts = this.getDebts(); const d = debts.find(x => x.id === id); if (d) { d.isSettled = true; d.settledAt = new Date().toISOString(); this.saveDebts(debts); } }
    static deleteDebt(id) { const debts = this.getDebts(); const i = debts.findIndex(x => x.id === id); if (i !== -1) { debts.splice(i, 1); this.saveDebts(debts); this.recordDeletion('debts', id); } }
    static getNetWorthItems() { return JSON.parse(localStorage.getItem('financeApp_networth') || '[]'); }
    static saveNetWorthItems(items) { localStorage.setItem('financeApp_networth', JSON.stringify(items)); }
    static addNetWorthItem({ name, value, currency, category, type, notes, person }) {
        const item = { id: DataService._uniqueId(), name, value: parseFloat(value), currency, category, type, notes: notes||'', person: person||'own', updatedAt: new Date().toISOString() };
        const items = this.getNetWorthItems(); items.push(item); this.saveNetWorthItems(items);
        this.autoSaveNetWorthSnapshot(); return item;
    }
    // skipHistory: true for corrections to the base amount (typos, data-entry fixes) so they
    // don't get recorded as a net-worth movement; a real valuation update should log normally.
    static updateNetWorthItem(id, updates, { skipHistory = false } = {}) {
        const items = this.getNetWorthItems(); const i = items.findIndex(x => x.id === id);
        if (i !== -1) { items[i] = { ...items[i], ...updates, updatedAt: new Date().toISOString() }; this.saveNetWorthItems(items); }
        if (!skipHistory) this.autoSaveNetWorthSnapshot();
    }
    static deleteNetWorthItem(id) {
        const items = this.getNetWorthItems(); const i = items.findIndex(x => x.id === id);
        if (i !== -1) { items.splice(i, 1); this.saveNetWorthItems(items); this.recordDeletion('networth', id); }
        this.autoSaveNetWorthSnapshot();
    }
    static computeNetWorth() {
        const defaultCurrency = (JSON.parse(localStorage.getItem('financeApp_settings') || '{}')).defaultCurrency || 'GBP';
        const items = this.getNetWorthItems();
        let total = 0;
        items.forEach(item => {
            const rates = CurrencyService.fallbackRates[item.currency];
            const rate = rates ? (rates[defaultCurrency] || 1) : 1;
            const converted = item.value * rate;
            total += item.type === 'asset' ? converted : -converted;
        });
        return total;
    }
    static autoSaveNetWorthSnapshot() {
        const history = JSON.parse(localStorage.getItem('financeApp_netWorthHistory') || '[]');
        // id is required so mergeBackups() can union history entries across devices instead
        // of dropping every entry (mergeById skips any item with id == null)
        history.push({ id: this._uniqueId(), date: new Date().toISOString().split('T')[0], netWorth: this.computeNetWorth() });
        localStorage.setItem('financeApp_netWorthHistory', JSON.stringify(history.slice(-24)));
    }
    static getNetWorthHistory() { return JSON.parse(localStorage.getItem('financeApp_netWorthHistory') || '[]'); }
    static clearNetWorthHistory() { localStorage.setItem('financeApp_netWorthHistory', '[]'); }
    static clearAllUserData() {
        // Wipe every financeApp_* key and cloud file-ID cache from localStorage
        Object.keys(localStorage)
            .filter(k => k.startsWith('financeApp_'))
            .forEach(k => localStorage.removeItem(k));
        localStorage.removeItem('ftGdFileId');
        // Reset in-memory DataService state so the next user starts fresh
        this.data = { expenses: [], income: [], settings: { currency: 'GBP' }, categories: [] };
        this.isInitialized = false;
    }
}

// Fail-closed backup ownership check.
// Returns true only when the backup is confirmed to belong to the current user.
// If the user is signed in but the backup carries no userId, it is treated as
// untrusted and rejected (an attacker can strip/null the field).
function isBackupOwnedByCurrentUser(backup, currentUser) {
    const currentUid = currentUser ? (currentUser.uid || String(currentUser.id)) : null;
    if (!currentUid) return true; // No signed-in user — allow restore
    if (!backup || !backup.userId) return false; // Signed in but backup has no owner stamp — reject
    return backup.userId === currentUid;
}

// ── Backup tamper-evidence (HMAC-SHA256) ──────────────────────────────────────
// The signing key is stored per-user under a non-financeApp_ prefix so it
// survives DataService.clearAllUserData() (which only wipes financeApp_* keys).
// The key is NEVER embedded in the cloud backup, so an attacker with cloud write
// access cannot forge a valid signature without access to the victim's device.
function getOrCreateBackupSignKey(userId) {
    if (!userId) return null;
    const storageKey = 'ftBsk_' + userId;
    let key = localStorage.getItem(storageKey);
    if (!key) {
        try {
            const bytes = crypto.getRandomValues(new Uint8Array(32));
            key = btoa(String.fromCharCode(...bytes));
            localStorage.setItem(storageKey, key);
        } catch (_) { return null; }
    }
    return key;
}

async function signBackupForUpload(backup, currentUser) {
    try {
        const userId = currentUser ? (currentUser.uid || String(currentUser.id)) : null;
        const signKey = getOrCreateBackupSignKey(userId);
        if (!signKey || !backup.data) return backup;
        const keyBytes = Uint8Array.from(atob(signKey), c => c.charCodeAt(0));
        const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
        const dataBytes = new TextEncoder().encode(JSON.stringify(backup.data));
        const sig = await crypto.subtle.sign('HMAC', cryptoKey, dataBytes);
        return { ...backup, backupSignature: btoa(String.fromCharCode(...new Uint8Array(sig))) };
    } catch (_) { return backup; }
}

// Returns:
//   { ok: true }                      — HMAC signature verified ✓ → restore allowed
//   { ok: false, unverifiable: true } — no local signing key exists (device has never signed
//                                       a backup, or first-login on a new device) → allow silently
//   { ok: false, requiresConfirmation } — local key exists but backup carries no signature;
//                                       could be a legacy pre-signing backup or a stripped sig.
//                                       Migration policy: require explicit user confirmation
//                                       (TOFU — trust-on-first-use) before restoring, then sign
//                                       the next upload to enforce signatures going forward.
//   { ok: false, tampered: true }     — signature present but HMAC mismatch → ALWAYS reject.
async function verifyBackupSignature(backup, currentUser) {
    try {
        const userId = currentUser ? (currentUser.uid || String(currentUser.id)) : null;
        const signKey = userId ? localStorage.getItem('ftBsk_' + userId) : null;

        // No local key at all — this device has never signed a backup.
        // Treat as unverifiable and allow silently (first-use / cross-device fresh install).
        if (!signKey) return { ok: false, unverifiable: true };

        // Key exists but backup has no signature → TOFU migration policy.
        // Restore paths that have a modal must ask for explicit user confirmation.
        // Headless restore paths (no modal) must refuse.
        if (!backup || !backup.backupSignature) {
            return { ok: false, requiresConfirmation: true };
        }

        const keyBytes = Uint8Array.from(atob(signKey), c => c.charCodeAt(0));
        const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: 'SHA-256' }, false, ['verify']);
        const dataBytes = new TextEncoder().encode(JSON.stringify(backup.data));
        const sigBytes = Uint8Array.from(atob(backup.backupSignature), c => c.charCodeAt(0));
        const valid = await crypto.subtle.verify('HMAC', cryptoKey, sigBytes, dataBytes);
        // Signature present and valid → full trust
        if (valid) return { ok: true };
        // Signature present but doesn't match this device's key.
        // This is expected when the backup was uploaded from a different device
        // (each device holds its own random key in localStorage). We cannot
        // distinguish a cross-device backup from a genuinely tampered one
        // without a shared key, so treat it as unverifiable and allow it
        // through silently — the same as a first-login / new-device restore.
        return { ok: false, unverifiable: true };
    } catch (_) { return { ok: false, unverifiable: true }; }
}

// Returns true when a backup's integrity state allows restore to proceed.
// ok and unverifiable → allow; requiresConfirmation → allow only via modal TOFU path;
// tampered → always block.
// Headless restore paths (no confirmation UI) must check !sigResult.requiresConfirmation separately.
function isSignatureAcceptable(sigResult) {
    return sigResult.ok || sigResult.unverifiable || sigResult.requiresConfirmation;
}

function computeNextDue(fromDate, frequency) {
    const d = new Date(fromDate);
    if (frequency === 'daily') d.setDate(d.getDate() + 1);
    if (frequency === 'weekly') d.setDate(d.getDate() + 7);
    if (frequency === 'monthly') d.setMonth(d.getMonth() + 1);
    if (frequency === 'yearly') d.setFullYear(d.getFullYear() + 1);
    return d.toISOString().split('T')[0];
}
