// Draws a bar that grows upward from a baseline with rounded top corners and a
// square bottom edge (per the app's chart mark spec — data-end rounded, baseline square).
function verticalBarPath(x, yTop, w, h, r) {
    if (h <= 0) return '';
    const radius = Math.min(r, w / 2, h);
    return `M ${x} ${yTop + h} L ${x} ${yTop + radius} Q ${x} ${yTop} ${x + radius} ${yTop} L ${x + w - radius} ${yTop} Q ${x + w} ${yTop} ${x + w} ${yTop + radius} L ${x + w} ${yTop + h} Z`;
}
// Mirror of verticalBarPath for a bar growing rightward from a baseline (rounded
// at the tip, square at the left/baseline edge).
function horizontalBarPath(x, y, w, h, r) {
    if (w <= 0) return '';
    const radius = Math.min(r, h / 2, w);
    return `M ${x} ${y} L ${x + w - radius} ${y} Q ${x + w} ${y} ${x + w} ${y + radius} L ${x + w} ${y + h - radius} Q ${x + w} ${y + h} ${x + w - radius} ${y + h} L ${x} ${y + h} Z`;
}
const formatCompactAmount = (value, defaultCurrency) => {
    const symbol = ValidationUtils.getCurrencySymbol(defaultCurrency);
    return symbol + new Intl.NumberFormat('en', { notation: 'compact', maximumFractionDigits: 1 }).format(value);
};

// Grouped vertical bar chart: income vs expense across the last N months.
// Colors match the existing summary cards above it (success green / danger red)
// so the same income/expense color mapping is used everywhere on this screen.
function IncomeExpenseTrendChart({ months, defaultCurrency }) {
    const [hovered, setHovered] = useState(null); // { i, series } | null
    const INCOME_COLOR = '#10b981', EXPENSE_COLOR = '#ef4444';
    const width = 340, height = 190;
    const padding = { top: 14, right: 10, bottom: 22, left: 6 };
    const plotWidth = width - padding.left - padding.right;
    const plotHeight = height - padding.top - padding.bottom;
    const rawMax = Math.max(1, ...months.flatMap(m => [m.income, m.expense]));
    const magnitude = Math.pow(10, Math.floor(Math.log10(rawMax)));
    const residual = rawMax / magnitude;
    const niceResidual = residual > 5 ? 10 : residual > 2 ? 5 : residual > 1 ? 2 : 1;
    const niceMax = niceResidual * magnitude;
    const gridFractions = [0, 0.25, 0.5, 0.75, 1];
    const groupWidth = plotWidth / months.length;
    const barWidth = Math.min(20, groupWidth / 2 - 6);
    const barGap = 3;
    const yFor = (v) => padding.top + plotHeight - (v / niceMax) * plotHeight;

    return (
        <div style={{ position: 'relative' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '0.5rem', fontSize: '0.8rem' }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: '0.35rem' }}><span style={{ width: 10, height: 10, borderRadius: 2, background: INCOME_COLOR, display: 'inline-block' }}></span>Income</span>
                <span style={{ display: 'flex', alignItems: 'center', gap: '0.35rem' }}><span style={{ width: 10, height: 10, borderRadius: 2, background: EXPENSE_COLOR, display: 'inline-block' }}></span>Expense</span>
            </div>
            <svg viewBox={`0 0 ${width} ${height}`} style={{ width: '100%', height: 'auto', display: 'block', overflow: 'visible' }}>
                {gridFractions.map((f, i) => (
                    <g key={i}>
                        <line x1={padding.left} x2={width - padding.right} y1={yFor(niceMax * f)} y2={yFor(niceMax * f)} stroke="#e5e7eb" strokeWidth="1" />
                        <text x={padding.left} y={yFor(niceMax * f) - 2} fontSize="7.5" fill="#898781">{formatCompactAmount(niceMax * f, defaultCurrency)}</text>
                    </g>
                ))}
                {months.map((m, i) => {
                    const groupX = padding.left + i * groupWidth;
                    const incomeX = groupX + groupWidth / 2 - barWidth - barGap / 2;
                    const expenseX = groupX + groupWidth / 2 + barGap / 2;
                    const isCurrent = i === months.length - 1;
                    const incomeHovered = hovered && hovered.i === i && hovered.series === 'income';
                    const expenseHovered = hovered && hovered.i === i && hovered.series === 'expense';
                    return (
                        <g key={i}>
                            <path d={verticalBarPath(incomeX, yFor(m.income), barWidth, plotHeight - (yFor(m.income) - padding.top), 4)}
                                fill={INCOME_COLOR} opacity={incomeHovered ? 1 : 0.9} style={{ cursor: 'pointer' }} tabIndex={0}
                                onMouseEnter={() => setHovered({ i, series: 'income' })} onMouseLeave={() => setHovered(null)}
                                onFocus={() => setHovered({ i, series: 'income' })} onBlur={() => setHovered(null)} />
                            <path d={verticalBarPath(expenseX, yFor(m.expense), barWidth, plotHeight - (yFor(m.expense) - padding.top), 4)}
                                fill={EXPENSE_COLOR} opacity={expenseHovered ? 1 : 0.9} style={{ cursor: 'pointer' }} tabIndex={0}
                                onMouseEnter={() => setHovered({ i, series: 'expense' })} onMouseLeave={() => setHovered(null)}
                                onFocus={() => setHovered({ i, series: 'expense' })} onBlur={() => setHovered(null)} />
                            {isCurrent && (
                                <>
                                    <text x={incomeX + barWidth / 2} y={yFor(m.income) - 4} textAnchor="middle" fontSize="7.5" fill="#1f2937" fontWeight="600">{formatCompactAmount(m.income, defaultCurrency)}</text>
                                    <text x={expenseX + barWidth / 2} y={yFor(m.expense) - 4} textAnchor="middle" fontSize="7.5" fill="#1f2937" fontWeight="600">{formatCompactAmount(m.expense, defaultCurrency)}</text>
                                </>
                            )}
                            <text x={groupX + groupWidth / 2} y={height - padding.bottom + 13} textAnchor="middle" fontSize="9" fill="#6b7280">{m.label}</text>
                        </g>
                    );
                })}
            </svg>
            {hovered && (() => {
                const m = months[hovered.i];
                const val = hovered.series === 'income' ? m.income : m.expense;
                const groupX = padding.left + hovered.i * groupWidth;
                const leftPct = ((groupX + groupWidth / 2) / width) * 100;
                const topPct = (yFor(val) / height) * 100;
                return (
                    <div style={{ position: 'absolute', left: leftPct + '%', top: topPct + '%', transform: 'translate(-50%, -110%)', background: '#1f2937', color: '#fff', padding: '0.3rem 0.55rem', borderRadius: '6px', fontSize: '0.72rem', pointerEvents: 'none', whiteSpace: 'nowrap', zIndex: 5 }}>
                        <strong>{ValidationUtils.formatCurrency(val, defaultCurrency)}</strong> · {hovered.series === 'income' ? 'Income' : 'Expense'} · {m.label}
                    </div>
                );
            })()}
        </div>
    );
}

// Horizontal bar chart for category spend: replaces the old duplicate progress-bar
// lists. Uses the project's validated categorical palette (fixed hue order — see
// dataviz skill), folding anything past the 7th category into a neutral "Other" bar.
function CategoryBarChart({ items, defaultCurrency }) {
    const [hoveredIdx, setHoveredIdx] = useState(null);
    const CATEGORY_PALETTE = ['#2a78d6', '#eb6834', '#1baf7a', '#eda100', '#e87ba4', '#008300', '#4a3aa7'];
    const OTHER_COLOR = '#9ca3af';
    const MAX_SLOTS = 7;

    const top = items.slice(0, MAX_SLOTS).map((it, i) => ({ name: it.name, total: it.total, color: CATEGORY_PALETTE[i] }));
    const rest = items.slice(MAX_SLOTS);
    const bars = rest.length > 0 ? [...top, { name: 'Other', total: rest.reduce((sum, it) => sum + it.total, 0), color: OTHER_COLOR }] : top;
    if (bars.length === 0) return null;

    const width = 360;
    const rowHeight = 28;
    const barThickness = 16;
    const labelWidth = 108;
    const valueColWidth = 70;
    const plotWidth = width - labelWidth - valueColWidth;
    const height = bars.length * rowHeight + 6;
    const maxTotal = Math.max(...bars.map(b => b.total), 1);

    return (
        <svg viewBox={`0 0 ${width} ${height}`} style={{ width: '100%', height: 'auto', display: 'block', overflow: 'visible' }}>
            {bars.map((b, i) => {
                const barW = Math.max((b.total / maxTotal) * plotWidth, 2);
                const y = i * rowHeight + (rowHeight - barThickness) / 2;
                const isHovered = hoveredIdx === i;
                const label = b.name.length > 15 ? b.name.slice(0, 14) + '…' : b.name;
                return (
                    <g key={b.name} tabIndex={0} style={{ cursor: 'pointer' }}
                        onMouseEnter={() => setHoveredIdx(i)} onMouseLeave={() => setHoveredIdx(null)}
                        onFocus={() => setHoveredIdx(i)} onBlur={() => setHoveredIdx(null)}>
                        <text x={0} y={y + barThickness / 2 + 3} fontSize="9.5" fill="#1f2937" fontWeight={isHovered ? '600' : '400'}>{label}</text>
                        <path d={horizontalBarPath(labelWidth, y, barW, barThickness, 4)} fill={b.color} opacity={isHovered ? 1 : 0.9} />
                        <text x={labelWidth + barW + 6} y={y + barThickness / 2 + 3} fontSize="9" fill="#6b7280">{ValidationUtils.formatCurrency(b.total, defaultCurrency)}</text>
                    </g>
                );
            })}
        </svg>
    );
}

function Summary({ expenses, income, categories, defaultCurrency }) {
    const [timeRange, setTimeRange] = useState('month');
    const [selectedCategory, setSelectedCategory] = useState('');
    const [selectedPaidBy, setSelectedPaidBy] = useState('');
    const [budgetData, setBudgetData] = useState([]);
    const [convertedExpenses, setConvertedExpenses] = useState([]);
    const [convertedIncome, setConvertedIncome] = useState([]);

    const convertAmountSync = (amount, fromCurrency, toCurrency) => {
        if (!fromCurrency || !toCurrency || fromCurrency === toCurrency) return amount;
        const rates = CurrencyService.fallbackRates[fromCurrency];
        if (rates && rates[toCurrency]) return Math.round(amount * rates[toCurrency] * 100) / 100;
        return amount;
    };

    useEffect(() => {
        const convertAll = async () => {
            const newExpenses = await Promise.all(expenses.map(async (exp) => {
                const expCurrency = exp.currency || 'GBP';
                if (expCurrency === defaultCurrency) return exp;
                try {
                    const converted = await CurrencyService.convertCurrency(exp.amount, expCurrency, defaultCurrency);
                    return { ...exp, amount: converted, currency: defaultCurrency, originalDisplayAmount: exp.amount, originalDisplayCurrency: expCurrency };
                } catch (e) {
                    return { ...exp, amount: convertAmountSync(exp.amount, expCurrency, defaultCurrency), currency: defaultCurrency };
                }
            }));
            const newIncome = await Promise.all(income.map(async (inc) => {
                const incCurrency = inc.currency || 'GBP';
                if (incCurrency === defaultCurrency) return inc;
                try {
                    const converted = await CurrencyService.convertCurrency(inc.amount, incCurrency, defaultCurrency);
                    return { ...inc, amount: converted, currency: defaultCurrency };
                } catch (e) {
                    return { ...inc, amount: convertAmountSync(inc.amount, incCurrency, defaultCurrency), currency: defaultCurrency };
                }
            }));
            setConvertedExpenses(newExpenses);
            setConvertedIncome(newIncome);
        };
        convertAll();
    }, [expenses, income, defaultCurrency]);

    const getEffectiveBudget = (category, now) => {
        const currentMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const currentMonthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        if (category.budgetHistory && category.budgetHistory.length > 0) {
            const midMonthReset = category.budgetHistory.find(h => {
                const endDate = new Date(h.endDate);
                return endDate >= currentMonthStart && endDate <= currentMonthEnd;
            });
            if (midMonthReset) {
                return { amount: midMonthReset.amount, currency: midMonthReset.currency };
            }
        }
        if (category.useSubcategoryBudgets && category.subcategoryBudgets) {
            const total = Object.values(category.subcategoryBudgets).reduce((sum, v) => sum + (v || 0), 0);
            const currency = category.budgetCurrency || (category.subcategoryBudgetCurrencies ? Object.values(category.subcategoryBudgetCurrencies)[0] : null) || defaultCurrency;
            return { amount: total, currency: currency };
        }
        return { amount: category.monthlyBudget || 0, currency: category.budgetCurrency || defaultCurrency };
    };
    const getEffectiveSubcategoryBudget = (category, subcatName, now) => {
        const currentMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const currentMonthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        if (category.subcategoryBudgetHistory && category.subcategoryBudgetHistory[subcatName]) {
            const midMonthReset = category.subcategoryBudgetHistory[subcatName].find(h => {
                const endDate = new Date(h.endDate);
                return endDate >= currentMonthStart && endDate <= currentMonthEnd;
            });
            if (midMonthReset) {
                return { amount: midMonthReset.amount, currency: midMonthReset.currency };
            }
        }
        const amount = (category.subcategoryBudgets && category.subcategoryBudgets[subcatName]) || 0;
        const currency = (category.subcategoryBudgetCurrencies && category.subcategoryBudgetCurrencies[subcatName]) || defaultCurrency;
        return { amount, currency };
    };

    const convertBudgetAmount = async (amount, fromCurrency) => {
        if (!fromCurrency || fromCurrency === defaultCurrency || amount <= 0) return amount;
        try { return await CurrencyService.convertCurrency(amount, fromCurrency, defaultCurrency); }
        catch (e) { return convertAmountSync(amount, fromCurrency, defaultCurrency); }
    };

    useEffect(() => {
        if (timeRange === 'month') {
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            let monthlyExpenses = convertedExpenses.filter(exp => { const d = new Date(exp.date); return d >= startOfMonth && d <= endOfMonth; });
            if (selectedPaidBy) {
                if (selectedPaidBy === 'self') { monthlyExpenses = monthlyExpenses.filter(exp => !exp.paidBy || exp.paidBy.trim() === ''); }
                else { monthlyExpenses = monthlyExpenses.filter(exp => exp.paidBy && exp.paidBy === selectedPaidBy); }
            }
            const buildSummary = async () => {
                const summaryPromises = categories.map(async (category) => {
                    const catExpenses = monthlyExpenses.filter(exp => exp.categoryId === category.id);
                    const totalSpent = catExpenses.reduce((sum, exp) => sum + exp.amount, 0);
                    const effectiveBudget = getEffectiveBudget(category, now);
                    let budget = await convertBudgetAmount(effectiveBudget.amount, effectiveBudget.currency);
                    const subcats = [];
                    if (category.useSubcategoryBudgets) {
                        for (const subcatName of (category.subcategories || [])) {
                            const subcatSpent = catExpenses.filter(exp => exp.subcategory === subcatName).reduce((sum, exp) => sum + exp.amount, 0);
                            const effectiveSubBudget = getEffectiveSubcategoryBudget(category, subcatName, now);
                            let subcatBudget = await convertBudgetAmount(effectiveSubBudget.amount, effectiveSubBudget.currency);
                            if (subcatBudget > 0 || subcatSpent > 0) { subcats.push({ name: subcatName, budget: subcatBudget, spent: subcatSpent, remaining: subcatBudget - subcatSpent, percentage: subcatBudget > 0 ? (subcatSpent / subcatBudget) * 100 : 0 }); }
                        }
                    }
                    return { id: category.id, name: category.name, budget: budget, spent: totalSpent, remaining: budget - totalSpent, percentage: budget > 0 ? (totalSpent / budget) * 100 : 0, subcategories: subcats };
                });
                const summary = (await Promise.all(summaryPromises)).filter(item => item.budget > 0 || item.spent > 0);
                setBudgetData(summary);
            };
            buildSummary();
        } else { setBudgetData([]); }
    }, [timeRange, convertedExpenses, categories, selectedPaidBy, defaultCurrency]);

    const getDateRange = () => {
        const now = new Date(); let startDate, endDate = now;
        switch (timeRange) { case 'week': startDate = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000); break; case 'month': startDate = new Date(now.getFullYear(), now.getMonth(), 1); break; case 'year': startDate = new Date(now.getFullYear(), 0, 1); break; default: startDate = new Date(now.getFullYear(), now.getMonth(), 1); }
        return { startDate, endDate };
    };
    const filterByDateRange = (data) => { const { startDate, endDate } = getDateRange(); return data.filter(item => { const itemDate = new Date(item.date); return itemDate >= startDate && itemDate <= endDate; }); };

    let filteredExpenses = filterByDateRange(convertedExpenses);
    let filteredIncome = filterByDateRange(convertedIncome);
    if (selectedPaidBy) {
        if (selectedPaidBy === 'self') { filteredExpenses = filteredExpenses.filter(expense => !expense.paidBy || expense.paidBy.trim() === ''); filteredIncome = filteredIncome.filter(incomeItem => !incomeItem.paidBy || incomeItem.paidBy.trim() === ''); }
        else { filteredExpenses = filteredExpenses.filter(expense => expense.paidBy && expense.paidBy === selectedPaidBy); filteredIncome = filteredIncome.filter(incomeItem => incomeItem.paidBy && incomeItem.paidBy === selectedPaidBy); }
    }
    if (selectedCategory) {
        filteredExpenses = filteredExpenses.filter(exp => exp.categoryId === parseInt(selectedCategory));
    }
    const expensePaidBy = convertedExpenses.filter(expense => expense.paidBy && expense.paidBy.trim() !== '').map(expense => expense.paidBy);
    const incomePaidBy = convertedIncome.filter(incomeItem => incomeItem.paidBy && incomeItem.paidBy.trim() !== '').map(incomeItem => incomeItem.paidBy);
    const uniquePaidBy = [...new Set([...expensePaidBy, ...incomePaidBy])].sort();
    const totalExpenses = filteredExpenses.reduce((sum, expense) => sum + expense.amount, 0);
    const totalIncome = filteredIncome.reduce((sum, inc) => sum + inc.amount, 0);
    const netAmount = totalIncome - totalExpenses;
    const expensesByCategory = categories.map(category => { const categoryExpenses = filteredExpenses.filter(expense => expense.categoryId === category.id); const total = categoryExpenses.reduce((sum, expense) => sum + expense.amount, 0); const percentage = totalExpenses > 0 ? (total / totalExpenses) * 100 : 0; return { ...category, total, percentage, count: categoryExpenses.length }; }).filter(category => category.total > 0).sort((a, b) => b.total - a.total);
    // Last 6 calendar months of income vs expense, independent of the Time Period
    // selector above (a trend view always needs its own fixed window) but still
    // scoped by the Person/Category filters, mirroring the filtering already done
    // for filteredExpenses/filteredIncome.
    const monthlyTrend = (() => {
        const now = new Date();
        const months = [];
        for (let i = 5; i >= 0; i--) {
            const monthDate = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const monthStart = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
            const monthEnd = new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0, 23, 59, 59, 999);
            let monthExpenses = convertedExpenses.filter(exp => { const d = new Date(exp.date); return d >= monthStart && d <= monthEnd; });
            let monthIncome = convertedIncome.filter(inc => { const d = new Date(inc.date); return d >= monthStart && d <= monthEnd; });
            if (selectedPaidBy) {
                if (selectedPaidBy === 'self') {
                    monthExpenses = monthExpenses.filter(exp => !exp.paidBy || exp.paidBy.trim() === '');
                    monthIncome = monthIncome.filter(inc => !inc.paidBy || inc.paidBy.trim() === '');
                } else {
                    monthExpenses = monthExpenses.filter(exp => exp.paidBy && exp.paidBy === selectedPaidBy);
                    monthIncome = monthIncome.filter(inc => inc.paidBy && inc.paidBy === selectedPaidBy);
                }
            }
            if (selectedCategory) { monthExpenses = monthExpenses.filter(exp => exp.categoryId === parseInt(selectedCategory)); }
            months.push({
                label: monthDate.toLocaleDateString('en-US', { month: 'short' }),
                income: monthIncome.reduce((sum, inc) => sum + inc.amount, 0),
                expense: monthExpenses.reduce((sum, exp) => sum + exp.amount, 0)
            });
        }
        return months;
    })();
    const getPreviousPeriodComparison = () => { const { startDate } = getDateRange(); const periodLength = new Date() - startDate; const previousEndDate = new Date(startDate.getTime() - 1); const previousStartDate = new Date(previousEndDate.getTime() - periodLength); const previousExpenses = convertedExpenses.filter(expense => { const expenseDate = new Date(expense.date); return expenseDate >= previousStartDate && expenseDate <= previousEndDate; }); const previousTotal = previousExpenses.reduce((sum, expense) => sum + expense.amount, 0); const change = totalExpenses - previousTotal; const changePercentage = previousTotal > 0 ? (change / previousTotal) * 100 : 0; return { change, changePercentage, previousTotal }; };
    const trendData = getPreviousPeriodComparison();
    const getTopSpendingDays = () => { const dailySpending = {}; filteredExpenses.forEach(expense => { const date = expense.date; dailySpending[date] = (dailySpending[date] || 0) + expense.amount; }); return Object.entries(dailySpending).sort(([,a], [,b]) => b - a).slice(0, 5).map(([date, amount]) => ({ date, amount })); };
    const topSpendingDays = getTopSpendingDays();
    const { startDate, endDate } = getDateRange();
    const daysDiff = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) || 1;
    const avgDailySpending = totalExpenses / daysDiff;

    return (
        <div className="screen">
            <div className="screen-header">
                <h2>Financial Summary</h2>
                <div className="summary-filters">
                    <div className="filter-group">
                        <label className="filter-label">Time Period:</label>
                        <select className="form-select form-select-sm" value={timeRange} onChange={(e) => setTimeRange(e.target.value)}>
                            <option value="week">This Week</option><option value="month">This Month</option><option value="year">This Year</option>
                        </select>
                    </div>
                    <div className="filter-group">
                        <label className="filter-label">Filter by Person:</label>
                        <select className="form-select form-select-sm" value={selectedPaidBy} onChange={(e) => setSelectedPaidBy(e.target.value)}>
                            <option value="">All People</option><option value="self">My Money Only</option>
                            {uniquePaidBy.map(person => (<option key={person} value={person}>{person}'s Money Only</option>))}
                        </select>
                    </div>
                    <div className="filter-group">
                        <label className="filter-label">Category:</label>
                        <select className="form-select form-select-sm" value={selectedCategory} onChange={e => setSelectedCategory(e.target.value)}>
                            <option value="">All Categories</option>
                            {categories.map(c => (<option key={c.id} value={c.id}>{c.name}</option>))}
                        </select>
                    </div>
                </div>
                <div className="print-hide" style={{textAlign: 'right', marginTop: '0.5rem'}}>
                    <button className="btn btn-sm btn-outline-secondary" onClick={() => window.print()}>
                        <i className="fas fa-file-pdf me-1"></i> Download as PDF
                    </button>
                </div>
            </div>
            <div className="summary-cards">
                <div className="summary-card income"><div className="card-icon"><i className="fas fa-arrow-up"></i></div><div className="card-content"><h6>Total Income</h6><div className="amount">{ValidationUtils.formatCurrency(totalIncome, defaultCurrency)}</div>{selectedPaidBy && (<div className="filter-info">{selectedPaidBy === 'self' ? 'Your income only' : selectedPaidBy + "'s income only"}</div>)}</div></div>
                <div className="summary-card expense"><div className="card-icon"><i className="fas fa-arrow-down"></i></div><div className="card-content"><h6>Total Expenses</h6><div className="amount">{ValidationUtils.formatCurrency(totalExpenses, defaultCurrency)}</div>{selectedPaidBy && (<div className="filter-info">{selectedPaidBy === 'self' ? 'Your expenses only' : selectedPaidBy + "'s expenses only"}</div>)}{trendData.changePercentage !== 0 && (<div className={'trend ' + (trendData.change > 0 ? 'negative' : 'positive')}><i className={'fas fa-arrow-' + (trendData.change > 0 ? 'up' : 'down')}></i>{Math.abs(trendData.changePercentage).toFixed(1)}% vs last period</div>)}</div></div>
                <div className={'summary-card ' + (netAmount >= 0 ? 'positive' : 'negative')}><div className="card-icon"><i className={'fas fa-' + (netAmount >= 0 ? 'plus' : 'minus')}></i></div><div className="card-content"><h6>Net Amount</h6><div className="amount">{ValidationUtils.formatCurrency(Math.abs(netAmount), defaultCurrency)}</div><div className="trend">{netAmount >= 0 ? 'Surplus' : 'Deficit'}</div></div></div>
                <div className="summary-card info"><div className="card-icon"><i className="fas fa-calendar-day"></i></div><div className="card-content"><h6>Daily Average</h6><div className="amount">{ValidationUtils.formatCurrency(avgDailySpending, defaultCurrency)}</div><div className="trend">{daysDiff} days</div></div></div>
            </div>
            <div className="category-breakdown" style={{marginBottom: '1.5rem'}}>
                <h5><i className="fas fa-chart-bar me-2"></i>Income vs Expense (Last 6 Months)</h5>
                <IncomeExpenseTrendChart months={monthlyTrend} defaultCurrency={defaultCurrency} />
            </div>
            {timeRange === 'month' && budgetData.length > 0 && (
                <div className="budget-overview">
                    <h5><i className="fas fa-calculator"></i> Monthly Budget Overview</h5>
                    <div className="budget-list">
                        {budgetData.map(budgetItem => (
                            <div key={budgetItem.id} className="budget-item">
                                <div className="budget-info">
                                    <div className="budget-name">{budgetItem.name}</div>
                                    <div className="budget-bar"><div className={'budget-bar-fill ' + (budgetItem.percentage > 100 ? 'over-budget' : budgetItem.percentage > 85 ? 'near-budget' : 'under-budget')} style={{ width: Math.min(budgetItem.percentage, 100) + '%' }}></div></div>
                                    <div className="budget-amounts">
                                        <span className="budget-spent">Spent: {ValidationUtils.formatCurrency(budgetItem.spent, defaultCurrency)}</span>
                                        <span className={'budget-remaining ' + (budgetItem.remaining >= 0 ? 'positive' : 'negative')}>{budgetItem.remaining >= 0 ? 'Remaining: ' : 'Over by: '}{ValidationUtils.formatCurrency(Math.abs(budgetItem.remaining), defaultCurrency)}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            )}
            {expensesByCategory.length > 0 && (
                <div className="category-breakdown">
                    <h5>Expenses by Category</h5>
                    <CategoryBarChart items={expensesByCategory} defaultCurrency={defaultCurrency} />
                </div>
            )}
            {topSpendingDays.length > 0 && (
                <div className="top-spending-days">
                    <h5>Top Spending Days</h5>
                    <div className="spending-days-list">
                        {topSpendingDays.map((day, index) => (
                            <div key={day.date} className="spending-day-item"><div className="day-rank">#{index + 1}</div><div className="day-info"><div className="day-date">{ValidationUtils.formatDate(day.date)}</div></div><div className="day-amount">{ValidationUtils.formatCurrency(day.amount, defaultCurrency)}</div></div>
                        ))}
                    </div>
                </div>
            )}
            <div className="quick-stats">
                <h5>Quick Stats</h5>
                <div className="stats-grid">
                    <div className="stat-item"><div className="stat-label">Total Transactions</div><div className="stat-value">{filteredExpenses.length}</div></div>
                    <div className="stat-item"><div className="stat-label">Largest Expense</div><div className="stat-value">{filteredExpenses.length > 0 ? ValidationUtils.formatCurrency(Math.max(...filteredExpenses.map(e => e.amount)), defaultCurrency) : ValidationUtils.formatCurrency(0, defaultCurrency)}</div></div>
                    <div className="stat-item"><div className="stat-label">Categories Used</div><div className="stat-value">{expensesByCategory.length}</div></div>
                    <div className="stat-item"><div className="stat-label">Savings Rate</div><div className="stat-value">{totalIncome > 0 ? ((netAmount / totalIncome) * 100).toFixed(1) + '%' : 'N/A'}</div></div>
                </div>
            </div>
            {filteredExpenses.length === 0 && filteredIncome.length === 0 && (
                <div className="empty-state"><i className="fas fa-chart-bar fa-3x"></i><h4>No financial data for this period</h4><p>Add some income and expenses to see your financial summary.</p></div>
            )}
        </div>
    );
}

function SettingsScreen({ onCurrencyChange, currentCurrency, currentUser, onStoragePickerOpen, syncStatus, lastSyncTime, storagePreference: storagePref, onSyncNow, onReconnect, onViewHistory }) {
    const [saveMessage, setSaveMessage] = useState('');
    const [people, setPeople] = useState([]);
    const [personForm, setPersonForm] = useState({ name: '', relationship: '', isDefault: false });
    const [editingPerson, setEditingPerson] = useState(null);
    const [personErrors, setPersonErrors] = useState({});
    const [showDeletePersonConfirm, setShowDeletePersonConfirm] = useState(null);

    const [nameSaved, setNameSaved] = useState(false);
    const [savedDisplayName, setSavedDisplayName] = useState('');

    const [autoBackupEnabled, setAutoBackupEnabled] = useState(true);
    const [backupHistory, setBackupHistory] = useState([]);
    const [lastSaveTime, setLastSaveTime] = useState('');
    const [restoreFile, setRestoreFile] = useState(null);
    const [restorePreview, setRestorePreview] = useState(null);
    const [restoreError, setRestoreError] = useState('');
    const [showRestoreConfirm, setShowRestoreConfirm] = useState(false);
    const [restoreConfirmText, setRestoreConfirmText] = useState('');
    const [backupDownloaded, setBackupDownloaded] = useState(false);
    const [showContactModal, setShowContactModal] = useState(false);
    const [cloudBackupRetention, setCloudBackupRetention] = useState('count5');

    useEffect(() => { DataService.initialize().then(() => { setPeople(DataService.getPeople()); }); }, []);
    useEffect(() => {
        const notifSettings = JSON.parse(localStorage.getItem('financeApp_notifSettings') || '{}');
        setBudgetAlertsEnabled(notifSettings.budgetAlertsEnabled !== false);
    }, []);

    useEffect(() => {
        DataService.getSettings().then(s => {
            setAutoBackupEnabled(s.autoBackupEnabled !== false);
            setCloudBackupRetention(s.cloudBackupRetention || 'count5');
        });
        setBackupHistory(DataService.getBackupHistory());
        setLastSaveTime(localStorage.getItem('financeApp_lastSaveTime') || '');
    }, []);

    const handleToggleBudgetAlerts = (enabled) => {
        setBudgetAlertsEnabled(enabled);
        const notifSettings = JSON.parse(localStorage.getItem('financeApp_notifSettings') || '{}');
        notifSettings.budgetAlertsEnabled = enabled;
        localStorage.setItem('financeApp_notifSettings', JSON.stringify(notifSettings));
    };

    const handleToggleAutoBackup = async (enabled) => {
        setAutoBackupEnabled(enabled);
        await DataService.updateSettings({ autoBackupEnabled: enabled });
    };

    const handleChangeBackupRetention = async (value) => {
        setCloudBackupRetention(value);
        await DataService.updateSettings({ cloudBackupRetention: value });
    };

    const handleDownloadBackup = () => {
        DataService.downloadBackup();
        setBackupHistory(DataService.getBackupHistory());
        setBackupDownloaded(true);
        setTimeout(() => setBackupDownloaded(false), 2000);
    };

    const handleRestoreFileChange = (e) => {
        setRestoreError(''); setRestorePreview(null); setRestoreFile(null);
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
            try {
                const parsed = JSON.parse(evt.target.result);
                if (!parsed.version || !parsed.data) { setRestoreError('Invalid backup file. Please select a valid FinanceTracker backup.'); return; }
                setRestoreFile(parsed);
                setRestorePreview({ date: parsed.createdAt, expenses: (parsed.data.expenses || []).length, income: (parsed.data.income || []).length });
            } catch (err) { setRestoreError('Invalid backup file. Please select a valid FinanceTracker backup.'); }
        };
        reader.readAsText(file);
    };

    const handleConfirmRestore = () => {
        try {
            DataService.restoreBackup(restoreFile);
            localStorage.setItem('financeApp_skipCloudRestoreCheck', 'true');
            window.location.reload();
        }
        catch (err) { setRestoreError('Restore failed: ' + err.message); setShowRestoreConfirm(false); setRestoreConfirmText(''); }
    };

    useEffect(() => {
        DataService.getSettings().then(s => {
            const name = s.displayName || '';
            setDisplayName(name);
            setSavedDisplayName(name);
        });
    }, []);

    const handleSaveDisplayName = async () => {
        setNameError('');
        const newName = displayName.trim();
        if (!newName || newName.length < 2) { setNameError('Name must be at least 2 characters'); return; }
        if (newName.length > 50) { setNameError('Name must be 50 characters or fewer'); return; }
        if (!/^[a-zA-Z\s\-']+$/.test(newName)) { setNameError("Only letters, spaces, hyphens and apostrophes are allowed"); return; }
        const settings = await DataService.getSettings();
        const oldName = settings.displayName || '';
        await DataService.updateSettings({ displayName: newName });
        if (oldName && oldName !== newName) DataService.migratePersonName(oldName, newName);
        try {
            const allPeople = DataService.getPeople();
            const systemPerson = allPeople.find(p => p.systemManaged === true);
            if (systemPerson) {
                DataService.updatePerson(systemPerson.id, { name: newName });
            } else {
                DataService.addPerson({ name: newName, isDefault: true, systemManaged: true });
            }
            setPeople(DataService.getPeople());
        } catch (e) { /* name conflict — still save display name */ }
        setSavedDisplayName(newName);
        setNameSaved(true);
        setTimeout(() => setNameSaved(false), 2000);
    };

            }
            setPeople(DataService.getPeople());
            setPersonForm({ name: '', relationship: '', isDefault: false });
            setEditingPerson(null);

        setPersonForm({ name: '', relationship: '', isDefault: false });

        } catch (error) {
            setSaveMessage('Failed to update currency');
        }

            </div>

                    <i className="fas fa-user me-2"></i>Your Name
                </h5>
                <p className="text-muted" style={{fontSize: '0.9rem', marginBottom: '0.75rem'}}>
                    Used as your identity when tracking "paid by"
                </p>
                <input type="text" className="form-control" placeholder="Enter your display name (2–50 characters)" value={displayName} onChange={e => { setDisplayName(e.target.value); setNameError(''); }} />

                </div>
                {nameError && <div className="text-danger mt-1" style={{fontSize: '0.875rem'}}>{nameError}</div>}
                {nameSaved && <div className="text-success mt-1" style={{fontSize: '0.875rem'}}><i className="fas fa-check me-1"></i>Name saved!</div>}
            </div>

            <hr style={{margin: '1rem 0 1.5rem'}} />

            <div style={{marginBottom: '1.5rem'}}>
                <h5 style={{marginBottom: '0.5rem', color: '#4a6cf7'}}>
                    <i className="fas fa-coins"></i> Default Currency
                </h5>
                <p className="text-muted" style={{fontSize: '0.9rem', marginBottom: '1rem'}}>

                                <button className="btn btn-sm btn-outline-primary" onClick={() => handleEditPerson(person)} title="Edit"><i className="fas fa-pencil-alt"></i></button>
                                <button className="btn btn-sm btn-outline-danger" onClick={() => setShowDeletePersonConfirm(person)} title="Delete"><i className="fas fa-trash"></i></button>
                            </div>
                        </div>
                    ))
                )}
            </div>

                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">

                            <div className="modal-body"><p>Remove <strong>{showDeletePersonConfirm.name}</strong> from the people list? Existing records will not be affected.</p></div>

                </div>

            <div style={{marginBottom: '1rem'}}>
                <h5 style={{marginBottom: '0.5rem', color: '#4a6cf7'}}>
                    <i className="fas fa-bell"></i> Notifications
                </h5>
                <p className="text-muted" style={{fontSize: '0.9rem', marginBottom: '1rem'}}>

                </p>
                <div className="d-flex justify-content-between align-items-center" style={{padding: '0.75rem', background: '#f8f9fa', borderRadius: '8px'}}>
                    <div>
                        <div style={{fontWeight: '600', fontSize: '0.95rem'}}>Budget Alerts</div>
                        <div className="text-muted" style={{fontSize: '0.82rem'}}>Warn when spending reaches 80% or over budget</div>
                    </div>
                    <div className="form-check form-switch mb-0">
                        <input className="form-check-input" type="checkbox" id="budgetAlertsToggle" checked={budgetAlertsEnabled} onChange={e => handleToggleBudgetAlerts(e.target.checked)} style={{cursor: 'pointer'}} />
                    </div>
                </div>
            </div>

                    const isSyncing = syncStatus === 'syncing';

                    const isConnected = isCloud && syncStatus !== 'reconnect-needed' && syncStatus !== 'error';
                    const formatRelativeTime = (isoString) => {

                        if (diff < 86400) { const h = Math.floor(diff / 3600); return h + ' hour' + (h !== 1 ? 's' : '') + ' ago'; }

                                        {isCloud && relativeSync && !isReconnectNeeded && (
                                            <div style={{fontSize:'0.78rem',color:'#6c757d',marginTop:'1px'}}>

                                            </div>
                                        )}
                                        {!isCloud && (
                                            <div style={{fontSize:'0.78rem',color:'#6c757d',marginTop:'1px'}}>{info.sub}</div>
                                        )}
                                    </div>
                                </div>
                                <button className="btn btn-sm btn-outline-primary" onClick={() => onStoragePickerOpen && onStoragePickerOpen()}>
                                    Switch
                                </button>
                            </div>
                            {isCloud && (
                                <div className="d-flex gap-2">
                                    {isReconnectNeeded ? (
                                        <button className="btn btn-sm btn-warning flex-grow-1" onClick={() => onReconnect && onReconnect()}>
                                            <i className="fas fa-plug me-1"></i>Re-connect {pref === 'gdrive' ? 'Google Drive' : 'OneDrive'}
                                        </button>
                                    ) : (
                                        <button className="btn btn-sm btn-outline-secondary flex-grow-1" onClick={() => onSyncNow && onSyncNow()} disabled={isSyncing}>
                                            {isSyncing

                                                : <><i className="fas fa-sync-alt me-1"></i>Sync now</>
                                            }

                                    {isConnected && (
                                        <button className="btn btn-sm btn-outline-secondary" title="Version history" onClick={() => onViewHistory && onViewHistory()} style={{flexShrink:0}}>
                                            <i className="fas fa-history"></i>

                                    )}
                                </div>
                            )}
                        </div>
                    );
                })()}
                {(storagePref === 'gdrive' || storagePref === 'onedrive') && (
                    <div style={{marginTop: '0.85rem'}}>
                        <label className="form-label small fw-semibold mb-1">Backup retention</label>
                        <select className="form-select form-select-sm" value={cloudBackupRetention} onChange={e => handleChangeBackupRetention(e.target.value)}>
                            <option value="count5">Keep last 5 backups</option>
                            <option value="7d">Keep backups for 7 days</option>
                            <option value="30d">Keep backups for 30 days</option>
                            <option value="90d">Keep backups for 90 days</option>

                        <div className="text-muted" style={{fontSize: '0.78rem', marginTop: '0.25rem'}}>

            </div>

            <hr style={{margin: '1.5rem 0'}} />
            <div style={{marginBottom: '1rem'}}>
