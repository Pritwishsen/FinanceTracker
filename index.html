function RecurringList({ onUpdate }) {
    const [schedules, setSchedules] = useState([]);
    const [deleteConfirm, setDeleteConfirm] = useState(null);

    const load = () => setSchedules(DataService.getRecurring());
    useEffect(() => { load(); }, []);

    const today = new Date().toISOString().split('T')[0];

    const getStatus = (s) => {
        if (s.endDate && today > s.endDate) return 'ended';
        if (!s.isActive) return 'paused';
        return 'active';
    };

    const handlePauseResume = (s) => {
        if (s.isActive) DataService.pauseRecurring(s.id);
        else DataService.resumeRecurring(s.id);
        load(); onUpdate();
    };

    const handleDelete = (id) => {
        DataService.deleteRecurring(id);
        setDeleteConfirm(null); load(); onUpdate();
    };

    const freqLabel = (f) => f ? f.charAt(0).toUpperCase() + f.slice(1) : '';

    return (
        <div className="screen">
            <div className="screen-header"><h2><i className="fas fa-redo me-2"></i>Recurring Transactions</h2></div>
            {schedules.length === 0 ? (
                <div className="empty-state">
                    <i className="fas fa-redo fa-3x"></i>
                    <h4>No recurring transactions</h4>
                    <p>When adding an expense or income, tick "Make this recurring" to set one up.</p>
                </div>
            ) : (
                <div style={{padding: '0 1rem 1rem'}}>
                    {schedules.map(s => {
                        const status = getStatus(s);
                        const t = s.templateExpense || {};
                        const isDueToday = s.nextDue === today;
                        return (
                            <div key={s.id} className="card mb-3 shadow-sm" style={{opacity: status === 'ended' ? 0.6 : 1}}>
                                <div className="card-body p-3">
                                    <div className="d-flex justify-content-between align-items-start mb-2">
                                        <div>
                                            <span className={`badge me-1 ${s.type === 'expense' ? 'bg-danger' : 'bg-success'}`}>{s.type === 'expense' ? 'Expense' : 'Income'}</span>
                                            {status === 'active' && <span className="badge bg-success me-1">Active</span>}
                                            {status === 'paused' && <span className="badge bg-warning text-dark me-1">Paused</span>}
                                            {status === 'ended' && <span className="badge bg-secondary me-1">Ended</span>}
                                            {isDueToday && status === 'active' && <span className="badge bg-primary">Due Today</span>}
                                        </div>
                                        <div className="d-flex gap-1">
                                            {status !== 'ended' && (
                                                <button className={`btn btn-sm ${s.isActive ? 'btn-outline-warning' : 'btn-outline-success'}`} onClick={() => handlePauseResume(s)} title={s.isActive ? 'Pause' : 'Resume'}>
                                                    <i className={`fas fa-${s.isActive ? 'pause' : 'play'}`}></i>
                                                </button>
                                            )}
                                            <button className="btn btn-sm btn-outline-danger" onClick={() => setDeleteConfirm(s)} title="Delete"><i className="fas fa-trash"></i></button>
                                        </div>
                                    </div>
                                    <div className="fw-semibold">{t.description || t.source || '—'}</div>
                                    <div className="text-muted small">
                                        {ValidationUtils.formatCurrency(t.amount || 0, t.currency || 'GBP')} &bull; {freqLabel(s.frequency)}
                                        {t.paidBy && <> &bull; {t.paidBy}</>}
                                    </div>
                                    <div className="small mt-1">
                                        <span className="text-muted">Next: </span><strong>{s.nextDue}</strong>
                                        {s.lastGenerated && <> &bull; <span className="text-muted">Last run: {s.lastGenerated}</span></>}
                                        {s.endDate && <> &bull; <span className="text-muted">Ends: {s.endDate}</span></>}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            )}
            {deleteConfirm && (
                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title">Delete Recurring</h5></div>
                            <div className="modal-body"><p>Delete the recurring <strong>{deleteConfirm.type}</strong> for <strong>{(deleteConfirm.templateExpense || {}).description || (deleteConfirm.templateExpense || {}).source || 'this item'}</strong>? Future transactions will no longer be generated.</p></div>
                            <div className="modal-footer">
                                <button className="btn btn-secondary" onClick={() => setDeleteConfirm(null)}>Cancel</button>
                                <button className="btn btn-danger" onClick={() => handleDelete(deleteConfirm.id)}>Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

const AuthUtils = {
    get firebaseReady() { return !!window.__firebaseReady; },
    async hashPassword(password) {
        const data = new TextEncoder().encode(password);
        const buf = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    },
    async verifyPassword(password, hash) {
        return (await this.hashPassword(password)) === hash;
    },
    async register(email, password, displayName) {
        const cred = await window.__firebaseAuth.createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName });
        await window.__firebaseDb.collection('users').doc(cred.user.uid).set({
            displayName,
            storagePreference: 'local',
            createdAt: new Date().toISOString()
        });
        return cred.user;
    },
    async signIn(email, password) {
        const cred = await window.__firebaseAuth.signInWithEmailAndPassword(email, password);
        const doc = await window.__firebaseDb.collection('users').doc(cred.user.uid).get();
        if (doc.exists) {
            const pref = doc.data().storagePreference || 'local';
            localStorage.setItem('financeApp_storagePreference', pref);
            if (pref) localStorage.setItem('financeApp_storagePickerConfirmed', 'true');
        } else {
            await window.__firebaseDb.collection('users').doc(cred.user.uid).set({
                displayName: cred.user.displayName || email,
                storagePreference: 'local',
                createdAt: new Date().toISOString()
            });
            localStorage.setItem('financeApp_storagePreference', 'local');
        }
        return cred.user;
    },
    async signOut() {
        if (window.__firebaseReady) await window.__firebaseAuth.signOut();
        localStorage.removeItem('financeApp_session_expiry');
        sessionStorage.removeItem('financeApp_session_active');
    },
    async sendPasswordReset(email) {
        await window.__firebaseAuth.sendPasswordResetEmail(email);
    },
    async _loadUserPref(user) {
        const doc = await window.__firebaseDb.collection('users').doc(user.uid).get();
        if (doc.exists) {
            const pref = doc.data().storagePreference || 'local';
            localStorage.setItem('financeApp_storagePreference', pref);
            if (pref) localStorage.setItem('financeApp_storagePickerConfirmed', 'true');
        } else {
            await window.__firebaseDb.collection('users').doc(user.uid).set({
                displayName: user.displayName || user.email,
                storagePreference: 'local',
                createdAt: new Date().toISOString()
            });
            localStorage.setItem('financeApp_storagePreference', 'local');
        }
    },
    async signInWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.addScope('email');
        const cred = await window.__firebaseAuth.signInWithPopup(provider);
        await this._loadUserPref(cred.user);
        return cred.user;
    },
    async signInWithFacebook() {
        const provider = new firebase.auth.FacebookAuthProvider();
        provider.addScope('email');
        const cred = await window.__firebaseAuth.signInWithPopup(provider);
        await this._loadUserPref(cred.user);
        return cred.user;
    },
    async linkSocialCredential(email, password, pendingCredential) {
        const cred = await window.__firebaseAuth.signInWithEmailAndPassword(email, password);
        await cred.user.linkWithCredential(pendingCredential);
        await this._loadUserPref(cred.user);
        return cred.user;
    },
    mapFirebaseError(code) {
        const map = {
            'auth/email-already-in-use': { field: 'email', message: 'An account with this email already exists. Please sign in instead.' },
            'auth/invalid-email': { field: 'email', message: 'Please enter a valid email address.' },
            'auth/weak-password': { field: 'password', message: 'Password must be at least 6 characters.' },
            'auth/user-not-found': null,
            'auth/wrong-password': { field: null, message: 'Incorrect email or password.' },
            'auth/invalid-credential': { field: null, message: 'Incorrect email or password.' },
            'auth/too-many-requests': { field: null, message: 'Too many failed attempts. Please try again later.' },
            'auth/requires-recent-login': { field: null, message: 'Please sign out and sign in again before changing your password.' },
            'auth/account-exists-with-different-credential': { field: null, message: 'An account already exists with this email. Enter your password to link the accounts.' },
            'auth/popup-closed-by-user': null,
            'auth/cancelled-popup-request': null,
            'auth/popup-blocked': { field: null, message: 'Sign-in popup was blocked. Please allow popups for this site and try again.' },
            'auth/unauthorized-domain': { field: null, message: 'This domain is not authorised for sign-in. Please add it to Firebase Console → Authentication → Settings → Authorised domains.' },
            'auth/operation-not-allowed': { field: null, message: 'This sign-in method is not enabled. Please enable it in Firebase Console → Authentication → Sign-in method.' },
            'auth/network-request-failed': { field: null, message: 'Network error. Please check your connection and try again.' },
            'auth/internal-error': { field: null, message: 'An internal error occurred. Please try again.' },
            'auth/user-disabled': { field: null, message: 'This account has been disabled. Please contact support.' }
        };
        return map.hasOwnProperty(code) ? map[code] : { field: null, message: `Sign-in failed (${code || 'unknown error'}). Please try again.` };
    }
};

function StoragePickerModal({ currentUser, initialPreference, onConfirm, onSkip }) {
    const providers = [
        { id: 'gdrive',   icon: 'fab fa-google-drive', label: 'Google Drive', color: '#4285F4', bgColor: '#e8f0fe', sub: 'Save to Google Drive' },
        { id: 'onedrive', icon: 'fab fa-microsoft',    label: 'OneDrive',     color: '#0078D4', bgColor: '#e6f2fb', sub: 'Save to OneDrive' },
        { id: 'local',    icon: 'fas fa-mobile-alt',   label: 'Local only',   color: '#6c757d', bgColor: '#f0f0f0', sub: 'This device only' }
    ];
    const [selected, setSelected] = React.useState(initialPreference || null);
    const [saving, setSaving] = React.useState(false);
    const [oauthStep, setOauthStep] = React.useState(null); // null | 'connecting' | 'downloading' | 'done' | 'error'

    const handleConfirm = async () => {
        if (!selected || saving) return;
        setSaving(true);
        setOauthStep(null);

        // OAuth FIRST while user gesture is still fresh (required for popup)
        let cloudBackup = null;
        let svc = null;
        if (selected === 'gdrive' || selected === 'onedrive') {
            svc = selected === 'gdrive' ? GDriveService : OneDriveService;
            if (svc.isConfigured()) {
                try {
                    setOauthStep('connecting');
                    await svc.requestToken();
                    setOauthStep('downloading');
                    cloudBackup = await svc.download();
                } catch (_) {
                    setOauthStep('error');
                    setSaving(false);
                    return; // Connection/download failed — abort before touching the committed preference
                }
            }
        }

        // If the chosen provider has no backup file yet, we're about to become its only copy
        // of this data — the upload must actually succeed before we commit the switch. Otherwise
        // financeApp_storagePreference would point at a provider with nothing backed up, and the
        // app would show "cloud protected" while silently having no cloud copy at all.
        if (svc && svc.isConfigured() && !cloudBackup) {
            try {
                setOauthStep('uploading');
                const signed = await signBackupForUpload(DataService.createBackup(), currentUser);
                await svc.upload(signed);
                localStorage.setItem('financeApp_lastCloudSync', new Date().toISOString());
            } catch (_) {
                setOauthStep('error');
                setSaving(false);
                return; // Upload failed — keep the previous provider active, don't commit the switch
            }
        }

        if (window.__firebaseReady && currentUser && currentUser.uid) {
            try { await window.__firebaseDb.collection('users').doc(currentUser.uid).update({ storagePreference: selected, pickerConfirmed: true }); } catch (_) {}
        }
        localStorage.setItem('financeApp_storagePreference', selected);
        localStorage.setItem('financeApp_storagePickerConfirmed', 'true');
        localStorage.removeItem('financeApp_storagePickerSkipCount');
        setOauthStep('done');
        setSaving(false);
        onConfirm(selected, cloudBackup);
    };

    const isCloud = selected === 'gdrive' || selected === 'onedrive';

    return (
        <div style={{position:'fixed',inset:0,zIndex:9999,background:'linear-gradient(135deg,#4a6cf7 0%,#6a3de8 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'1.5rem',overflowY:'auto'}}>
            <div style={{width:'100%',maxWidth:'460px'}}>
                <div className="text-center text-white mb-4">
                    <div style={{fontSize:'2.5rem',marginBottom:'0.5rem'}}><i className="fas fa-cloud-upload-alt"></i></div>
                    <h3 className="fw-bold mb-1">Where should your backup live?</h3>
                    <p style={{opacity:0.85,fontSize:'0.92rem',margin:0}}>Choose where your financial data is backed up. You can change this later in Settings.</p>
                </div>
                <div className="d-flex flex-column gap-3 mb-3">
                    {providers.map(p => (
                        <div key={p.id} onClick={() => { if (!saving) { setSelected(p.id); setOauthStep(null); } }}
                            style={{borderRadius:'14px',border:selected===p.id?'2.5px solid #fff':'2.5px solid transparent',background:selected===p.id?'#fff':'rgba(255,255,255,0.15)',padding:'1rem 1.2rem',cursor:saving?'default':'pointer',transition:'all 0.15s',opacity:saving&&selected!==p.id?0.5:1}}>
                            <div className="d-flex align-items-center gap-3">
                                <div style={{width:'44px',height:'44px',borderRadius:'12px',background:selected===p.id?p.bgColor:'rgba(255,255,255,0.25)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                    <i className={p.icon} style={{fontSize:'1.4rem',color:selected===p.id?p.color:'#fff'}}></i>
                                </div>
                                <div style={{flex:1}}>
                                    <div style={{fontWeight:700,fontSize:'1rem',color:selected===p.id?'#1a1a2e':'#fff'}}>{p.label}</div>
                                    <div style={{fontSize:'0.78rem',color:selected===p.id?'#555':'rgba(255,255,255,0.75)',marginTop:'1px'}}>{p.sub}</div>
                                </div>
                                {selected===p.id && <i className="fas fa-check-circle" style={{color:'#4a6cf7',fontSize:'1.2rem',flexShrink:0}}></i>}
                            </div>
                        </div>
                    ))}
                </div>
                {selected === 'local' && (
                    <div className="alert alert-warning d-flex gap-2 py-2 mb-3" style={{borderRadius:'10px',fontSize:'0.83rem'}}>
                        <i className="fas fa-exclamation-triangle mt-1 flex-shrink-0"></i>
                        <span>Your data is only available on this device. If you log in elsewhere, you'll see an empty app unless you import a backup.</span>
                    </div>
                )}
                {isCloud && !oauthStep && (
                    <div className="alert d-flex gap-2 py-2 mb-3" style={{borderRadius:'10px',fontSize:'0.83rem',background:'rgba(255,255,255,0.9)',border:'none',color:'#0c4a6e'}}>
                        <i className="fas fa-info-circle mt-1 flex-shrink-0"></i>
                        <span>Your backup will be saved to <strong>FinanceTracker Backups</strong> in your {selected==='gdrive'?'Google Drive':'OneDrive'}. Only you can access it.</span>
                    </div>
                )}
                {isCloud && oauthStep && (
                    <div className={'alert d-flex gap-2 py-2 mb-3 ' + (oauthStep==='error'?'alert-warning':'alert-info')} style={{borderRadius:'10px',fontSize:'0.83rem'}}>
                        {oauthStep==='connecting' && <><span className="spinner-border spinner-border-sm me-2 flex-shrink-0" style={{marginTop:'1px'}}></span><span>Connecting to {selected==='gdrive'?'Google Drive':'OneDrive'}…</span></>}
                        {oauthStep==='downloading' && <><span className="spinner-border spinner-border-sm me-2 flex-shrink-0" style={{marginTop:'1px'}}></span><span>Checking for existing backup…</span></>}
                        {oauthStep==='uploading' && <><span className="spinner-border spinner-border-sm me-2 flex-shrink-0" style={{marginTop:'1px'}}></span><span>Saving your first backup to {selected==='gdrive'?'Google Drive':'OneDrive'}…</span></>}
                        {oauthStep==='done' && <><i className="fas fa-check-circle me-2 flex-shrink-0" style={{color:'#198754',marginTop:'1px'}}></i><span>Connected! Proceeding…</span></>}
                        {oauthStep==='error' && <><i className="fas fa-exclamation-triangle me-2 flex-shrink-0" style={{marginTop:'1px'}}></i><span>Couldn't back up to {selected==='gdrive'?'Google Drive':'OneDrive'} — nothing has changed, you're still on your previous storage. Please try again.</span></>}
                    </div>
                )}
                <button className="btn w-100 fw-semibold py-3" onClick={handleConfirm} disabled={!selected || saving}
                    style={{borderRadius:'12px',background:selected?'#fff':'rgba(255,255,255,0.4)',color:selected?'#4a6cf7':'rgba(255,255,255,0.6)',border:'none',fontSize:'1rem',transition:'all 0.15s'}}>
                    {saving
                        ? (oauthStep==='connecting'||oauthStep==='downloading'||oauthStep==='uploading'
                            ? <><span className="spinner-border spinner-border-sm me-2"></span>{oauthStep==='connecting'?'Connecting…':oauthStep==='downloading'?'Checking backup…':'Backing up…'}</>
                            : <><span className="spinner-border spinner-border-sm me-2"></span>Saving…</>)
                        : 'Confirm'}
                </button>
                {onSkip && (
                    <div className="text-center mt-3">
                        <button onClick={onSkip} disabled={saving}
                            style={{background:'none',border:'none',color:'rgba(255,255,255,0.65)',fontSize:'0.85rem',cursor:saving?'default':'pointer',textDecoration:'underline',padding:'0.25rem 0.5rem'}}>
                            Maybe later — remind me next time
                        </button>
                    </div>
                )}
            </div>
        </div>
    );
}

function RegistrationScreen({ onRegister, onLogin }) {
    const [activeTab, setActiveTab] = useState('register');
    const [formData, setFormData] = useState({ displayName: '', email: '', password: '', confirmPassword: '' });
    const [errors, setErrors] = useState({});
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [showPassword, setShowPassword] = useState(false);
    const [showConfirm, setShowConfirm] = useState(false);
    const [socialLoading, setSocialLoading] = useState(null);
    const [socialError, setSocialError] = useState('');
    const [linkModal, setLinkModal] = useState(null);
    const [linkPw, setLinkPw] = useState('');
    const [linkShowPw, setLinkShowPw] = useState(false);
    const [linkError, setLinkError] = useState('');
    const [linkLoading, setLinkLoading] = useState(false);
    const [signEmail, setSignEmail] = useState('');
    const [signPw, setSignPw] = useState('');
    const [signShowPw, setSignShowPw] = useState(false);
    const [signRemember, setSignRemember] = useState(false);
    const [signLockUntil] = useState(() => { const v = parseInt(localStorage.getItem('financeApp_failLockUntil') || '0'); return v > Date.now() ? v : 0; });
    const [failCount, setFailCount] = useState(() => parseInt(localStorage.getItem('financeApp_failCount') || '0'));
    const [signError, setSignError] = useState(() => { const until = parseInt(localStorage.getItem('financeApp_failLockUntil') || '0'); return until > Date.now() ? 'Too many failed attempts. Please try again in 15 minutes.' : ''; });
    const [lockedOut, setLockedOut] = useState(() => { const v = parseInt(localStorage.getItem('financeApp_failLockUntil') || '0'); return v > Date.now(); });
    const [showForgot, setShowForgot] = useState(false);
    const [forgotEmail, setForgotEmail] = useState('');
    const [forgotSent, setForgotSent] = useState(false);
    const [showContactModal, setShowContactModal] = useState(false);

    const handleChange = (field, value) => { setFormData(prev => ({ ...prev, [field]: value })); if (errors[field]) setErrors(prev => ({ ...prev, [field]: '' })); };

    const validate = () => {
        const e = {};
        const nameRx = /^[a-zA-Z\s\-']+$/;
        const n = formData.displayName.trim();
        if (!n || n.length < 2) e.displayName = 'Display name must be at least 2 characters';
        else if (n.length > 50) e.displayName = 'Display name must be 50 characters or fewer';
        else if (!nameRx.test(n)) e.displayName = 'Only letters, spaces, hyphens and apostrophes allowed';
        if (!formData.email.trim()) e.email = 'Email is required';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email.trim())) e.email = 'Enter a valid email address';
        if (!formData.password) e.password = 'Password is required';
        else if (formData.password.length < 8) e.password = 'Password must be at least 8 characters';
        if (!formData.confirmPassword) e.confirmPassword = 'Please confirm your password';
        else if (formData.password !== formData.confirmPassword) e.confirmPassword = 'Passwords do not match';
        return e;
    };

    const handleSubmit = async (ev) => {
        ev.preventDefault();
        const errs = validate();
        if (Object.keys(errs).length > 0) { setErrors(errs); return; }
        setIsSubmitting(true);
        try {
            if (AuthUtils.firebaseReady) {
                const fbUser = await AuthUtils.register(formData.email.trim().toLowerCase(), formData.password, formData.displayName.trim());
                const user = { id: fbUser.uid, uid: fbUser.uid, displayName: formData.displayName.trim(), email: formData.email.trim().toLowerCase(), authProvider: 'firebase', createdAt: new Date().toISOString() };
                localStorage.setItem('financeApp_currentUser', JSON.stringify(user));
                await DataService.updateSettings({ displayName: user.displayName });
                try { DataService.addPerson({ name: user.displayName, isDefault: true, systemManaged: true }); } catch (_) {}
                onRegister(user);
            } else {
                const existing = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null'); } catch (_) { return null; } })();
                if (existing && existing.email === formData.email.trim().toLowerCase()) {
                    setErrors({ email: 'An account with this email already exists. Please sign in instead.' });
                    setIsSubmitting(false); return;
                }
                // A different account's data is in storage — wipe it before creating the new account
                if (existing) { DataService.clearAllUserData(); }
                const passwordHash = await AuthUtils.hashPassword(formData.password);
                const user = { id: Date.now(), displayName: formData.displayName.trim(), email: formData.email.trim().toLowerCase(), passwordHash, authProvider: 'email', createdAt: new Date().toISOString() };
                localStorage.setItem('financeApp_currentUser', JSON.stringify(user));
                localStorage.setItem('financeApp_session_expiry', String(Date.now() + 30 * 24 * 60 * 60 * 1000));
                localStorage.setItem('financeApp_session_uid', String(user.id));
                localStorage.removeItem('financeApp_failCount');
                localStorage.removeItem('financeApp_failLockUntil');
                await DataService.updateSettings({ displayName: user.displayName });
                try { DataService.addPerson({ name: user.displayName, isDefault: true, systemManaged: true }); } catch (_) {}
                onRegister(user);
            }
        } catch (err) {
            if (AuthUtils.firebaseReady && err.code) {
                const mapped = AuthUtils.mapFirebaseError(err.code);
                if (mapped && mapped.field) setErrors({ [mapped.field]: mapped.message });
                else if (mapped) setErrors({ general: mapped.message });
                else setErrors({ general: 'Registration failed. Please try again.' });
            } else {
                setErrors({ general: 'Registration failed. Please try again.' });
            }
            setIsSubmitting(false);
        }
    };

    const handleSocialSignIn = async (provider) => {
        if (!AuthUtils.firebaseReady) { setSocialError('Sign-in not available. Please use email and password.'); return; }
        setSocialLoading(provider);
        setSocialError('');
        try {
            const fbUser = provider === 'google' ? await AuthUtils.signInWithGoogle() : await AuthUtils.signInWithFacebook();
            localStorage.removeItem('financeApp_failCount');
            localStorage.removeItem('financeApp_failLockUntil');
            const storedUser = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null'); } catch (_) { return null; } })();
            const user = { id: fbUser.uid, uid: fbUser.uid, displayName: fbUser.displayName || (storedUser && storedUser.displayName) || fbUser.email, email: fbUser.email, authProvider: 'firebase', createdAt: (storedUser && storedUser.createdAt) || new Date().toISOString() };
            localStorage.setItem('financeApp_currentUser', JSON.stringify(user));
            const people = DataService.getPeople();
            const match = people.find(p => p.name === user.displayName && p.systemManaged);
            if (match) { try { DataService.updatePerson(match.id, { isDefault: true }); } catch (_) {} }
            else if (user.displayName) { try { DataService.addPerson({ name: user.displayName, isDefault: true, systemManaged: true }); } catch (_) {} }
            (onLogin || onRegister)(user);
        } catch (err) {
            console.error('[Social sign-in error]', err.code, err.message, err);
            if (err.code === 'auth/account-exists-with-different-credential') {
                setLinkModal({ email: err.email, credential: err.credential, providerName: provider === 'google' ? 'Google' : 'Facebook' });
            } else if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                const mapped = AuthUtils.mapFirebaseError(err.code);
                setSocialError(mapped ? mapped.message : 'Sign-in failed. Please try again.');
            }
        } finally {
            setSocialLoading(null);
        }
    };

    const handleLinkAccounts = async () => {
        if (!linkModal) return;
        setLinkLoading(true);
        setLinkError('');
        try {
            const fbUser = await AuthUtils.linkSocialCredential(linkModal.email, linkPw, linkModal.credential);
            const storedUser = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null'); } catch (_) { return null; } })();
            const user = { id: fbUser.uid, uid: fbUser.uid, displayName: fbUser.displayName || (storedUser && storedUser.displayName) || fbUser.email, email: fbUser.email, authProvider: 'firebase', createdAt: (storedUser && storedUser.createdAt) || new Date().toISOString() };
            localStorage.setItem('financeApp_currentUser', JSON.stringify(user));
            setLinkModal(null);
            setLinkPw('');
            (onLogin || onRegister)(user);
        } catch (err) {
            const mapped = AuthUtils.mapFirebaseError(err.code);
            setLinkError(mapped ? mapped.message : 'Incorrect password. Please try again.');
        } finally {
            setLinkLoading(false);
        }
    };

    const handleSignIn = async (ev) => {
        ev.preventDefault();
        if (lockedOut) return;
        if (AuthUtils.firebaseReady) {
            try {
                const fbUser = await AuthUtils.signIn(signEmail.trim().toLowerCase(), signPw);
                localStorage.removeItem('financeApp_failCount');
                localStorage.removeItem('financeApp_failLockUntil');
                const storedUser = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null'); } catch (_) { return null; } })();
                const user = {
                    id: fbUser.uid, uid: fbUser.uid,
                    displayName: fbUser.displayName || (storedUser && storedUser.displayName) || signEmail.trim(),
                    email: fbUser.email,
                    authProvider: 'firebase',
                    createdAt: (storedUser && storedUser.createdAt) || new Date().toISOString()
                };
                localStorage.setItem('financeApp_currentUser', JSON.stringify(user));
                const people = DataService.getPeople();
                const match = people.find(p => p.name === user.displayName && p.systemManaged);
                if (match) { try { DataService.updatePerson(match.id, { isDefault: true }); } catch (_) {} }
                (onLogin || onRegister)(user);
            } catch (err) {
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
                    // Attempt migration: check if a localStorage account exists with matching credentials
                    const stored = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null'); } catch (_) { return null; } })();
                    if (stored && stored.email === signEmail.trim().toLowerCase()) {
                        // Support both legacy plaintext password and hashed password
                        if (stored.password && !stored.passwordHash) {
                            stored.passwordHash = await AuthUtils.hashPassword(stored.password);
                            delete stored.password;
                            localStorage.setItem('financeApp_currentUser', JSON.stringify(stored));
                        }
                        const localOk = stored.passwordHash && await AuthUtils.verifyPassword(signPw, stored.passwordHash);
                        if (localOk) {
                            try {
                                const fbUser = await AuthUtils.register(stored.email, signPw, stored.displayName || stored.email);
                                const user = { ...stored, id: fbUser.uid, uid: fbUser.uid, authProvider: 'firebase' };
                                delete user.passwordHash; delete user.password;
                                localStorage.setItem('financeApp_currentUser', JSON.stringify(user));
                                localStorage.removeItem('financeApp_failCount');
                                localStorage.removeItem('financeApp_failLockUntil');
                                (onLogin || onRegister)(user);
                                return;
                            } catch (migrErr) { /* fall through to error */ }
                        }
                    }
                }
                const mapped = AuthUtils.mapFirebaseError(err.code);
                const msg = mapped ? mapped.message : 'Incorrect email or password.';
                const newCount = failCount + 1;
                setFailCount(newCount);
                localStorage.setItem('financeApp_failCount', String(newCount));
                if (newCount >= 5) {
                    const until = Date.now() + 15 * 60 * 1000;
                    localStorage.setItem('financeApp_failLockUntil', String(until));
                    setLockedOut(true);
                    setSignError('Too many failed attempts. Please try again in 15 minutes.');
                } else {
                    setSignError(msg || 'Incorrect email or password.');
                }
            }
        } else {
            const stored = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null'); } catch (_) { return null; } })();
            if (stored && stored.password && !stored.passwordHash) {
                stored.passwordHash = await AuthUtils.hashPassword(stored.password);
                delete stored.password;
                localStorage.setItem('financeApp_currentUser', JSON.stringify(stored));
            }
            const emailMatch = stored && stored.email === signEmail.trim().toLowerCase();
            const passwordMatch = emailMatch && await AuthUtils.verifyPassword(signPw, stored.passwordHash);
            if (!emailMatch || !passwordMatch) {
                const newCount = failCount + 1;
                setFailCount(newCount);
                localStorage.setItem('financeApp_failCount', String(newCount));
                if (newCount >= 5) {
                    const until = Date.now() + 15 * 60 * 1000;
                    localStorage.setItem('financeApp_failLockUntil', String(until));
                    setLockedOut(true);
                    setSignError('Too many failed attempts. Please try again in 15 minutes.');
                } else {
                    setSignError('Incorrect email or password.');
                }
                return;
            }
            localStorage.removeItem('financeApp_failCount');
            localStorage.removeItem('financeApp_failLockUntil');
            if (signRemember) {
                localStorage.setItem('financeApp_session_expiry', String(Date.now() + 30 * 24 * 60 * 60 * 1000));
                localStorage.setItem('financeApp_session_uid', String(stored.id));
            } else {
                sessionStorage.setItem('financeApp_session_active', 'true');
                sessionStorage.setItem('financeApp_session_uid', String(stored.id));
            }
            const people = DataService.getPeople();
            const match = people.find(p => p.name === stored.displayName && p.systemManaged);
            if (match) { try { DataService.updatePerson(match.id, { isDefault: true }); } catch (_) {} }
            (onLogin || onRegister)(stored);
        }
    };

    const handleForgotPw = async () => {
        if (AuthUtils.firebaseReady) {
            try { await AuthUtils.sendPasswordReset(forgotEmail.trim().toLowerCase()); } catch (_) {}
        } else {
            const stored = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null'); } catch (_) { return null; } })();
            console.log('[ForgotPW] Reset requested for:', forgotEmail.trim().toLowerCase(), '| match:', stored && stored.email === forgotEmail.trim().toLowerCase());
        }
        setForgotSent(true);
    };

    const gradientBtn = { background: 'linear-gradient(135deg,#4a6cf7,#6a3de8)', border: 'none' };
    const cardRounded = { borderRadius: '16px', border: 'none' };
    const btnRounded = { borderRadius: '10px' };

    return (
        <div style={{minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg,#4a6cf7 0%,#6a3de8 100%)', padding: '1rem'}}>
            <div style={{width: '100%', maxWidth: '420px'}}>
                <div className="text-center text-white mb-4">
                    <i className="fas fa-wallet fa-3x mb-3" style={{opacity: 0.9}}></i>
                    <h1 style={{fontWeight: '700', fontSize: '1.8rem'}}>Personal Finance</h1>
                    <p style={{opacity: 0.85, marginBottom: 0}}>Track your money, reach your goals</p>
                </div>
                <div className="card shadow-lg" style={cardRounded}>
                    <div className="card-body p-4">
                        <div className="d-flex mb-4" style={{background: '#f8f9fa', borderRadius: '10px', padding: '4px', gap: '4px'}}>
                            {[['register','Create Account'],['signin','Sign In']].map(([tab, label]) => (
                                <button key={tab} onClick={() => setActiveTab(tab)} style={{flex: 1, borderRadius: '8px', fontWeight: '600', fontSize: '0.88rem', padding: '0.45rem 0.5rem', border: 'none', whiteSpace: 'nowrap', cursor: 'pointer', background: activeTab === tab ? '#0d6efd' : 'transparent', color: activeTab === tab ? '#fff' : '#555', boxShadow: activeTab === tab ? '0 1px 4px rgba(0,0,0,0.15)' : 'none', transition: 'all 0.15s'}}>
                                    {label}
                                </button>
                            ))}
                        </div>
                        {activeTab === 'register' && (
                            <form onSubmit={handleSubmit} noValidate>
                                {errors.general && <div className="alert alert-danger py-2 small mb-3">{errors.general}</div>}
                                <div className="mb-3">
                                    <label className="form-label fw-semibold">Display Name</label>
                                    <input type="text" className={'form-control' + (errors.displayName ? ' is-invalid' : '')} placeholder="e.g. Alex Smith" value={formData.displayName} onChange={e => handleChange('displayName', e.target.value)} />
                                    {errors.displayName && <div className="invalid-feedback">{errors.displayName}</div>}
                                </div>
                                <div className="mb-3">
                                    <label className="form-label fw-semibold">Email Address</label>
                                    <input type="email" className={'form-control' + (errors.email ? ' is-invalid' : '')} placeholder="you@example.com" value={formData.email} onChange={e => handleChange('email', e.target.value)} autoComplete="email" />
                                    {errors.email && <div className="invalid-feedback">{errors.email}</div>}
                                </div>
                                <div className="mb-3">
                                    <label className="form-label fw-semibold">Password</label>
                                    <div className="input-group">
                                        <input type={showPassword ? 'text' : 'password'} className={'form-control' + (errors.password ? ' is-invalid' : '')} placeholder="Min. 8 characters" value={formData.password} onChange={e => handleChange('password', e.target.value)} autoComplete="new-password" />
                                        <button type="button" className="btn btn-outline-secondary" onClick={() => setShowPassword(v => !v)} tabIndex={-1}><i className={'fas fa-' + (showPassword ? 'eye-slash' : 'eye')}></i></button>
                                        {errors.password && <div className="invalid-feedback">{errors.password}</div>}
                                    </div>
                                    {formData.password && (() => {
                                        const strength = ValidationUtils.getPasswordStrength(formData.password);
                                        return (
                                            <div className="password-strength">
                                                <div className="password-strength-bar"><div className={'password-strength-fill ' + strength.className} style={{width: strength.percent + '%'}}></div></div>
                                                <span className={'password-strength-label ' + strength.className}>{strength.label}</span>
                                            </div>
                                        );
                                    })()}
                                </div>
                                <div className="mb-4">
                                    <label className="form-label fw-semibold">Confirm Password</label>
                                    <div className="input-group">
                                        <input type={showConfirm ? 'text' : 'password'} className={'form-control' + (errors.confirmPassword ? ' is-invalid' : '')} placeholder="Re-enter your password" value={formData.confirmPassword} onChange={e => handleChange('confirmPassword', e.target.value)} autoComplete="new-password" />
                                        <button type="button" className="btn btn-outline-secondary" onClick={() => setShowConfirm(v => !v)} tabIndex={-1}><i className={'fas fa-' + (showConfirm ? 'eye-slash' : 'eye')}></i></button>
                                        {errors.confirmPassword && <div className="invalid-feedback">{errors.confirmPassword}</div>}
                                    </div>
                                </div>
                                <button type="submit" className="btn btn-primary w-100 fw-semibold py-2 mb-3" disabled={isSubmitting} style={{...gradientBtn, ...btnRounded}}>
                                    {isSubmitting ? <><span className="spinner-border spinner-border-sm me-2"></span>Creating...</> : 'Create Account'}
                                </button>
                                <div className="d-flex align-items-center my-3"><hr className="flex-grow-1 m-0" /><span className="px-2 text-muted small">or</span><hr className="flex-grow-1 m-0" /></div>
                                {socialError && <div className="alert alert-danger py-2 small mb-2">{socialError}</div>}
                                <div className="d-grid gap-2">
                                    <button type="button" className="btn btn-outline-secondary fw-semibold" onClick={() => handleSocialSignIn('google')} disabled={!!socialLoading} style={btnRounded}>
                                        {socialLoading === 'google' ? <><span className="spinner-border spinner-border-sm me-2"></span>Connecting...</> : <><i className="fab fa-google me-2" style={{color:'#4285F4'}}></i>Continue with Google</>}
                                    </button>
                                    <button type="button" className="btn btn-outline-secondary fw-semibold" onClick={() => handleSocialSignIn('facebook')} disabled={!!socialLoading} style={btnRounded}>
                                        {socialLoading === 'facebook' ? <><span className="spinner-border spinner-border-sm me-2"></span>Connecting...</> : <><i className="fab fa-facebook me-2" style={{color:'#1877F2'}}></i>Continue with Facebook</>}
                                    </button>

function ContactUsModal({ onClose, defaultReplyTo }) {
    const [subject, setSubject] = useState('');
    const [details, setDetails] = useState('');
    const [replyTo, setReplyTo] = useState(defaultReplyTo || '');
    const [isSending, setIsSending] = useState(false);
    const [error, setError] = useState('');
    const [sent, setSent] = useState(false);

    const handleSend = async () => {
        setError('');
        const trimmedSubject = subject.trim();
        const trimmedDetails = details.trim();
        const trimmedReplyTo = replyTo.trim();
        if (!trimmedSubject) { setError('Please enter a subject.'); return; }
        if (!trimmedDetails) { setError('Please enter some details.'); return; }
        if (trimmedReplyTo && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmedReplyTo)) { setError('Please enter a valid email address.'); return; }
        setIsSending(true);
        try {
            const res = await fetch('/api/contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subject: trimmedSubject, details: trimmedDetails, replyTo: trimmedReplyTo })
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) { setError(data.error || 'Failed to send message. Please try again.'); setIsSending(false); return; }
            setSent(true);
            setIsSending(false);
            setTimeout(onClose, 1800);
        } catch (e) {
            setError('Network error. Please check your connection and try again.');
            setIsSending(false);
        }
    };

    return (
        <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.6)', zIndex: 9999}}>
            <div className="modal-dialog modal-dialog-centered">
                <div className="modal-content" style={{borderRadius: '16px', border: 'none'}}>
                    <div className="modal-header border-0 pb-1">
                        <h5 className="modal-title fw-semibold"><i className="fas fa-envelope me-2 text-primary"></i>Contact Us</h5>
                        <button type="button" className="btn-close" onClick={onClose} disabled={isSending}></button>
                    </div>
                    <div className="modal-body pt-1">
                        {sent ? (
                            <div className="alert alert-success py-2 small mb-0">Message sent — we'll get back to you soon.</div>
                        ) : (
                            <>
                                {error && <div className="alert alert-danger py-2 small mb-3">{error}</div>}
                                {defaultReplyTo ? (
                                    <div className="mb-3">
                                        <label className="form-label fw-semibold small">Your Email</label>
                                        <input type="email" className="form-control" value={replyTo} disabled />
                                    </div>
                                ) : (
                                    <div className="mb-3">
                                        <label className="form-label fw-semibold small">Your Email (optional, for a reply)</label>
                                        <input type="email" className="form-control" placeholder="you@example.com" value={replyTo} onChange={e => setReplyTo(e.target.value)} autoComplete="email" />
                                    </div>
                                )}
                                <div className="mb-3">
                                    <label className="form-label fw-semibold small">Subject</label>
                                    <input type="text" className="form-control" placeholder="What's this about?" value={subject} onChange={e => setSubject(e.target.value)} maxLength={200} />
                                </div>
                                <div className="mb-1">
                                    <label className="form-label fw-semibold small">Details</label>
                                    <textarea className="form-control" rows={5} placeholder="Tell us more..." value={details} onChange={e => setDetails(e.target.value)} maxLength={5000}></textarea>
                                </div>
                            </>
                        )}
                    </div>
                    {!sent && (
                        <div className="modal-footer border-0 pt-0">
                            <button className="btn btn-secondary btn-sm" onClick={onClose} disabled={isSending}>Cancel</button>
                            <button className="btn btn-primary fw-semibold btn-sm" onClick={handleSend} disabled={isSending || !subject.trim() || !details.trim()} style={{background: 'linear-gradient(135deg,#4a6cf7,#6a3de8)', border: 'none', borderRadius: '8px'}}>
                                {isSending ? <><span className="spinner-border spinner-border-sm me-2"></span>Sending...</> : <><i className="fas fa-paper-plane me-2"></i>Send</>}
                            </button>
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
}

function DisplayNamePrompt({ onRegister }) {
    const [name, setName] = useState('');
    const [error, setError] = useState('');
    const [saving, setSaving] = useState(false);

    const handleSave = async () => {
        const trimmed = name.trim();
        if (!trimmed || trimmed.length < 2) { setError('Name must be at least 2 characters'); return; }
        if (trimmed.length > 50) { setError('Name must be 50 characters or fewer'); return; }
        if (!/^[a-zA-Z\s\-']+$/.test(trimmed)) { setError("Only letters, spaces, hyphens and apostrophes allowed"); return; }
        setSaving(true);
        try {
            const user = JSON.parse(localStorage.getItem('financeApp_currentUser') || '{}');
            const updated = { ...user, displayName: trimmed };
            localStorage.setItem('financeApp_currentUser', JSON.stringify(updated));
            await DataService.updateSettings({ displayName: trimmed });
            try { DataService.addPerson({ name: trimmed, isDefault: true, systemManaged: true }); } catch (_) {}
            onRegister(updated);
        } catch (e) { setError('Failed to save. Please try again.'); setSaving(false); }
    };

    return (
        <div style={{minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg,#4a6cf7 0%,#6a3de8 100%)', padding: '1rem'}}>

                <div className="card shadow-lg" style={{borderRadius: '16px', border: 'none'}}>

                        <i className="fas fa-user-circle fa-3x mb-3" style={{color: '#4a6cf7'}}></i>

                        <p className="text-muted small mb-4">This name will appear across your expenses and reports.</p>

                        {error && <div className="invalid-feedback d-block mb-2">{error}</div>}
                        <button className="btn btn-primary w-100 fw-semibold py-2 mt-2" onClick={handleSave} disabled={saving} style={{borderRadius: '10px', background: 'linear-gradient(135deg,#4a6cf7,#6a3de8)', border: 'none'}}>

function ExportData({ expenses, income, categories, defaultCurrency, onNavigate }) {
    const [format, setFormat] = useState('csv');
    const [scope, setScope] = useState('all');
    const [fromDate, setFromDate] = useState('');
    const [toDate, setToDate] = useState('');
    const [toast, setToast] = useState('');
    const [printing, setPrinting] = useState(false);

    const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3500); };

    const todayStr = () => new Date().toISOString().split('T')[0];

    const getDateRange = () => {
        if (fromDate || toDate) return { from: fromDate || null, to: toDate || null };
        if (scope === 'current-month') {
            const n = new Date(), y = n.getFullYear(), m = n.getMonth();
            return { from: new Date(y, m, 1).toISOString().split('T')[0], to: new Date(y, m + 1, 0).toISOString().split('T')[0] };
        }
        return { from: null, to: null };
    };

    const inRange = (dateStr, from, to) => {
        if (!dateStr) return true;
        if (from && dateStr < from) return false;
        if (to && dateStr > to) return false;
        return true;
    };

    const exportToCSV = downloadCSV;

    const getCatName = (id) => { const c = categories.find(c => c.id === id); return c ? c.name : id || ''; };
    const getSubName = (cid, sid) => { const c = categories.find(c => c.id === cid); if (!c || !c.subcategories) return sid || ''; const s = c.subcategories.find(s => s.id === sid); return s ? s.name : sid || ''; };

    const handleExport = () => {
        if (format === 'pdf') {
            if (onNavigate) onNavigate('summary');
            setPrinting(true);
            setTimeout(() => { window.print(); setTimeout(() => setPrinting(false), 2000); }, 400);
            return;
        }
        const { from, to } = getDateRange();
        const doExp = scope !== 'income-only';
        const doInc = scope !== 'expenses-only';
        const filteredExp = doExp ? expenses.filter(e => inRange(e.date, from, to)) : [];
        const filteredInc = doInc ? income.filter(i => inRange(i.date, from, to)) : [];
        if (filteredExp.length === 0 && filteredInc.length === 0) { showToast('No records match. Export will be empty.'); return; }
        const expHeaders = ['Date','Description','Amount','Currency','Category','Sub Category','Paid By','Tags','Notes'];
        const incHeaders = ['Date','Source of Income','Currency','Amount',"Who's Income"];
        const expRows = filteredExp.map(e => [e.date, e.description || '', e.amount, e.currency || defaultCurrency, getCatName(e.categoryId), e.subcategory || '', e.paidBy || '', (e.tags || []).join(';'), e.notes || '']);
        const incRows = filteredInc.map(i => [i.date, i.source || '', i.currency || defaultCurrency, i.amount, i.whosIncome || i.paidBy || '']);
        if (filteredExp.length > 0) exportToCSV(`financetracker-expenses-${todayStr()}.csv`, expHeaders, expRows);
        if (filteredInc.length > 0) setTimeout(() => exportToCSV(`financetracker-income-${todayStr()}.csv`, incHeaders, incRows), filteredExp.length > 0 ? 200 : 0);
    };

    const scopeOptions = [
        { value: 'all', label: 'All Data' },
        { value: 'expenses-only', label: 'Expenses Only' },
        { value: 'income-only', label: 'Income Only' },
        { value: 'current-month', label: 'Current Month' }
    ];
    const gradientBtn = { background: 'linear-gradient(135deg,#4a6cf7,#6a3de8)', border: 'none' };

    return (
        <div className="p-3" style={{maxWidth: '480px', margin: '0 auto'}}>
            <h5 className="fw-bold mb-3"><i className="fas fa-file-export me-2 text-primary"></i>Export Data</h5>

            <div className="card shadow-sm mb-3">
                <div className="card-body">
                    <div className="mb-3">
                        <label className="form-label fw-semibold">Format</label>
                        <div className="d-flex gap-2">
                            {[['csv','CSV'],['pdf','PDF (Summary)']].map(([v, l]) => (
                                <button key={v} onClick={() => setFormat(v)} style={{flex: 1, borderRadius: '8px', fontWeight: '600', fontSize: '0.88rem', padding: '0.5rem', border: '2px solid ' + (format === v ? '#4a6cf7' : '#dee2e6'), background: format === v ? '#eef1ff' : '#fff', color: format === v ? '#4a6cf7' : '#555', cursor: 'pointer', transition: 'all 0.15s'}}>{l}</button>
                            ))}
                        </div>
                    </div>

                    {format === 'csv' && (
                        <div className="mb-3">
                            <label className="form-label fw-semibold">Scope</label>
                            <div className="d-flex flex-wrap gap-2">
                                {scopeOptions.map(o => (
                                    <button key={o.value} onClick={() => setScope(o.value)} style={{borderRadius: '8px', fontWeight: '600', fontSize: '0.82rem', padding: '0.4rem 0.75rem', border: '2px solid ' + (scope === o.value ? '#4a6cf7' : '#dee2e6'), background: scope === o.value ? '#eef1ff' : '#fff', color: scope === o.value ? '#4a6cf7' : '#555', cursor: 'pointer', transition: 'all 0.15s'}}>{o.label}</button>
                                ))}
                            </div>
                        </div>
                    )}

                    {format === 'csv' && (
                        <div className="mb-1">
                            <label className="form-label fw-semibold">Date Range Override <span className="text-muted fw-normal small">(optional — overrides scope)</span></label>
                            <div className="d-flex gap-2">
                                <div className="flex-fill">
                                    <label className="form-label small text-muted mb-1">From</label>
                                    <input type="date" className="form-control form-control-sm" value={fromDate} onChange={e => setFromDate(e.target.value)} />
                                </div>
                                <div className="flex-fill">
                                    <label className="form-label small text-muted mb-1">To</label>
                                    <input type="date" className="form-control form-control-sm" value={toDate} onChange={e => setToDate(e.target.value)} />
                                </div>
                                {(fromDate || toDate) && <div className="d-flex align-items-end pb-1"><button className="btn btn-sm btn-outline-secondary" onClick={() => { setFromDate(''); setToDate(''); }} title="Clear dates">✕</button></div>}
                            </div>
                        </div>
                    )}
                </div>
            </div>

            {format === 'pdf' && (
                <div className="alert alert-info small mb-3">
                    <i className="fas fa-info-circle me-2"></i>This will navigate to the Financial Summary and open your browser's print/save-as-PDF dialog.
                </div>
            )}

            {format === 'csv' && (
                <div className="alert alert-light small mb-3 text-muted border">
                    <i className="fas fa-info-circle me-2"></i>Amounts are exported in their original stored currency. A Currency column is included in each file.
                    {scope === 'all' && ' All Data exports two files: one for expenses and one for income.'}
                </div>
            )}

            <button className="btn btn-primary w-100 fw-semibold py-2" onClick={handleExport} style={gradientBtn}>
                <i className={'fas fa-' + (format === 'pdf' ? 'print' : 'download') + ' me-2'}></i>
                {format === 'pdf' ? 'Print / Save as PDF' : 'Download CSV'}
            </button>

            {printing && (
                <div className="text-center text-muted mt-3 small"><span className="spinner-border spinner-border-sm me-2"></span>Opening print dialog…</div>
            )}

            {toast && (
                <div style={{position: 'fixed', bottom: '5rem', left: '50%', transform: 'translateX(-50%)', background: '#333', color: '#fff', padding: '0.65rem 1.25rem', borderRadius: '8px', zIndex: 9999, fontSize: '0.88rem', whiteSpace: 'nowrap', boxShadow: '0 4px 12px rgba(0,0,0,0.3)'}}>
                    <i className="fas fa-exclamation-circle me-2"></i>{toast}
                </div>
            )}
        </div>
    );
}

function ProfileScreen({ currentUser, onLogout, onUpdate }) {
    const [user, setUser] = useState({ ...currentUser });
    const [editingName, setEditingName] = useState(false);
    const [newName, setNewName] = useState(user.displayName || '');
    const [nameError, setNameError] = useState('');
    const [nameSaving, setNameSaving] = useState(false);
    const [nameSuccess, setNameSuccess] = useState('');
    const [currPw, setCurrPw] = useState('');
    const [newPw, setNewPw] = useState('');
    const [confirmPw, setConfirmPw] = useState('');
    const [pwError, setPwError] = useState('');
    const [pwSuccess, setPwSuccess] = useState('');
    const [showCurrPw, setShowCurrPw] = useState(false);
    const [showNewPw, setShowNewPw] = useState(false);
    const [showConfirmPw, setShowConfirmPw] = useState(false);
    const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);

    const handleSaveName = async () => {
        const trimmed = newName.trim();
        if (!trimmed || trimmed.length < 2) { setNameError('Name must be at least 2 characters'); return; }
        if (trimmed.length > 50) { setNameError('Name must be 50 characters or fewer'); return; }
        if (!/^[a-zA-Z\s\-']+$/.test(trimmed)) { setNameError("Only letters, spaces, hyphens and apostrophes allowed"); return; }
        setNameSaving(true);
        try {
            const oldName = user.displayName;
            if (oldName && oldName !== trimmed) DataService.migratePersonName(oldName, trimmed);
            const people = DataService.getPeople();
            const match = people.find(p => p.name === oldName && p.systemManaged);
            if (match) { try { DataService.updatePerson(match.id, { name: trimmed }); } catch (_) {} }
            const updated = { ...user, displayName: trimmed };
            localStorage.setItem('financeApp_currentUser', JSON.stringify(updated));
            await DataService.updateSettings({ displayName: trimmed });
            setUser(updated);
            setEditingName(false);
            setNameSuccess('Display name updated.');
            setTimeout(() => setNameSuccess(''), 3000);
            if (onUpdate) onUpdate();
        } catch (e) { setNameError('Failed to save. Please try again.'); }
        setNameSaving(false);
    };

    const handleChangePw = async () => {
        setPwError(''); setPwSuccess('');
        if (!newPw || newPw.length < 8) { setPwError('New password must be at least 8 characters.'); return; }
        if (newPw !== confirmPw) { setPwError('New passwords do not match.'); return; }
        if (AuthUtils.firebaseReady) {
            try {
                const fbUser = window.__firebaseAuth.currentUser;
                if (!fbUser) { setPwError('Session expired. Please sign out and sign in again.'); return; }
                const { EmailAuthProvider } = firebase.auth;
                const credential = EmailAuthProvider.credential(fbUser.email, currPw);
                await fbUser.reauthenticateWithCredential(credential);
                await fbUser.updatePassword(newPw);
                setCurrPw(''); setNewPw(''); setConfirmPw('');
                setPwSuccess('Password changed successfully.');
                setTimeout(() => setPwSuccess(''), 4000);
            } catch (err) {
                const mapped = AuthUtils.mapFirebaseError(err.code);
                if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                    setPwError('Current password is incorrect.');
                } else if (mapped) {
                    setPwError(mapped.message);
                } else {
                    setPwError('Failed to change password. Please try again.');
                }
            }
        } else {
            const stored = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || '{}'); } catch (_) { return {}; } })();
            if (stored.password && !stored.passwordHash) {
                stored.passwordHash = await AuthUtils.hashPassword(stored.password);
                delete stored.password;
                localStorage.setItem('financeApp_currentUser', JSON.stringify(stored));
            }
            const currentOk = await AuthUtils.verifyPassword(currPw, stored.passwordHash || '');
            if (!currentOk) { setPwError('Current password is incorrect.'); return; }
            stored.passwordHash = await AuthUtils.hashPassword(newPw);
            delete stored.password;
            localStorage.setItem('financeApp_currentUser', JSON.stringify(stored));
            setCurrPw(''); setNewPw(''); setConfirmPw('');
            setPwSuccess('Password changed successfully.');
            setTimeout(() => setPwSuccess(''), 4000);
        }
    };

    const handleLogoutConfirm = async () => {
        await AuthUtils.signOut();
        onLogout();
    };

    const gradientBtn = { background: 'linear-gradient(135deg,#4a6cf7,#6a3de8)', border: 'none' };
    const providerLabel = { email: 'Email & Password', google: 'Google', facebook: 'Facebook' };
    const createdDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : '—';

    return (
        <div className="p-3" style={{maxWidth: '480px', margin: '0 auto'}}>
            <div className="card mb-3 shadow-sm">
                <div className="card-header fw-semibold"><i className="fas fa-user-circle me-2 text-primary"></i>Profile Details</div>
                <div className="card-body">
                    {nameSuccess && <div className="alert alert-success py-2 small mb-3">{nameSuccess}</div>}
                    <div className="mb-3">
                        <label className="form-label fw-semibold small text-muted text-uppercase" style={{fontSize: '0.7rem', letterSpacing: '0.05em'}}>Display Name</label>
                        {editingName ? (
                            <div>
                                <input type="text" className={'form-control mb-2' + (nameError ? ' is-invalid' : '')} value={newName} onChange={e => { setNewName(e.target.value); setNameError(''); }} autoFocus />
                                {nameError && <div className="invalid-feedback d-block mb-2">{nameError}</div>}
                                <div className="d-flex gap-2">
                                    <button className="btn btn-primary btn-sm fw-semibold" onClick={handleSaveName} disabled={nameSaving} style={gradientBtn}>{nameSaving ? 'Saving…' : 'Save'}</button>
                                    <button className="btn btn-outline-secondary btn-sm" onClick={() => { setEditingName(false); setNewName(user.displayName || ''); setNameError(''); }}>Cancel</button>
                                </div>
                            </div>
                        ) : (
                            <div className="d-flex align-items-center gap-2">
                                <span className="fw-semibold">{user.displayName}</span>
                                <button className="btn btn-outline-secondary btn-sm" onClick={() => { setEditingName(true); setNewName(user.displayName || ''); }}><i className="fas fa-pencil-alt me-1"></i>Edit</button>
                            </div>
                        )}
                    </div>
                    <div className="mb-3">
                        <label className="form-label fw-semibold small text-muted text-uppercase" style={{fontSize: '0.7rem', letterSpacing: '0.05em'}}>Email</label>
                        <div className="p-2 rounded bg-light text-muted small">{user.email || '—'}</div>
                    </div>
                    <div className="mb-3">
                        <label className="form-label fw-semibold small text-muted text-uppercase" style={{fontSize: '0.7rem', letterSpacing: '0.05em'}}>Sign-in Method</label>
                        <div className="p-2 rounded bg-light text-muted small">{providerLabel[user.authProvider] || user.authProvider || '—'}</div>
                    </div>
                    <div>
                        <label className="form-label fw-semibold small text-muted text-uppercase" style={{fontSize: '0.7rem', letterSpacing: '0.05em'}}>Account Created</label>
                        <div className="p-2 rounded bg-light text-muted small">{createdDate}</div>
                    </div>
                </div>
            </div>

            {user.authProvider === 'email' && (
                <div className="card mb-3 shadow-sm">
                    <div className="card-header fw-semibold"><i className="fas fa-lock me-2 text-primary"></i>Change Password</div>
                    <div className="card-body">
                        {pwError && <div className="alert alert-danger py-2 small mb-3">{pwError}</div>}
                        {pwSuccess && <div className="alert alert-success py-2 small mb-3">{pwSuccess}</div>}
                        <div className="mb-3">
                            <label className="form-label fw-semibold small">Current Password</label>
                            <div className="input-group">
                                <input type={showCurrPw ? 'text' : 'password'} className="form-control" value={currPw} onChange={e => { setCurrPw(e.target.value); setPwError(''); }} autoComplete="current-password" />
                                <button type="button" className="btn btn-outline-secondary" onClick={() => setShowCurrPw(v => !v)} tabIndex={-1}><i className={'fas fa-' + (showCurrPw ? 'eye-slash' : 'eye')}></i></button>
                            </div>
                        </div>
                        <div className="mb-3">
                            <label className="form-label fw-semibold small">New Password <span className="text-muted fw-normal">(min. 8 characters)</span></label>
                            <div className="input-group">
                                <input type={showNewPw ? 'text' : 'password'} className="form-control" value={newPw} onChange={e => { setNewPw(e.target.value); setPwError(''); }} autoComplete="new-password" />
                                <button type="button" className="btn btn-outline-secondary" onClick={() => setShowNewPw(v => !v)} tabIndex={-1}><i className={'fas fa-' + (showNewPw ? 'eye-slash' : 'eye')}></i></button>
                            </div>
                        </div>
                        <div className="mb-3">
                            <label className="form-label fw-semibold small">Confirm New Password</label>
                            <div className="input-group">
                                <input type={showConfirmPw ? 'text' : 'password'} className="form-control" value={confirmPw} onChange={e => { setConfirmPw(e.target.value); setPwError(''); }} autoComplete="new-password" />
                                <button type="button" className="btn btn-outline-secondary" onClick={() => setShowConfirmPw(v => !v)} tabIndex={-1}><i className={'fas fa-' + (showConfirmPw ? 'eye-slash' : 'eye')}></i></button>
                            </div>
                        </div>
                        <button className="btn btn-primary w-100 fw-semibold" onClick={handleChangePw} style={gradientBtn}>Change Password</button>
                    </div>
                </div>
            )}

            <div className="card shadow-sm">
                <div className="card-body text-center">
                    <p className="text-muted small mb-3">Your expenses, income and settings stay on this device — only your session is cleared.</p>
                    <button className="btn btn-danger w-100 fw-semibold py-2" onClick={() => setShowLogoutConfirm(true)}><i className="fas fa-sign-out-alt me-2"></i>Log Out</button>
                </div>
            </div>

            {showLogoutConfirm && (
                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title"><i className="fas fa-sign-out-alt me-2"></i>Log Out</h5></div>
                            <div className="modal-body"><p className="mb-0">Are you sure you want to log out? Your data will remain safe on this device.</p></div>
                            <div className="modal-footer">
                                <button className="btn btn-secondary" onClick={() => setShowLogoutConfirm(false)}>Cancel</button>
                                <button className="btn btn-danger fw-semibold" onClick={handleLogoutConfirm}>Log Out</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

function MonthlyTrends({ expenses, income, categories, defaultCurrency, currentUser, onMonthSelect }) {
    const [timeWindow, setTimeWindow] = useState(() => sessionStorage.getItem('trends_timeWindow') || '6m');
    const [selectedPerson, setSelectedPerson] = useState(() => sessionStorage.getItem('trends_person') || '__me__');
    const [selectedCats, setSelectedCats] = useState(() => { try { return JSON.parse(sessionStorage.getItem('trends_cats') || '[]'); } catch(_) { return []; } });
    const [showCatFilter, setShowCatFilter] = useState(false);
    const [expanded, setExpanded] = useState({});
    const [people] = useState(() => DataService.getPeople());

    const setTw = (v) => { setTimeWindow(v); sessionStorage.setItem('trends_timeWindow', v); };
    const setPerson = (v) => { setSelectedPerson(v); sessionStorage.setItem('trends_person', v); };
    const setCats = (fn) => { setSelectedCats(prev => { const next = typeof fn === 'function' ? fn(prev) : fn; sessionStorage.setItem('trends_cats', JSON.stringify(next)); return next; }); };

    const toggle = (key) => setExpanded(prev => ({ ...prev, [key]: !prev[key] }));

    const convertSync = (amount, from, to) => {
        if (!from || !to || from === to) return amount;
        const rates = CurrencyService.fallbackRates[from];
        if (rates && rates[to]) return Math.round(amount * rates[to] * 100) / 100;
        return amount;
    };
    const fmt = (n) => ValidationUtils.formatCurrency(n, defaultCurrency);

    const getMonths = () => {
        const now = new Date();
        const months = [];
        if (timeWindow === 'year') {
            for (let m = 0; m <= now.getMonth(); m++) months.push({ year: now.getFullYear(), month: m });
        } else {
            const count = timeWindow === '3m' ? 3 : timeWindow === '12m' ? 12 : 6;
            for (let i = count - 1; i >= 0; i--) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                months.push({ year: d.getFullYear(), month: d.getMonth() });
            }
        }
        return months;
    };

    const months = getMonths();
    const now = new Date();
    const curYear = now.getFullYear(), curMonth = now.getMonth();
    const personName = currentUser ? (currentUser.displayName || 'Me') : 'Me';

    const myName = (currentUser ? (currentUser.displayName || '') : '').toLowerCase().trim();

    const filteredExpenses = (() => {
        let exps = expenses;
        if (selectedPerson === '__me__') {
            exps = exps.filter(e => {
                const pb = (e.paidBy || '').toLowerCase().trim();
                return !pb || (myName && pb === myName);
            });
        } else if (selectedPerson !== '__all__') {
            exps = exps.filter(e => (e.paidBy || '').trim() === selectedPerson);
        }
        if (selectedCats.length > 0) exps = exps.filter(e => selectedCats.includes(e.categoryId));
        return exps;
    })();

    const filteredIncome = (() => {
        if (selectedPerson === '__all__') return income;
        if (selectedPerson === '__me__') {
            return income.filter(i => {
                const wi = (i.whosIncome || i.paidBy || '').toLowerCase().trim();
                return !wi || (myName && wi === myName);
            });
        }
        return income.filter(i => (i.whosIncome || i.paidBy || '').trim() === selectedPerson);
    })();

    const monthData = months.map(({ year, month }) => {
        const mm = String(month + 1).padStart(2, '0');
        const prefix = `${year}-${mm}`;
        const me = filteredExpenses.filter(e => (e.date || '').startsWith(prefix));
        const mi = filteredIncome.filter(i => (i.date || '').startsWith(prefix));
        const totalExp = me.reduce((s, e) => s + convertSync(e.amount, e.currency || 'GBP', defaultCurrency), 0);
        const totalInc = mi.reduce((s, i) => s + convertSync(i.amount, i.currency || 'GBP', defaultCurrency), 0);
        const net = totalInc - totalExp;
        const savingsRate = totalInc > 0 ? ((totalInc - totalExp) / totalInc) * 100 : null;
        const isCurrent = year === curYear && month === curMonth;
        const lastDay = new Date(year, month + 1, 0).getDate();
        const from = `${year}-${mm}-01`;
        const to = `${year}-${mm}-${String(lastDay).padStart(2, '0')}`;
        const label = new Date(year, month, 1).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
        const shortLabel = new Date(year, month, 1).toLocaleDateString('en-GB', { month: 'short' });

        const catBreakdown = {};
        categories.forEach(cat => {
            const catExps = me.filter(e => e.categoryId === cat.id);
            if (catExps.length === 0) return;
            const total = catExps.reduce((s, e) => s + convertSync(e.amount, e.currency || 'GBP', defaultCurrency), 0);
            const subBreakdown = {};
            catExps.forEach(e => { if (e.subcategory) subBreakdown[e.subcategory] = (subBreakdown[e.subcategory] || 0) + convertSync(e.amount, e.currency || 'GBP', defaultCurrency); });
            catBreakdown[cat.id] = { total, subBreakdown, catName: cat.name };
        });

        const incomeBreakdown = {};
        mi.forEach(i => { const src = i.source || 'Other'; incomeBreakdown[src] = (incomeBreakdown[src] || 0) + convertSync(i.amount, i.currency || 'GBP', defaultCurrency); });

        return { year, month, prefix, label, shortLabel, totalExp, totalInc, net, savingsRate, isCurrent, from, to, catBreakdown, incomeBreakdown };
    });

    const completeMonths = monthData.filter(m => !m.isCurrent && (m.totalExp > 0 || m.totalInc > 0));

    const maxVal = Math.max(...monthData.flatMap(m => [m.totalInc, m.totalExp]), 1);
    const minNet = Math.min(...monthData.map(m => m.net), 0);
    const totalRange = maxVal - minNet;
    const svgW = 420, ChartH = 180, padL = 52, padR = 10, padT = 22, padB = 28;
