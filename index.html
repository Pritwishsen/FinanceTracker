        const confirmed = localStorage.getItem('financeApp_storagePickerConfirmed') === 'true';
        setStoragePreference(pref);
        if (pref === 'gdrive' || pref === 'onedrive') {
            localStorage.setItem('financeApp_storagePickerConfirmed', 'true');
            setShowStoragePicker(false);
            const lastSync = localStorage.getItem('financeApp_lastCloudSync');
            if (lastSync) { setLastSyncTime(lastSync); setSyncStatus('synced'); }
            // Cloud restore/reconnect gate — blocks main app until check is resolved
            const skipCloudCheck = localStorage.getItem('financeApp_skipCloudRestoreCheck') === 'true';
            if (skipCloudCheck) {
                localStorage.removeItem('financeApp_skipCloudRestoreCheck');
                setCloudSyncGate('idle');
                // Upload the manually restored data to cloud so it stays in sync
                const svc = pref === 'gdrive' ? GDriveService : OneDriveService;
                if (svc.isConfigured() && svc.isTokenValid()) {
                    setSyncStatus('syncing');
                    signBackupForUpload(DataService.createBackup(), currentUser).then(signed =>
                        SyncService.upload(signed)
                    ).then(result => {
                        if (result.status === 'success') { setSyncStatus('synced'); setLastSyncTime(result.syncedAt); }
                        else { setSyncStatus('idle'); }
                    }).catch(() => { setSyncStatus('idle'); });
                }
                return;
            }
            const svc = pref === 'gdrive' ? GDriveService : OneDriveService;
            if (svc.isConfigured()) {
                (async () => {
                // OneDrive's SDK loads async+defer and may not be ready yet on a fresh page
                // load; wait for it so isTokenValid() doesn't spuriously report "no session".
                if (svc.waitUntilReady) await svc.waitUntilReady();
                if (svc.isTokenValid()) {
                    setCloudSyncGate('checking');
                    SyncService.download().then(async cloudBackup => {
                        if (!cloudBackup) { setCloudSyncGate('idle'); return; }
                        // Fail-closed: reject backups that don't belong to the current user
                        if (!isBackupOwnedByCurrentUser(cloudBackup, currentUser)) { setCloudSyncGate('idle'); return; }
                        const cloudTime = new Date(cloudBackup.createdAt || 0).getTime();
                        const localTime = new Date(localStorage.getItem('financeApp_lastSaveTime') || 0).getTime();
                        if (cloudTime > localTime) {
                            const localExp = JSON.parse(localStorage.getItem('financeApp_expenses') || '[]');
                            const localInc = JSON.parse(localStorage.getItem('financeApp_income') || '[]');
                            if (localExp.length > 0 || localInc.length > 0) {
                                // This is a headless path with no confirmation UI, so an unsigned
                                // legacy backup (requiresConfirmation) must not merge silently —
                                // decline and leave both local and cloud data untouched instead.
                                const sigResult = await verifyBackupSignature(cloudBackup, currentUser);
                                if (!isSignatureAcceptable(sigResult) || sigResult.requiresConfirmation) {
                                    setCloudSyncGate('idle');
                                    return;
                                }
                                // Both devices have data — merge so nothing is lost, then tell the user
                                const merged = DataService.mergeBackups(DataService.createBackup(), cloudBackup);
                                DataService.restoreBackup(merged);
                                DataService.isInitialized = false;
                                setCloudSyncGate('idle');
                                const [expD, incD, catD, setD] = await Promise.all([DataService.getExpenses(), DataService.getIncome(), DataService.getCategories(), DataService.getSettings()]);
                                setExpenses(expD); setIncome(incD); setCategories(catD); setDefaultCurrency(setD.currency || 'GBP');
                                setPeople(DataService.getPeople());
                                showSyncMergeToast('Merged changes from another device');
                                setSyncStatus('syncing');
                                try {
                                    const signed = await signBackupForUpload(merged, currentUser);
                                    const result = await SyncService.upload(signed);
                                    if (result.status === 'success') { setSyncStatus('synced'); setLastSyncTime(result.syncedAt); }
                                    else {
                                        setSyncStatus('error');
                                        showSyncMergeToast('Merged locally, but the upload to the cloud failed — will retry on your next change.');
                                    }
                                } catch (_) {
                                    setSyncStatus('error');
                                    showSyncMergeToast('Merged locally, but the upload to the cloud failed — will retry on your next change.');
                                }
                            } else {
                                // Local is empty — just restore from cloud
                                setCloudRestoreData(cloudBackup); setCloudSyncGate('restore-prompt');
                            }
                        } else { setCloudSyncGate('idle'); }
                    }).catch(() => { setCloudSyncGate('idle'); });
                } else {
                    // No active session token — prompt user to reconnect before entering app
                    setCloudSyncGate('reconnect-prompt');
                }
                })();
            }
        } else if (!confirmed) {
            // skipCount = logins remaining before re-prompt (2 on first skip → hides on login 1 & 2 → shows on login 3)
            const skipCount = parseInt(localStorage.getItem('financeApp_storagePickerSkipCount') || '0', 10);
            if (skipCount > 0) {
                // Still inside the skip window — decrement and let user in without prompting
                localStorage.setItem('financeApp_storagePickerSkipCount', String(skipCount - 1));
                setShowStoragePicker(false);
            } else {
                // Skip window exhausted (or never skipped) — show the picker
                setShowStoragePicker(true);
            }
        } else {
            setShowStoragePicker(false);
        }
    }, [currentUser ? currentUser.uid : null]);

    useEffect(() => {
        const loadData = async () => {
            try {
                await DataService.processRecurringSchedules();
                const todayStr = new Date().toISOString().split('T')[0];
                const appSettings = await DataService.getSettings();
                const hasData = DataService.data.expenses.length > 0 || DataService.data.income.length > 0;
                if (appSettings.autoBackupEnabled !== false && hasData && !SyncService.isCloudEnabled() && DataService.hasDataChangedSinceLastBackup()) {
                    const lastAutoBackup = localStorage.getItem('financeApp_lastAutoBackup');
                    if (lastAutoBackup !== todayStr) {
                        DataService.downloadBackup();
                        localStorage.setItem('financeApp_lastAutoBackup', todayStr);
                    }
                }
                const [expensesData, incomeData, categoriesData, settings] = await Promise.all([
                    DataService.getExpenses(), DataService.getIncome(), DataService.getCategories(), DataService.getSettings()
                ]);
                setExpenses(expensesData); setIncome(incomeData); setCategories(categoriesData); setDefaultCurrency(settings.currency || 'GBP');
                setPeople(DataService.getPeople());
                await refreshNotifications();
            } catch (error) { console.error('Error loading data:', error); }
        };
        loadData();
    }, []);

    // The actual download+merge+upload cloud round-trip — runs once per debounce window,
    // no matter how many handleDataUpdate() calls fed into it (see cloudSyncDebounceRef above).
    const performCloudSync = async () => {
        if (!SyncService.isCloudEnabled()) return;
        if (cloudSyncInFlightRef.current) return;
        cloudSyncInFlightRef.current = true;
        setSyncStatus('syncing');
        try {
            // Download-first: merge any changes uploaded by another device
            // before writing our snapshot, so neither device loses data.
            let backupToUpload = DataService.createBackup();
            try {
                const cloudBackup = await SyncService.download();
                if (cloudBackup && isBackupOwnedByCurrentUser(cloudBackup, currentUser)) {
                    const sigResult = await verifyBackupSignature(cloudBackup, currentUser);
                    if (isSignatureAcceptable(sigResult)) {
                        const cloudTime = new Date(cloudBackup.createdAt || 0).getTime();
                        const lastSync = new Date(localStorage.getItem('financeApp_lastCloudSync') || 0).getTime();
                        if (cloudTime > lastSync) {
                            // Another device has uploaded since our last sync — merge
                            const merged = DataService.mergeBackups(backupToUpload, cloudBackup);
                            DataService.restoreBackup(merged);
                            DataService.isInitialized = false;
                            const [expD, incD, catD, setD] = await Promise.all([DataService.getExpenses(), DataService.getIncome(), DataService.getCategories(), DataService.getSettings()]);
                            setExpenses(expD); setIncome(incD); setCategories(catD); setDefaultCurrency(setD.currency || 'GBP');
                            setPeople(DataService.getPeople());
                            backupToUpload = merged;
                        }
                    }
                }
            } catch (_) { /* cloud check failed — proceed with local-only upload */ }
            const signedBackup = await signBackupForUpload(backupToUpload, currentUser);
            const result = await SyncService.upload(signedBackup);
            if (result.status === 'success') {
                setSyncStatus('synced'); setLastSyncTime(result.syncedAt); localStorage.setItem('financeApp_lastCloudSync', result.syncedAt);
                // Reconcile lastSaveTime with what we actually uploaded — otherwise it stays
                // pinned to the pre-upload stamp (set above by saveLatestBackup()), which is
                // always slightly older than backupToUpload.createdAt. On the next reload/login
                // the cloud-vs-local check then sees cloudTime > localTime and treats our own
                // just-uploaded data as "newer than local", triggering a spurious re-merge.
                if (backupToUpload.createdAt) localStorage.setItem('financeApp_lastSaveTime', backupToUpload.createdAt);
                clearCloudSyncPending();
            }
            else if (result.status === 'reconnect-needed') { setSyncStatus('reconnect-needed'); setReconnectBannerDismissed(false); }
            else if (result.status !== 'local') { setSyncStatus(result.status === 'not_configured' ? 'not_configured' : 'error'); }
        } catch (_) { setSyncStatus('error'); }
        finally { cloudSyncInFlightRef.current = false; }
    };
    const CLOUD_SYNC_DEBOUNCE_MS = 3000;
    const scheduleCloudSync = () => {
        if (cloudSyncDebounceRef.current) clearTimeout(cloudSyncDebounceRef.current);
        cloudSyncDebounceRef.current = setTimeout(() => { cloudSyncDebounceRef.current = null; performCloudSync(); }, CLOUD_SYNC_DEBOUNCE_MS);
    };
    const cancelScheduledCloudSync = () => { if (cloudSyncDebounceRef.current) { clearTimeout(cloudSyncDebounceRef.current); cloudSyncDebounceRef.current = null; } };

    // Marks that a local change hasn't been confirmed uploaded yet. Set optimistically
    // whenever a sync is scheduled (not just on failure) so the flag — and the banner it
    // drives — survives a tab close/reload that happens before the debounced sync fires
    // or while offline, instead of only surfacing after a failed attempt.
    const markCloudSyncPending = () => {
        if (!localStorage.getItem('financeApp_pendingCloudSync')) {
            const now = new Date().toISOString();
            localStorage.setItem('financeApp_pendingCloudSync', now);
            setPendingSyncSince(now);
            setPendingSyncBannerDismissed(false);
        }
    };
    const clearCloudSyncPending = () => {
        localStorage.removeItem('financeApp_pendingCloudSync');
        setPendingSyncSince('');
    };

    // Retries a pending sync as soon as the browser regains connectivity, instead of
    // waiting for the user's next edit or a manual "Sync now". The periodic check is a
    // fallback for the 'online' event not firing reliably (e.g. captive portals that
    // briefly report connectivity before the real request fails).
    useEffect(() => {
        const retryIfPending = () => {
            if (SyncService.isCloudEnabled() && navigator.onLine && localStorage.getItem('financeApp_pendingCloudSync')) {
                performCloudSync();
            }
        };
        window.addEventListener('online', retryIfPending);
        const intervalId = setInterval(retryIfPending, 2 * 60 * 1000);
        return () => { window.removeEventListener('online', retryIfPending); clearInterval(intervalId); };
    }, []);

    const handleDataUpdate = async () => {
        try {
            const [expensesData, incomeData, categoriesData, settings] = await Promise.all([
                DataService.getExpenses(), DataService.getIncome(), DataService.getCategories(), DataService.getSettings()
            ]);
            setExpenses(expensesData); setIncome(incomeData); setCategories(categoriesData); setDefaultCurrency(settings.currency || 'GBP');
            setPeople(DataService.getPeople());
            await refreshNotifications();
            // Guard: check BEFORE saveLatestBackup() sets financeApp_lastSaveTime, so that
            // a freshly-wiped device (just logged in, no local data yet) doesn't overwrite
            // the cloud backup with empty data.
            const hasSavedLocally = !!localStorage.getItem('financeApp_lastSaveTime');
            DataService.saveLatestBackup();
            // Debounced: a burst of calls (e.g. one per row of a CSV import) coalesces into
            // a single cloud round-trip fired after the burst settles, instead of one per call.
            if (SyncService.isCloudEnabled() && hasSavedLocally) { markCloudSyncPending(); scheduleCloudSync(); }
        } catch (error) { console.error('Error updating data:', error); }
    };

    const handleRegister = (user) => { setCurrentUser(user); };
    const handleLogout = () => {
        // A pending debounced sync must not fire after logout — it would read the
        // about-to-be-wiped local data and could overwrite the cloud backup with it.
        cancelScheduledCloudSync();
        const pref = localStorage.getItem('financeApp_storagePreference') || '';
        if (pref === 'gdrive') GDriveService.clearToken();
        else if (pref === 'onedrive') OneDriveService.clearToken();
        // Clear session integrity token from sessionStorage (localStorage token wiped by clearAllUserData)
        sessionStorage.removeItem('financeApp_session_uid');
        sessionStorage.removeItem('financeApp_session_active');
        // Wipe all financial data so the next user on this device starts with a clean slate
        DataService.clearAllUserData();
        setCurrentUser(null); setStoragePreference(''); setShowStoragePicker(false);
        setSyncStatus('idle'); setReconnectBannerDismissed(false);
        setCloudSyncGate('idle'); setCloudGateConnecting(false); setCloudGateError('');
        setExpenses([]); setIncome([]); setCategories([]); setPeople([]);
    };
    const handleStorageConfirm = async (pref, cloudBackup) => {
        // Provider migration: switching from one cloud provider to another
        const oldPref = storagePreference;
        const isOldCloud = oldPref === 'gdrive' || oldPref === 'onedrive';
        const isNewCloud = pref === 'gdrive' || pref === 'onedrive';
        if (isOldCloud && isNewCloud && oldPref !== pref) {
            try {
                const oldSvc = oldPref === 'gdrive' ? GDriveService : OneDriveService;
                if (oldSvc.isConfigured() && oldSvc.isTokenValid()) {
                    const oldBackup = await oldSvc.download();
                    if (oldBackup && isBackupOwnedByCurrentUser(oldBackup, currentUser)) {
                        const sigResult = await verifyBackupSignature(oldBackup, currentUser);
                        // Skip auto-migration restore for unsigned backups — no modal here for TOFU
                        if (isSignatureAcceptable(sigResult) && !sigResult.requiresConfirmation) { DataService.restoreBackup(oldBackup); }
                    }
                }
            } catch (_) {}
        }
        setStoragePreference(pref);
        setShowStoragePicker(false);
        setSyncStatus('idle');
        setReconnectBannerDismissed(false);
        localStorage.removeItem('financeApp_storagePickerSkipCount');
        // Reflect a backup that already succeeded (e.g. the picker's own upload when this
        // provider had no prior file) immediately, instead of waiting on handleDataUpdate()'s
        // own re-upload below to succeed before the Settings screen shows a synced time.
        const persistedSync = localStorage.getItem('financeApp_lastCloudSync');
        if ((pref === 'gdrive' || pref === 'onedrive') && persistedSync) { setLastSyncTime(persistedSync); setSyncStatus('synced'); }
        let showingRestore = false;
        if (cloudBackup && isBackupOwnedByCurrentUser(cloudBackup, currentUser)) {
            const cloudTime = new Date(cloudBackup.createdAt || 0).getTime();
            const localTime = new Date(localStorage.getItem('financeApp_lastSaveTime') || 0).getTime();
            if (cloudTime > localTime) { setCloudRestoreData(cloudBackup); setCloudSyncGate('restore-prompt'); showingRestore = true; }
        }
        // Upload local data to cloud immediately after connecting (unless we're showing the restore prompt)
        if ((pref === 'gdrive' || pref === 'onedrive') && !showingRestore) {
            handleDataUpdate();
        }
    };
    const handleOpenStoragePicker = () => { setShowStoragePicker(true); };
    const handleReconnect = async () => {
        const svc = storagePreference === 'gdrive' ? GDriveService : OneDriveService;
        if (!svc || !svc.isConfigured()) { setSyncStatus('not_configured'); return; }
        try {
            await svc.requestToken();
            // After re-connecting, check if cloud has newer data and offer restore
            setSyncStatus('syncing');
            try {
                const cloudBackup = await SyncService.download();
                if (cloudBackup && isBackupOwnedByCurrentUser(cloudBackup, currentUser)) {
                    const sigResult = await verifyBackupSignature(cloudBackup, currentUser);
                    if (!isSignatureAcceptable(sigResult)) throw new Error('Cloud backup integrity check failed — restore blocked.');
                    const cloudTime = new Date(cloudBackup.createdAt || 0).getTime();
                    const localTime = new Date(localStorage.getItem('financeApp_lastSaveTime') || 0).getTime();
                    if (cloudTime > localTime) {
                        const localExp = JSON.parse(localStorage.getItem('financeApp_expenses') || '[]');
                        const localInc = JSON.parse(localStorage.getItem('financeApp_income') || '[]');
                        if (localExp.length > 0 || localInc.length > 0) {
                            const merged = DataService.mergeBackups(DataService.createBackup(), cloudBackup);
                            DataService.restoreBackup(merged);
                            DataService.isInitialized = false;
                            const signedM = await signBackupForUpload(merged, currentUser);
                            await SyncService.upload(signedM);
                            const [expD, incD, catD, setD] = await Promise.all([DataService.getExpenses(), DataService.getIncome(), DataService.getCategories(), DataService.getSettings()]);
                            setExpenses(expD); setIncome(incD); setCategories(catD); setDefaultCurrency(setD.currency || 'GBP');
                            setPeople(DataService.getPeople());
                        } else {
                            setCloudRestoreData(cloudBackup);
                            setCloudSyncGate('restore-prompt');
                            setSyncStatus('idle');
                            return;
                        }
                    }
                }
            } catch (_) {}
            setReconnectBannerDismissed(true);
            setSyncStatus('idle');
            handleDataUpdate();
        } catch (_) { setSyncStatus('reconnect-needed'); }
    };
    const handleSyncNow = async () => {
        if (!SyncService.isCloudEnabled()) return;
        // A manual sync makes any pending debounced one from a recent edit redundant.
        cancelScheduledCloudSync();
        const svc = storagePreference === 'gdrive' ? GDriveService : OneDriveService;
        // If no valid token, show reconnect instead of trying (and failing with session-expired)
        if (!svc || !svc.isTokenValid()) { setSyncStatus('reconnect-needed'); setReconnectBannerDismissed(false); return; }
        setSyncStatus('syncing');
        try {
            // Download-first: if cloud is newer than local, offer restore instead of overwriting
            const cloudBackup = await SyncService.download();
            if (cloudBackup && isBackupOwnedByCurrentUser(cloudBackup, currentUser)) {
                const sigResult = await verifyBackupSignature(cloudBackup, currentUser);
                if (isSignatureAcceptable(sigResult)) {
                    const cloudTime = new Date(cloudBackup.createdAt || 0).getTime();
                    const localTime = new Date(localStorage.getItem('financeApp_lastSaveTime') || 0).getTime();
                    if (cloudTime > localTime) {
                        // Merge cloud + local instead of replacing either side
                        const merged = DataService.mergeBackups(DataService.createBackup(), cloudBackup);
                        DataService.restoreBackup(merged);
                        DataService.isInitialized = false;
                        const signedMerged = await signBackupForUpload(merged, currentUser);
                        const mergeResult = await SyncService.upload(signedMerged);
                        if (mergeResult.status === 'success') { setSyncStatus('synced'); setLastSyncTime(mergeResult.syncedAt); localStorage.setItem('financeApp_lastCloudSync', mergeResult.syncedAt); clearCloudSyncPending(); }
                        else { setSyncStatus('idle'); }
                        const [expD, incD, catD, setD] = await Promise.all([DataService.getExpenses(), DataService.getIncome(), DataService.getCategories(), DataService.getSettings()]);
                        setExpenses(expD); setIncome(incD); setCategories(catD); setDefaultCurrency(setD.currency || 'GBP');
                        setPeople(DataService.getPeople());
                        return;
                    }
                }
            }
            // Local is up to date — upload it
            const signedForSync = await signBackupForUpload(DataService.createBackup(), currentUser);
            const result = await SyncService.upload(signedForSync);
            if (result.status === 'success') { setSyncStatus('synced'); setLastSyncTime(result.syncedAt); clearCloudSyncPending(); }
            else if (result.status === 'reconnect-needed') { setSyncStatus('reconnect-needed'); setReconnectBannerDismissed(false); }
            else { setSyncStatus(result.status === 'not_configured' ? 'not_configured' : 'error'); }
        } catch (_) { setSyncStatus('error'); }
    };
    const handleCloudGateConnect = async () => {
        const svc = storagePreference === 'gdrive' ? GDriveService : OneDriveService;
        if (!svc || !svc.isConfigured()) { setCloudSyncGate('idle'); return; }
        setCloudGateConnecting(true); setCloudGateError('');
        try {
            await svc.requestToken();
        } catch {
            // Only the OAuth step itself failing is actually a pop-up/permissions problem
            setCloudGateConnecting(false);
            setCloudGateError('Connection failed — check pop-up permissions and try again.');
            return;
        }
        setCloudGateConnecting(false); // OAuth complete — clear spinner before transition
        setCloudSyncGate('checking');
        try {
            const cloudBackup = await SyncService.download();
            if (!cloudBackup) { setCloudSyncGate('idle'); return; }
            // Fail-closed: reject backups that don't belong to the current user
            if (!isBackupOwnedByCurrentUser(cloudBackup, currentUser)) { setCloudSyncGate('idle'); return; }
            const sigResult = await verifyBackupSignature(cloudBackup, currentUser);
            if (!isSignatureAcceptable(sigResult)) { setCloudSyncGate('idle'); return; }
            const cloudTime = new Date(cloudBackup.createdAt || 0).getTime();
            const localTime = new Date(localStorage.getItem('financeApp_lastSaveTime') || 0).getTime();
            if (cloudTime > localTime) {
                const localExp = JSON.parse(localStorage.getItem('financeApp_expenses') || '[]');
                const localInc = JSON.parse(localStorage.getItem('financeApp_income') || '[]');
                if (localExp.length > 0 || localInc.length > 0) {
                    const merged = DataService.mergeBackups(DataService.createBackup(), cloudBackup);
                    DataService.restoreBackup(merged);
                    DataService.isInitialized = false;
                    setCloudSyncGate('idle');
                    signBackupForUpload(merged, currentUser).then(signed => SyncService.upload(signed)).catch(() => {});
                    Promise.all([DataService.getExpenses(), DataService.getIncome(), DataService.getCategories(), DataService.getSettings()]).then(([expD, incD, catD, setD]) => {
                        setExpenses(expD); setIncome(incD); setCategories(catD); setDefaultCurrency(setD.currency || 'GBP');
                        setPeople(DataService.getPeople());
                    });
                } else {
                    setCloudRestoreData(cloudBackup); setCloudSyncGate('restore-prompt');
                }
            }
            else { setCloudSyncGate('idle'); }
        } catch {
            // A Drive/network/verification failure here has nothing to do with OAuth pop-ups —
            // showing the pop-up-permissions message here sent users to re-grant a permission
            // they already had, with no way to fix the actual problem. Return to the reconnect
            // screen (instead of leaving the app stuck on the "Checking…" spinner forever) with
            // wording that matches what actually failed.
            setCloudSyncGate('reconnect-prompt');
            setCloudGateError("Connected, but couldn't reach your cloud backup — check your connection and try again.");
        }
    };
    const handleCloudGateSkip = () => { setCloudSyncGate('idle'); setCloudGateError(''); };

    const handleCurrencyChange = (newCurrency) => { setDefaultCurrency(newCurrency); handleDataUpdate(); };

    const renderScreen = () => {
        switch (currentScreen) {
            case 'expenses': return <ExpenseList expenses={expenses} categories={categories} onUpdate={handleDataUpdate} initialDateFrom={expensesInitDateFrom} initialDateTo={expensesInitDateTo} initialPaidBy={expensesInitPaidBy} />;
            case 'trends': return <MonthlyTrends expenses={expenses} income={income} categories={categories} defaultCurrency={defaultCurrency} currentUser={currentUser} onMonthSelect={(from, to, paidBy) => { setExpensesInitDateFrom(from); setExpensesInitDateTo(to); setExpensesInitPaidBy(paidBy || ''); setCurrentScreen('expenses'); }} />;
            case 'add-expense': return <ExpenseForm categories={categories} onSave={handleDataUpdate} onCancel={() => setCurrentScreen('expenses')} />;
            case 'categories': return <CategoryManager categories={categories} onUpdate={handleDataUpdate} defaultCurrency={defaultCurrency} />;
            case 'income': return <IncomeForm income={income} onUpdate={handleDataUpdate} />;
            case 'summary': return <Summary expenses={expenses} income={income} categories={categories} defaultCurrency={defaultCurrency} />;
            case 'goals': return <SavingsGoals defaultCurrency={defaultCurrency} />;
            case 'bills': return <BillTracker categories={categories} onUpdate={handleDataUpdate} />;
            case 'recurring': return <RecurringList onUpdate={handleDataUpdate} />;
            case 'bulk-upload': return <BulkUpload categories={categories} onUpdate={handleDataUpdate} />;
            case 'debts': return <DebtTracker defaultCurrency={defaultCurrency} categories={categories} onUpdate={handleDataUpdate} />;
            case 'networth': return <NetWorth defaultCurrency={defaultCurrency} />;
            case 'settings': return <SettingsScreen currentCurrency={defaultCurrency} onCurrencyChange={handleCurrencyChange} currentUser={currentUser} onStoragePickerOpen={handleOpenStoragePicker} syncStatus={syncStatus} lastSyncTime={lastSyncTime} storagePreference={storagePreference} onSyncNow={handleSyncNow} onReconnect={handleReconnect} onViewHistory={() => setShowCloudHistory(true)} />;
            case 'export': return <ExportData expenses={expenses} income={income} categories={categories} defaultCurrency={defaultCurrency} onNavigate={setCurrentScreen} />;
            case 'profile': return <ProfileScreen currentUser={currentUser} onLogout={handleLogout} onUpdate={handleDataUpdate} />;
            default: return <ExpenseList expenses={expenses} categories={categories} onUpdate={handleDataUpdate} />;
        }
    };

    if (authLoading) return (
        <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#4a6cf7 0%,#6a3de8 100%)'}}>
            <div className="spinner-border text-white mb-3" style={{width:'3rem',height:'3rem'}}></div>
            <div className="text-white fw-semibold">Signing you in…</div>
        </div>
    );
    if (!currentUser) return <RegistrationScreen onRegister={handleRegister} onLogin={handleRegister} />;
    if (!currentUser.displayName) return <DisplayNamePrompt onRegister={handleRegister} />;
    if (showStoragePicker) return <StoragePickerModal currentUser={currentUser} initialPreference={storagePreference || 'local'} onConfirm={handleStorageConfirm} onSkip={() => { localStorage.setItem('financeApp_storagePickerSkipCount', '2'); setShowStoragePicker(false); }} />;
    if (cloudSyncGate === 'checking') return (
        <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#4a6cf7 0%,#6a3de8 100%)'}}>
            <div className="spinner-border text-white mb-3" style={{width:'3rem',height:'3rem'}}></div>
            <div className="text-white fw-semibold">Checking cloud backup…</div>
            <div className="text-white mt-1" style={{opacity:0.7,fontSize:'0.83rem'}}>{storagePreference === 'gdrive' ? 'Google Drive' : 'OneDrive'}</div>
        </div>
    );
    if (cloudSyncGate === 'reconnect-prompt') return (
        <CloudReconnectGate provider={storagePreference} connecting={cloudGateConnecting} error={cloudGateError} onConnect={handleCloudGateConnect} onSkip={handleCloudGateSkip} />
    );
    if (cloudSyncGate === 'restore-prompt' && cloudRestoreData) return (
        <CloudRestoreModal
            backupData={cloudRestoreData}
            currentUser={currentUser}
            onRestore={async () => {
                // Restore in-place — no page reload needed.
                // DataService.restoreBackup() was already called inside CloudRestoreModal
                // before onRestore fires; force a cache-bust so handleDataUpdate re-reads
                // the freshly restored localStorage values instead of stale in-memory data.
                DataService.isInitialized = false;
                setCloudRestoreData(null);
                setCloudSyncGate('idle');
                await handleDataUpdate();
            }}
            onKeepLocal={() => { setCloudRestoreData(null); setCloudSyncGate('idle'); handleDataUpdate(); }}
        />
    );

    const hasLocalData = expenses.length > 0 || income.length > 0;
    const showLocalDeviceBanner = storagePreference === 'local'
        && localStorage.getItem('financeApp_storagePickerConfirmed') === 'true'
        && !localStorage.getItem('financeApp_latestBackup')
        && hasLocalData
        && !localDeviceBannerDismissed;

    return (
        <div className="mobile-app">
            <div className="app-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <h1 style={{margin:0}}><i className="fas fa-wallet"></i> Personal Finance</h1>
                <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
                    {(storagePreference === 'gdrive' || storagePreference === 'onedrive') && (
                        <span style={{cursor:'default'}} title={syncStatus==='synced'?'Synced '+(lastSyncTime?new Date(lastSyncTime).toLocaleTimeString():''):syncStatus==='syncing'?'Syncing…':syncStatus==='reconnect-needed'?'Re-connect required':syncStatus==='error'?'Sync error':'Cloud sync'}>
                            {syncStatus==='syncing' && <i className="fas fa-spinner fa-spin" style={{color:'rgba(255,255,255,0.9)',fontSize:'0.85rem'}}></i>}
                            {syncStatus==='synced' && <i className="fas fa-cloud" style={{color:'#86efac',fontSize:'0.85rem'}}></i>}
                            {syncStatus==='reconnect-needed' && <i className="fas fa-exclamation-triangle" style={{color:'#fcd34d',fontSize:'0.85rem'}}></i>}
                            {syncStatus==='error' && <i className="fas fa-exclamation-circle" style={{color:'#fca5a5',fontSize:'0.85rem'}}></i>}
                            {(syncStatus==='idle'||syncStatus==='not_configured') && <i className="fas fa-cloud" style={{color:'rgba(255,255,255,0.35)',fontSize:'0.85rem'}}></i>}
                        </span>
                    )}
                    <button className="btn btn-sm btn-outline-light position-relative" onClick={() => setShowNotifPanel(true)} title="Notifications">
                        <i className="fas fa-bell"></i>
                        {notifications.some(n => !n.read) && (
                            <span className="badge rounded-pill bg-danger" style={{position:'absolute',top:-4,right:-4,fontSize:'0.6rem',padding:'2px 5px',lineHeight:1}}>
                                {notifications.filter(n => !n.read).length}
                            </span>
                        )}
                    </button>
                    <button className="btn btn-sm btn-outline-light" onClick={() => setCurrentScreen('profile')} title="My Profile"><i className="fas fa-user-circle"></i></button>
                </div>
            </div>
            {showNotifPanel && (
                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}} onClick={() => setShowNotifPanel(false)}>
                    <div className="modal-dialog modal-dialog-centered" onClick={e => e.stopPropagation()}>
                        <div className="modal-content">
                            <div className="modal-header">
                                <h5 className="modal-title"><i className="fas fa-bell me-2"></i>Notifications</h5>
                                <button type="button" className="btn-close" onClick={() => setShowNotifPanel(false)}></button>
                            </div>
                            <div className="modal-body" style={{maxHeight:'60vh',overflowY:'auto'}}>
                                {notifications.length === 0 ? (
                                    <p className="text-muted text-center mb-0">You're all caught up — no notifications.</p>
                                ) : notifications.map(n => (
                                    <div key={n.id} className="d-flex align-items-start gap-2 mb-2 pb-2" style={{borderBottom:'1px solid #eee',cursor:'pointer',opacity:n.read?0.65:1}}
                                        onClick={() => { DataService.markNotificationRead(n.id); setNotifications(DataService.getNotifications()); setShowNotifPanel(false); if (n.screen) setCurrentScreen(n.screen); }}>
                                        <i className={'fas mt-1 ' + (n.type === 'bill' ? 'fa-clock text-info' : n.type === 'budget-over' ? 'fa-exclamation-circle text-danger' : 'fa-exclamation-triangle text-warning')}></i>
                                        <div style={{flex:1}}>
                                            <div style={{fontSize:'0.9rem',fontWeight:n.read?400:600}}>{n.title}</div>
                                            <div className="text-muted" style={{fontSize:'0.78rem'}}>{n.message}</div>
                                        </div>
                                        <button type="button" className="btn-close btn-close-sm" style={{fontSize:'0.55rem'}} onClick={(e) => { e.stopPropagation(); DataService.dismissNotification(n.id); setNotifications(DataService.getNotifications()); }}></button>
                                    </div>
                                ))}
                            </div>
                            {notifications.length > 0 && (
                                <div className="modal-footer">
                                    <button type="button" className="btn btn-sm btn-outline-secondary" onClick={() => { DataService.markAllNotificationsRead(); setNotifications(DataService.getNotifications()); }}>Mark all read</button>
                                    <button type="button" className="btn btn-sm btn-outline-danger" onClick={() => { DataService.clearAllNotifications(); setNotifications([]); }}>Clear all</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            )}
            {syncMergeToast && (
                <div className="alert d-flex gap-2 align-items-center" style={{margin:'0 1rem 0.5rem',fontSize:'0.83rem',borderRadius:'8px',background:'#cfe2ff',border:'1px solid #4a6cf7',color:'#084298'}}>
                    <i className="fas fa-check-circle flex-shrink-0"></i>
                    <div style={{flex:1}}>{syncMergeToast}</div>
                    <button className="btn-close flex-shrink-0" style={{fontSize:'0.6rem'}} onClick={() => setSyncMergeToast('')}></button>
                </div>
            )}
            {syncStatus === 'reconnect-needed' && !reconnectBannerDismissed && (
                <div className="alert d-flex gap-2 align-items-center" style={{margin:'0 1rem 0.5rem',fontSize:'0.83rem',borderRadius:'8px',background:'#fff3cd',border:'1px solid #ffc107',color:'#664d03'}}>
                    <i className="fas fa-exclamation-triangle flex-shrink-0"></i>
                    <div style={{flex:1}}>
                        <strong>Cloud sync disconnected</strong> — your data isn't backing up.{' '}
                        <button className="btn btn-link btn-sm p-0 fw-semibold" style={{verticalAlign:'baseline',fontSize:'0.83rem',color:'#664d03'}} onClick={handleReconnect}>
                            Re-connect {storagePreference === 'gdrive' ? 'Google Drive' : 'OneDrive'}
                        </button>
                    </div>
                    <button className="btn-close flex-shrink-0" style={{fontSize:'0.6rem'}} onClick={() => setReconnectBannerDismissed(true)}></button>
                </div>
            )}
            {pendingSyncSince && !pendingSyncBannerDismissed && syncStatus !== 'syncing' && syncStatus !== 'reconnect-needed' && (
                <div className="alert d-flex gap-2 align-items-center" style={{margin:'0 1rem 0.5rem',fontSize:'0.83rem',borderRadius:'8px',background:'#f8d7da',border:'1px solid #dc3545',color:'#842029'}}>
                    <i className="fas fa-exclamation-circle flex-shrink-0"></i>
                    <div style={{flex:1}}>
                        <strong>Changes not backed up</strong> — pending since {new Date(pendingSyncSince).toLocaleString()}. We'll retry automatically, or{' '}
                        <button className="btn btn-link btn-sm p-0 fw-semibold" style={{verticalAlign:'baseline',fontSize:'0.83rem',color:'#842029'}} onClick={handleSyncNow}>sync now</button>.
                    </div>
                    <button className="btn-close flex-shrink-0" style={{fontSize:'0.6rem'}} onClick={() => setPendingSyncBannerDismissed(true)}></button>
                </div>
            )}
            {showLocalDeviceBanner && (
                <div className="alert alert-warning d-flex gap-2 align-items-start" style={{margin:'0 1rem 0.5rem',fontSize:'0.83rem',borderRadius:'8px'}}>
                    <i className="fas fa-exclamation-triangle mt-1 flex-shrink-0"></i>
                    <div style={{flex:1}}>
                        Your data is stored locally on another device.{' '}
                        <button className="btn btn-link btn-sm p-0 fw-semibold" style={{verticalAlign:'baseline',fontSize:'0.83rem'}} onClick={() => setCurrentScreen('settings')}>Import a backup</button>{' '}
                        to restore it here, or switch your storage in Settings.
                    </div>
                    <button className="btn-close flex-shrink-0" style={{fontSize:'0.6rem'}} onClick={() => { localStorage.setItem('financeApp_localBannerDismissed', new Date().toISOString().split('T')[0]); setLocalDeviceBannerDismissed(true); }}></button>
                </div>
            )}
            <div className="app-content">{renderScreen()}</div>
            <Navigation currentScreen={currentScreen} onScreenChange={setCurrentScreen} />
            {showCloudHistory && (
                <CloudHistoryModal
                    onClose={() => setShowCloudHistory(false)}
                    onRestored={() => {
                        setShowCloudHistory(false);
                        DataService.isInitialized = false;
                        handleDataUpdate();
                    }}
                    currentUser={currentUser}
                />
            )}
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
