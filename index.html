// Builds a CSV blob from headers + rows (quote-escaping values that contain
// commas/quotes/newlines) and triggers a browser download. Shared by ExportData
// and BulkUpload's template/failed-rows downloads.
function downloadCSV(filename, headers, rows) {
    const esc = (val) => { const s = String(val == null ? '' : val); return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"' + s.replace(/"/g, '""') + '"' : s; };
    const lines = [headers.map(esc).join(','), ...rows.map(r => r.map(esc).join(','))];
    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 500);
}

const BULK_UPLOAD_MAX_ROWS = 1000;
const BULK_UPLOAD_MAX_BYTES = 5 * 1024 * 1024;

function BulkUpload({ categories, onUpdate }) {
    const [activeTab, setActiveTab] = useState('expenses');
    const [parsedRows, setParsedRows] = useState([]);
    const [originalHeaderCols, setOriginalHeaderCols] = useState([]);
    const [fileError, setFileError] = useState('');
    const [selectedFileName, setSelectedFileName] = useState('');
    const [importResult, setImportResult] = useState(null);
    const [isImporting, setIsImporting] = useState(false);
    const [isDragOver, setIsDragOver] = useState(false);
    const [showOnlyErrors, setShowOnlyErrors] = useState(false);
    const [currentPage, setCurrentPage] = useState(1);
    const fileInputRef = React.useRef(null);
    const ROWS_PER_PAGE = 50;

    const validCurrencies = ['GBP', 'EUR', 'USD', 'INR'];

    const parseCSVLine = (line) => {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (inQuotes) {
                if (ch === '"' && i + 1 < line.length && line[i + 1] === '"') { current += '"'; i++; }
                else if (ch === '"') { inQuotes = false; }
                else { current += ch; }
            } else {
                if (ch === '"') { inQuotes = true; }
                else if (ch === ',') { result.push(current.trim()); current = ''; }
                else { current += ch; }
            }
        }
        result.push(current.trim());
        return result;
    };

    const parseDate = (val) => {
        if (!val) return null;
        let year, month, day;
        if (/^\d{4}-\d{2}-\d{2}$/.test(val)) {
            [year, month, day] = val.split('-').map(Number);
        } else if (/^\d{2}[\/\-]\d{2}[\/\-]\d{4}$/.test(val)) {
            const parts = val.split(/[\/\-]/);
            day = Number(parts[0]); month = Number(parts[1]); year = Number(parts[2]);
        } else {
            return null;
        }
        if (!year || !month || !day || month < 1 || month > 12 || day < 1 || day > 31) return null;
        const pad = n => String(n).padStart(2, '0');
        return `${year}-${pad(month)}-${pad(day)}`;
    };

    // Shared by the file picker and the drag-and-drop zone so both paths go
    // through identical validation and parsing.
    const processFile = (file) => {
        setImportResult(null);
        setFileError('');
        setParsedRows([]);
        setOriginalHeaderCols([]);
        setSelectedFileName(file.name);

        if (file.size > BULK_UPLOAD_MAX_BYTES) {
            setFileError(`This file is ${(file.size / (1024 * 1024)).toFixed(1)}MB, which exceeds the 5MB limit. Please split it into smaller files.`);
            return;
        }

        const reader = new FileReader();
        reader.onload = (evt) => {
            const text = evt.target.result;
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) { setFileError('The file must contain a header row and at least one data row.'); return; }
            if (lines.length - 1 > BULK_UPLOAD_MAX_ROWS) {
                setFileError(`This file has ${lines.length - 1} rows, which exceeds the ${BULK_UPLOAD_MAX_ROWS}-row limit. Please split it into smaller files.`);
                return;
            }
            setOriginalHeaderCols(parseCSVLine(lines[0]));
            const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().trim());

            if (activeTab === 'expenses') {
                const colMap = {};
                const expHeaders = ['date', 'amount', 'currency', 'description', 'category', 'sub category', 'paid by'];
                expHeaders.forEach(eh => { const idx = headers.indexOf(eh); if (idx !== -1) colMap[eh] = idx; });
                if (colMap['date'] === undefined || colMap['amount'] === undefined || colMap['category'] === undefined || colMap['sub category'] === undefined) {
                    setFileError('Missing required columns: Date, Amount, Category, Sub Category');
                    return;
                }
                const rows = [];
                const today = new Date().toISOString().split('T')[0];
                for (let i = 1; i < lines.length; i++) {
                    const vals = parseCSVLine(lines[i]);
                    const errors = [];
                    const dateVal = vals[colMap['date']] || '';
                    const amountVal = vals[colMap['amount']] || '';
                    const currencyVal = colMap['currency'] !== undefined ? (vals[colMap['currency']] || '').toUpperCase() : '';
                    const descVal = colMap['description'] !== undefined ? (vals[colMap['description']] || '') : '';
                    const catVal = vals[colMap['category']] || '';
                    const subVal = vals[colMap['sub category']] || '';
                    const paidByVal = colMap['paid by'] !== undefined ? (vals[colMap['paid by']] || '') : '';

                    const parsedDate = parseDate(dateVal);
                    if (!parsedDate) errors.push('Invalid date');
                    else if (parsedDate > today) errors.push('Future date not allowed');

                    const amount = parseFloat(amountVal.replace(/[£$€₹,]/g, ''));
                    if (isNaN(amount) || amount <= 0) errors.push('Invalid amount');

                    const currency = currencyVal || 'GBP';
                    if (!validCurrencies.includes(currency)) errors.push('Invalid currency: ' + currencyVal);

                    const matchedCat = categories.find(c => c.name.toLowerCase() === catVal.toLowerCase());
                    if (!matchedCat) errors.push('Category not found: ' + catVal);
                    let matchedSub = null;
                    if (matchedCat) {
                        matchedSub = matchedCat.subcategories.find(s => s.toLowerCase() === subVal.toLowerCase());
                        if (!matchedSub) errors.push('Subcategory not found: ' + subVal);
                    }

                    const description = descVal || (matchedCat && matchedSub ? matchedCat.name + ' - ' + matchedSub : '');

                    rows.push({
                        rowNum: i,
                        date: parsedDate,
                        amount: amount,
                        currency: currency,
                        description: description,
                        categoryId: matchedCat ? matchedCat.id : null,
                        categoryName: matchedCat ? matchedCat.name : catVal,
                        subcategory: matchedSub || subVal,
                        paidBy: paidByVal,
                        error: errors.length > 0 ? errors.join('; ') : null,
                        raw: lines[i]
                    });
                }
                setParsedRows(rows);
            } else {
                const colMap = {};
                const incHeaders = ['date', 'source of income', 'currency', 'amount', 'description', "who's income"];
                incHeaders.forEach(eh => { const idx = headers.indexOf(eh); if (idx !== -1) colMap[eh] = idx; });
                if (colMap['date'] === undefined || colMap['amount'] === undefined || colMap['source of income'] === undefined) {
                    setFileError('Missing required columns: Date, Amount, Source of Income');
                    return;
                }
                const rows = [];
                const today = new Date().toISOString().split('T')[0];
                for (let i = 1; i < lines.length; i++) {
                    const vals = parseCSVLine(lines[i]);
                    const errors = [];
                    const dateVal = vals[colMap['date']] || '';
                    const sourceVal = vals[colMap['source of income']] || '';
                    const currencyVal = colMap['currency'] !== undefined ? (vals[colMap['currency']] || '').toUpperCase() : '';
                    const amountVal = vals[colMap['amount']] || '';
                    const descVal = colMap['description'] !== undefined ? (vals[colMap['description']] || '') : '';
                    const whosVal = colMap["who's income"] !== undefined ? (vals[colMap["who's income"]] || '') : '';

                    const parsedDate = parseDate(dateVal);
                    if (!parsedDate) errors.push('Invalid date');
                    else if (parsedDate > today) errors.push('Future date not allowed');

                    const amount = parseFloat(amountVal.replace(/[£$€₹,]/g, ''));
                    if (isNaN(amount) || amount <= 0) errors.push('Invalid amount');

                    if (!sourceVal.trim()) errors.push('Source of Income is required');

                    const currency = currencyVal || 'GBP';
                    if (currencyVal && !validCurrencies.includes(currency)) errors.push('Invalid currency: ' + currencyVal);

                    rows.push({
                        rowNum: i,
                        date: parsedDate,
                        amount: amount,
                        currency: currency,
                        source: sourceVal.trim(),
                        description: descVal,
                        paidBy: whosVal,
                        error: errors.length > 0 ? errors.join('; ') : null,
                        raw: lines[i]
                    });
                }
                setParsedRows(rows);
            }
        };
        reader.readAsText(file);
    };

    const handleFileSelect = (e) => {
        const file = e.target.files[0];
        if (file) processFile(file);
    };

    const handleDrop = (e) => {
        e.preventDefault();
        setIsDragOver(false);
        if (isImporting) return;
        const file = e.dataTransfer.files && e.dataTransfer.files[0];
        if (file) processFile(file);
    };

    const handleDownloadTemplate = () => {
        if (activeTab === 'expenses') {
            const exampleCat = categories[0];
            const exampleSub = exampleCat && exampleCat.subcategories && exampleCat.subcategories[0];
            downloadCSV('financetracker-expenses-template.csv',
                ['Date', 'Amount', 'Currency', 'Description', 'Category', 'Sub Category', 'Paid By'],
                [['2026-01-15', '25.00', 'GBP', 'Example expense', exampleCat ? exampleCat.name : 'Food & Dining', exampleSub || 'Groceries', '']]);
        } else {
            downloadCSV('financetracker-income-template.csv',
                ['Date', 'Source of Income', 'Currency', 'Amount', 'Description', "Who's Income"],
                [['2026-01-15', 'Salary', 'GBP', '2000.00', 'Example income', '']]);
        }
    };

    const handleDownloadFailedRows = () => {
        const failed = parsedRows.filter(r => r.error);
        if (failed.length === 0) return;
        const headers = [...originalHeaderCols, 'Error'];
        const rows = failed.map(r => [...parseCSVLine(r.raw), r.error]);
        downloadCSV(`financetracker-${activeTab}-failed-rows.csv`, headers, rows);
    };

    const handleImport = async () => {
        setIsImporting(true);
        try {
            const validRows = parsedRows.filter(r => !r.error);
            let imported = 0;
            for (const row of validRows) {
                if (activeTab === 'expenses') {
                    await DataService.addExpense({
                        amount: row.amount,
                        currency: row.currency,
                        date: row.date,
                        description: row.description,
                        categoryId: row.categoryId,
                        subcategory: row.subcategory,
                        paidBy: row.paidBy
                    });
                } else {
                    await DataService.addIncome({
                        amount: row.amount,
                        currency: row.currency,
                        date: row.date,
                        source: row.source,
                        description: row.description,
                        paidBy: row.paidBy
                    });
                }
                imported++;
            }
            const errorCount = parsedRows.filter(r => r.error).length;
            setImportResult({ imported, errors: errorCount, fileName: selectedFileName });
            setParsedRows([]);
            setSelectedFileName('');
            if (fileInputRef.current) fileInputRef.current.value = '';
            onUpdate();
        } finally {
            setIsImporting(false);
        }
    };

    const validCount = parsedRows.filter(r => !r.error).length;
    const errorCount = parsedRows.filter(r => r.error).length;
    const displayRows = showOnlyErrors ? parsedRows.filter(r => r.error) : parsedRows;
    const totalPages = Math.max(1, Math.ceil(displayRows.length / ROWS_PER_PAGE));
    const pageRows = displayRows.slice((currentPage - 1) * ROWS_PER_PAGE, currentPage * ROWS_PER_PAGE);

    useEffect(() => { setCurrentPage(1); }, [parsedRows, showOnlyErrors]);

    const resetOnTabChange = (tab) => {
        if (isImporting) return;
        setActiveTab(tab);
        setParsedRows([]);
        setFileError('');
        setImportResult(null);
        setSelectedFileName('');
        setShowOnlyErrors(false);
        if (fileInputRef.current) fileInputRef.current.value = '';
    };

    return (
        <div className="screen">
            <div className="screen-header">
                <h2>Bulk Upload</h2>
            </div>
            <ul className="nav nav-tabs" style={{marginBottom: '1rem'}}>
                {/* No "nav-item" class here: the app defines a global .nav-item rule for the
                    bottom navigation bar (flex-column, max-width 70px) that collides with and
                    breaks Bootstrap's unrelated nav-tabs <li> when reusing the same class name. */}
                <li>
                    <button className={'nav-link ' + (activeTab === 'expenses' ? 'active' : '')} onClick={() => resetOnTabChange('expenses')} disabled={isImporting}>Expenses</button>
                </li>
                <li>
                    <button className={'nav-link ' + (activeTab === 'income' ? 'active' : '')} onClick={() => resetOnTabChange('income')} disabled={isImporting}>Income</button>
                </li>
            </ul>

            {importResult && (
                <div className="alert alert-info">
                    <i className="fas fa-check-circle me-2"></i>
                    Imported {importResult.imported} row{importResult.imported !== 1 ? 's' : ''}{importResult.fileName ? <> from <strong>{importResult.fileName}</strong></> : ''}.
                    {importResult.errors > 0 && ` ${importResult.errors} rows had errors and were skipped.`}
                </div>
            )}

            <div style={{marginBottom: '1rem'}}>
                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem'}}>
                    <label style={{fontWeight: '600', margin: 0}}>Select CSV File</label>
                    <button type="button" className="btn btn-sm btn-outline-secondary" onClick={handleDownloadTemplate}>
                        <i className="fas fa-download me-1"></i>Download Template
                    </button>
                </div>
                <div
                    onDragOver={e => { e.preventDefault(); if (!isImporting) setIsDragOver(true); }}
                    onDragLeave={() => setIsDragOver(false)}
                    onDrop={handleDrop}
                    style={{
                        border: '2px dashed ' + (isDragOver ? '#4a6cf7' : '#ced4da'),
                        borderRadius: '8px',
                        padding: '0.75rem',
                        background: isDragOver ? '#eef2ff' : 'transparent',
                        transition: 'all 0.15s',
                        opacity: isImporting ? 0.6 : 1
                    }}
                >
                    <input ref={fileInputRef} type="file" className="form-control" accept=".csv" onChange={handleFileSelect} disabled={isImporting} />
                    <div className="form-text mb-0">Drag and drop a CSV file here, or use the picker above.</div>
                </div>
                <div className="form-text">
                    {activeTab === 'expenses'
                        ? 'Columns: Date, Amount, Currency, Description, Category, Sub Category, Paid By'
                        : "Columns: Date, Source of Income, Currency, Amount, Description, Who's Income"}
                    {' '}· Max {BULK_UPLOAD_MAX_ROWS} rows, 5MB.
                </div>
            </div>

            {fileError && <div className="alert alert-danger"><i className="fas fa-exclamation-circle me-2"></i>{fileError}</div>}

            {parsedRows.length > 0 && (
                <div>
                    <div style={{marginBottom: '0.75rem', display: 'flex', flexWrap: 'wrap', gap: '0.75rem', alignItems: 'center', justifyContent: 'space-between'}}>
                        <div style={{display: 'flex', gap: '0.75rem', alignItems: 'center', flexWrap: 'wrap'}}>
                            <span className="badge bg-success">{validCount} valid</span>
                            {errorCount > 0 && <span className="badge bg-danger">{errorCount} errors</span>}
                            <div className="btn-group btn-group-sm" role="group">
                                <button type="button" className={'btn ' + (!showOnlyErrors ? 'btn-primary' : 'btn-outline-primary')} onClick={() => setShowOnlyErrors(false)}>All</button>
                                <button type="button" className={'btn ' + (showOnlyErrors ? 'btn-primary' : 'btn-outline-primary')} onClick={() => setShowOnlyErrors(true)} disabled={errorCount === 0}>Errors only</button>
                            </div>
                        </div>
                        {errorCount > 0 && (
                            <button type="button" className="btn btn-sm btn-outline-danger" onClick={handleDownloadFailedRows}>
                                <i className="fas fa-download me-1"></i>Download Failed Rows
                            </button>
                        )}
                    </div>

                    <button className="btn btn-primary mb-3" onClick={handleImport} disabled={validCount === 0 || isImporting}>
                        {isImporting
                            ? <><span className="spinner-border spinner-border-sm me-2"></span>Importing...</>
                            : <><i className="fas fa-file-import me-2"></i>Import {validCount} valid row{validCount !== 1 ? 's' : ''}</>
                        }
                    </button>

                    <div style={{overflowX: 'auto', marginBottom: '0.5rem'}}>
                        <table className="table table-sm table-bordered" style={{fontSize: '0.85rem'}}>
                            <thead className="table-light">
                                <tr>
                                    <th>#</th>
                                    {activeTab === 'expenses' ? (
                                        <>{['Date', 'Amount', 'Currency', 'Description', 'Category', 'Subcategory', 'Paid By', 'Status'].map(h => <th key={h}>{h}</th>)}</>
                                    ) : (
                                        <>{['Date', 'Source', 'Amount', 'Currency', 'Description', "Who's Income", 'Status'].map(h => <th key={h}>{h}</th>)}</>
                                    )}
                                </tr>
                            </thead>
                            <tbody>
                                {pageRows.map((row, idx) => (
                                    <tr key={row.rowNum ?? idx} className={row.error ? 'table-danger' : 'table-success'}>
                                        <td>{row.rowNum}</td>
                                        {activeTab === 'expenses' ? (
                                            <>
                                                <td>{row.date || '-'}</td>
                                                <td>{isNaN(row.amount) ? '-' : row.amount}</td>
                                                <td>{row.currency}</td>
                                                <td>{row.description || '-'}</td>
                                                <td>{row.categoryName || '-'}</td>
                                                <td>{row.subcategory || '-'}</td>
                                                <td>{row.paidBy || '-'}</td>
                                            </>
                                        ) : (
                                            <>
                                                <td>{row.date || '-'}</td>
                                                <td>{row.source || '-'}</td>
                                                <td>{isNaN(row.amount) ? '-' : row.amount}</td>
                                                <td>{row.currency}</td>
                                                <td>{row.description || '-'}</td>
                                                <td>{row.paidBy || '-'}</td>
                                            </>
                                        )}
                                        <td>{row.error ? <span className="text-danger" style={{fontSize: '0.8rem'}}>{row.error}</span> : <i className="fas fa-check text-success"></i>}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {totalPages > 1 && (
                        <div className="d-flex justify-content-between align-items-center mb-3" style={{fontSize: '0.85rem'}}>
                            <button className="btn btn-sm btn-outline-secondary" onClick={() => setCurrentPage(p => Math.max(1, p - 1))} disabled={currentPage === 1}>
                                <i className="fas fa-chevron-left me-1"></i>Prev
                            </button>
                            <span className="text-muted">Page {currentPage} of {totalPages}</span>
                            <button className="btn btn-sm btn-outline-secondary" onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages}>
                                Next<i className="fas fa-chevron-right ms-1"></i>
                            </button>
                        </div>
                    )}
                </div>
            )}

            {parsedRows.length === 0 && !importResult && !fileError && (
                <div className="text-muted text-center" style={{padding: '2rem', background: '#f8f9fa', borderRadius: '8px'}}>
                    <i className="fas fa-file-csv fa-3x" style={{marginBottom: '0.75rem', display: 'block', opacity: 0.4}}></i>
                    <p>Select a CSV file to preview and import {activeTab === 'expenses' ? 'expenses' : 'income'}</p>
                </div>
            )}
        </div>
    );
}

function SavingsGoals({ defaultCurrency }) {
    const [goals, setGoals] = useState([]);
    const [monthlyNet, setMonthlyNet] = useState(0);
    const [showForm, setShowForm] = useState(false);
    const [editingGoal, setEditingGoal] = useState(null);
    const [formData, setFormData] = useState({ name: '', targetAmount: '', currency: defaultCurrency || 'GBP', deadline: '', currentSaved: '', emoji: '', notes: '' });
    const [formErrors, setFormErrors] = useState({});
    const [deleteConfirm, setDeleteConfirm] = useState(null);
    const [addFundsGoalId, setAddFundsGoalId] = useState(null);
    const [addFundsAmount, setAddFundsAmount] = useState('');
    const [addFundsError, setAddFundsError] = useState('');

    const loadGoals = () => setGoals(DataService.getGoals());

    useEffect(() => {
        loadGoals();
        const calcMonthlyNet = async () => {
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const [expenses, income] = await Promise.all([DataService.getExpenses(), DataService.getIncome()]);
            const monthExp = expenses.filter(e => new Date(e.date) >= startOfMonth).reduce((s, e) => s + e.amount, 0);
            const monthInc = income.filter(i => new Date(i.date) >= startOfMonth).reduce((s, i) => s + i.amount, 0);
            setMonthlyNet(Math.max(0, monthInc - monthExp));
        };
        calcMonthlyNet();
    }, []);

    const resetForm = () => {
        setFormData({ name: '', targetAmount: '', currency: defaultCurrency || 'GBP', deadline: '', currentSaved: '', emoji: '', notes: '' });
        setFormErrors({});
        setEditingGoal(null);
    };

    const handleSubmit = (e) => {
        e.preventDefault();
        const errors = {};
        if (!formData.name || formData.name.trim().length < 2) errors.name = 'Name must be at least 2 characters';
        if (!formData.targetAmount || parseFloat(formData.targetAmount) <= 0) errors.targetAmount = 'Target amount must be greater than 0';
        if (formData.deadline && new Date(formData.deadline) <= new Date()) errors.deadline = 'Deadline must be in the future';
        if (Object.keys(errors).length > 0) { setFormErrors(errors); return; }
        try {
            if (editingGoal) {
                DataService.updateGoal(editingGoal.id, { name: formData.name.trim(), targetAmount: parseFloat(formData.targetAmount), currency: formData.currency, deadline: formData.deadline, notes: formData.notes, emoji: formData.emoji, currentSaved: parseFloat(formData.currentSaved || 0) });
            } else {
                DataService.addGoal({ name: formData.name.trim(), targetAmount: formData.targetAmount, currency: formData.currency, deadline: formData.deadline, notes: formData.notes, emoji: formData.emoji, currentSaved: formData.currentSaved });
            }
            resetForm(); setShowForm(false); loadGoals();
        } catch (err) { setFormErrors({ name: err.message }); }
    };

    const handleEdit = (goal) => {
        setFormData({ name: goal.name, targetAmount: goal.targetAmount.toString(), currency: goal.currency || defaultCurrency || 'GBP', deadline: goal.deadline || '', currentSaved: goal.currentSaved.toString(), emoji: goal.emoji || '', notes: goal.notes || '' });
        setEditingGoal(goal); setShowForm(true);
    };

    const handleDelete = (id) => { DataService.deleteGoal(id); setDeleteConfirm(null); loadGoals(); };

    const handleAddFunds = (goalId) => {
        const amount = parseFloat(addFundsAmount);
        if (!addFundsAmount || isNaN(amount) || amount <= 0) { setAddFundsError('Enter a valid amount > 0'); return; }
        DataService.addToGoal(goalId, amount);
        setAddFundsGoalId(null); setAddFundsAmount(''); setAddFundsError(''); loadGoals();
    };

    const getProjectedCompletion = (goal) => {
        const remaining = goal.targetAmount - goal.currentSaved;
        if (remaining <= 0 || monthlyNet <= 0) return null;
        const projDate = new Date();
        projDate.setMonth(projDate.getMonth() + Math.ceil(remaining / monthlyNet));
        return projDate.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    };

    const getDeadlineInfo = (deadline) => {
        if (!deadline) return null;
        const diffDays = Math.ceil((new Date(deadline) - new Date()) / (1000 * 60 * 60 * 24));
        if (diffDays < 0) return { text: 'OVERDUE', overdue: true };
        return { text: diffDays + ' days remaining', overdue: false };
    };

    const currencies = ['GBP', 'EUR', 'USD', 'INR'];
    const fmt = (amount, currency) => ValidationUtils.formatCurrency(amount, currency || defaultCurrency);

    return (
        <div className="screen">
            <div className="screen-header" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <h2><i className="fas fa-piggy-bank me-2"></i>Savings Goals</h2>
                <button className="btn btn-primary btn-sm" onClick={() => { if (showForm && !editingGoal) { resetForm(); setShowForm(false); } else { resetForm(); setShowForm(true); } }}>
                    <i className={'fas fa-' + (showForm && !editingGoal ? 'times' : 'plus') + ' me-1'}></i>
                    {showForm && !editingGoal ? 'Cancel' : 'New Goal'}
                </button>
            </div>

            {showForm && (
                <div className="card mb-3" style={{borderRadius:'12px', border:'1px solid #e9ecef'}}>
                    <div className="card-body">
                        <h6 className="card-title mb-3">{editingGoal ? 'Edit Goal' : 'New Savings Goal'}</h6>
                        <form onSubmit={handleSubmit}>
                            <div className="row g-2">
                                <div className="col-8">
                                    <label className="form-label" style={{fontWeight:'600',fontSize:'0.85rem'}}>Goal Name *</label>
                                    <input type="text" className={'form-control ' + (formErrors.name ? 'is-invalid' : '')} value={formData.name} onChange={e => setFormData(p => ({...p, name: e.target.value}))} placeholder="e.g., Holiday Fund" />
                                    {formErrors.name && <div className="invalid-feedback">{formErrors.name}</div>}
                                </div>
                                <div className="col-4">
                                    <label className="form-label" style={{fontWeight:'600',fontSize:'0.85rem'}}>Emoji</label>
                                    <input type="text" className="form-control" value={formData.emoji} onChange={e => setFormData(p => ({...p, emoji: e.target.value}))} placeholder="✈️" maxLength={2} />
                                </div>
                                <div className="col-8">
                                    <label className="form-label" style={{fontWeight:'600',fontSize:'0.85rem'}}>Target Amount *</label>
                                    <input type="number" step="0.01" min="0.01" className={'form-control ' + (formErrors.targetAmount ? 'is-invalid' : '')} value={formData.targetAmount} onChange={e => setFormData(p => ({...p, targetAmount: e.target.value}))} placeholder="0.00" />
                                    {formErrors.targetAmount && <div className="invalid-feedback">{formErrors.targetAmount}</div>}
                                </div>
                                <div className="col-4">
                                    <label className="form-label" style={{fontWeight:'600',fontSize:'0.85rem'}}>Currency</label>
                                    <select className="form-select" value={formData.currency} onChange={e => setFormData(p => ({...p, currency: e.target.value}))}>
                                        {currencies.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="col-6">
                                    <label className="form-label" style={{fontWeight:'600',fontSize:'0.85rem'}}>Currently Saved</label>
                                    <input type="number" step="0.01" min="0" className="form-control" value={formData.currentSaved} onChange={e => setFormData(p => ({...p, currentSaved: e.target.value}))} placeholder="0.00" />
                                </div>
                                <div className="col-6">
                                    <label className="form-label" style={{fontWeight:'600',fontSize:'0.85rem'}}>Deadline (optional)</label>
                                    <input type="date" className={'form-control ' + (formErrors.deadline ? 'is-invalid' : '')} value={formData.deadline} onChange={e => setFormData(p => ({...p, deadline: e.target.value}))} />
                                    {formErrors.deadline && <div className="invalid-feedback">{formErrors.deadline}</div>}
                                </div>
                                <div className="col-12">
                                    <label className="form-label" style={{fontWeight:'600',fontSize:'0.85rem'}}>Notes (optional)</label>
                                    <textarea className="form-control" rows={2} value={formData.notes} onChange={e => setFormData(p => ({...p, notes: e.target.value}))} placeholder="Optional notes..." />
                                </div>
                            </div>
                            <div className="d-flex gap-2 mt-3">
                                <button type="submit" className="btn btn-primary btn-sm"><i className={'fas fa-' + (editingGoal ? 'save' : 'plus') + ' me-1'}></i>{editingGoal ? 'Save Changes' : 'Add Goal'}</button>
                                <button type="button" className="btn btn-secondary btn-sm" onClick={() => { resetForm(); setShowForm(false); }}>Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            )}

            {goals.length === 0 && !showForm ? (
                <div className="empty-state">
                    <i className="fas fa-piggy-bank fa-3x"></i>
                    <h4>No savings goals yet</h4>
                    <p>Create your first goal!</p>
                </div>
            ) : (
                goals.map(goal => {
                    const pct = goal.targetAmount > 0 ? Math.min((goal.currentSaved / goal.targetAmount) * 100, 100) : 0;
                    const reached = goal.currentSaved >= goal.targetAmount;
                    const projected = getProjectedCompletion(goal);
                    const deadlineInfo = getDeadlineInfo(goal.deadline);
                    const currency = goal.currency || defaultCurrency;
                    return (
                        <div key={goal.id} className="card mb-3" style={{borderRadius:'12px', border:'1px solid ' + (reached ? '#28a745' : '#e9ecef')}}>
                            <div className="card-body">
                                <div className="d-flex justify-content-between align-items-start mb-2">
                                    <div>
                                        {goal.emoji && <span style={{fontSize:'1.4rem', marginRight:'0.4rem'}}>{goal.emoji}</span>}
                                        <strong style={{fontSize:'1rem'}}>{goal.name}</strong>
                                    </div>
                                    <div className="d-flex gap-1">
                                        <button className="btn btn-outline-primary btn-sm" onClick={() => handleEdit(goal)}><i className="fas fa-edit"></i></button>
                                        <button className="btn btn-outline-danger btn-sm" onClick={() => setDeleteConfirm(goal)}><i className="fas fa-trash"></i></button>
                                    </div>
                                </div>

                                {reached ? (
                                    <div className="alert alert-success py-1 px-2 mb-2" style={{fontSize:'0.85rem'}}>🎉 GOAL REACHED!</div>
                                ) : (
                                    <>
                                        <div className="progress mb-1" style={{height:'10px'}}>
                                            <div className="progress-bar bg-success" role="progressbar" style={{width: pct + '%'}} aria-valuenow={Math.round(pct)} aria-valuemin="0" aria-valuemax="100"></div>
                                        </div>
                                        <div className="d-flex justify-content-between mb-1" style={{fontSize:'0.82rem', color:'#6c757d'}}>
                                            <span>Saved: {fmt(goal.currentSaved, currency)}</span>
                                            <span>Remaining: {fmt(goal.targetAmount - goal.currentSaved, currency)}</span>
                                        </div>
                                    </>
                                )}

                                <div style={{fontSize:'0.85rem', marginBottom:'0.3rem'}}>
                                    Target: <strong>{fmt(goal.targetAmount, currency)}</strong>
                                    {deadlineInfo && (
                                        <span className={'ms-2 badge ' + (deadlineInfo.overdue ? 'bg-danger' : 'bg-secondary')}>
                                            <i className="fas fa-clock me-1"></i>{deadlineInfo.text}
                                        </span>
                                    )}
                                </div>

                                {projected && !reached && (
                                    <div style={{fontSize:'0.8rem', color:'#6c757d', marginBottom:'0.3rem'}}>
                                        <i className="fas fa-calendar-check me-1"></i>Projected: {projected} at current saving rate
                                    </div>
                                )}
                                {goal.notes && <div style={{fontSize:'0.8rem', color:'#888', fontStyle:'italic', marginBottom:'0.3rem'}}>{goal.notes}</div>}

                                {addFundsGoalId === goal.id ? (
                                    <div className="d-flex gap-2 align-items-center mt-2" style={{flexWrap:'wrap'}}>
                                        <input type="number" step="0.01" min="0.01" className={'form-control form-control-sm ' + (addFundsError ? 'is-invalid' : '')} style={{width:'120px'}} value={addFundsAmount} onChange={e => { setAddFundsAmount(e.target.value); setAddFundsError(''); }} placeholder="Amount" autoFocus />
                                        {addFundsError && <div className="text-danger" style={{fontSize:'0.78rem', width:'100%'}}>{addFundsError}</div>}
                                        <button className="btn btn-success btn-sm" onClick={() => handleAddFunds(goal.id)}><i className="fas fa-check me-1"></i>Add</button>
                                        <button className="btn btn-secondary btn-sm" onClick={() => { setAddFundsGoalId(null); setAddFundsAmount(''); setAddFundsError(''); }}>Cancel</button>
                                    </div>
                                ) : (
                                    !reached && <button className="btn btn-outline-success btn-sm mt-2" onClick={() => { setAddFundsGoalId(goal.id); setAddFundsAmount(''); setAddFundsError(''); }}><i className="fas fa-plus me-1"></i>Add Funds</button>
                                )}
                            </div>
                        </div>
                    );
                })
            )}

            {deleteConfirm && (
                <div className="modal show d-block" style={{backgroundColor:'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title">Delete Goal</h5></div>
                            <div className="modal-body"><p>Delete <strong>{deleteConfirm.emoji} {deleteConfirm.name}</strong>? This cannot be undone.</p></div>
                            <div className="modal-footer">
                                <button className="btn btn-secondary" onClick={() => setDeleteConfirm(null)}>Cancel</button>
                                <button className="btn btn-danger" onClick={() => handleDelete(deleteConfirm.id)}>Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

function BillTracker({ categories, onUpdate }) {
    const [bills, setBills] = useState([]);
    const [showForm, setShowForm] = useState(false);
    const [editingBill, setEditingBill] = useState(null);
    const [formData, setFormData] = useState({ name: '', amount: '', currency: 'GBP', frequency: 'Monthly', nextDueDate: new Date().toISOString().split('T')[0], categoryId: '', reminderDaysBefore: '3', notes: '' });
    const [formErrors, setFormErrors] = useState({});
    const [deleteConfirm, setDeleteConfirm] = useState(null);
    const [logMsg, setLogMsg] = useState('');

    const loadBills = () => setBills(DataService.getBills());
    useEffect(() => { loadBills(); }, []);

    const today = new Date().toISOString().split('T')[0];

    const getDaysDiff = (dateStr) => Math.ceil((new Date(dateStr) - new Date(today)) / 86400000);

    const getBadge = (bill) => {
        if (!bill.isActive) return null;
        const diff = getDaysDiff(bill.nextDueDate);
        if (diff < 0 && !bill.isPaid) return { label: 'OVERDUE', cls: 'bg-danger' };
        if (diff === 0) return { label: 'DUE TODAY', cls: 'bg-danger' };
        if (diff <= bill.reminderDaysBefore) return { label: 'DUE SOON', cls: 'bg-warning text-dark' };
        return null;
    };

    const getMonthlyAmount = (bill) => {
        if (!bill.isActive) return 0;
        const map = { Weekly: 4.33, Monthly: 1, Quarterly: 1/3, Yearly: 1/12 };
        return bill.amount * (map[bill.frequency] || 1);
    };

    const monthlyCommitment = bills.reduce((s, b) => s + getMonthlyAmount(b), 0);

    const sortedBills = [...bills].sort((a, b) => {
        const aOverdue = getDaysDiff(a.nextDueDate) < 0 && !a.isPaid;
        const bOverdue = getDaysDiff(b.nextDueDate) < 0 && !b.isPaid;
        const aToday = a.nextDueDate === today;
        const bToday = b.nextDueDate === today;
        if (aOverdue && !bOverdue) return -1;
        if (!aOverdue && bOverdue) return 1;
        if (aToday && !bToday) return -1;
        if (!aToday && bToday) return 1;
        return a.nextDueDate.localeCompare(b.nextDueDate);
    });

    const activeBills = sortedBills.filter(b => b.isActive);
    const inactiveBills = sortedBills.filter(b => !b.isActive);

    const resetForm = () => {
        setFormData({ name: '', amount: '', currency: 'GBP', frequency: 'Monthly', nextDueDate: today, categoryId: '', reminderDaysBefore: '3', notes: '' });
        setFormErrors({}); setEditingBill(null);
    };

    const handleSubmit = (e) => {
        e.preventDefault();
        const errors = {};
        if (!formData.name || formData.name.trim().length < 2) errors.name = 'Name must be at least 2 characters';
        if (!formData.amount || parseFloat(formData.amount) <= 0) errors.amount = 'Amount must be greater than 0';
        if (!formData.nextDueDate || formData.nextDueDate < today) errors.nextDueDate = 'Due date must be today or in the future';
        if (Object.keys(errors).length > 0) { setFormErrors(errors); return; }
        try {
            if (editingBill) {
                DataService.updateBill(editingBill.id, { name: formData.name.trim(), amount: parseFloat(formData.amount), currency: formData.currency, frequency: formData.frequency, nextDueDate: formData.nextDueDate, categoryId: parseInt(formData.categoryId) || null, reminderDaysBefore: parseInt(formData.reminderDaysBefore) || 3, notes: formData.notes });
            } else {
                DataService.addBill({ name: formData.name.trim(), amount: formData.amount, currency: formData.currency, frequency: formData.frequency, nextDueDate: formData.nextDueDate, categoryId: formData.categoryId, reminderDaysBefore: formData.reminderDaysBefore, notes: formData.notes });

                    <div style={{fontSize:'0.8rem', opacity:0.85}}>Monthly Commitment</div>
                    <div style={{fontSize:'1.5rem', fontWeight:'700'}}>{fmtCurrency(monthlyCommitment, 'GBP')}</div>

                                    <input type="text" className={'form-control ' + (formErrors.name ? 'is-invalid' : '')} value={formData.name} onChange={e => setFormData(p => ({...p, name: e.target.value}))} placeholder="e.g., Netflix, Rent, Phone" />
