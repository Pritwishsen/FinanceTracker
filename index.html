    const chartW = svgW - padL - padR, chartH = ChartH - padT - padB;
    const n = monthData.length;
    const slotW = chartW / Math.max(n, 1);
    const barW = Math.min(slotW * 0.3, 13);
    const toY = (v) => padT + ((maxVal - v) / totalRange) * chartH;
    const zeroY = toY(0);
    const fmtTick = (v) => { if (v >= 1000000) return (v/1000000).toFixed(1)+'M'; if (v >= 1000) return (v/1000).toFixed(0)+'k'; return Math.round(v)+''; };

    const netPoints = monthData.map((m, i) => `${padL + (i + 0.5) * slotW},${toY(m.net)}`).join(' ');
    const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => minNet + f * totalRange);

    return (
        <div className="screen">
            <div className="screen-header"><h2><i className="fas fa-chart-line me-2"></i>Monthly Trends</h2></div>

            <div style={{padding:'0 1rem 0.6rem'}}>
                <div className="btn-group w-100" role="group">
                    {[['3m','3M'],['6m','6M'],['12m','12M'],['year','This Year']].map(([v,l]) => (
                        <button key={v} type="button" className={'btn btn-sm ' + (timeWindow === v ? 'btn-primary' : 'btn-outline-primary')} onClick={() => setTw(v)} style={{fontSize:'0.75rem'}}>{l}</button>
                    ))}
                </div>
            </div>

            <div style={{padding:'0 1rem 0.6rem',display:'flex',gap:'8px',flexWrap:'wrap'}}>
                <select className="form-select form-select-sm" style={{flex:'1',minWidth:'150px'}} value={selectedPerson} onChange={e => setPerson(e.target.value)}>
                    <option value="__me__">My expenses ({personName})</option>
                    <option value="__all__">Everyone</option>
                    {people.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                </select>
                <button type="button" className={'btn btn-sm ' + (selectedCats.length > 0 ? 'btn-primary' : 'btn-outline-secondary')} onClick={() => setShowCatFilter(v => !v)} style={{whiteSpace:'nowrap'}}>
                    <i className="fas fa-filter me-1"></i>Categories{selectedCats.length > 0 ? ` (${selectedCats.length})` : ''}
                </button>
            </div>

            {showCatFilter && (
                <div style={{padding:'0 1rem 0.75rem'}}>
                    <div style={{background:'#f8f9fa',borderRadius:'8px',padding:'0.5rem 0.6rem'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.4rem'}}>
                            <span style={{fontSize:'0.78rem',color:'#6c757d',fontWeight:600}}>Filter by category</span>
                            {selectedCats.length > 0 && <button type="button" className="btn btn-sm btn-link p-0" style={{fontSize:'0.75rem'}} onClick={() => setCats([])}>Clear all</button>}
                        </div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                            {categories.map(cat => (
                                <button key={cat.id} type="button"
                                    className={'btn btn-sm ' + (selectedCats.includes(cat.id) ? 'btn-primary' : 'btn-outline-secondary')}
                                    style={{fontSize:'0.73rem',padding:'2px 8px'}}
                                    onClick={() => setCats(prev => prev.includes(cat.id) ? prev.filter(id => id !== cat.id) : [...prev, cat.id])}>
                                    {cat.name}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            )}

            {completeMonths.length < 2 ? (
                <div style={{textAlign:'center',padding:'3rem 1rem'}}>
                    <i className="fas fa-chart-line fa-3x text-muted" style={{display:'block',marginBottom:'1rem'}}></i>
                    <h5 className="text-muted">Not enough data yet</h5>
                    <p className="text-muted small">Add expenses over at least 2 months to see trends.</p>
                </div>
            ) : (
                <React.Fragment>
                    <div style={{padding:'0 1rem 0.5rem',overflowX:'auto'}}>
                        <svg viewBox={`0 0 ${svgW} ${ChartH}`} style={{width:'100%',minWidth:Math.max(svgW, n*32)+'px',height:'auto',display:'block'}}>
                            {yTicks.map((val, fi) => {
                                const y = toY(val);
                                return (
                                    <React.Fragment key={fi}>
                                        <line x1={padL} y1={y} x2={svgW - padR} y2={y} stroke={val === 0 ? '#adb5bd' : '#e9ecef'} strokeWidth={val === 0 ? 1.5 : 1}/>
                                        <text x={padL - 3} y={y + 3.5} textAnchor="end" fontSize="8.5" fill="#6c757d">{fmtTick(val)}</text>
                                    </React.Fragment>
                                );
                            })}
                            {monthData.map((m, i) => {
                                const cx = padL + (i + 0.5) * slotW;
                                const incH = Math.max(0, (m.totalInc / totalRange) * chartH);
                                const expH = Math.max(0, (m.totalExp / totalRange) * chartH);
                                return (
                                    <React.Fragment key={`${m.year}-${m.month}`}>
                                        <rect x={cx - barW - 1} y={zeroY - incH} width={barW} height={incH} fill="#198754" opacity={m.isCurrent ? 0.4 : 0.82} rx="1.5"/>
                                        <rect x={cx + 1} y={zeroY - expH} width={barW} height={expH} fill="#fd7e14" opacity={m.isCurrent ? 0.4 : 0.82} rx="1.5"/>
                                        <text x={cx} y={ChartH - padB + 12} textAnchor="middle" fontSize="9" fill={m.isCurrent ? '#adb5bd' : '#495057'}>{m.shortLabel}</text>
                                    </React.Fragment>
                                );
                            })}
                            {n > 1 && <polyline points={netPoints} fill="none" stroke="#0d6efd" strokeWidth="2" strokeLinejoin="round"/>}
                            {n > 1 && monthData.map((m, i) => {
                                const cx = padL + (i + 0.5) * slotW;
                                return <circle key={i} cx={cx} cy={toY(m.net)} r="2.5" fill={m.net >= 0 ? '#0d6efd' : '#dc3545'}/>;
                            })}
                            <rect x={padL} y={padT - 16} width={7} height={7} fill="#198754" rx="1"/>
                            <text x={padL + 9} y={padT - 9} fontSize="9" fill="#495057">Income</text>
                            <rect x={padL + 48} y={padT - 16} width={7} height={7} fill="#fd7e14" rx="1"/>
                            <text x={padL + 57} y={padT - 9} fontSize="9" fill="#495057">Expenses</text>
                            <line x1={padL + 106} y1={padT - 12} x2={padL + 116} y2={padT - 12} stroke="#0d6efd" strokeWidth="2"/>
                            <circle cx={padL + 111} cy={padT - 12} r="2.5" fill="#0d6efd"/>
                            <text x={padL + 119} y={padT - 9} fontSize="9" fill="#495057">Net</text>
                        </svg>
                    </div>

                    <div style={{padding:'0 1rem 1rem'}}>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 70px 70px 62px 52px',gap:'4px',padding:'0 10px 0.3rem',fontSize:'0.7rem',color:'#6c757d',fontWeight:600}}>
                            <span>Month</span>
                            <span style={{textAlign:'right',color:'#198754'}}>Income</span>
                            <span style={{textAlign:'right',color:'#fd7e14'}}>Expenses</span>
                            <span style={{textAlign:'right'}}>Net</span>
                            <span style={{textAlign:'right'}}>Savings%</span>
                        </div>

                        {monthData.map(m => {
                            const expKey = `${m.prefix}:exp`;
                            const incKey = `${m.prefix}:inc`;
                            const hasCat = Object.keys(m.catBreakdown).length > 0;
                            const hasInc = Object.keys(m.incomeBreakdown).length > 0;
                            const paidByFilter = selectedPerson === '__all__' ? '' : selectedPerson === '__me__' ? '__mine__' : selectedPerson;
                            return (
                                <div key={m.prefix} style={{marginBottom:'6px',border:'1px solid',borderColor:m.isCurrent?'#adb5bd':'#dee2e6',borderStyle:m.isCurrent?'dashed':'solid',borderRadius:'8px',overflow:'hidden'}}>
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 70px 70px 62px 52px',gap:'4px',alignItems:'center',padding:'8px 10px',background:m.isCurrent?'#f8f9fa':'#fff'}}>
                                        <div style={{fontWeight:600,fontSize:'0.85rem'}}>
                                            {m.label}
                                            {m.isCurrent && <span className="badge bg-secondary ms-1" style={{fontSize:'0.6rem'}}>current</span>}
                                        </div>
                                        <div style={{fontSize:'0.8rem',color:'#198754',textAlign:'right'}}>{m.totalInc > 0 ? fmt(m.totalInc) : <span style={{color:'#adb5bd'}}>—</span>}</div>
                                        <div style={{fontSize:'0.8rem',color:'#fd7e14',textAlign:'right',cursor:m.totalExp>0?'pointer':'default',textDecoration:m.totalExp>0?'underline':'none',textDecorationColor:'#fd7e14',textUnderlineOffset:'2px'}}
                                            onClick={() => m.totalExp > 0 && onMonthSelect(m.from, m.to, paidByFilter)}
                                            title={m.totalExp > 0 ? `View ${m.label} expenses` : undefined}>
                                            {m.totalExp > 0 ? fmt(m.totalExp) : <span style={{color:'#adb5bd'}}>—</span>}
                                        </div>
                                        <div style={{fontSize:'0.8rem',fontWeight:600,textAlign:'right',color:(m.totalInc>0||m.totalExp>0)?(m.net>=0?'#198754':'#dc3545'):'#adb5bd'}}>
                                            {(m.totalInc > 0 || m.totalExp > 0) ? fmt(m.net) : '—'}
                                        </div>
                                        <div style={{fontSize:'0.78rem',color:'#6c757d',textAlign:'right'}}>
                                            {m.savingsRate !== null ? m.savingsRate.toFixed(0)+'%' : 'N/A'}
                                        </div>
                                    </div>
                                    {(hasCat || hasInc) && (
                                        <div style={{display:'flex',gap:'4px',padding:'3px 10px 5px',borderTop:'1px solid #f0f0f0',background:'#fafafa'}}>
                                            {hasCat && (
                                                <button type="button" className={'btn btn-sm ' + (expanded[expKey] ? 'btn-warning' : 'btn-outline-secondary')}
                                                    style={{fontSize:'0.7rem',padding:'1px 8px'}}
                                                    onClick={e => { e.stopPropagation(); toggle(expKey); }}>
                                                    <i className={'fas fa-' + (expanded[expKey] ? 'minus' : 'plus') + ' me-1'}></i>Expenses
                                                </button>
                                            )}
                                            {hasInc && (
                                                <button type="button" className={'btn btn-sm ' + (expanded[incKey] ? 'btn-success' : 'btn-outline-secondary')}
                                                    style={{fontSize:'0.7rem',padding:'1px 8px'}}
                                                    onClick={e => { e.stopPropagation(); toggle(incKey); }}>
                                                    <i className={'fas fa-' + (expanded[incKey] ? 'minus' : 'plus') + ' me-1'}></i>Income
                                                </button>
                                            )}
                                        </div>
                                    )}
                                    {expanded[expKey] && hasCat && (
                                        <div style={{borderTop:'1px solid #f0f0f0'}}>
                                            {Object.entries(m.catBreakdown).sort((a,b) => b[1].total - a[1].total).map(([catId, data]) => {
                                                const catKey = `${m.prefix}:cat:${catId}`;
                                                const hasSubs = Object.keys(data.subBreakdown).length > 0;
                                                return (
                                                    <div key={catId}>
                                                        <div style={{display:'flex',alignItems:'center',padding:'5px 10px 5px 18px',gap:'6px',background:'#fff9f0'}}>
                                                            {hasSubs
                                                                ? <button type="button" className="btn btn-sm btn-outline-secondary" style={{fontSize:'0.65rem',padding:'0 5px',lineHeight:'1.4',minWidth:'20px'}} onClick={e => { e.stopPropagation(); toggle(catKey); }}>
                                                                    <i className={'fas fa-' + (expanded[catKey] ? 'minus' : 'plus')}></i>
                                                                  </button>
                                                                : <span style={{width:'22px',display:'inline-block'}}></span>
                                                            }
                                                            <span style={{flex:1,fontSize:'0.8rem',fontWeight:500}}>{data.catName}</span>
                                                            <span style={{fontSize:'0.8rem',color:'#fd7e14',fontWeight:600}}>{fmt(data.total)}</span>
                                                        </div>
                                                        {expanded[catKey] && hasSubs && Object.entries(data.subBreakdown).sort((a,b) => b[1]-a[1]).map(([sub, amt]) => (
                                                            <div key={sub} style={{display:'flex',padding:'3px 10px 3px 46px',fontSize:'0.77rem',color:'#6c757d',background:'#fffdf8'}}>
                                                                <span style={{flex:1}}>{sub}</span>
                                                                <span>{fmt(amt)}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                    {expanded[incKey] && hasInc && (
                                        <div style={{borderTop:'1px solid #f0f0f0'}}>
                                            {Object.entries(m.incomeBreakdown).sort((a,b) => b[1]-a[1]).map(([src, amt]) => (
                                                <div key={src} style={{display:'flex',padding:'5px 10px 5px 18px',fontSize:'0.8rem',background:'#f0fff4'}}>
                                                    <span style={{flex:1,color:'#495057'}}><i className="fas fa-arrow-circle-down me-1 text-success"></i>{src}</span>
                                                    <span style={{color:'#198754',fontWeight:600}}>{fmt(amt)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </React.Fragment>
            )}
        </div>
    );
}

function NetWorth({ defaultCurrency }) {
    const [items, setItems] = useState(() => DataService.getNetWorthItems());
    const [history, setHistory] = useState(() => DataService.getNetWorthHistory());
    const [showForm, setShowForm] = useState(false);
    const [editingItem, setEditingItem] = useState(null);
    const [form, setForm] = useState({ name: '', value: '', currency: defaultCurrency || 'GBP', type: 'asset', category: 'Cash', notes: '', person: 'own' });
    const [formErrors, setFormErrors] = useState({});
    const [showDeleteModal, setShowDeleteModal] = useState(null);
    const [showHistory, setShowHistory] = useState(true);
    const [showClearHistoryConfirm, setShowClearHistoryConfirm] = useState(false);
    const [valuationItem, setValuationItem] = useState(null);
    const [valuationValue, setValuationValue] = useState('');
    const [valuationError, setValuationError] = useState('');
    const [selectedPerson, setSelectedPerson] = useState('own');
    const [people, setPeople] = useState(() => DataService.getPeople());
    const [allExpenses, setAllExpenses] = useState(() => DataService.data.expenses || []);
    const [allIncome, setAllIncome] = useState(() => DataService.data.income || []);

    useEffect(() => {
        setPeople(DataService.getPeople());
        setAllExpenses(DataService.data.expenses || []);
        setAllIncome(DataService.data.income || []);
    }, []);

    // Sync form person when person filter changes (only when form is not open for editing)
    useEffect(() => {
        if (!editingItem) setForm(f => ({...f, person: selectedPerson}));
    }, [selectedPerson]);

    const ASSET_CATS = ['Cash', 'Investments', 'Property', 'Vehicle', 'Other'];
    const LIABILITY_CATS = ['Mortgage', 'Loan', 'Credit Card', 'Other'];
    const CURRENCIES = ['GBP', 'EUR', 'USD', 'INR'];

    const reload = () => { setItems(DataService.getNetWorthItems()); setHistory(DataService.getNetWorthHistory()); };

    const convertToDefault = (value, currency) => {
        const rates = CurrencyService.fallbackRates[currency];
        const rate = rates ? (rates[defaultCurrency] || 1) : 1;
        return value * rate;
    };

    const fmt = (amount, currency) => {
        try { return new Intl.NumberFormat('en-GB', { style: 'currency', currency }).format(amount); }
        catch (_) { return `${currency} ${Number(amount).toFixed(2)}`; }
    };

    // Cash Flow (income − expenses) filtered by person
    const filteredExpenses = allExpenses.filter(r => {
        if (selectedPerson === 'own') return !r.paidBy || r.paidBy.trim() === '';
        return r.paidBy && r.paidBy.trim() === selectedPerson;
    });
    const filteredIncome = allIncome.filter(r => {
        const person = (r.whosIncome || r.paidBy || '').trim();
        if (selectedPerson === 'own') return person === '';
        return person === selectedPerson;
    });
    const totalIncomeConverted = filteredIncome.reduce((s, r) => s + convertToDefault(r.convertedAmount || r.amount || 0, r.currency || defaultCurrency), 0);
    const totalExpensesConverted = filteredExpenses.reduce((s, r) => s + convertToDefault(r.convertedAmount || r.amount || 0, r.currency || defaultCurrency), 0);
    const cashFlow = totalIncomeConverted - totalExpensesConverted;

    // Debts "I Owe" → shown as liabilities, filtered by selected person
    const debtLiabilities = DataService.getDebts().filter(d => d.direction === 'owe' && !d.isSettled && (d.person || 'own') === selectedPerson);

    // Filter items by selected person
    const visibleItems = items.filter(i => (i.person || 'own') === selectedPerson);

    const totalAssets = visibleItems.filter(i => i.type === 'asset').reduce((s, i) => s + convertToDefault(i.value, i.currency), 0);
    const totalManualLiabilities = visibleItems.filter(i => i.type === 'liability').reduce((s, i) => s + convertToDefault(i.value, i.currency), 0);
    const totalDebtLiabilities = debtLiabilities.reduce((s, d) => s + convertToDefault(d.amount, d.currency), 0);
    const totalLiabilities = totalManualLiabilities + totalDebtLiabilities;
    // Net Worth = Total Assets + Net Savings (Cash Flow) − Total Liabilities
    const netWorth = totalAssets + cashFlow - totalLiabilities;

    const openAddForm = () => {
        setEditingItem(null);
        setForm({ name: '', value: '', currency: defaultCurrency || 'GBP', type: 'asset', category: 'Cash', notes: '', person: selectedPerson });
        setFormErrors({});
        setShowForm(true);
    };

    const openEditForm = (item) => {
        setEditingItem(item);
        setForm({ name: item.name, value: String(item.value), currency: item.currency, type: item.type, category: item.category, notes: item.notes || '', person: item.person || 'own' });
        setFormErrors({});
        setShowForm(true);
    };

    const handleTypeChange = (type) => {
        setForm(f => ({ ...f, type, category: type === 'asset' ? 'Cash' : 'Mortgage' }));
    };

    const handleSubmit = (e) => {
        e.preventDefault();
        const errors = {};
        if (!form.name.trim()) errors.name = 'Name is required';
        if (!form.value || parseFloat(form.value) <= 0) errors.value = 'Value must be greater than 0';
        if (Object.keys(errors).length > 0) { setFormErrors(errors); return; }
        if (editingItem) {
            // Base-amount correction (typo/data-entry fix) — not a real valuation movement,
            // so it must not show up as a gain/loss in the history "Change" column.
            DataService.updateNetWorthItem(editingItem.id, { name: form.name.trim(), value: parseFloat(form.value), currency: form.currency, type: form.type, category: form.category, notes: form.notes, person: form.person || 'own' }, { skipHistory: true });
        } else {
            DataService.addNetWorthItem({ name: form.name.trim(), value: form.value, currency: form.currency, type: form.type, category: form.category, notes: form.notes, person: form.person || 'own' });
        }
        setShowForm(false);
        setEditingItem(null);
        reload();
    };

    const handleDelete = (id) => { DataService.deleteNetWorthItem(id); setShowDeleteModal(null); reload(); };

    const openValuationForm = (item) => { setValuationItem(item); setValuationValue(String(item.value)); setValuationError(''); };

    const handleValuationSubmit = (e) => {
        e.preventDefault();
        if (!valuationValue || parseFloat(valuationValue) <= 0) { setValuationError('Value must be greater than 0'); return; }
        // A real valuation update — logged to history so the change shows as a gain/loss.
        DataService.updateNetWorthItem(valuationItem.id, { value: parseFloat(valuationValue) });
        setValuationItem(null);
        setValuationValue('');
        reload();
    };

    const groupBy = (arr, key) => arr.reduce((acc, item) => { (acc[item[key]] = acc[item[key]] || []).push(item); return acc; }, {});
    const assetItems = visibleItems.filter(i => i.type === 'asset');
    const liabilityItems = visibleItems.filter(i => i.type === 'liability');
    const assetsByCat = groupBy(assetItems, 'category');
    const liabsByCat = groupBy(liabilityItems, 'category');

    const sortedHistory = [...history].reverse();

    const catColor = { Cash:'#0dcaf0', Investments:'#6f42c1', Property:'#198754', Vehicle:'#fd7e14', Other:'#6c757d', Mortgage:'#dc3545', Loan:'#e83e8c', 'Credit Card':'#fd7e14' };

    const renderItemCard = (item, colorClass) => (
        <div key={item.id} style={{marginBottom:'6px',borderRadius:'8px',border:'1px solid #e9ecef',background:'#fff',padding:'9px 12px',display:'flex',alignItems:'flex-start',gap:'8px'}}>
            <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:'0.88rem'}}>{item.name}</div>
                <div style={{fontSize:'0.92rem',fontWeight:700,color:colorClass}}>{fmt(item.value, item.currency)}</div>
                {item.currency !== defaultCurrency && (
                    <div style={{fontSize:'0.72rem',color:'#6c757d'}}>≈ {fmt(convertToDefault(item.value, item.currency), defaultCurrency)}</div>
                )}
                {item.notes && <div style={{fontSize:'0.75rem',color:'#6c757d',marginTop:'2px'}}>{item.notes}</div>}
            </div>
            <div style={{display:'flex',gap:'4px',flexShrink:0}}>
                <button type="button" className="btn btn-sm btn-outline-success" style={{fontSize:'0.7rem',padding:'2px 7px'}} title="Update valuation (logs a change)" onClick={() => openValuationForm(item)}>
                    <i className="fas fa-chart-line"></i>
                </button>
                <button type="button" className="btn btn-sm btn-outline-primary" style={{fontSize:'0.7rem',padding:'2px 7px'}} title="Edit base amount (no change logged)" onClick={() => openEditForm(item)}>
                    <i className="fas fa-pencil-alt"></i>
                </button>
                <button type="button" className="btn btn-sm btn-outline-danger" style={{fontSize:'0.7rem',padding:'2px 7px'}} onClick={() => setShowDeleteModal(item.id)}>
                    <i className="fas fa-trash"></i>
                </button>
            </div>
        </div>
    );

    return (
        <div className="screen">
            <div className="screen-header"><h2><i className="fas fa-balance-scale me-2"></i>Net Worth</h2></div>

            {/* Person filter */}
            <div style={{padding:'0 1rem 0.5rem'}}>
                <select className="form-select form-select-sm" value={selectedPerson} onChange={e => setSelectedPerson(e.target.value)}>
                    <option value="own">Own (Me)</option>
                    {people.map(p => <option key={p.id} value={p.name}>{p.name}{p.relationship ? ` (${p.relationship})` : ''}</option>)}
                </select>
            </div>

            {/* Summary banner — Total Assets | Cash Flow | Liabilities, then Net Worth centred */}
            <div style={{padding:'0 1rem 0.5rem'}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'8px'}}>
                    <div style={{background:'#f0fff4',border:'1px solid #c3e6cb',borderRadius:'10px',padding:'9px 8px',textAlign:'center'}}>
                        <div style={{fontSize:'0.6rem',color:'#198754',fontWeight:700,letterSpacing:'0.04em',marginBottom:'3px'}}>TOTAL ASSETS</div>
                        <div style={{fontSize:'0.88rem',fontWeight:800,color:'#198754',lineHeight:1.1}}>{fmt(totalAssets, defaultCurrency)}</div>
                        <div style={{fontSize:'0.58rem',color:'#adb5bd',marginTop:'3px'}}>All assets</div>
                    </div>
                    <div style={{background:cashFlow>=0?'#f0fff4':'#fff5f5',border:`1px solid ${cashFlow>=0?'#c3e6cb':'#f5c6cb'}`,borderRadius:'10px',padding:'9px 8px',textAlign:'center'}}>
                        <div style={{fontSize:'0.6rem',color:'#6c757d',fontWeight:700,letterSpacing:'0.04em',marginBottom:'3px'}}>CASH FLOW</div>
                        <div style={{fontSize:'0.88rem',fontWeight:800,color:cashFlow>=0?'#198754':'#dc3545',lineHeight:1.1}}>{fmt(cashFlow, defaultCurrency)}</div>
                        <div style={{fontSize:'0.58rem',color:'#adb5bd',marginTop:'3px'}}>Income − Expenses</div>
                    </div>
                    <div style={{background:'#fff5f5',border:'1px solid #f5c6cb',borderRadius:'10px',padding:'9px 8px',textAlign:'center'}}>
                        <div style={{fontSize:'0.6rem',color:'#dc3545',fontWeight:700,letterSpacing:'0.04em',marginBottom:'3px'}}>LIABILITIES</div>
                        <div style={{fontSize:'0.88rem',fontWeight:800,color:'#dc3545',lineHeight:1.1}}>{fmt(totalLiabilities, defaultCurrency)}</div>
                        <div style={{fontSize:'0.58rem',color:'#adb5bd',marginTop:'3px'}}>Total owed</div>
                    </div>
                </div>
                <div style={{display:'flex',justifyContent:'center'}}>
                    <div style={{background:netWorth>=0?'#f0fff4':'#fff5f5',border:`1px solid ${netWorth>=0?'#c3e6cb':'#f5c6cb'}`,borderRadius:'12px',padding:'10px 32px',textAlign:'center'}}>
                        <div style={{fontSize:'0.65rem',color:'#6c757d',fontWeight:700,letterSpacing:'0.05em',marginBottom:'3px'}}>NET WORTH</div>
                        <div style={{fontSize:'1.2rem',fontWeight:800,color:netWorth>=0?'#198754':'#dc3545',lineHeight:1.1}}>{fmt(netWorth, defaultCurrency)}</div>
                        <div style={{fontSize:'0.6rem',color:'#adb5bd',marginTop:'3px'}}>Assets + Flow − Liabilities</div>
                    </div>
                </div>
            </div>

            {/* Add button */}
            <div style={{padding:'0.25rem 1rem 0.75rem',display:'flex',gap:'8px'}}>
                <button type="button" className={'btn btn-sm flex-fill ' + (showForm ? 'btn-secondary' : 'btn-primary')}
                    onClick={() => { if (showForm) { setShowForm(false); setEditingItem(null); } else openAddForm(); }}>
                    <i className={'fas fa-' + (showForm ? 'times' : 'plus') + ' me-1'}></i>
                    {showForm ? 'Cancel' : 'Add Asset / Liability'}
                </button>
            </div>

            {/* Form */}
            {showForm && (
                <div style={{margin:'0 1rem 0.75rem',background:'#f8f9fa',borderRadius:'10px',padding:'0.75rem'}}>
                    <h6 style={{marginBottom:'0.6rem',fontSize:'0.85rem',fontWeight:600}}>{editingItem ? 'Edit Item' : 'Add New Item'}</h6>
                    <form onSubmit={handleSubmit}>
                        <div className="mb-2" style={{display:'flex',gap:'8px'}}>
                            <button type="button" className={'btn btn-sm flex-fill ' + (form.type==='asset' ? 'btn-success' : 'btn-outline-secondary')} onClick={() => handleTypeChange('asset')}>
                                <i className="fas fa-plus-circle me-1"></i>Asset
                            </button>
                            <button type="button" className={'btn btn-sm flex-fill ' + (form.type==='liability' ? 'btn-danger' : 'btn-outline-secondary')} onClick={() => handleTypeChange('liability')}>
                                <i className="fas fa-minus-circle me-1"></i>Liability
                            </button>
                        </div>
                        <div className="mb-2">
                            <input className={'form-control form-control-sm' + (formErrors.name ? ' is-invalid' : '')}
                                placeholder="Name (e.g. Savings Account)" value={form.name}
                                onChange={e => setForm(f => ({...f, name: e.target.value}))} />
                            {formErrors.name && <div className="invalid-feedback">{formErrors.name}</div>}
                        </div>
                        <div className="mb-2" style={{display:'grid',gridTemplateColumns:'1fr 100px',gap:'8px'}}>
                            <div>
                                <input type="number" min="0.01" step="0.01"
                                    className={'form-control form-control-sm' + (formErrors.value ? ' is-invalid' : '')}
                                    placeholder="Value" value={form.value}
                                    onChange={e => setForm(f => ({...f, value: e.target.value}))} />
                                {formErrors.value && <div className="invalid-feedback">{formErrors.value}</div>}
                            </div>
                            <select className="form-select form-select-sm" value={form.currency} onChange={e => setForm(f => ({...f, currency: e.target.value}))}>
                                {CURRENCIES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div className="mb-2">
                            <select className="form-select form-select-sm" value={form.category} onChange={e => setForm(f => ({...f, category: e.target.value}))}>
                                {(form.type === 'asset' ? ASSET_CATS : LIABILITY_CATS).map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div className="mb-2">
                            <label style={{fontSize:'0.75rem',fontWeight:600,marginBottom:'3px',display:'block'}}>Linked to</label>
                            <select className="form-select form-select-sm" value={form.person} onChange={e => setForm(f => ({...f, person: e.target.value}))}>
                                <option value="own">Own (Me)</option>
                                {people.map(p => <option key={p.id} value={p.name}>{p.name}{p.relationship ? ` (${p.relationship})` : ''}</option>)}
                            </select>
                        </div>
                        <div className="mb-3">
                            <input className="form-control form-control-sm" placeholder="Notes (optional)" value={form.notes}
                                onChange={e => setForm(f => ({...f, notes: e.target.value}))} />
                        </div>
                        <div style={{display:'flex',gap:'8px'}}>
                            <button type="submit" className="btn btn-sm btn-primary">{editingItem ? 'Save Changes' : 'Add Item'}</button>
                            <button type="button" className="btn btn-sm btn-outline-secondary" onClick={() => { setShowForm(false); setEditingItem(null); setFormErrors({}); }}>Cancel</button>
                        </div>
                    </form>
                </div>
            )}

            {/* Assets list */}
            <div style={{padding:'0 1rem'}}>
                <div style={{marginBottom:'1rem'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}}>
                        <h6 style={{margin:0,fontSize:'0.85rem',fontWeight:700,color:'#198754'}}><i className="fas fa-arrow-up me-1"></i>Assets</h6>
                        <span className="badge bg-success" style={{fontSize:'0.62rem'}}>{assetItems.length}</span>
                        <span style={{marginLeft:'auto',fontSize:'0.8rem',fontWeight:700,color:'#198754'}}>{fmt(totalAssets, defaultCurrency)}</span>
                    </div>
                    {assetItems.length === 0
                        ? <div style={{textAlign:'center',padding:'1rem 0',color:'#6c757d',fontSize:'0.83rem',background:'#f8f9fa',borderRadius:'8px'}}>No assets added yet.</div>
                        : ASSET_CATS.filter(c => assetsByCat[c]).map(cat => (
                            <div key={cat} style={{marginBottom:'8px'}}>
                                <div style={{fontSize:'0.7rem',fontWeight:700,color:catColor[cat]||'#6c757d',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'4px',paddingLeft:'2px'}}>{cat}</div>
                                {assetsByCat[cat].map(item => renderItemCard(item, '#198754'))}
                            </div>
                        ))
                    }
                </div>

                {/* Liabilities list */}
                <div style={{marginBottom:'1rem'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}}>
                        <h6 style={{margin:0,fontSize:'0.85rem',fontWeight:700,color:'#dc3545'}}><i className="fas fa-arrow-down me-1"></i>Liabilities</h6>
                        <span className="badge bg-danger" style={{fontSize:'0.62rem'}}>{liabilityItems.length + debtLiabilities.length}</span>
                        <span style={{marginLeft:'auto',fontSize:'0.8rem',fontWeight:700,color:'#dc3545'}}>{fmt(totalLiabilities, defaultCurrency)}</span>
                    </div>
                    {liabilityItems.length === 0 && debtLiabilities.length === 0
                        ? <div style={{textAlign:'center',padding:'1rem 0',color:'#6c757d',fontSize:'0.83rem',background:'#f8f9fa',borderRadius:'8px'}}>No liabilities added yet.</div>
                        : <>
                            {LIABILITY_CATS.filter(c => liabsByCat[c]).map(cat => (
                                <div key={cat} style={{marginBottom:'8px'}}>
                                    <div style={{fontSize:'0.7rem',fontWeight:700,color:catColor[cat]||'#6c757d',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'4px',paddingLeft:'2px'}}>{cat}</div>
                                    {liabsByCat[cat].map(item => renderItemCard(item, '#dc3545'))}
                                </div>
                            ))}
                            {debtLiabilities.length > 0 && (
                                <div style={{marginBottom:'8px'}}>
                                    <div style={{fontSize:'0.7rem',fontWeight:700,color:'#e83e8c',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'4px',paddingLeft:'2px'}}>
                                        Debts I Owe
                                        <span className="badge ms-1" style={{background:'#e83e8c',fontSize:'0.55rem',verticalAlign:'middle'}}>From Debt Tracker</span>
                                    </div>
                                    {debtLiabilities.map(debt => (
                                        <div key={debt.id} style={{marginBottom:'6px',borderRadius:'8px',border:'1px solid #f5c2d0',background:'#fff5f8',padding:'9px 12px',display:'flex',alignItems:'flex-start',gap:'8px'}}>
                                            <div style={{flex:1,minWidth:0}}>
                                                <div style={{fontWeight:600,fontSize:'0.88rem'}}>{debt.counterparty}</div>
                                                <div style={{fontSize:'0.9rem',fontWeight:700,color:'#dc3545'}}>{fmt(debt.amount, debt.currency)}</div>
                                                {debt.currency !== defaultCurrency && <div style={{fontSize:'0.72rem',color:'#6c757d'}}>≈ {fmt(convertToDefault(debt.amount, debt.currency), defaultCurrency)}</div>}
                                                {debt.dueDate && <div style={{fontSize:'0.72rem',color:'#6c757d'}}>Due: {new Date(debt.dueDate+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>}
                                                {debt.notes && <div style={{fontSize:'0.72rem',color:'#6c757d',marginTop:'2px'}}>{debt.notes}</div>}
                                            </div>
                                            <span style={{fontSize:'0.68rem',color:'#6c757d',flexShrink:0,marginTop:'2px'}}>auto</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                          </>
                    }
                </div>
            </div>

            {/* History table */}
            <div style={{padding:'0 1rem 1rem'}}>
                <div style={{display:'flex',gap:'6px',marginBottom:'8px'}}>
                    <button type="button" className="btn btn-sm btn-outline-secondary flex-grow-1" onClick={() => setShowHistory(v => !v)}>
                        <i className={'fas fa-' + (showHistory ? 'chevron-up' : 'chevron-down') + ' me-1'}></i>
                        {showHistory ? 'Hide' : 'Show'} History ({sortedHistory.length} snapshots)
                    </button>
                    {sortedHistory.length > 0 && (
                        <button type="button" className="btn btn-sm btn-outline-danger" title="Delete all history" onClick={() => setShowClearHistoryConfirm(true)}>
                            <i className="fas fa-trash-alt"></i>
                        </button>
                    )}
                </div>
                {showHistory && (
                    sortedHistory.length === 0
                        ? <div style={{textAlign:'center',padding:'1rem',color:'#6c757d',fontSize:'0.83rem',background:'#f8f9fa',borderRadius:'8px'}}>No history yet. Add your first asset or liability above.</div>
                        : <div style={{borderRadius:'10px',overflow:'hidden',border:'1px solid #dee2e6'}}>
                            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.8rem'}}>
                                <thead>
                                    <tr style={{background:'#f8f9fa'}}>
                                        <th style={{padding:'7px 10px',textAlign:'left',fontWeight:600,borderBottom:'1px solid #dee2e6'}}>Date</th>
                                        <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,borderBottom:'1px solid #dee2e6'}}>Net Worth</th>
                                        <th style={{padding:'7px 10px',textAlign:'right',fontWeight:600,borderBottom:'1px solid #dee2e6'}}>Change</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedHistory.map((entry, idx) => {
                                        const prev = sortedHistory[idx + 1];
                                        const change = prev != null ? entry.netWorth - prev.netWorth : null;
                                        const isFirst = idx === 0;
                                        return (
                                            <tr key={idx} style={{borderBottom:idx < sortedHistory.length-1 ? '1px solid #f0f0f0' : 'none', background:isFirst?'#f0fff4':'#fff'}}>
                                                <td style={{padding:'7px 10px',color:'#495057'}}>
                                                    {new Date(entry.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
                                                    {isFirst && <span className="badge bg-success ms-1" style={{fontSize:'0.58rem'}}>Latest</span>}
                                                </td>
                                                <td style={{padding:'7px 10px',textAlign:'right',fontWeight:isFirst?700:400,color:entry.netWorth>=0?'#198754':'#dc3545'}}>
                                                    {fmt(entry.netWorth, defaultCurrency)}
                                                </td>
                                                <td style={{padding:'7px 10px',textAlign:'right',fontWeight:600,color:change===null?'#adb5bd':change>0?'#198754':change<0?'#dc3545':'#6c757d'}}>
                                                    {change === null ? '—' : change === 0 ? '±0' : (change > 0 ? '▲ ' : '▼ ') + fmt(Math.abs(change), defaultCurrency)}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                          </div>
                )}
            </div>

            {/* Delete modal */}
            {showDeleteModal && (
                <div className="modal show d-block" style={{background:'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title">Delete Item?</h5></div>
                            <div className="modal-body"><p className="mb-0">Delete this item? This cannot be undone.</p></div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-outline-secondary btn-sm" onClick={() => setShowDeleteModal(null)}>Cancel</button>
                                <button type="button" className="btn btn-danger btn-sm" onClick={() => handleDelete(showDeleteModal)}><i className="fas fa-trash me-1"></i>Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* Clear all history modal */}
            {showClearHistoryConfirm && (
                <div className="modal show d-block" style={{background:'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header border-danger">
                                <h5 className="modal-title text-danger"><i className="fas fa-exclamation-triangle me-2"></i>Delete All History?</h5>
                            </div>
                            <div className="modal-body">
                                <p>You are about to permanently delete all <strong>{sortedHistory.length} net worth snapshot{sortedHistory.length !== 1 ? 's' : ''}</strong>.</p>
                                <p className="mb-0">Your assets and liabilities themselves will not be affected — only the historical trend is cleared.</p>
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={() => setShowClearHistoryConfirm(false)}>Cancel</button>
                                <button type="button" className="btn btn-danger" onClick={() => { DataService.clearNetWorthHistory(); setShowClearHistoryConfirm(false); reload(); }}>
                                    <i className="fas fa-trash-alt me-1"></i>Delete All
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* Update valuation modal */}
            {valuationItem && (
                <div className="modal show d-block" style={{background:'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <form className="modal-content" onSubmit={handleValuationSubmit}>
                            <div className="modal-header"><h5 className="modal-title">Update Valuation — {valuationItem.name}</h5></div>
                            <div className="modal-body">
                                <p className="text-muted" style={{fontSize:'0.85rem'}}>Current: {fmt(valuationItem.value, valuationItem.currency)}. This records a real change and will show as a gain/loss in the history below.</p>
                                <label className="form-label">New Value ({valuationItem.currency})</label>
                                <input type="number" step="0.01" className={'form-control' + (valuationError ? ' is-invalid' : '')} value={valuationValue} onChange={e => { setValuationValue(e.target.value); setValuationError(''); }} autoFocus />
                                {valuationError && <div className="invalid-feedback">{valuationError}</div>}
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-outline-secondary btn-sm" onClick={() => setValuationItem(null)}>Cancel</button>
                                <button type="submit" className="btn btn-success btn-sm"><i className="fas fa-chart-line me-1"></i>Save Valuation</button>
                            </div>
                        </form>
                    </div>
                </div>
            )}
        </div>
    );
}

function DebtTracker({ defaultCurrency, categories, onUpdate }) {
    const [activeTab, setActiveTab] = useState('owe');
    const [debts, setDebts] = useState(() => DataService.getDebts());
    const [showForm, setShowForm] = useState(false);
    const [editingDebt, setEditingDebt] = useState(null);
    const [form, setForm] = useState({ counterparty: '', amount: '', currency: defaultCurrency || 'GBP', notes: '', dueDate: '', person: 'own' });
    const [formErrors, setFormErrors] = useState({});
    const [showSettleModal, setShowSettleModal] = useState(null);
    const [showDeleteModal, setShowDeleteModal] = useState(null);
    const [showLinkedModal, setShowLinkedModal] = useState(null);
    const [linkedCatId, setLinkedCatId] = useState('');
    const [linkedSubcat, setLinkedSubcat] = useState('');
    const [showSettled, setShowSettled] = useState(false);
    const [selectedPerson, setSelectedPerson] = useState('own');
    const [people] = useState(() => DataService.getPeople());

    const reload = () => setDebts(DataService.getDebts());
    const today = new Date().toISOString().split('T')[0];
    const currencies = ['GBP', 'EUR', 'USD', 'INR'];
    const isOverdue = (d) => d.dueDate && d.dueDate < today && !d.isSettled;

    const personDebts = debts.filter(d => (d.person || 'own') === selectedPerson);
    const activeDebts = personDebts.filter(d => !d.isSettled && d.direction === activeTab);
    const settledDebts = personDebts.filter(d => d.isSettled && d.direction === activeTab);
    const sortedActive = [...activeDebts].sort((a, b) => (isOverdue(a) ? 0 : 1) - (isOverdue(b) ? 0 : 1) || new Date(b.createdAt) - new Date(a.createdAt));

    const sumByCurrency = (dir) => {
        const totals = {};
        personDebts.filter(d => !d.isSettled && d.direction === dir).forEach(d => { totals[d.currency] = (totals[d.currency] || 0) + d.amount; });
        return totals;
    };
    const oweTotals = sumByCurrency('owe');
    const owedTotals = sumByCurrency('owed');

    const fmtAmt = (amount, currency) => {
        try { return new Intl.NumberFormat('en-GB', { style: 'currency', currency }).format(amount); } catch (_) { return `${currency} ${Number(amount).toFixed(2)}`; }
    };

    const handleAddDebt = (e) => {
        e.preventDefault();
        const errors = {};
        if (!form.counterparty.trim()) errors.counterparty = 'Person name is required';
        if (!form.amount || parseFloat(form.amount) <= 0) errors.amount = 'Amount must be greater than 0';
        if (Object.keys(errors).length > 0) { setFormErrors(errors); return; }
        if (editingDebt) {
            DataService.updateDebt(editingDebt.id, { counterparty: form.counterparty.trim(), amount: parseFloat(form.amount), currency: form.currency, notes: form.notes, dueDate: form.dueDate, person: form.person || 'own' });
            setEditingDebt(null);
        } else {
            DataService.addDebt({ ...form, counterparty: form.counterparty.trim(), direction: activeTab });
        }
        setForm({ counterparty: '', amount: '', currency: defaultCurrency || 'GBP', notes: '', dueDate: '', person: selectedPerson });
        setFormErrors({});
        setShowForm(false);
        reload();
    };

    const openEditForm = (debt) => {
        setEditingDebt(debt);
        setForm({ counterparty: debt.counterparty, amount: String(debt.amount), currency: debt.currency, notes: debt.notes || '', dueDate: debt.dueDate || '', person: debt.person || 'own' });
        setFormErrors({});
        setShowForm(true);
    };

    const handleSettle = (debt) => {
        DataService.settleDebt(debt.id);
        setShowSettleModal(null);
        setLinkedCatId('');
        setLinkedSubcat('');
        setShowLinkedModal(debt);
        reload();
    };

    const handleLinkedRecord = async (debt) => {
        if (debt.direction === 'owe') {
            const cat = (categories || []).find(c => String(c.id) === String(linkedCatId));
            await DataService.addExpense({ amount: debt.amount, currency: debt.currency, date: today, categoryId: linkedCatId ? Number(linkedCatId) : null, category: cat ? cat.name : '', subcategory: linkedSubcat, description: `Settled debt to ${debt.counterparty}`, paidBy: '', tags: [] });
        } else {
            await DataService.addIncome({ amount: debt.amount, currency: debt.currency, date: today, source: `Debt from ${debt.counterparty}`, description: `Received debt from ${debt.counterparty}`, whosIncome: '' });
        }
        setLinkedCatId('');
        setLinkedSubcat('');
        setShowLinkedModal(null);
        if (onUpdate) onUpdate();
    };

    const handleDelete = (id) => { DataService.deleteDebt(id); setShowDeleteModal(null); reload(); };

    return (
        <div className="screen">
            <div className="screen-header"><h2><i className="fas fa-handshake me-2"></i>Debt Tracker</h2></div>

            {/* Person filter */}
            <div style={{padding:'0 1rem 0.5rem'}}>
                <select className="form-select form-select-sm" value={selectedPerson} onChange={e => { setSelectedPerson(e.target.value); setShowForm(false); setEditingDebt(null); }}>
                    <option value="own">Own (Me)</option>
                    {people.map(p => <option key={p.id} value={p.name}>{p.name}{p.relationship ? ` (${p.relationship})` : ''}</option>)}
                </select>
            </div>

            <div style={{padding:'0 1rem 0.75rem',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
                <div style={{background:'#fff5f5',border:'1px solid #f5c6cb',borderRadius:'10px',padding:'10px 12px'}}>
                    <div style={{fontSize:'0.72rem',color:'#dc3545',fontWeight:700,marginBottom:'3px',letterSpacing:'0.03em'}}>TOTAL I OWE</div>
                    {Object.keys(oweTotals).length === 0
                        ? <div style={{fontSize:'0.85rem',color:'#adb5bd'}}>None</div>
                        : Object.entries(oweTotals).map(([cur, amt]) => <div key={cur} style={{fontSize:'0.95rem',fontWeight:700,color:'#dc3545'}}>{fmtAmt(amt, cur)}</div>)}
                </div>
                <div style={{background:'#f0fff4',border:'1px solid #c3e6cb',borderRadius:'10px',padding:'10px 12px'}}>
                    <div style={{fontSize:'0.72rem',color:'#198754',fontWeight:700,marginBottom:'3px',letterSpacing:'0.03em'}}>OWED TO ME</div>
                    {Object.keys(owedTotals).length === 0
                        ? <div style={{fontSize:'0.85rem',color:'#adb5bd'}}>None</div>
                        : Object.entries(owedTotals).map(([cur, amt]) => <div key={cur} style={{fontSize:'0.95rem',fontWeight:700,color:'#198754'}}>{fmtAmt(amt, cur)}</div>)}
                </div>
            </div>

            <div style={{padding:'0 1rem 0.75rem',display:'flex',gap:'8px'}}>
                <button type="button" className={'btn btn-sm flex-fill ' + (activeTab==='owe' ? 'btn-danger' : 'btn-outline-secondary')} onClick={() => setActiveTab('owe')}>
                    <i className="fas fa-arrow-up me-1"></i>I Owe
                </button>
                <button type="button" className={'btn btn-sm flex-fill ' + (activeTab==='owed' ? 'btn-success' : 'btn-outline-secondary')} onClick={() => setActiveTab('owed')}>
                    <i className="fas fa-arrow-down me-1"></i>Owed to Me
                </button>
                <button type="button" className={'btn btn-sm ' + (showForm ? 'btn-secondary' : 'btn-primary')} onClick={() => { if (showForm) { setShowForm(false); setEditingDebt(null); setForm({ counterparty: '', amount: '', currency: defaultCurrency || 'GBP', notes: '', dueDate: '', person: selectedPerson }); } else { setEditingDebt(null); setForm({ counterparty: '', amount: '', currency: defaultCurrency || 'GBP', notes: '', dueDate: '', person: selectedPerson }); setShowForm(true); } }} title="Add debt">
                    <i className={'fas fa-' + (showForm ? 'times' : 'plus')}></i>
                </button>
            </div>

            {showForm && (
                <div style={{margin:'0 1rem 0.75rem',background:'#f8f9fa',borderRadius:'10px',padding:'0.75rem'}}>
                    <h6 style={{marginBottom:'0.6rem',fontSize:'0.85rem',fontWeight:600}}>{activeTab==='owe' ? 'Add Debt I Owe' : 'Add Debt Owed to Me'}</h6>
                    <form onSubmit={handleAddDebt}>
                        <div className="mb-2">
                            <input className={'form-control form-control-sm' + (formErrors.counterparty ? ' is-invalid' : '')}
                                placeholder="Person / counterparty name" value={form.counterparty}
                                onChange={e => setForm(f => ({...f, counterparty: e.target.value}))} />
                            {formErrors.counterparty && <div className="invalid-feedback">{formErrors.counterparty}</div>}
                        </div>
                        <div className="mb-2" style={{display:'grid',gridTemplateColumns:'1fr 100px',gap:'8px'}}>
                            <div>
                                <input type="number" min="0.01" step="0.01" className={'form-control form-control-sm' + (formErrors.amount ? ' is-invalid' : '')}
                                    placeholder="Amount" value={form.amount}
                                    onChange={e => setForm(f => ({...f, amount: e.target.value}))} />
                                {formErrors.amount && <div className="invalid-feedback">{formErrors.amount}</div>}
                            </div>
                            <select className="form-select form-select-sm" value={form.currency} onChange={e => setForm(f => ({...f, currency: e.target.value}))}>
                                {currencies.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div className="mb-2">
                            <input type="date" className="form-control form-control-sm" value={form.dueDate}
                                onChange={e => setForm(f => ({...f, dueDate: e.target.value}))} />
                            <div style={{fontSize:'0.72rem',color:'#6c757d',marginTop:'2px'}}>Due date (optional)</div>
                        </div>
                        <div className="mb-2">
                            <label style={{fontSize:'0.75rem',fontWeight:600,marginBottom:'3px',display:'block'}}>Linked to</label>
                            <select className="form-select form-select-sm" value={form.person} onChange={e => setForm(f => ({...f, person: e.target.value}))}>
                                <option value="own">Own (Me)</option>
                                {people.map(p => <option key={p.id} value={p.name}>{p.name}{p.relationship ? ` (${p.relationship})` : ''}</option>)}
                            </select>
                        </div>
                        <div className="mb-3">
                            <input className="form-control form-control-sm" placeholder="Notes (optional)" value={form.notes}
                                onChange={e => setForm(f => ({...f, notes: e.target.value}))} />
                        </div>
                        <div style={{display:'flex',gap:'8px'}}>
                            <button type="submit" className="btn btn-sm btn-primary">{editingDebt ? 'Save Changes' : 'Add Debt'}</button>
                            <button type="button" className="btn btn-sm btn-outline-secondary" onClick={() => { setShowForm(false); setEditingDebt(null); setFormErrors({}); }}>Cancel</button>
                        </div>
                    </form>
                </div>
            )}

            <div style={{padding:'0 1rem'}}>
                {sortedActive.length === 0 ? (
                    <div style={{textAlign:'center',padding:'2.5rem 0',color:'#6c757d'}}>
                        <i className={'fas fa-' + (activeTab==='owe' ? 'hand-holding-usd' : 'money-bill-wave') + ' fa-2x mb-2 d-block'}></i>
                        <p style={{fontSize:'0.85rem',margin:0}}>No active {activeTab==='owe' ? 'debts you owe' : 'debts owed to you'}</p>
                    </div>
                ) : sortedActive.map(debt => {
                    const overdue = isOverdue(debt);
                    return (
                        <div key={debt.id} style={{marginBottom:'8px',borderRadius:'10px',border:'1px solid',borderColor:overdue?'#ffc107':'#dee2e6',background:overdue?'#fffdf0':'#fff',padding:'10px 12px'}}>
                            <div style={{display:'flex',alignItems:'flex-start',gap:'8px'}}>
                                <div style={{flex:1,minWidth:0}}>
                                    <div style={{display:'flex',alignItems:'center',gap:'5px',flexWrap:'wrap',marginBottom:'3px'}}>
                                        <span className={'badge ' + (debt.direction==='owe' ? 'bg-danger' : 'bg-success')} style={{fontSize:'0.58rem'}}>{debt.direction==='owe' ? 'I OWE' : 'OWED TO ME'}</span>
                                        {overdue && <span className="badge bg-warning text-dark" style={{fontSize:'0.58rem'}}>OVERDUE</span>}
                                        <span style={{fontWeight:600,fontSize:'0.88rem'}}>{debt.counterparty}</span>
                                    </div>
                                    <div style={{fontSize:'0.95rem',fontWeight:700,color:debt.direction==='owe'?'#dc3545':'#198754'}}>{fmtAmt(debt.amount, debt.currency)}</div>
                                    {debt.dueDate && <div style={{fontSize:'0.75rem',color:overdue?'#e65100':'#6c757d',marginTop:'1px'}}>Due: {new Date(debt.dueDate+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>}
                                    {debt.notes && <div style={{fontSize:'0.75rem',color:'#6c757d',marginTop:'2px'}}>{debt.notes}</div>}
                                </div>
                                <div style={{display:'flex',flexDirection:'column',gap:'4px',flexShrink:0}}>
                                    <button type="button" className="btn btn-sm btn-outline-success" style={{fontSize:'0.7rem',padding:'2px 8px'}} onClick={() => setShowSettleModal(debt)}>
                                        <i className="fas fa-check me-1"></i>Settle
                                    </button>
                                    <button type="button" className="btn btn-sm btn-outline-secondary" style={{fontSize:'0.7rem',padding:'2px 8px'}} onClick={() => openEditForm(debt)}>
                                        <i className="fas fa-pencil-alt"></i>
                                    </button>
                                    <button type="button" className="btn btn-sm btn-outline-danger" style={{fontSize:'0.7rem',padding:'2px 8px'}} onClick={() => setShowDeleteModal(debt.id)}>
                                        <i className="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                })}
            </div>

            {settledDebts.length > 0 && (
                <div style={{padding:'0.5rem 1rem 1rem'}}>
                    <button type="button" className="btn btn-sm btn-outline-secondary w-100" onClick={() => setShowSettled(v => !v)}>
                        <i className={'fas fa-' + (showSettled ? 'chevron-up' : 'chevron-down') + ' me-1'}></i>
                        {showSettled ? 'Hide' : 'Show'} settled debts ({settledDebts.length})
                    </button>
                    {showSettled && (
                        <div style={{marginTop:'8px'}}>
                            {settledDebts.map(debt => (
                                <div key={debt.id} style={{marginBottom:'6px',borderRadius:'8px',border:'1px solid #e9ecef',background:'#f8f9fa',padding:'8px 12px'}}>
                                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'8px'}}>
                                        <div style={{flex:1,minWidth:0}}>
                                            <div style={{fontWeight:500,fontSize:'0.85rem',color:'#6c757d'}}>{debt.counterparty}</div>
                                            <div style={{fontSize:'0.85rem',color:'#adb5bd',textDecoration:'line-through'}}>{fmtAmt(debt.amount, debt.currency)}</div>
                                            {debt.settledAt && <div style={{fontSize:'0.72rem',color:'#adb5bd'}}>Settled {new Date(debt.settledAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>}
                                        </div>
                                        <button type="button" className="btn btn-sm btn-outline-danger" style={{fontSize:'0.65rem',padding:'2px 7px'}} onClick={() => setShowDeleteModal(debt.id)}>
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            )}

            {showSettleModal && (
                <div className="modal show d-block" style={{background:'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title">Mark as Settled?</h5></div>
                            <div className="modal-body">
                                <p>Mark <strong>{fmtAmt(showSettleModal.amount, showSettleModal.currency)}</strong> {showSettleModal.direction==='owe' ? 'owed to' : 'from'} <strong>{showSettleModal.counterparty}</strong> as settled?</p>
                                <p className="text-muted small mb-0">This cannot be undone.</p>
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-outline-secondary btn-sm" onClick={() => setShowSettleModal(null)}>Cancel</button>
                                <button type="button" className="btn btn-success btn-sm" onClick={() => handleSettle(showSettleModal)}><i className="fas fa-check me-1"></i>Yes, Settle</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {showLinkedModal && (
                <div className="modal show d-block" style={{background:'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header">
                                <h5 className="modal-title"><i className="fas fa-check-circle text-success me-2"></i>Debt Settled!</h5>
                            </div>
                            <div className="modal-body">
                                {showLinkedModal.direction === 'owe' ? (
                                    <>
                                        <p>Would you like to add an <strong>expense record</strong> for <strong>{fmtAmt(showLinkedModal.amount, showLinkedModal.currency)}</strong>?</p>
                                        <div className="mb-2">
                                            <label className="form-label" style={{fontSize:'0.82rem',fontWeight:600}}>Category</label>
                                            <select className="form-select form-select-sm" value={linkedCatId}
                                                onChange={e => { setLinkedCatId(e.target.value); setLinkedSubcat(''); }}>
                                                <option value="">— Select category (optional) —</option>
                                                {(categories || []).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                            </select>
                                        </div>
                                        {linkedCatId && (() => {
                                            const cat = (categories || []).find(c => String(c.id) === String(linkedCatId));
                                            const subcats = cat && cat.subcategories && cat.subcategories.length > 0 ? cat.subcategories : [];
                                            return subcats.length > 0 ? (
                                                <div className="mb-2">
                                                    <label className="form-label" style={{fontSize:'0.82rem',fontWeight:600}}>Sub Category</label>
                                                    <select className="form-select form-select-sm" value={linkedSubcat}
                                                        onChange={e => setLinkedSubcat(e.target.value)}>
                                                        <option value="">— Select sub category (optional) —</option>
                                                        {subcats.map(s => <option key={s} value={s}>{s}</option>)}
                                                    </select>
                                                </div>
                                            ) : null;
                                        })()}
                                        <p className="text-muted small mb-0">Added with today's date. Won't affect debt totals.</p>
                                    </>
                                ) : (
                                    <>
                                        <p>Would you like to add an <strong>income record</strong> for <strong>{fmtAmt(showLinkedModal.amount, showLinkedModal.currency)}</strong>?</p>
                                        <p className="text-muted small mb-0">Added with today's date. Won't affect debt totals.</p>
                                    </>
                                )}
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-outline-secondary btn-sm" onClick={() => setShowLinkedModal(null)}>No thanks</button>
                                <button type="button" className={'btn btn-sm ' + (showLinkedModal.direction==='owe' ? 'btn-danger' : 'btn-success')} onClick={() => handleLinkedRecord(showLinkedModal)}>
                                    <i className={'fas fa-' + (showLinkedModal.direction==='owe' ? 'receipt' : 'wallet') + ' me-1'}></i>
                                    Add {showLinkedModal.direction==='owe' ? 'Expense' : 'Income'} Record
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {showDeleteModal && (
                <div className="modal show d-block" style={{background:'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title">Delete Debt?</h5></div>
                            <div className="modal-body"><p className="mb-0">Are you sure you want to delete this debt record? This cannot be undone.</p></div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-outline-secondary btn-sm" onClick={() => setShowDeleteModal(null)}>Cancel</button>
                                <button type="button" className="btn btn-danger btn-sm" onClick={() => handleDelete(showDeleteModal)}><i className="fas fa-trash me-1"></i>Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

function App() {
    const [currentScreen, setCurrentScreen] = useState('expenses');
    const [expenses, setExpenses] = useState([]);
    const [income, setIncome] = useState([]);
    const [categories, setCategories] = useState([]);
    const [defaultCurrency, setDefaultCurrency] = useState('GBP');
    const [people, setPeople] = useState([]);
    const [notifications, setNotifications] = useState(() => DataService.getNotifications());
    const [showNotifPanel, setShowNotifPanel] = useState(false);
    const [expensesInitDateFrom, setExpensesInitDateFrom] = useState('');
    const [expensesInitDateTo, setExpensesInitDateTo] = useState('');
    const [expensesInitPaidBy, setExpensesInitPaidBy] = useState('');
    const [currentUser, setCurrentUser] = useState(() => {
        if (window.__firebaseReady) return null;
        try {
            const expiry = parseInt(localStorage.getItem('financeApp_session_expiry') || '0');
            const sessionActive = sessionStorage.getItem('financeApp_session_active') === 'true';
            if (expiry > Date.now() || sessionActive) {
                const storedUser = JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null');
                if (!storedUser) return null;
                // Session UID binding: prevents accidental data inheritance across different
                // local accounts (e.g. same device, different users). Note: this is not a
                // cryptographic anti-spoofing control — all values live in browser-writable
                // storage and a same-origin attacker with devtools access can bypass it.
                // Robust identity guarantees require a server-side auth layer (e.g. Firebase).
                const sessionUid = expiry > Date.now()
                    ? localStorage.getItem('financeApp_session_uid')
                    : sessionStorage.getItem('financeApp_session_uid');
                if (sessionUid !== String(storedUser.id)) return null;
                return storedUser;
            }
            return null;
        } catch (_) { return null; }
    });
    const [authLoading, setAuthLoading] = useState(() => !!window.__firebaseReady);
    const [storagePreference, setStoragePreference] = useState(() => localStorage.getItem('financeApp_storagePreference') || '');
    const [showStoragePicker, setShowStoragePicker] = useState(false);
    const [localDeviceBannerDismissed, setLocalDeviceBannerDismissed] = useState(
        () => localStorage.getItem('financeApp_localBannerDismissed') === new Date().toISOString().split('T')[0]
    );
    const [syncStatus, setSyncStatus] = useState('idle');
    const [lastSyncTime, setLastSyncTime] = useState(() => localStorage.getItem('financeApp_lastCloudSync') || '');
    // Coalesces bursts of handleDataUpdate() calls (e.g. a 50-row CSV import firing one
    // save event per row) into a single download+merge+upload cycle, instead of one full
    // cloud round-trip per call — avoiding Drive/OneDrive per-user rate limits (HTTP 429).
    const cloudSyncDebounceRef = React.useRef(null);
    const cloudSyncInFlightRef = React.useRef(false);
    const [cloudSyncGate, setCloudSyncGate] = useState('idle'); // idle|checking|reconnect-prompt|restore-prompt
    const [cloudRestoreData, setCloudRestoreData] = useState(null);
    const [showCloudHistory, setShowCloudHistory] = useState(false);
    const [cloudGateConnecting, setCloudGateConnecting] = useState(false);
    const [cloudGateError, setCloudGateError] = useState('');
    const [reconnectBannerDismissed, setReconnectBannerDismissed] = useState(false);
    const [syncMergeToast, setSyncMergeToast] = useState('');
    const showSyncMergeToast = (msg) => { setSyncMergeToast(msg); setTimeout(() => setSyncMergeToast(''), 4500); };
    // Persisted (unlike syncStatus) so a failed/offline sync is still visible and
    // auto-retryable after the user reloads or comes back to the app later.
    const [pendingSyncSince, setPendingSyncSince] = useState(() => localStorage.getItem('financeApp_pendingCloudSync') || '');
    const [pendingSyncBannerDismissed, setPendingSyncBannerDismissed] = useState(false);

    // Recomputes which budget/bill alerts are currently true and reconciles them into the
    // persisted notification store (financeApp_notifications) so they survive reloads and
    // show up in the bell/panel instead of only as a banner that resets on every render.
    const refreshNotifications = async () => {
        const notifSettings = JSON.parse(localStorage.getItem('financeApp_notifSettings') || '{}');
        let budgetActive = [];
        if (notifSettings.budgetAlertsEnabled !== false) {
            const alerts = await DataService.checkBudgetAlerts();
            budgetActive = alerts.map(a => ({
                key: 'budget:' + a.categoryId,
                type: a.type === 'over' ? 'budget-over' : 'budget-near',
                title: a.type === 'over' ? `${a.name}: over budget` : `${a.name}: approaching budget`,
                message: `${a.pct.toFixed(0)}% of budget ${a.type === 'over' ? 'spent' : 'used'}`,
                screen: 'categories'
            }));
        }
        const todayStr = new Date().toISOString().split('T')[0];
        const dueSoon = DataService.getBills().filter(b => { if (!b.isActive) return false; const diff = Math.ceil((new Date(b.nextDueDate) - new Date(todayStr)) / 86400000); return diff <= b.reminderDaysBefore; });
        const billActive = dueSoon.map(b => ({ key: 'bill:' + b.id, type: 'bill', title: `${b.name}: due soon`, message: 'Due ' + ValidationUtils.formatDate(b.nextDueDate), screen: 'bills' }));
        DataService.syncNotifications([...budgetActive, ...billActive]);
        setNotifications(DataService.getNotifications());
    };

    useEffect(() => {
        if (!window.__firebaseReady) return;
        const unsubscribe = window.__firebaseAuth.onAuthStateChanged(async (fbUser) => {
            if (fbUser) {
                const stored = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null'); } catch (_) { return null; } })();
                // If a different user's data is sitting in localStorage, wipe it before loading
                if (stored && stored.uid && stored.uid !== fbUser.uid) {
                    DataService.clearAllUserData();
                }
                const user = {
                    id: fbUser.uid, uid: fbUser.uid,
                    displayName: fbUser.displayName || (stored && stored.displayName) || fbUser.email,
                    email: fbUser.email,
                    authProvider: 'firebase',
                    createdAt: (stored && stored.createdAt) || new Date().toISOString()
                };
                localStorage.setItem('financeApp_currentUser', JSON.stringify(user));
                // Read storagePreference from Firestore BEFORE calling setCurrentUser so that
                // localStorage is already populated when the storage-gate useEffect runs.
                // This ensures the storage picker is never shown to returning users regardless
                // of which auth method they used (email/password, Google OAuth, or any future
                // provider) — not just email/password which had a prior synchronous read.
                try {
                    const doc = await window.__firebaseDb.collection('users').doc(fbUser.uid).get();
                    if (doc.exists) {
                        const pref = doc.data().storagePreference;
                        if (pref) {
                            localStorage.setItem('financeApp_storagePreference', pref);
                            localStorage.setItem('financeApp_storagePickerConfirmed', 'true');
                        }
                    }
                } catch (_) {}
                setCurrentUser(user);
            } else {
                setCurrentUser(null);
            }
            setAuthLoading(false);
        });
        return () => unsubscribe();
    }, []);

    useEffect(() => {
        if (!currentUser) return;
        const pref = localStorage.getItem('financeApp_storagePreference') || '';
