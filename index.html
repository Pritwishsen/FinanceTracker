function ExpenseForm({ categories, onSave, onCancel, editExpense = null, editSplitGroup = null }) {
    const [people, setPeople] = useState([]);
    const [formData, setFormData] = useState(() => {
        const peopleList = DataService.getPeople();
        const defaultPerson = peopleList.find(p => p.isDefault);
        if (editSplitGroup && editSplitGroup.length > 0) {
            const first = editSplitGroup[0];
            const total = editSplitGroup.reduce((sum, r) => sum + (parseFloat(r.amount) || 0), 0);
            return {
                amount: total, date: first.date, description: first.description, categoryId: first.categoryId,
                subcategory: first.subcategory, paidBy: first.paidBy || '', currency: first.currency || 'GBP', tags: first.tags || []
            };
        }
        return {
            amount: editExpense ? editExpense.amount : '',
            date: editExpense ? editExpense.date : new Date().toISOString().split('T')[0],
            description: editExpense ? editExpense.description : '',
            categoryId: editExpense ? editExpense.categoryId : '',
            subcategory: editExpense ? editExpense.subcategory : '',
            paidBy: editExpense ? (editExpense.paidBy || '') : (defaultPerson ? defaultPerson.name : ''),
            currency: editExpense ? (editExpense.currency || 'GBP') : 'GBP',
            tags: editExpense ? (editExpense.tags || []) : []
        };
    });
    const [tagInputRaw, setTagInputRaw] = useState(() => {
        if (editSplitGroup && editSplitGroup.length > 0) return (editSplitGroup[0].tags || []).join(', ');
        return editExpense ? (editExpense.tags || []).join(', ') : '';
    });
    const [errors, setErrors] = useState({});
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [showSuccess, setShowSuccess] = useState(false);
    const [recentlyUsed, setRecentlyUsed] = useState([]);
    const [isRecurring, setIsRecurring] = useState(false);
    const [recurringFreq, setRecurringFreq] = useState('monthly');
    const [recurringEndDate, setRecurringEndDate] = useState('');
    const [isSplit, setIsSplit] = useState(!!(editSplitGroup && editSplitGroup.length > 0));
    const [splitParticipants, setSplitParticipants] = useState(() => (editSplitGroup ? editSplitGroup.map(r => ({ id: r.id, name: r.paidBy || 'Me' })) : []));
    const [splitMethod, setSplitMethod] = useState(() => (editSplitGroup && editSplitGroup.length > 0 ? 'custom' : 'equal'));
    const [customAmounts, setCustomAmounts] = useState(() => {
        if (!editSplitGroup) return {};
        const obj = {};
        editSplitGroup.forEach(r => { obj[r.id] = r.amount; });
        return obj;
    });

    useEffect(() => { setPeople(DataService.getPeople()); }, []);
    useEffect(() => { if (!editExpense && !editSplitGroup) { DataService.getRecentlyUsedCategories(3).then(setRecentlyUsed); } }, []);
    useEffect(() => { if (!editExpense && !editSplitGroup) { DataService.getSettings().then(s => { if (s && s.currency) setFormData(prev => prev.currency === 'GBP' ? { ...prev, currency: s.currency } : prev); }); } }, []);

    const handleInputChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
        if (errors[field]) setErrors(prev => ({ ...prev, [field]: '' }));
        if (field === 'categoryId') setFormData(prev => ({ ...prev, subcategory: '' }));
    };

    const handleTagInput = (raw) => {
        setTagInputRaw(raw);
        const tags = [...new Set(raw.split(',').map(t => t.trim().toLowerCase()).filter(t => t.length > 0))];
        if (tags.length > 10) { setErrors(prev => ({ ...prev, tags: 'Maximum 10 tags allowed per expense' })); return; }
        if (tags.some(t => t.length > 30)) { setErrors(prev => ({ ...prev, tags: 'Tags must be 30 characters or fewer' })); return; }
        setErrors(prev => ({ ...prev, tags: '' }));
        setFormData(prev => ({ ...prev, tags }));
    };

    const handleSubmit = (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        const tags = formData.tags || [];
        if (tags.length > 10) { setErrors({ tags: 'Maximum 10 tags allowed per expense' }); setIsSubmitting(false); return; }
        if (tags.some(t => t.length > 30)) { setErrors({ tags: 'Tags must be 30 characters or fewer' }); setIsSubmitting(false); return; }
        const validation = ValidationUtils.validateExpense({ ...formData, amount: parseFloat(formData.amount), categoryId: parseInt(formData.categoryId) });
        if (!validation.isValid) { setErrors(validation.errors); setIsSubmitting(false); return; }
        if (isSplit || editSplitGroup) {
            if (splitParticipants.length < 2) { setErrors({ general: 'A split needs at least 2 participants.' }); setIsSubmitting(false); return; }
            if (splitMethod === 'custom') {
                const total = splitParticipants.reduce((sum, p) => sum + (parseFloat(customAmounts[p.id]) || 0), 0);
                const target = parseFloat(formData.amount);
                if (Math.abs(total - target) > 0.01) { setErrors({ general: `Custom amounts must sum to ${ValidationUtils.formatCurrency(target, formData.currency)}. Current total: ${ValidationUtils.formatCurrency(total, formData.currency)}.` }); setIsSubmitting(false); return; }
                if (splitParticipants.some(p => !(parseFloat(customAmounts[p.id]) > 0))) { setErrors({ general: 'Each participant must have an amount greater than 0.' }); setIsSubmitting(false); return; }
            }
        }
        try {
            let description = formData.description.trim();
            if (!description && selectedCategory) description = selectedCategory.name + ' - ' + formData.subcategory;
            if (editSplitGroup) {
                // Batch-update every existing record in the split group instead of creating new
                // ones — shared fields (date/category/currency/etc.) apply to all, and each
                // participant's own share is recalculated from the edited total.
                const sharedFields = { date: formData.date, description, categoryId: parseInt(formData.categoryId), subcategory: formData.subcategory, currency: formData.currency, tags: formData.tags };
                const totalAmt = parseFloat(formData.amount);
                const n = splitParticipants.length;
                const baseShare = Math.round(totalAmt / n * 100) / 100;
                splitParticipants.forEach((p, i) => {
                    const share = splitMethod === 'equal'
                        ? (i === n - 1 ? Math.round((totalAmt - baseShare * (n - 1)) * 100) / 100 : baseShare)
                        : parseFloat(customAmounts[p.id] || 0);
                    DataService.updateExpense(p.id, { ...sharedFields, amount: share, paidBy: p.name });
                });
                setShowSuccess(true);
                setTimeout(() => { onSave(); if (onCancel) onCancel(); }, 1000);
                setIsSubmitting(false);
                return;
            }
            const expenseData = { ...formData, description: description, amount: parseFloat(formData.amount), categoryId: parseInt(formData.categoryId) };
            if (editExpense) {
                if (isSplit && splitParticipants.length >= 2) {
                    // Converting a single expense into a new split — replace it with N split records
                    DataService.deleteExpense(editExpense.id);
                    const splitGroupId = 'split_' + Date.now();
                    const totalAmt = parseFloat(formData.amount);
                    const n = splitParticipants.length;
                    const baseShare = Math.round(totalAmt / n * 100) / 100;
                    splitParticipants.forEach((p, i) => {
                        const share = splitMethod === 'equal'
                            ? (i === n - 1 ? Math.round((totalAmt - baseShare * (n - 1)) * 100) / 100 : baseShare)
                            : parseFloat(customAmounts[p.id] || 0);
                        DataService.addExpenseWithConversion({ ...expenseData, amount: share, paidBy: p.name, splitGroupId, isSplitRecord: true });
                    });
                } else {
                    DataService.updateExpense(editExpense.id, expenseData);
                }
                if (isRecurring) { DataService.addRecurring({ templateExpense: expenseData, frequency: recurringFreq, endDate: recurringEndDate, type: 'expense' }); }
            } else if (isSplit && splitParticipants.length >= 2) {
                const splitGroupId = 'split_' + Date.now();
                const totalAmt = parseFloat(formData.amount);
                const n = splitParticipants.length;
                const baseShare = Math.round(totalAmt / n * 100) / 100;
                splitParticipants.forEach((p, i) => {
                    const share = splitMethod === 'equal'
                        ? (i === n - 1 ? Math.round((totalAmt - baseShare * (n - 1)) * 100) / 100 : baseShare)
                        : parseFloat(customAmounts[p.id] || 0);
                    DataService.addExpenseWithConversion({ ...expenseData, amount: share, paidBy: p.name, splitGroupId, isSplitRecord: true });
                });
                if (isRecurring) { DataService.addRecurring({ templateExpense: expenseData, frequency: recurringFreq, endDate: recurringEndDate, type: 'expense' }); }
            } else {
                DataService.addExpenseWithConversion(expenseData);
                if (isRecurring) { DataService.addRecurring({ templateExpense: expenseData, frequency: recurringFreq, endDate: recurringEndDate, type: 'expense' }); }
            }
            setShowSuccess(true);
            setTimeout(() => { onSave(); if (onCancel) onCancel(); }, 1000);
        } catch (error) { setErrors({ general: 'Failed to save expense. Please try again.' }); }
        setIsSubmitting(false);
    };

    const handleQuickFill = (recentExpense) => {
        setFormData(prev => ({ ...prev, amount: '', date: new Date().toISOString().split('T')[0], categoryId: recentExpense.categoryId, subcategory: recentExpense.subcategory, paidBy: recentExpense.paidBy || '' }));
    };

    const selectedCategory = categories.find(cat => cat.id === parseInt(formData.categoryId));

    if (showSuccess) {
        return (<div className="screen"><div className="success-message"><i className="fas fa-check-circle"></i><h3>Expense {editSplitGroup ? 'Split Updated' : editExpense ? 'Updated' : 'Added'} Successfully!</h3></div></div>);
    }

    return (
        <div className="screen">
            <div className="screen-header">
                <button onClick={onCancel} className="btn btn-outline-secondary"><i className="fas fa-arrow-left"></i> Back</button>
                <h2>{editSplitGroup ? 'Edit Split Expense (All Records)' : editExpense ? 'Edit Expense' : 'Add New Expense'}</h2>
            </div>
            {recentlyUsed.length > 0 && !editExpense && !editSplitGroup && (
                <div className="quick-fill-section">
                    <h6>Quick Fill from Recent:</h6>
                    <div className="quick-fill-buttons">
                        {recentlyUsed.map((item, index) => (
                            <button key={index} type="button" className="btn btn-sm btn-outline-primary" onClick={() => handleQuickFill({ categoryId: item.category.id, subcategory: item.subcategory })}>
                                {item.category.name} - {item.subcategory}
                            </button>
                        ))}
                    </div>
                </div>
            )}
            <form onSubmit={handleSubmit} className="expense-form">
                {errors.general && (<div className="alert alert-danger">{errors.general}</div>)}
                <div className="form-group">
                    <label htmlFor="currency">Currency *</label>
                    <select id="currency" className="form-select" value={formData.currency} onChange={(e) => handleInputChange('currency', e.target.value)}>
                        <option value="USD">US Dollar ($)</option>
                        <option value="GBP">British Pound (£)</option>
                        <option value="EUR">Euro (€)</option>
                        <option value="INR">Indian Rupee (₹)</option>
                    </select>
                </div>
                <div className="form-group">
                    <label htmlFor="amount">{editSplitGroup ? 'Total Amount *' : 'Amount *'}</label>
                    <div className="input-group">
                        <span className="input-group-text">{ValidationUtils.getCurrencySymbol(formData.currency)}</span>
                        <input type="number" id="amount" className={'form-control ' + (errors.amount ? 'is-invalid' : '')} value={formData.amount} onChange={(e) => handleInputChange('amount', e.target.value)} placeholder="0.00" step="0.01" min="0" />
                    </div>
                    {errors.amount && <div className="invalid-feedback d-block">{errors.amount}</div>}
                </div>
                <div className="form-group">
                    <label htmlFor="date">Date *</label>
                    <input type="date" id="date" className={'form-control ' + (errors.date ? 'is-invalid' : '')} value={formData.date} onChange={(e) => handleInputChange('date', e.target.value)} max={new Date().toISOString().split('T')[0]} />
                    {errors.date && <div className="invalid-feedback">{errors.date}</div>}
                </div>
                <div className="form-group">
                    <label htmlFor="description">Description (Optional)</label>
                    <input type="text" id="description" className={'form-control ' + (errors.description ? 'is-invalid' : '')} value={formData.description} onChange={(e) => handleInputChange('description', e.target.value)} placeholder="Enter expense description" />
                    {errors.description && <div className="invalid-feedback">{errors.description}</div>}
                    <div className="form-text">Leave empty to auto-generate from category and subcategory</div>

                <div className="form-group">

                    {errors.tags && <div className="invalid-feedback">{errors.tags}</div>}

                        </div>

                </div>
                <div className="form-group">

                    <select id="category" className={'form-select ' + (errors.categoryId ? 'is-invalid' : '')} value={formData.categoryId} onChange={(e) => handleInputChange('categoryId', e.target.value)}>

                        <select id="subcategory" className={'form-select ' + (errors.subcategory ? 'is-invalid' : '')} value={formData.subcategory} onChange={(e) => handleInputChange('subcategory', e.target.value)}>
                            <option value="">Select a subcategory</option>
                            {selectedCategory.subcategories.map(sub => (<option key={sub} value={sub}>{sub}</option>))}
                        </select>
                        {errors.subcategory && <div className="invalid-feedback">{errors.subcategory}</div>}
                    </div>
                )}
                {!editSplitGroup && (
                    <div className="form-group">
                        <label htmlFor="paidBy">Who's Expense (Optional)</label>
                        {people.length > 0 ? (
                            <select id="paidBy" className={'form-select ' + (errors.paidBy ? 'is-invalid' : '')} value={formData.paidBy} onChange={(e) => handleInputChange('paidBy', e.target.value)}>
                                <option value="">— Me / My Own —</option>
                                {people.map(p => (<option key={p.id} value={p.name}>{p.name}</option>))}
                            </select>
                        ) : (
                            <input type="text" id="paidBy" className={'form-control ' + (errors.paidBy ? 'is-invalid' : '')} value={formData.paidBy} onChange={(e) => handleInputChange('paidBy', e.target.value)} placeholder="e.g., John, Mary, Shared" />
                        )}
                        {errors.paidBy && <div className="invalid-feedback">{errors.paidBy}</div>}
                        <div className="form-text">{people.length > 0 ? 'Select who paid for this expense' : 'Enter who paid for this expense (leave empty if it\'s your own)'}</div>
                    </div>
                )}
                <div className="form-group">
                    {!editSplitGroup && (
                        <div className="form-check">
                            <input className="form-check-input" type="checkbox" id="isSplit" checked={isSplit} onChange={e => {
                                    const val = e.target.checked;
                                    setIsSplit(val);
                                    if (val && splitParticipants.length === 0) {
                                        setSplitParticipants([{ id: 'me', name: formData.paidBy || 'Me' }]);
                                    }
                                }} />
                                <label className="form-check-label" htmlFor="isSplit"><i className="fas fa-users me-1"></i>Split this expense between people</label>
                            </div>
                        )}
                        {editSplitGroup && (
                            <div className="fw-semibold small text-uppercase text-muted"><i className="fas fa-users me-1"></i>Split Participants (shares recalculated on save)</div>
                        )}
                        {isSplit && (
                            <div className="mt-3 p-3 border rounded" style={{backgroundColor: '#f8f9fa'}}>
                                <div className="mb-2 fw-semibold small text-uppercase text-muted">Participants</div>
                                {splitParticipants.map(p => (
                                    <div key={p.id} className="d-flex justify-content-between align-items-center mb-1">
                                        <span className="small">{p.name}{p.id === 'me' ? <span className="text-muted"> (you)</span> : ''}</span>
                                        {!editSplitGroup && p.id !== 'me' && (
                                            <button type="button" className="btn btn-sm btn-outline-danger py-0 px-1" style={{lineHeight:'1.2'}} onClick={() => { setSplitParticipants(prev => prev.filter(x => x.id !== p.id)); setCustomAmounts(prev => { const n = {...prev}; delete n[p.id]; return n; }); }}><i className="fas fa-times"></i></button>
                                        )}
                                    </div>
                                ))}
                                {!editSplitGroup && people.filter(p => !splitParticipants.find(s => s.name === p.name)).length > 0 && (
                                    <select className="form-select form-select-sm mt-2 mb-2" value="" onChange={e => { const person = people.find(p => p.name === e.target.value); if (person) setSplitParticipants(prev => [...prev, { id: person.id, name: person.name }]); }}>
                                        <option value="">+ Add person to split...</option>
                                        {people.filter(p => !splitParticipants.find(s => s.name === p.name)).map(p => (<option key={p.id} value={p.name}>{p.name}</option>))}
                                    </select>
                                )}
                                {splitParticipants.length < 2 && <div className="text-warning small mt-1"><i className="fas fa-exclamation-triangle me-1"></i>At least 2 participants required</div>}
                                <div className="mt-3 mb-2 fw-semibold small text-uppercase text-muted">Split Method</div>
                                <div className="d-flex gap-2 mb-3">
                                    <button type="button" className={'btn btn-sm ' + (splitMethod === 'equal' ? 'btn-primary' : 'btn-outline-secondary')} onClick={() => setSplitMethod('equal')}>Equal Split</button>
                                    <button type="button" className={'btn btn-sm ' + (splitMethod === 'custom' ? 'btn-primary' : 'btn-outline-secondary')} onClick={() => setSplitMethod('custom')}>Custom Amounts</button>
                                </div>
                                {splitMethod === 'equal' && splitParticipants.length >= 1 && (
                                    <div className="small text-muted">Each person pays: <strong>{ValidationUtils.formatCurrency(parseFloat(formData.amount || 0) / Math.max(splitParticipants.length, 1), formData.currency)}</strong></div>
                                )}
                                {splitMethod === 'custom' && (
                                    <div>
                                        {splitParticipants.map(p => (
                                            <div key={p.id} className="d-flex align-items-center gap-2 mb-2">
                                                <label className="small mb-0" style={{minWidth: '80px', flexShrink: 0}}>{p.name}</label>
                                                <div className="input-group input-group-sm">
                                                    <span className="input-group-text">{ValidationUtils.getCurrencySymbol(formData.currency)}</span>
                                                    <input type="number" className="form-control" placeholder="0.00" step="0.01" min="0" value={customAmounts[p.id] || ''} onChange={e => setCustomAmounts(prev => ({ ...prev, [p.id]: e.target.value }))} />
                                                </div>
                                            </div>
                                        ))}
                                        {(() => {
                                            const total = splitParticipants.reduce((sum, p) => sum + (parseFloat(customAmounts[p.id]) || 0), 0);
                                            const target = parseFloat(formData.amount || 0);
                                            const match = Math.abs(total - target) < 0.01;
                                            const over = total > target + 0.01;
                                            return (<div className={'small fw-semibold ' + (match ? 'text-success' : over ? 'text-danger' : 'text-muted')}>Split total: {ValidationUtils.formatCurrency(total, formData.currency)} of {ValidationUtils.formatCurrency(target, formData.currency)}{match && ' ✓'}</div>);
                                        })()}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                {!editSplitGroup && (
                    <div className="form-group">
                        <div className="form-check">
                            <input className="form-check-input" type="checkbox" id="isRecurring" checked={isRecurring} onChange={e => setIsRecurring(e.target.checked)} />
                            <label className="form-check-label" htmlFor="isRecurring"><i className="fas fa-redo me-1"></i>Make this a recurring expense</label>
                        </div>
                        {isRecurring && (
                            <div className="mt-2">
                                <select className="form-select mb-2" value={recurringFreq} onChange={e => setRecurringFreq(e.target.value)}>
                                    <option value="daily">Daily</option>
                                    <option value="weekly">Weekly</option>
                                    <option value="monthly">Monthly</option>
                                    <option value="yearly">Yearly</option>
                                </select>
                                <label className="form-label small text-muted">End Date (Optional)</label>
                                <input type="date" className="form-control" value={recurringEndDate} min={new Date().toISOString().split('T')[0]} onChange={e => setRecurringEndDate(e.target.value)} />
                            </div>
                        )}
                    </div>
                )}
                <div className="form-actions">
                    <button type="button" className="btn btn-secondary" onClick={onCancel} disabled={isSubmitting}>Cancel</button>
                    <button type="submit" className="btn btn-primary" disabled={isSubmitting}>
                        {isSubmitting ? (<><span className="spinner-border spinner-border-sm me-2"></span>{editExpense || editSplitGroup ? 'Updating...' : 'Adding...'}</>) : (<><i className="fas fa-save me-2"></i>{editSplitGroup ? 'Update All Split Records' : editExpense ? 'Update Expense' : 'Add Expense'}</>)}
                    </button>
                </div>
            </form>
        </div>
    );
}

function ExpenseList({ expenses, categories, onUpdate, initialDateFrom = '', initialDateTo = '', initialPaidBy = '' }) {
    const [filterCategory, setFilterCategory] = useState('');
    const [filterSubcategory, setFilterSubcategory] = useState('');
    const [filterPerson, setFilterPerson] = useState(initialPaidBy || '');
    const [filterDateFrom, setFilterDateFrom] = useState(initialDateFrom || '');
    const [filterDateTo, setFilterDateTo] = useState(initialDateTo || '');
    const [editingExpense, setEditingExpense] = useState(null);
    const [editingSplitGroupId, setEditingSplitGroupId] = useState(null);
    const [showEditConfirm, setShowEditConfirm] = useState(null);
    const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
    const [searchTerm, setSearchTerm] = useState('');
    const [people, setPeople] = useState([]);
    const [duplicatingExpense, setDuplicatingExpense] = useState(null);
    const [duplicateDate, setDuplicateDate] = useState('today');
    const [duplicateCustomDate, setDuplicateCustomDate] = useState('');
    const [duplicateDateError, setDuplicateDateError] = useState('');
    const [filterTags, setFilterTags] = useState([]);
    const [visibleCount, setVisibleCount] = useState(50);
    const [showClearAllConfirm, setShowClearAllConfirm] = useState(false);
    const [openMenuId, setOpenMenuId] = useState(null);

    useEffect(() => { setPeople(DataService.getPeople()); }, [expenses]);

    useEffect(() => {
        if (!openMenuId) return;
        const close = () => setOpenMenuId(null);
        document.addEventListener('click', close);
        return () => document.removeEventListener('click', close);
    }, [openMenuId]);

    const filteredExpenses = useMemo(() => {
        let filtered = expenses;
        if (filterCategory) filtered = filtered.filter(expense => expense.categoryId === parseInt(filterCategory));
        if (filterSubcategory) filtered = filtered.filter(expense => expense.subcategory === filterSubcategory);
        if (filterPerson === '__mine__') filtered = filtered.filter(expense => !(expense.paidBy || '').trim());
        else if (filterPerson) filtered = filtered.filter(expense => (expense.paidBy || '').trim() === filterPerson.trim());
        if (filterDateFrom) filtered = filtered.filter(expense => (expense.date || '').substring(0, 10) >= filterDateFrom);
        if (filterDateTo) filtered = filtered.filter(expense => (expense.date || '').substring(0, 10) <= filterDateTo);
        if (searchTerm) { const st = searchTerm.toLowerCase(); filtered = filtered.filter(e => (e.description || '').toLowerCase().includes(st) || (e.tags || []).some(tag => tag.includes(st))); }
        if (filterTags.length > 0) filtered = filtered.filter(e => filterTags.every(ft => (e.tags || []).includes(ft)));
        return filtered;
    }, [expenses, filterCategory, filterSubcategory, filterPerson, filterDateFrom, filterDateTo, searchTerm, filterTags]);

    useEffect(() => { setVisibleCount(50); }, [filteredExpenses]);

    const visibleExpenses = filteredExpenses.slice(0, visibleCount);

    const handleCategoryFilter = (categoryId) => { setFilterCategory(categoryId); setFilterSubcategory(''); };
    const handleDeleteExpense = (expenseId) => { DataService.deleteExpense(expenseId); setShowDeleteConfirm(null); onUpdate(); };
    const handleDeleteSplitGroup = (splitGroupId) => { DataService.deleteExpensesBySplitGroup(splitGroupId); setShowDeleteConfirm(null); onUpdate(); };
    const deletingExpense = showDeleteConfirm ? expenses.find(e => e.id === showDeleteConfirm) : null;
    const deletingIsSplit = !!(deletingExpense && deletingExpense.isSplitRecord && deletingExpense.splitGroupId);
    const editConfirmExpense = showEditConfirm ? expenses.find(e => e.id === showEditConfirm) : null;
    const handleDuplicateExpense = (expense) => { setDuplicatingExpense(expense); setDuplicateDate('today'); setDuplicateCustomDate(''); setDuplicateDateError(''); };
    const handleConfirmDuplicate = () => {
        const today = new Date().toISOString().split('T')[0];
        let chosenDate;
        if (duplicateDate === 'original') chosenDate = duplicatingExpense.date;
        else if (duplicateDate === 'today') chosenDate = today;
        else { if (!duplicateCustomDate) { setDuplicateDateError('Please pick a date.'); return; } chosenDate = duplicateCustomDate; }
        if (chosenDate > today) { setDuplicateDateError('Duplicate date cannot be in the future.'); return; }
        const newRecord = { ...duplicatingExpense, id: DataService._uniqueId(), createdAt: new Date().toISOString(), date: chosenDate, description: duplicatingExpense.description + ' (Copy)' };
        DataService.addExpense(newRecord); onUpdate(); setDuplicatingExpense(null);
    };
    const getCategoryName = (categoryId) => { const category = categories.find(cat => cat.id === categoryId); return category ? category.name : 'Unknown Category'; };
    const getCategoryColor = (name) => {
        const palette = ['#4a6cf7','#e67e22','#2ecc71','#e74c3c','#9b59b6','#1abc9c','#f39c12','#3498db','#e91e63','#00bcd4','#ff5722','#607d8b'];
        let h = 0;
        for (let i = 0; i < (name||'').length; i++) h = (h * 31 + (name||'').charCodeAt(i)) & 0xffff;
        return palette[h % palette.length];
    };
    const selectedCategory = categories.find(cat => cat.id === parseInt(filterCategory));
    const expensesByCurrency = filteredExpenses.reduce((acc, expense) => { const currency = expense.currency || 'USD'; if (!acc[currency]) acc[currency] = { total: 0, count: 0 }; acc[currency].total += expense.amount; acc[currency].count += 1; return acc; }, {});

    if (editingExpense) {
        return (<ExpenseForm categories={categories} editExpense={editingExpense} onSave={() => { setEditingExpense(null); onUpdate(); }} onCancel={() => setEditingExpense(null)} />);
    }
    if (editingSplitGroupId) {
        const groupRecords = expenses.filter(e => e.splitGroupId === editingSplitGroupId);
        return (<ExpenseForm categories={categories} editSplitGroup={groupRecords} onSave={() => { setEditingSplitGroupId(null); onUpdate(); }} onCancel={() => setEditingSplitGroupId(null)} />);
    }

    return (
        <div className="screen">
            <div className="screen-header">
                <h2>Expense History</h2>
                {expenses.length > 0 && (
                    <button className="btn btn-sm btn-outline-danger" onClick={() => setShowClearAllConfirm(true)} title="Delete all expenses">
                        <i className="fas fa-trash-alt me-1"></i>Clear All
                    </button>
                )}
                <div className="expense-totals">
                    {Object.keys(expensesByCurrency).length === 1 ? (
                        <div className="expense-total">Total: {ValidationUtils.formatCurrency(Object.values(expensesByCurrency)[0].total, Object.keys(expensesByCurrency)[0])}</div>
                    ) : (
                        <div className="expense-total-multi">
                            {Object.entries(expensesByCurrency).map(([currency, data]) => (<div key={currency} className="expense-total-item">{ValidationUtils.formatCurrency(data.total, currency)}</div>))}
                        </div>
                    )}
                </div>
            </div>
            <div className="filters-section">
                <div className="search-box">
                    <div className="input-group">
                        <span className="input-group-text"><i className="fas fa-search"></i></span>
                        <input type="text" className="form-control" placeholder="Search expenses..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                    </div>
                </div>
                <div className="filter-row">
                    <select className="form-select" value={filterCategory} onChange={(e) => handleCategoryFilter(e.target.value)}>
                        <option value="">All Categories</option>
                        {categories.map(category => (<option key={category.id} value={category.id}>{category.name}</option>))}
                    </select>
                    {selectedCategory && selectedCategory.subcategories.length > 0 && (
                        <select className="form-select" value={filterSubcategory} onChange={(e) => setFilterSubcategory(e.target.value)}>
                            <option value="">All Subcategories</option>
                            {selectedCategory.subcategories.map(sub => (<option key={sub} value={sub}>{sub}</option>))}
                        </select>
                    )}
                    <select className="form-select" value={filterPerson} onChange={(e) => setFilterPerson(e.target.value)}>
                        <option value="">All People</option>
                        <option value="__mine__">My Expenses Only</option>
                        {[...new Set([...people.map(p => p.name), ...expenses.map(e => e.paidBy).filter(Boolean)])].sort().map(name => (<option key={name} value={name}>{name}</option>))}
                    </select>
                </div>
                {(() => { const allTags = [...new Set(expenses.flatMap(e => e.tags || []))].sort(); return allTags.length > 0 ? (
                    <div className="filter-row" style={{flexDirection:'column',alignItems:'flex-start',gap:'6px'}}>
                        <select className="form-select form-select-sm" style={{width:'auto',minWidth:'170px'}} value="" onChange={(e) => { if (e.target.value) setFilterTags(prev => prev.includes(e.target.value) ? prev : [...prev, e.target.value]); }}>
                            <option value="">Filter by tag…</option>
                            {allTags.filter(t => !filterTags.includes(t)).map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        {filterTags.length > 0 && (
                            <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                                {filterTags.map(t => <span key={t} className="badge bg-secondary" style={{fontSize:'0.75rem',cursor:'pointer'}} onClick={() => setFilterTags(prev => prev.filter(x => x !== t))} title="Remove filter">{t} ✕</span>)}
                            </div>
                        )}
                    </div>
                ) : null; })()}
                <div className="filter-row">
                    <input type="date" className="form-control" title="From Date" value={filterDateFrom} onChange={(e) => setFilterDateFrom(e.target.value)} />
                    <input type="date" className="form-control" title="To Date" value={filterDateTo} onChange={(e) => setFilterDateTo(e.target.value)} />
                </div>
                {(filterCategory || filterSubcategory || filterPerson || filterDateFrom || filterDateTo || searchTerm || filterTags.length > 0) && (
                    <button className="btn btn-sm btn-outline-secondary" onClick={() => { setFilterCategory(''); setFilterSubcategory(''); setFilterPerson(''); setFilterDateFrom(''); setFilterDateTo(''); setSearchTerm(''); setFilterTags([]); }}>
                        <i className="fas fa-times me-1"></i>Clear Filters
                    </button>
                )}
            </div>
            <div className="expense-list">
                {filteredExpenses.length === 0 ? (
                    <div className="empty-state"><i className="fas fa-receipt fa-3x"></i><h4>No expenses found</h4><p>{expenses.length === 0 ? "Start by adding your first expense!" : "Try adjusting your filters or search term."}</p></div>
                ) : (
                    visibleExpenses.map(expense => {
                        const catName = getCategoryName(expense.categoryId);
                        const metaParts = [catName, expense.subcategory, ValidationUtils.formatDate(expense.date)];
                        if (expense.paidBy) metaParts.push(expense.paidBy);
                        return (
                        <div key={expense.id} className="expense-item">
                            <div className="expense-avatar" style={{background: getCategoryColor(catName)}}>
                                {catName.charAt(0).toUpperCase()}
                            </div>
                            <div className="expense-info">
                                <div className="expense-description">
                                    {expense.isSplitRecord && <span className="badge bg-info me-1" style={{fontSize:'0.65em'}}><i className="fas fa-users me-1"></i>Split</span>}
                                    {expense.description}
                                </div>
                                <div className="expense-meta">
                                    {metaParts.join(' · ')}
                                    {expense.tags && expense.tags.map(tag => (
                                        <span key={tag} className="expense-tag-pill">{tag}</span>
                                    ))}
                                </div>
                            </div>
                            <div className="expense-right">
                                <div className="expense-amount">{ValidationUtils.formatCurrency(expense.amount, expense.currency || 'USD')}</div>
                                <div className="expense-menu-wrap">
                                    <button className="expense-menu-btn" title="Actions"
                                        onClick={(e) => { e.stopPropagation(); setOpenMenuId(openMenuId === expense.id ? null : expense.id); }}>
                                        <i className="fas fa-ellipsis-v"></i>
                                    </button>
                                    {openMenuId === expense.id && (
                                        <div className="expense-menu-dropdown">
                                            <button onClick={() => { if (expense.isSplitRecord && expense.splitGroupId) { setShowEditConfirm(expense.id); } else { setEditingExpense(expense); } setOpenMenuId(null); }}><i className="fas fa-edit"></i>Edit</button>
                                            <button onClick={() => { handleDuplicateExpense(expense); setOpenMenuId(null); }}><i className="fas fa-copy"></i>Duplicate</button>
                                            <button className="danger" onClick={() => { setShowDeleteConfirm(expense.id); setOpenMenuId(null); }}><i className="fas fa-trash"></i>Delete</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        );
                    })
                )}
            </div>
            {visibleCount < filteredExpenses.length && (
                <div className="text-center py-3">
                    <button className="btn btn-outline-primary" onClick={() => setVisibleCount(c => c + 50)}>
                        <i className="fas fa-chevron-down me-2"></i>Load more ({filteredExpenses.length - visibleCount} remaining)
                    </button>
                </div>
            )}
            {duplicatingExpense && (
                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title"><i className="fas fa-copy me-2"></i>Duplicate Expense</h5></div>
                            <div className="modal-body">
                                <p className="text-muted mb-3"><strong>{duplicatingExpense.description}</strong></p>
                                <p className="mb-2">Choose a date for the duplicate:</p>
                                <div className="form-check mb-2">
                                    <input className="form-check-input" type="radio" name="dupDate" id="dupToday" checked={duplicateDate === 'today'} onChange={() => { setDuplicateDate('today'); setDuplicateDateError(''); }} />
                                    <label className="form-check-label" htmlFor="dupToday">Use today</label>
                                </div>
                                <div className="form-check mb-2">
                                    <input className="form-check-input" type="radio" name="dupDate" id="dupOriginal" checked={duplicateDate === 'original'} onChange={() => { setDuplicateDate('original'); setDuplicateDateError(''); }} />
                                    <label className="form-check-label" htmlFor="dupOriginal">Keep original date ({ValidationUtils.formatDate(duplicatingExpense.date)})</label>
                                </div>
                                <div className="form-check mb-2">
                                    <input className="form-check-input" type="radio" name="dupDate" id="dupCustom" checked={duplicateDate === 'custom'} onChange={() => { setDuplicateDate('custom'); setDuplicateDateError(''); }} />
                                    <label className="form-check-label" htmlFor="dupCustom">Pick a date</label>
                                </div>
                                {duplicateDate === 'custom' && (
                                    <input type="date" className="form-control mt-2" value={duplicateCustomDate} max={new Date().toISOString().split('T')[0]} onChange={(e) => { setDuplicateCustomDate(e.target.value); setDuplicateDateError(''); }} />
                                )}
                                {duplicateDateError && <div className="text-danger mt-2 small">{duplicateDateError}</div>}
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={() => setDuplicatingExpense(null)}>Cancel</button>
                                <button type="button" className="btn btn-success" onClick={handleConfirmDuplicate}><i className="fas fa-copy me-1"></i>Duplicate</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
            {showDeleteConfirm && (
                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title">Confirm Delete</h5></div>
                            <div className="modal-body">
                                {deletingIsSplit
                                    ? <p>This expense is part of a split. Delete just your share, or all split records for this expense?</p>
                                    : <p>Are you sure you want to delete this expense? This action cannot be undone.</p>}
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={() => setShowDeleteConfirm(null)}>Cancel</button>
                                {deletingIsSplit ? (
                                    <>
                                        <button type="button" className="btn btn-outline-danger" onClick={() => handleDeleteExpense(showDeleteConfirm)}>Delete just your share</button>
                                        <button type="button" className="btn btn-danger" onClick={() => handleDeleteSplitGroup(deletingExpense.splitGroupId)}>Delete all split records</button>
                                    </>
                                ) : (
                                    <button type="button" className="btn btn-danger" onClick={() => handleDeleteExpense(showDeleteConfirm)}>Delete</button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            )}
            {showEditConfirm && editConfirmExpense && (
                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title">Edit Split Expense</h5></div>
                            <div className="modal-body">
                                <p>This expense is part of a split. Edit just this record, or edit all records in this split (recalculates everyone's share)?</p>
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={() => setShowEditConfirm(null)}>Cancel</button>
                                <button type="button" className="btn btn-outline-primary" onClick={() => { setEditingExpense(editConfirmExpense); setShowEditConfirm(null); }}>Edit just this record</button>
                                <button type="button" className="btn btn-primary" onClick={() => { setEditingSplitGroupId(editConfirmExpense.splitGroupId); setShowEditConfirm(null); }}>Edit all records in this split</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
            {showClearAllConfirm && (
                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.6)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header border-danger">
                                <h5 className="modal-title text-danger"><i className="fas fa-exclamation-triangle me-2"></i>Delete All Expenses?</h5>
                            </div>
                            <div className="modal-body">
                                <p>You are about to permanently delete <strong>all {expenses.length} expense{expenses.length !== 1 ? 's' : ''}</strong>.</p>
                                <p className="text-danger mb-0"><strong>This cannot be undone.</strong></p>
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={() => setShowClearAllConfirm(false)}>Cancel</button>
                                <button type="button" className="btn btn-danger" onClick={() => { DataService.clearAllExpenses(); setShowClearAllConfirm(false); onUpdate(); }}>
                                    <i className="fas fa-trash-alt me-1"></i>Delete All
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

function CategoryManager({ categories, onUpdate, defaultCurrency }) {
    const [editingCategory, setEditingCategory] = useState(null);
    const [newCategoryName, setNewCategoryName] = useState('');
    const [newSubcategoryName, setNewSubcategoryName] = useState('');
    const [addingSubcategoryTo, setAddingSubcategoryTo] = useState(null);
    const [errors, setErrors] = useState({});
    const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
    const [showBudgets, setShowBudgets] = useState(false);
    const [budgetChanges, setBudgetChanges] = useState({});
    const [categoryBudgetModes, setCategoryBudgetModes] = useState(() => {
        const modes = {};
        categories.forEach(cat => { if (cat.useSubcategoryBudgets) modes[cat.id] = true; });
        return modes;
    });
    const hasBudgetCurrencyMismatch = categories.some(cat => cat.budgetCurrency && cat.budgetCurrency !== defaultCurrency && (cat.monthlyBudget > 0 || (cat.subcategoryBudgets && Object.values(cat.subcategoryBudgets).some(v => v > 0))));
    const handleResetAllBudgets = async () => { try { await DataService.resetAllBudgets(defaultCurrency); onUpdate(); } catch (error) { setErrors({ budget: 'Failed to reset budgets' }); } };

    const handleAddCategory = (e) => { e.preventDefault(); const validation = ValidationUtils.validateCategory({ name: newCategoryName }); if (!validation.isValid) { setErrors(validation.errors); return; } const existingCategory = categories.find(cat => cat.name.toLowerCase() === newCategoryName.trim().toLowerCase()); if (existingCategory) { setErrors({ name: 'Category name already exists' }); return; } DataService.addCategory({ name: newCategoryName.trim() }); setNewCategoryName(''); setErrors({}); onUpdate(); };
    const handleUpdateCategory = (categoryId, newName) => { const validation = ValidationUtils.validateCategory({ name: newName }); if (!validation.isValid) { setErrors({ [categoryId]: validation.errors.name }); return; } const existingCategory = categories.find(cat => cat.id !== categoryId && cat.name.toLowerCase() === newName.trim().toLowerCase()); if (existingCategory) { setErrors({ [categoryId]: 'Category name already exists' }); return; } DataService.updateCategory(categoryId, { name: newName.trim() }); setEditingCategory(null); setErrors({}); onUpdate(); };
    const handleDeleteCategory = async (categoryId) => { const expensesUsingCategory = await DataService.getExpensesByCategory(categoryId); if (expensesUsingCategory.length > 0) { setErrors({ delete: `Cannot delete category. It's being used by ${expensesUsingCategory.length} expense(s).` }); setShowDeleteConfirm(null); return; } await DataService.deleteCategory(categoryId); setShowDeleteConfirm(null); setErrors({}); onUpdate(); };
    const handleAddSubcategory = (categoryId) => { if (!newSubcategoryName.trim()) { setErrors({ subcategory: 'Subcategory name is required' }); return; } const category = categories.find(cat => cat.id === categoryId); if (category.subcategories.includes(newSubcategoryName.trim())) { setErrors({ subcategory: 'Subcategory already exists' }); return; } DataService.addSubcategory(categoryId, newSubcategoryName.trim()); setNewSubcategoryName(''); setAddingSubcategoryTo(null); setErrors({}); onUpdate(); };
    const handleDeleteSubcategory = async (categoryId, subcategoryName) => { const expensesUsingSubcategory = await DataService.getExpensesByCategory(categoryId, subcategoryName); if (expensesUsingSubcategory.length > 0) { setErrors({ delete: `Cannot delete subcategory. It's being used by ${expensesUsingSubcategory.length} expense(s).` }); return; } await DataService.removeSubcategory(categoryId, subcategoryName); setErrors({}); onUpdate(); };
    const handleBudgetChange = (categoryId, type, subcategory, value) => { const key = type === 'category' ? 'cat-' + categoryId : 'sub-' + categoryId + '-' + subcategory; setBudgetChanges(prev => ({ ...prev, [key]: value })); };
    const handleThresholdChange = (categoryId, value) => { setBudgetChanges(prev => ({ ...prev, ['threshold-' + categoryId]: value })); };
    const getCurrentThresholdValue = (categoryId) => { const key = 'threshold-' + categoryId; if (budgetChanges[key] !== undefined) return budgetChanges[key]; const category = categories.find(c => c.id === categoryId); return (category && category.notificationThreshold) || 80; };
    const saveBudgetChanges = async () => { try { for (const [key, value] of Object.entries(budgetChanges)) { if (key.startsWith('cat-')) { const categoryId = parseInt(key.replace('cat-', '')); await DataService.setCategoryBudget(categoryId, value, defaultCurrency); } else if (key.startsWith('threshold-')) { const categoryId = parseInt(key.replace('threshold-', '')); const clamped = Math.min(100, Math.max(50, parseInt(value) || 80)); await DataService.updateCategory(categoryId, { notificationThreshold: clamped }); } else if (key.startsWith('sub-')) { const parts = key.replace('sub-', '').split('-'); const categoryId = parseInt(parts[0]); const subcategory = parts.slice(1).join('-'); await DataService.setSubcategoryBudget(categoryId, subcategory, value, defaultCurrency); } } await onUpdate(); setBudgetChanges({}); } catch (error) { setErrors({ budget: 'Failed to save budget changes' }); } };
    const toggleBudgetMode = async (categoryId) => { const newMode = !categoryBudgetModes[categoryId]; setCategoryBudgetModes(prev => ({ ...prev, [categoryId]: newMode })); await DataService.updateCategory(categoryId, { useSubcategoryBudgets: newMode }); const keysToRemove = Object.keys(budgetChanges).filter(key => key.startsWith('cat-' + categoryId) || key.startsWith('sub-' + categoryId + '-')); setBudgetChanges(prev => { const updated = { ...prev }; keysToRemove.forEach(key => delete updated[key]); return updated; }); onUpdate(); };
    const getCurrentBudgetValue = (categoryId, type, subcategory) => { const key = type === 'category' ? 'cat-' + categoryId : 'sub-' + categoryId + '-' + subcategory; if (budgetChanges[key] !== undefined) return budgetChanges[key]; const category = categories.find(c => c.id === categoryId); if (!category) return ''; if (type === 'category') return category.monthlyBudget || ''; else return (category.subcategoryBudgets && category.subcategoryBudgets[subcategory]) || ''; };
    const hasUnsavedChanges = Object.keys(budgetChanges).length > 0;
    const getCategoryTotalBudget = (category) => { if (categoryBudgetModes[category.id]) { return category.subcategories.reduce((sum, sub) => sum + (parseFloat(getCurrentBudgetValue(category.id, 'subcategory', sub)) || 0), 0); } return parseFloat(getCurrentBudgetValue(category.id, 'category')) || 0; };
    const totalBudget = categories.reduce((sum, category) => sum + getCategoryTotalBudget(category), 0);

    return (
        <div className="screen">
            <div className="screen-header">
                <h2>Category Management & Budgets</h2>
                {hasUnsavedChanges && (<button className="btn btn-success btn-sm" onClick={saveBudgetChanges}><i className="fas fa-save"></i> Save Budget Changes</button>)}
            </div>
            {errors.delete && (<div className="alert alert-danger">{errors.delete}</div>)}
            {hasBudgetCurrencyMismatch && (
                <div className="alert alert-warning d-flex align-items-center justify-content-between" style={{marginBottom: '1rem'}}>
                    <div><i className="fas fa-exclamation-triangle me-2"></i>Budgets were set in a different currency. Reset all to {defaultCurrency}?</div>
                    <button className="btn btn-warning btn-sm ms-2" onClick={handleResetAllBudgets}><i className="fas fa-sync-alt me-1"></i>Reset All Budgets</button>
                </div>
            )}
            <div className="add-category-section">
                <h5>Add New Category</h5>
                <form onSubmit={handleAddCategory} className="add-form">
                    <div className="input-group">
                        <input type="text" className={'form-control ' + (errors.name ? 'is-invalid' : '')} value={newCategoryName} onChange={(e) => { setNewCategoryName(e.target.value); if (errors.name) setErrors(prev => ({ ...prev, name: '' })); }} placeholder="Enter category name" />
                        <button type="submit" className="btn btn-primary"><i className="fas fa-plus"></i> Add</button>
                    </div>
                    {errors.name && <div className="invalid-feedback d-block">{errors.name}</div>}
                </form>
            </div>
            <div className="categories-list">
                {categories.length === 0 ? (
                    <div className="empty-state"><i className="fas fa-tags fa-3x"></i><h4>No categories found</h4><p>Start by adding your first category!</p></div>
                ) : (
                    categories.map(category => (
                        <div key={category.id} className="category-item">
                            <div className="category-header">
                                {editingCategory === category.id ? (
                                    <div className="edit-category-form">
                                        <input type="text" className={'form-control ' + (errors[category.id] ? 'is-invalid' : '')} defaultValue={category.name} onBlur={(e) => handleUpdateCategory(category.id, e.target.value)} onKeyPress={(e) => { if (e.key === 'Enter') handleUpdateCategory(category.id, e.target.value); }} autoFocus />
                                        {errors[category.id] && (<div className="invalid-feedback d-block">{errors[category.id]}</div>)}
                                    </div>
                                ) : (
                                    <div className="category-info"><h6>{category.name}</h6><span className="subcategory-count">{category.subcategories.length} subcategories</span></div>
                                )}
                                <div className="category-actions">
                                    <button className="btn btn-sm btn-outline-primary" onClick={() => setEditingCategory(editingCategory === category.id ? null : category.id)} title="Edit"><i className="fas fa-edit"></i></button>
                                    <button className="btn btn-sm btn-outline-success" onClick={() => setAddingSubcategoryTo(addingSubcategoryTo === category.id ? null : category.id)} title="Add Subcategory"><i className="fas fa-plus"></i></button>
                                    <button className="btn btn-sm btn-outline-danger" onClick={() => setShowDeleteConfirm(category.id)} title="Delete"><i className="fas fa-trash"></i></button>
                                </div>
                            </div>
                            <div className="category-budget-inline">
                                {category.subcategories.length > 0 && (
                                    <div className="budget-mode-toggle">
                                        <div className="form-check">
                                            <input type="checkbox" className="form-check-input" id={'budget-mode-' + category.id} checked={categoryBudgetModes[category.id] || false} onChange={() => toggleBudgetMode(category.id)} />
                                            <label className="form-check-label" htmlFor={'budget-mode-' + category.id}>Use subcategory-level budgets</label>
                                        </div>
                                    </div>
                                )}
                                {!categoryBudgetModes[category.id] && (
                                    <div className="budget-input-row">
                                        <label className="budget-label"><i className="fas fa-calculator"></i> Category Budget:</label>
                                        <div className="input-group input-group-sm budget-input">
                                            <span className="input-group-text">{ValidationUtils.getCurrencySymbol(hasBudgetCurrencyMismatch && category.budgetCurrency ? category.budgetCurrency : defaultCurrency)}</span>
                                            <input type="number" className="form-control" value={getCurrentBudgetValue(category.id, 'category')} onChange={(e) => handleBudgetChange(category.id, 'category', null, e.target.value)} placeholder="0.00" step="0.01" min="0" disabled={hasBudgetCurrencyMismatch} />
                                        </div>
                                    </div>
                                )}
                                {categoryBudgetModes[category.id] && category.subcategories.length > 0 && (
                                    <div className="subcategory-budgets">
                                        <div className="subcategory-budget-header"><h6>Subcategory Budgets:</h6></div>
                                        {category.subcategories.map(subcategory => {
                                            const subBudgetCurrency = hasBudgetCurrencyMismatch && category.subcategoryBudgetCurrencies && category.subcategoryBudgetCurrencies[subcategory] ? category.subcategoryBudgetCurrencies[subcategory] : defaultCurrency;
                                            return (
                                            <div key={subcategory} className="budget-input-row subcategory-budget-row">
                                                <label className="budget-label subcategory-label">{subcategory}:</label>
                                                <div className="input-group input-group-sm budget-input">
                                                    <span className="input-group-text">{ValidationUtils.getCurrencySymbol(subBudgetCurrency)}</span>
                                                    <input type="number" className="form-control" value={getCurrentBudgetValue(category.id, 'subcategory', subcategory)} onChange={(e) => handleBudgetChange(category.id, 'subcategory', subcategory, e.target.value)} placeholder="0.00" step="0.01" min="0" disabled={hasBudgetCurrencyMismatch} />
                                                </div>
                                            </div>
                                            );
                                        })}
                                    </div>
                                )}
                                <div className="budget-input-row">
                                    <label className="budget-label"><i className="fas fa-bell"></i> Notify me at:</label>
                                    <div className="input-group input-group-sm budget-input">
                                        <input type="number" className="form-control" value={getCurrentThresholdValue(category.id)} onChange={(e) => handleThresholdChange(category.id, e.target.value)} min="50" max="100" step="1" />
                                        <span className="input-group-text">%</span>
                                    </div>
                                </div>
                                {(() => {
                                    const useSubcategoryBudgets = categoryBudgetModes[category.id];
                                    let totalCategoryBudget = 0;
                                    if (useSubcategoryBudgets) { totalCategoryBudget = category.subcategories.reduce((sum, subcategory) => sum + (parseFloat(getCurrentBudgetValue(category.id, 'subcategory', subcategory)) || 0), 0); } else { totalCategoryBudget = parseFloat(getCurrentBudgetValue(category.id, 'category')) || 0; }
                                    const displayCurrency = hasBudgetCurrencyMismatch && category.budgetCurrency ? category.budgetCurrency : defaultCurrency;
                                    return totalCategoryBudget > 0 ? (<div className="category-total-budget"><div className="total-budget-display"><strong>Total for {category.name}: {ValidationUtils.formatCurrency(totalCategoryBudget, displayCurrency)}</strong></div></div>) : null;
                                })()}
                            </div>
                            {addingSubcategoryTo === category.id && (
                                <div className="add-subcategory-form">
                                    <div className="input-group input-group-sm">
                                        <input type="text" className={'form-control ' + (errors.subcategory ? 'is-invalid' : '')} value={newSubcategoryName} onChange={(e) => { setNewSubcategoryName(e.target.value); if (errors.subcategory) setErrors(prev => ({ ...prev, subcategory: '' })); }} placeholder="Enter subcategory name" onKeyPress={(e) => { if (e.key === 'Enter') handleAddSubcategory(category.id); }} />
                                        <button className="btn btn-primary" onClick={() => handleAddSubcategory(category.id)}>Add</button>
                                    </div>
                                    {errors.subcategory && (<div className="invalid-feedback d-block">{errors.subcategory}</div>)}
                                </div>
                            )}
                            {category.subcategories.length > 0 && (
                                <div className="subcategories-list">
                                    {category.subcategories.map(subcategory => (
                                        <div key={subcategory} className="subcategory-item">
                                            <span>{subcategory}</span>
                                            <button className="btn btn-sm btn-outline-danger" onClick={() => handleDeleteSubcategory(category.id, subcategory)} title="Delete Subcategory"><i className="fas fa-times"></i></button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    ))
                )}
            </div>
            <div className="total-budget-summary">
                <div className="budget-summary-card">
                    <div className="summary-content">
                        <div className="summary-icon"><i className="fas fa-calculator"></i></div>
                        <div className="summary-info">
                            <h5>Total Monthly Budget</h5>
                            <div className="total-amount">{ValidationUtils.formatCurrency(totalBudget, hasBudgetCurrencyMismatch ? categories.find(c => c.budgetCurrency)?.budgetCurrency || defaultCurrency : defaultCurrency)}</div>
                            <div className="summary-note">{categories.filter(cat => getCategoryTotalBudget(cat) > 0).length} of {categories.length} categories have budgets set</div>
                        </div>
                    </div>
                </div>
            </div>
            {showDeleteConfirm && (
                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title">Confirm Delete</h5></div>
                            <div className="modal-body"><p>Are you sure you want to delete this category?</p></div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={() => setShowDeleteConfirm(null)}>Cancel</button>
                                <button type="button" className="btn btn-danger" onClick={() => handleDeleteCategory(showDeleteConfirm)}>Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

function IncomeForm({ income, onUpdate }) {
    const [people, setPeople] = useState([]);
    const [formData, setFormData] = useState(() => {
        const peopleList = DataService.getPeople();
        const defaultPerson = peopleList.find(p => p.isDefault);
        return { amount: '', date: new Date().toISOString().split('T')[0], source: '', description: '', paidBy: defaultPerson ? defaultPerson.name : '', currency: 'GBP' };
    });
    const [errors, setErrors] = useState({});
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [showSuccess, setShowSuccess] = useState(false);
    const [editingIncome, setEditingIncome] = useState(null);
    const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
    const [showClearAllConfirm, setShowClearAllConfirm] = useState(false);
    const [isRecurring, setIsRecurring] = useState(false);
    const [recurringFreq, setRecurringFreq] = useState('monthly');
    const [recurringEndDate, setRecurringEndDate] = useState('');

    useEffect(() => { setPeople(DataService.getPeople()); }, []);

    const handleInputChange = (field, value) => { setFormData(prev => ({ ...prev, [field]: value })); if (errors[field]) setErrors(prev => ({ ...prev, [field]: '' })); };
    const handleSubmit = (e) => {
        e.preventDefault(); setIsSubmitting(true);
        const validation = ValidationUtils.validateIncome({ ...formData, amount: parseFloat(formData.amount) });
        if (!validation.isValid) { setErrors(validation.errors); setIsSubmitting(false); return; }
        try {
            const incomeData = { ...formData, amount: parseFloat(formData.amount) };
            if (editingIncome) { DataService.updateIncome(editingIncome.id, incomeData); } else { DataService.addIncomeWithConversion(incomeData); if (isRecurring) { DataService.addRecurring({ templateExpense: incomeData, frequency: recurringFreq, endDate: recurringEndDate, type: 'income' }); } }
            setShowSuccess(true);
            setTimeout(() => { setFormData({ amount: '', date: new Date().toISOString().split('T')[0], source: '', description: '', paidBy: '', currency: 'GBP' }); setEditingIncome(null); setShowSuccess(false); onUpdate(); }, 1000);
        } catch (error) { setErrors({ general: 'Failed to save income. Please try again.' }); }
        setIsSubmitting(false);
    };
    const handleEdit = (incomeItem) => { setEditingIncome(incomeItem); setFormData({ amount: incomeItem.amount.toString(), date: incomeItem.date, source: incomeItem.source, description: incomeItem.description || '', paidBy: incomeItem.paidBy || '', currency: incomeItem.currency || 'GBP' }); };
    const handleDelete = (incomeId) => { DataService.deleteIncome(incomeId); setShowDeleteConfirm(null); onUpdate(); };
    const handleDuplicateIncome = (incomeItem) => { const duplicate = { ...incomeItem, date: new Date().toISOString().split('T')[0] }; delete duplicate.id; delete duplicate.createdAt; DataService.addIncome(duplicate); onUpdate(); };
    const handleCancelEdit = () => { setEditingIncome(null); setFormData({ amount: '', date: new Date().toISOString().split('T')[0], source: '', description: '', paidBy: '', currency: 'GBP' }); setErrors({}); };
    const totalIncome = income.reduce((sum, item) => sum + item.amount, 0);

    if (showSuccess) { return (<div className="screen"><div className="success-message"><i className="fas fa-check-circle"></i><h3>Income {editingIncome ? 'Updated' : 'Added'} Successfully!</h3></div></div>); }

    return (
        <div className="screen">
            <div className="screen-header">
                <h2>Income Management</h2>
                <div className="income-total">Total Income: {ValidationUtils.formatCurrency(totalIncome, income[0]?.currency || 'GBP')}</div>
            </div>
            <div className="income-form-section">
                <h5>{editingIncome ? 'Edit Income' : 'Add New Income'}</h5>
                <form onSubmit={handleSubmit} className="income-form">
                    {errors.general && (<div className="alert alert-danger">{errors.general}</div>)}
                    <div className="form-group">
                        <label htmlFor="currency">Currency *</label>
                        <select id="currency" className="form-select" value={formData.currency} onChange={(e) => handleInputChange('currency', e.target.value)}>
                            <option value="USD">US Dollar ($)</option><option value="GBP">British Pound (£)</option><option value="EUR">Euro (€)</option><option value="INR">Indian Rupee (₹)</option>
                        </select>
                    </div>
                    <div className="form-group">
                        <label htmlFor="amount">Amount *</label>
                        <div className="input-group">
                            <span className="input-group-text">{ValidationUtils.getCurrencySymbol(formData.currency)}</span>
                            <input type="number" id="amount" className={'form-control ' + (errors.amount ? 'is-invalid' : '')} value={formData.amount} onChange={(e) => handleInputChange('amount', e.target.value)} placeholder="0.00" step="0.01" min="0" />
                        </div>
                        {errors.amount && <div className="invalid-feedback d-block">{errors.amount}</div>}
                    </div>
                    <div className="form-group">
                        <label htmlFor="date">Date *</label>
                        <input type="date" id="date" className={'form-control ' + (errors.date ? 'is-invalid' : '')} value={formData.date} onChange={(e) => handleInputChange('date', e.target.value)} />
                        {errors.date && <div className="invalid-feedback">{errors.date}</div>}
                    </div>
                    <div className="form-group">
                        <label htmlFor="source">Income Source *</label>
                        <input type="text" id="source" className={'form-control ' + (errors.source ? 'is-invalid' : '')} value={formData.source} onChange={(e) => handleInputChange('source', e.target.value)} placeholder="e.g., Salary, Freelance, Investment" />
                        {errors.source && <div className="invalid-feedback">{errors.source}</div>}
                    </div>
                    <div className="form-group">
                        <label htmlFor="description">Description (Optional)</label>
                        <input type="text" id="description" className="form-control" value={formData.description} onChange={(e) => handleInputChange('description', e.target.value)} placeholder="Additional details" />
                    </div>
                    <div className="form-group">
                        <label htmlFor="paidBy">Who's Income (Optional)</label>
                        {people.length > 0 ? (
                            <select id="paidBy" className="form-select" value={formData.paidBy} onChange={(e) => handleInputChange('paidBy', e.target.value)}>
                                <option value="">— Me / My Own —</option>
                                {people.map(p => (<option key={p.id} value={p.name}>{p.name}</option>))}
                            </select>
                        ) : (
                            <input type="text" id="paidBy" className="form-control" value={formData.paidBy} onChange={(e) => handleInputChange('paidBy', e.target.value)} placeholder="e.g., John, Mary, Shared" />
                        )}
                        <div className="form-text">{people.length > 0 ? 'Select who received this income' : 'Enter who received this income (leave empty if it\'s your own)'}</div>
                    </div>
                    {!editingIncome && (
                        <div className="form-group">
                            <div className="form-check">
                                <input className="form-check-input" type="checkbox" id="isRecurringIncome" checked={isRecurring} onChange={e => setIsRecurring(e.target.checked)} />
                                <label className="form-check-label" htmlFor="isRecurringIncome"><i className="fas fa-redo me-1"></i>Make this a recurring income</label>
                            </div>
                            {isRecurring && (
                                <div className="mt-2">
                                    <select className="form-select mb-2" value={recurringFreq} onChange={e => setRecurringFreq(e.target.value)}>
                                        <option value="daily">Daily</option>
                                        <option value="weekly">Weekly</option>
                                        <option value="monthly">Monthly</option>
                                        <option value="yearly">Yearly</option>
                                    </select>
                                    <label className="form-label small text-muted">End Date (Optional)</label>
                                    <input type="date" className="form-control" value={recurringEndDate} min={new Date().toISOString().split('T')[0]} onChange={e => setRecurringEndDate(e.target.value)} />
                                </div>
                            )}
                        </div>
                    )}
                    <div className="form-actions">
