    <script type="text/babel">
const { useState, useEffect, useMemo } = React;

class CurrencyService {
    static ratesCache = {};
    static API_KEY = null;
    
    static supportedCurrencies = {
        'GBP': { name: 'British Pound', symbol: '£' },
        'EUR': { name: 'Euro', symbol: '€' },
        'INR': { name: 'Indian Rupee', symbol: '₹' },
        'USD': { name: 'US Dollar', symbol: '$' }
    };

    static fallbackRates = {
        'GBP': { 'EUR': 1.17, 'USD': 1.27, 'INR': 106.5, 'GBP': 1 },
        'EUR': { 'GBP': 0.85, 'USD': 1.08, 'INR': 91.2, 'EUR': 1 },
        'USD': { 'GBP': 0.79, 'EUR': 0.92, 'INR': 84.1, 'USD': 1 },
        'INR': { 'GBP': 0.0094, 'EUR': 0.011, 'USD': 0.012, 'INR': 1 }
    };

    static async fetchExchangeRates(baseCurrency = 'GBP') {
        const cacheTime = 30 * 60 * 1000;
        const now = Date.now();
        if (this.ratesCache[baseCurrency] && (now - this.ratesCache[baseCurrency].timestamp) < cacheTime) {
            return this.ratesCache[baseCurrency].rates;
        }
        try {
            const response = await fetch('https://api.exchangerate-api.com/v4/latest/' + baseCurrency);
            if (response.ok) {
                const data = await response.json();
                this.ratesCache[baseCurrency] = { rates: data.rates, timestamp: now };
                localStorage.setItem('exchangeRates_' + baseCurrency, JSON.stringify({
                    rates: data.rates, timestamp: now
                }));
                return data.rates;
            }
        } catch (error) {
            console.warn('Failed to fetch live exchange rates for ' + baseCurrency + ':', error);
        }
        try {
            const cached = localStorage.getItem('exchangeRates_' + baseCurrency);
            if (cached) {
                const { rates, timestamp } = JSON.parse(cached);
                if ((now - timestamp) < 24 * 60 * 60 * 1000) {
                    this.ratesCache[baseCurrency] = { rates, timestamp };
                    return rates;
                }
            }
        } catch (error) {
            console.warn('Failed to load cached exchange rates:', error);
        }
        const fallback = this.fallbackRates[baseCurrency] || this.fallbackRates['GBP'];
        this.ratesCache[baseCurrency] = { rates: fallback, timestamp: now };
        return fallback;
    }

    static async convertCurrency(amount, fromCurrency, toCurrency) {
        if (fromCurrency === toCurrency) return amount;
        try {
            const rates = await this.fetchExchangeRates(fromCurrency);
            if (rates[toCurrency]) {
                return Math.round(amount * rates[toCurrency] * 100) / 100;
            }
            const fallback = this.fallbackRates[fromCurrency];
            if (fallback && fallback[toCurrency]) {
                return Math.round(amount * fallback[toCurrency] * 100) / 100;
            }
            return amount;
        } catch (error) {
            console.error('Currency conversion failed:', error);
            const fallback = this.fallbackRates[fromCurrency];
            if (fallback && fallback[toCurrency]) {
                return Math.round(amount * fallback[toCurrency] * 100) / 100;
            }
            return amount;
        }
    }

    static getCurrencySymbol(currencyCode) {
        const c = this.supportedCurrencies[currencyCode];
        return c ? c.symbol : currencyCode;
    }

    static getCurrencyName(currencyCode) {
        const c = this.supportedCurrencies[currencyCode];
        return c ? c.name : currencyCode;
    }

    static formatCurrency(amount, currencyCode) {
        const symbol = this.getCurrencySymbol(currencyCode);
        return symbol + amount.toFixed(2);
    }

    static async getConversionRate(fromCurrency, toCurrency) {
        if (fromCurrency === toCurrency) return 1;
        try {
            return await this.convertCurrency(1, fromCurrency, toCurrency);
        } catch (error) {
            return 1;
        }
    }
}
window.CurrencyService = CurrencyService;

const ValidationUtils = {
    validateExpense: (expense) => {
        const errors = {};
        if (!expense.amount || expense.amount <= 0) errors.amount = 'Amount must be greater than 0';
        if (!expense.date) { errors.date = 'Date is required'; } else { const date = new Date(expense.date); if (date > new Date()) errors.date = 'Date cannot be in the future'; }
        if (expense.description && expense.description.trim().length > 0 && expense.description.trim().length < 3) errors.description = 'Description must be at least 3 characters if provided';
        if (!expense.categoryId) errors.categoryId = 'Category is required';
        if (!expense.subcategory) errors.subcategory = 'Subcategory is required';
        if (expense.paidBy && expense.paidBy.trim().length > 0 && expense.paidBy.trim().length < 2) errors.paidBy = 'Name must be at least 2 characters if provided';
        return { isValid: Object.keys(errors).length === 0, errors };
    },
    validateIncome: (income) => {
        const errors = {};
        if (!income.amount || income.amount <= 0) errors.amount = 'Amount must be greater than 0';
        if (!income.date) errors.date = 'Date is required';
        if (!income.source || income.source.trim().length === 0) errors.source = 'Income source is required';
        return { isValid: Object.keys(errors).length === 0, errors };
    },
    validateCategory: (category) => {
        const errors = {};
        if (!category.name || category.name.trim().length === 0) errors.name = 'Category name is required';
        else if (category.name.trim().length < 2) errors.name = 'Category name must be at least 2 characters';
        return { isValid: Object.keys(errors).length === 0, errors };
    },
    formatCurrency: (amount, currency = 'USD') => {
        const currencyMap = {
            'USD': { locale: 'en-US', currency: 'USD' },
            'GBP': { locale: 'en-GB', currency: 'GBP' },
            'EUR': { locale: 'en-EU', currency: 'EUR' },
            'INR': { locale: 'en-IN', currency: 'INR' }
        };
        const config = currencyMap[currency] || currencyMap['USD'];
        return new Intl.NumberFormat(config.locale, { style: 'currency', currency: config.currency }).format(amount);
    },
    getCurrencySymbol: (currency = 'USD') => {
        const symbols = { 'USD': '$', 'GBP': '£', 'EUR': '€', 'INR': '₹' };
        return symbols[currency] || '$';
    },
    formatDate: (date) => {
        return new Date(date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }
};
window.ValidationUtils = ValidationUtils;

class DataService {
    static data = { expenses: [], income: [], settings: { currency: 'GBP' }, categories: [] };
    static isInitialized = false;

    static async initialize() {
        if (this.isInitialized) return;
        try {
            const savedExpenses = localStorage.getItem('financeApp_expenses');
            const savedIncome = localStorage.getItem('financeApp_income');
            const savedCategories = localStorage.getItem('financeApp_categories');
            const savedSettings = localStorage.getItem('financeApp_settings');
            if (savedExpenses) this.data.expenses = JSON.parse(savedExpenses);
            if (savedIncome) this.data.income = JSON.parse(savedIncome);
            if (savedCategories) {
                this.data.categories = JSON.parse(savedCategories);
            } else {
                this.data.categories = [
                    { id: 1, name: 'Food & Dining', subcategories: ['Restaurants', 'Groceries', 'Coffee', 'Fast Food'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 2, name: 'Transportation', subcategories: ['Gas', 'Public Transit', 'Parking', 'Uber/Lyft'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 3, name: 'Shopping', subcategories: ['Clothing', 'Electronics', 'Home', 'Personal Care'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 4, name: 'Entertainment', subcategories: ['Movies', 'Sports', 'Music', 'Games'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 5, name: 'Bills & Utilities', subcategories: ['Electric', 'Water', 'Internet', 'Phone'], monthlyBudget: 0, subcategoryBudgets: {} }
                ];
                this.saveCategories();
            }
            if (savedSettings) {
                const parsed = JSON.parse(savedSettings);
                if (parsed.defaultCurrency && !parsed.currency) { parsed.currency = parsed.defaultCurrency; delete parsed.defaultCurrency; }
                this.data.settings = { ...this.data.settings, ...parsed };
                this.saveSettings();
            }
            this.isInitialized = true;
        } catch (error) {
            console.error('Error initializing DataService:', error);
            this.initializeDefaultData();
            this.isInitialized = true;
        }
    }

    static initializeDefaultData() {
        this.data.categories = [
            { id: 1, name: 'Food & Dining', subcategories: ['Restaurants', 'Groceries', 'Coffee', 'Fast Food'] },
            { id: 2, name: 'Transportation', subcategories: ['Gas', 'Public Transit', 'Parking', 'Uber/Lyft'] },
            { id: 3, name: 'Shopping', subcategories: ['Clothing', 'Electronics', 'Home', 'Personal Care'] },
            { id: 4, name: 'Entertainment', subcategories: ['Movies', 'Sports', 'Music', 'Games'] },
            { id: 5, name: 'Bills & Utilities', subcategories: ['Electric', 'Water', 'Internet', 'Phone'] }
        ];
        this.saveCategories();
    }

    static saveExpenses() { localStorage.setItem('financeApp_expenses', JSON.stringify(this.data.expenses)); }
    static saveIncome() { localStorage.setItem('financeApp_income', JSON.stringify(this.data.income)); }
    static saveCategories() { localStorage.setItem('financeApp_categories', JSON.stringify(this.data.categories)); }
    static saveSettings() { localStorage.setItem('financeApp_settings', JSON.stringify(this.data.settings)); }

    static getPeople() { return (this.data.settings.people || []).slice().sort((a, b) => a.name.localeCompare(b.name)); }
    static addPerson({ name, relationship, isDefault, systemManaged }) {
        if (!name || name.trim().length < 2) throw new Error('Person name must be at least 2 characters');
        if (!this.data.settings.people) this.data.settings.people = [];
        const trimmed = name.trim();
        const duplicate = this.data.settings.people.find(p => p.name.toLowerCase() === trimmed.toLowerCase());
        if (duplicate) throw new Error('A person with this name already exists');
        if (isDefault) this.data.settings.people.forEach(p => { p.isDefault = false; });
        const person = { id: Date.now(), name: trimmed, relationship: (relationship || '').trim(), isDefault: !!isDefault, systemManaged: !!systemManaged };
        this.data.settings.people.push(person);
        this.saveSettings();
        return person;
    }
    static updatePerson(id, updates) {
        if (!this.data.settings.people) return null;
        const person = this.data.settings.people.find(p => p.id === id);
        if (!person) return null;
        const oldName = person.name;
        if (updates.name !== undefined) {
            const trimmed = updates.name.trim();
            if (trimmed.length < 2) throw new Error('Person name must be at least 2 characters');
            const duplicate = this.data.settings.people.find(p => p.id !== id && p.name.toLowerCase() === trimmed.toLowerCase());
            if (duplicate) throw new Error('A person with this name already exists');
            person.name = trimmed;
            if (oldName !== trimmed) this.migratePersonName(oldName, trimmed);
        }
        if (updates.relationship !== undefined) person.relationship = updates.relationship.trim();
        if (updates.isDefault) {
            this.data.settings.people.forEach(p => { p.isDefault = false; });
            person.isDefault = true;
        } else if (updates.isDefault === false) {
            person.isDefault = false;
        }
        this.saveSettings();
        return person;
    }
    static deletePerson(id) {
        if (!this.data.settings.people) return null;
        const index = this.data.settings.people.findIndex(p => p.id === id);
        if (index === -1) return null;
        const deleted = this.data.settings.people.splice(index, 1)[0];
        this.saveSettings();
        return deleted;
    }
    static migratePersonName(oldName, newName) {
        this.data.expenses.forEach(exp => { if (exp.paidBy === oldName) exp.paidBy = newName; });
        this.data.income.forEach(inc => { if (inc.paidBy === oldName) inc.paidBy = newName; });
        this.saveExpenses();
        this.saveIncome();
    }
    static setDefaultPerson(id) {
        if (!this.data.settings.people) return;
        this.data.settings.people.forEach(p => { p.isDefault = (p.id === id); });
        this.saveSettings();
    }

    static async getExpenses() { await this.initialize(); return [...this.data.expenses].sort((a, b) => new Date(b.date) - new Date(a.date)); }
    static _idSeq = 0;
    static _uniqueId() { return Date.now() * 10000 + (++DataService._idSeq % 10000); }
    static async addExpense(expense) {
        await this.initialize();
        const newExpense = { ...expense, id: DataService._uniqueId(), createdAt: new Date().toISOString() };
        this.data.expenses.push(newExpense);
        this.saveExpenses();
        return newExpense;
    }
    static async addExpenseWithConversion(expense) {
        await this.initialize();
        const expenseData = { ...expense, id: DataService._uniqueId(), createdAt: new Date().toISOString() };
        this.data.expenses.push(expenseData);
        this.saveExpenses();
        return expenseData;
    }
    static async updateExpense(id, updates) {
        await this.initialize();
        const index = this.data.expenses.findIndex(expense => expense.id === id);
        if (index !== -1) { this.data.expenses[index] = { ...this.data.expenses[index], ...updates }; this.saveExpenses(); return this.data.expenses[index]; }
        return null;
    }
    static async deleteExpense(id) {
        await this.initialize();
        const index = this.data.expenses.findIndex(expense => expense.id === id);
        if (index !== -1) { const deleted = this.data.expenses.splice(index, 1)[0]; this.saveExpenses(); return deleted; }
        return null;
    }
    static async getExpensesByCategory(categoryId, subcategory = null) {
        await this.initialize();
        return this.data.expenses.filter(expense => {
            const matchesCategory = expense.categoryId === categoryId;
            const matchesSubcategory = !subcategory || expense.subcategory === subcategory;
            return matchesCategory && matchesSubcategory;
        });
    }
    static async getIncome() { await this.initialize(); return [...this.data.income].sort((a, b) => new Date(b.date) - new Date(a.date)); }
    static async addIncome(income) {
        await this.initialize();
        const newIncome = { id: Date.now(), ...income, createdAt: new Date().toISOString() };
        this.data.income.push(newIncome);
        this.saveIncome();
        return newIncome;
    }
    static async addIncomeWithConversion(income) {
        await this.initialize();
        const incomeData = { ...income, id: Date.now(), createdAt: new Date().toISOString() };
        this.data.income.push(incomeData);
        this.saveIncome();
        return incomeData;
    }
    static async updateIncome(id, updates) {
        await this.initialize();
        const index = this.data.income.findIndex(income => income.id === id);
        if (index !== -1) { this.data.income[index] = { ...this.data.income[index], ...updates }; this.saveIncome(); return this.data.income[index]; }
        return null;
    }
    static async deleteIncome(id) {
        await this.initialize();
        const index = this.data.income.findIndex(income => income.id === id);
        if (index !== -1) { const deleted = this.data.income.splice(index, 1)[0]; this.saveIncome(); return deleted; }
        return null;
    }
    static async getCategories() { await this.initialize(); return [...this.data.categories]; }
    static async addCategory(category) {
        await this.initialize();
        const newCategory = { id: Date.now(), ...category, subcategories: category.subcategories || [], monthlyBudget: category.monthlyBudget || 0, subcategoryBudgets: category.subcategoryBudgets || {} };
        this.data.categories.push(newCategory);
        this.saveCategories();
        return newCategory;
    }
    static async updateCategory(id, updates) {
        await this.initialize();
        const index = this.data.categories.findIndex(category => category.id === id);
        if (index !== -1) { this.data.categories[index] = { ...this.data.categories[index], ...updates }; this.saveCategories(); return this.data.categories[index]; }
        return null;
    }
    static async deleteCategory(id) {
        await this.initialize();
        const index = this.data.categories.findIndex(category => category.id === id);
        if (index !== -1) { const deleted = this.data.categories.splice(index, 1)[0]; this.saveCategories(); return deleted; }
        return null;
    }
    static async addSubcategory(categoryId, subcategoryName) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category && !category.subcategories.includes(subcategoryName)) { category.subcategories.push(subcategoryName); this.saveCategories(); return true; }
        return false;
    }
    static async removeSubcategory(categoryId, subcategoryName) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category) { const index = category.subcategories.indexOf(subcategoryName); if (index !== -1) { category.subcategories.splice(index, 1); this.saveCategories(); return true; } }
        return false;
    }
    static async getSettings() {
        await this.initialize();
        const settings = { ...this.data.settings };
        if (settings.defaultCurrency && !settings.currency) settings.currency = settings.defaultCurrency;
        if (!settings.displayName) settings.displayName = '';
        return settings;
    }
    static async updateSettings(updates) {
        await this.initialize();
        if (updates.defaultCurrency) { updates.currency = updates.defaultCurrency; delete updates.defaultCurrency; }
        this.data.settings = { ...this.data.settings, ...updates };
        if (this.data.settings.defaultCurrency) { this.data.settings.currency = this.data.settings.defaultCurrency; delete this.data.settings.defaultCurrency; }
        this.saveSettings();
        return this.data.settings;
    }
    static async getCurrency() { await this.initialize(); return this.data.settings.currency || 'GBP'; }
    static async setCurrency(currency) { await this.initialize(); this.data.settings.currency = currency; this.saveSettings(); return currency; }
    static async setCategoryBudget(categoryId, budget, currency) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category) {
            category.monthlyBudget = parseFloat(budget) || 0;
            if (currency) { category.budgetCurrency = currency; }
            if (!category.budgetStartDate) { category.budgetStartDate = new Date().toISOString().split('T')[0]; }
            if (!category.budgetHistory) { category.budgetHistory = []; }
            this.saveCategories();
            return true;
        }
        return false;
    }
    static async setSubcategoryBudget(categoryId, subcategoryName, budget, currency) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category) {
            if (!category.subcategoryBudgets) category.subcategoryBudgets = {};
            if (!category.subcategoryBudgetCurrencies) category.subcategoryBudgetCurrencies = {};
            category.subcategoryBudgets[subcategoryName] = parseFloat(budget) || 0;
            if (currency) { category.subcategoryBudgetCurrencies[subcategoryName] = currency; }
            this.saveCategories();
            return true;
        }
        return false;
    }
    static async resetCategoryBudget(categoryId, newCurrency) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category) {
            if (!category.budgetHistory) category.budgetHistory = [];
            if (category.monthlyBudget > 0) {
                category.budgetHistory.push({
                    amount: category.monthlyBudget,
                    currency: category.budgetCurrency || 'GBP',
                    startDate: category.budgetStartDate || null,
                    endDate: new Date().toISOString().split('T')[0]
                });
            }
            category.monthlyBudget = 0;
            category.budgetCurrency = newCurrency;
            category.budgetStartDate = new Date().toISOString().split('T')[0];
            this.saveCategories();
            return true;
        }
        return false;
    }
    static async resetSubcategoryBudget(categoryId, subcategoryName, newCurrency) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category) {
            if (!category.subcategoryBudgetHistory) category.subcategoryBudgetHistory = {};
            if (!category.subcategoryBudgetHistory[subcategoryName]) category.subcategoryBudgetHistory[subcategoryName] = [];
            const oldBudget = (category.subcategoryBudgets && category.subcategoryBudgets[subcategoryName]) || 0;
            const oldCurrency = (category.subcategoryBudgetCurrencies && category.subcategoryBudgetCurrencies[subcategoryName]) || 'GBP';
            if (oldBudget > 0) {
                category.subcategoryBudgetHistory[subcategoryName].push({
                    amount: oldBudget, currency: oldCurrency, endDate: new Date().toISOString().split('T')[0]
                });
            }
            if (!category.subcategoryBudgets) category.subcategoryBudgets = {};
            if (!category.subcategoryBudgetCurrencies) category.subcategoryBudgetCurrencies = {};
            category.subcategoryBudgets[subcategoryName] = 0;
            category.subcategoryBudgetCurrencies[subcategoryName] = newCurrency;
            this.saveCategories();
            return true;
        }
        return false;
    }
    static async resetAllBudgets(newCurrency) {
        await this.initialize();
        const today = new Date().toISOString().split('T')[0];
        this.data.categories.forEach(category => {
            if (!category.budgetHistory) category.budgetHistory = [];
            if (category.monthlyBudget > 0) {
                category.budgetHistory.push({ amount: category.monthlyBudget, currency: category.budgetCurrency || 'GBP', startDate: category.budgetStartDate || null, endDate: today });
            }
            category.monthlyBudget = 0;
            category.budgetCurrency = newCurrency;
            category.budgetStartDate = today;
            if (category.subcategoryBudgets) {
                if (!category.subcategoryBudgetHistory) category.subcategoryBudgetHistory = {};
                Object.keys(category.subcategoryBudgets).forEach(subName => {
                    const oldBudget = category.subcategoryBudgets[subName] || 0;
                    const oldCurrency = (category.subcategoryBudgetCurrencies && category.subcategoryBudgetCurrencies[subName]) || 'GBP';
                    if (oldBudget > 0) {
                        if (!category.subcategoryBudgetHistory[subName]) category.subcategoryBudgetHistory[subName] = [];
                        category.subcategoryBudgetHistory[subName].push({ amount: oldBudget, currency: oldCurrency, endDate: today });
                    }
                    category.subcategoryBudgets[subName] = 0;
                });
                if (!category.subcategoryBudgetCurrencies) category.subcategoryBudgetCurrencies = {};
                Object.keys(category.subcategoryBudgetCurrencies).forEach(subName => { category.subcategoryBudgetCurrencies[subName] = newCurrency; });
            }
        });
        this.saveCategories();
        return true;
    }
    static async getBudgetSummary() {
        await this.initialize();
        const now = new Date();
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        const monthlyExpenses = this.data.expenses.filter(expense => { const expenseDate = new Date(expense.date); return expenseDate >= startOfMonth && expenseDate <= endOfMonth; });
        const budgetSummary = [];
        this.data.categories.forEach(category => {
            const categoryExpenses = monthlyExpenses.filter(expense => expense.categoryId === category.id);
            const totalSpent = categoryExpenses.reduce((sum, expense) => sum + expense.amount, 0);
            const categoryData = { id: category.id, name: category.name, budget: category.monthlyBudget || 0, spent: totalSpent, remaining: (category.monthlyBudget || 0) - totalSpent, percentage: category.monthlyBudget > 0 ? (totalSpent / category.monthlyBudget) * 100 : 0, subcategories: [] };
            category.subcategories.forEach(subcatName => {
                const subcatExpenses = categoryExpenses.filter(expense => expense.subcategory === subcatName);
                const subcatSpent = subcatExpenses.reduce((sum, expense) => sum + expense.amount, 0);
                const subcatBudget = (category.subcategoryBudgets && category.subcategoryBudgets[subcatName]) || 0;
                if (subcatBudget > 0 || subcatSpent > 0) { categoryData.subcategories.push({ name: subcatName, budget: subcatBudget, spent: subcatSpent, remaining: subcatBudget - subcatSpent, percentage: subcatBudget > 0 ? (subcatSpent / subcatBudget) * 100 : 0 }); }
            });
            if (categoryData.budget > 0 || categoryData.spent > 0) budgetSummary.push(categoryData);
        });
        return budgetSummary;
    }
    static async checkBudgetAlerts() {
        const budgetSummary = await this.getBudgetSummary();
        const alerts = [];
        budgetSummary.forEach(item => {
            if (item.budget > 0) {
                if (item.percentage >= 100) alerts.push({ type: 'over', name: item.name, pct: item.percentage, spent: item.spent, budget: item.budget });
                else if (item.percentage >= 80) alerts.push({ type: 'near', name: item.name, pct: item.percentage, spent: item.spent, budget: item.budget });
            }
        });
        return alerts;
    }
    static async getRecentlyUsedCategories(limit = 5) {
        await this.initialize();
        const recentExpenses = (await this.getExpenses()).slice(0, 20);
        const categoryCount = {};
        recentExpenses.forEach(expense => { const key = expense.categoryId + '-' + expense.subcategory; categoryCount[key] = (categoryCount[key] || 0) + 1; });
        return Object.entries(categoryCount).sort(([,a], [,b]) => b - a).slice(0, limit).map(([key]) => { const [categoryId, subcategory] = key.split('-'); const category = this.data.categories.find(cat => cat.id === parseInt(categoryId)); return { category, subcategory }; }).filter(item => item.category);
    }
    static getGoals() { return JSON.parse(localStorage.getItem('financeApp_goals') || '[]'); }
    static saveGoals(goals) { localStorage.setItem('financeApp_goals', JSON.stringify(goals)); }
    static addGoal({ name, targetAmount, currency, deadline, notes, emoji, currentSaved }) {
        const goals = this.getGoals();
        if (!name || name.trim().length < 2) throw new Error('Name must be at least 2 characters');
        if (goals.find(g => g.name.toLowerCase() === name.trim().toLowerCase())) throw new Error('A goal with this name already exists');
        if (!targetAmount || parseFloat(targetAmount) <= 0) throw new Error('Target amount must be greater than 0');
        if (deadline && new Date(deadline) <= new Date()) throw new Error('Deadline must be in the future');
        const goal = { id: Date.now(), name: name.trim(), targetAmount: parseFloat(targetAmount), currency: currency || 'GBP', deadline: deadline || '', notes: notes || '', emoji: emoji || '', currentSaved: parseFloat(currentSaved || 0), createdAt: new Date().toISOString() };
        goals.push(goal);
        this.saveGoals(goals);
        return goal;
    }
    static updateGoal(id, updates) { const goals = this.getGoals(); const i = goals.findIndex(g => g.id === id); if (i !== -1) { goals[i] = { ...goals[i], ...updates }; this.saveGoals(goals); } }
    static deleteGoal(id) { const goals = this.getGoals(); const i = goals.findIndex(g => g.id === id); if (i !== -1) { goals.splice(i, 1); this.saveGoals(goals); } }
    static addToGoal(id, amount) { const goals = this.getGoals(); const goal = goals.find(g => g.id === id); if (goal) { goal.currentSaved += parseFloat(amount); this.saveGoals(goals); } }
    static getBills() { return JSON.parse(localStorage.getItem('financeApp_bills') || '[]'); }
    static saveBills(b) { localStorage.setItem('financeApp_bills', JSON.stringify(b)); }
    static addBill({ name, amount, currency, frequency, nextDueDate, categoryId, reminderDaysBefore, notes }) {
        if (!name || name.trim().length < 2) throw new Error('Name must be at least 2 characters');
        if (!amount || parseFloat(amount) <= 0) throw new Error('Amount must be greater than 0');
        const today = new Date().toISOString().split('T')[0];
        if (!nextDueDate || nextDueDate < today) throw new Error('Due date must be today or in the future');
        const bill = { id: Date.now(), name: name.trim(), amount: parseFloat(amount), currency: currency || 'GBP', frequency: frequency || 'Monthly', nextDueDate, categoryId: parseInt(categoryId) || null, reminderDaysBefore: parseInt(reminderDaysBefore) || 3, notes: notes || '', isActive: true, isPaid: false };
        const bills = this.getBills(); bills.push(bill); this.saveBills(bills); return bill;
    }
    static updateBill(id, updates) { const bills = this.getBills(); const i = bills.findIndex(b => b.id === id); if (i !== -1) { bills[i] = { ...bills[i], ...updates }; this.saveBills(bills); } }
    static deleteBill(id) { const bills = this.getBills(); const i = bills.findIndex(b => b.id === id); if (i !== -1) { bills.splice(i, 1); this.saveBills(bills); } }
    static markBillPaid(id) {
        const bills = this.getBills(); const bill = bills.find(b => b.id === id); if (!bill) return;
        const d = new Date(bill.nextDueDate);
        if (bill.frequency === 'Weekly') d.setDate(d.getDate() + 7);
        else if (bill.frequency === 'Monthly') d.setMonth(d.getMonth() + 1);
        else if (bill.frequency === 'Quarterly') d.setMonth(d.getMonth() + 3);
        else if (bill.frequency === 'Yearly') d.setFullYear(d.getFullYear() + 1);
        bill.nextDueDate = d.toISOString().split('T')[0]; bill.isPaid = false;
        this.saveBills(bills);
    }
    static getRecurring() { return JSON.parse(localStorage.getItem('financeApp_recurring') || '[]'); }
    static saveRecurring(r) { localStorage.setItem('financeApp_recurring', JSON.stringify(r)); }
    static addRecurring({ templateExpense, frequency, endDate, type }) {
        const schedule = { id: DataService._uniqueId(), templateExpense, frequency, endDate: endDate || '', type, nextDue: computeNextDue(new Date(), frequency), lastGenerated: null, isActive: true };
        const r = this.getRecurring(); r.push(schedule); this.saveRecurring(r); return schedule;
    }
    static pauseRecurring(id) { const r = this.getRecurring(); const s = r.find(x => x.id === id); if (s) { s.isActive = false; this.saveRecurring(r); } }
    static resumeRecurring(id) { const r = this.getRecurring(); const s = r.find(x => x.id === id); if (s) { s.isActive = true; this.saveRecurring(r); } }
    static deleteRecurring(id) { const r = this.getRecurring(); const i = r.findIndex(x => x.id === id); if (i !== -1) { r.splice(i, 1); this.saveRecurring(r); } }
    static async processRecurringSchedules() {
        const schedules = this.getRecurring();
        const today = new Date().toISOString().split('T')[0];
        let changed = false;
        for (const schedule of schedules) {
            if (!schedule.isActive) continue;
            if (schedule.endDate && today > schedule.endDate) continue;
            while (schedule.nextDue <= today) {
                const instance = { ...schedule.templateExpense, id: DataService._uniqueId(), date: schedule.nextDue, createdAt: new Date().toISOString() };
                if (schedule.type === 'expense') await this.addExpense(instance);
                else await this.addIncome(instance);
                schedule.lastGenerated = schedule.nextDue;
                schedule.nextDue = computeNextDue(schedule.nextDue, schedule.frequency);
                changed = true;
            }
        }
        if (changed) this.saveRecurring(schedules);
    }
    static createBackup() {
        const keys = ['expenses', 'income', 'categories', 'settings', 'goals', 'bills', 'recurring', 'debts', 'networth'];
        const data = {};
        keys.forEach(key => { const v = localStorage.getItem('financeApp_' + key); data[key] = v ? JSON.parse(v) : null; });
        return { version: '1.0', createdAt: new Date().toISOString(), data };
    }
    static downloadBackup() {
        const backup = this.createBackup();
        const date = new Date().toISOString().split('T')[0];
        const filename = 'financetracker-backup-' + date + '.json';
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        this.recordBackupEntry(filename);
        return filename;
    }
    static restoreBackup(backupData) {
        if (!backupData || !backupData.version || !backupData.data) throw new Error('Invalid backup structure');
        let count = 0;
        Object.entries(backupData.data).forEach(([key, value]) => { if (value !== null && value !== undefined) { localStorage.setItem('financeApp_' + key, JSON.stringify(value)); count++; } });
        return count;
    }
    static getBackupHistory() { return JSON.parse(localStorage.getItem('financeApp_backupHistory') || '[]'); }
    static recordBackupEntry(filename) {
        const history = this.getBackupHistory();
        history.unshift({ filename, createdAt: new Date().toISOString() });
        localStorage.setItem('financeApp_backupHistory', JSON.stringify(history.slice(0, 10)));
    }
    static saveLatestBackup() {
        try {
            const backup = this.createBackup();
            localStorage.setItem('financeApp_latestBackup', JSON.stringify(backup));
            localStorage.setItem('financeApp_lastSaveTime', new Date().toISOString());
        } catch (e) { /* silently ignore storage errors */ }
    }
}
window.DataService = DataService;

function computeNextDue(fromDate, frequency) {
    const d = new Date(fromDate);
    if (frequency === 'daily') d.setDate(d.getDate() + 1);
    if (frequency === 'weekly') d.setDate(d.getDate() + 7);
    if (frequency === 'monthly') d.setMonth(d.getMonth() + 1);
    if (frequency === 'yearly') d.setFullYear(d.getFullYear() + 1);
    return d.toISOString().split('T')[0];
}

function ExpenseForm({ categories, onSave, onCancel, editExpense = null }) {
    const [people, setPeople] = useState([]);
    const [formData, setFormData] = useState(() => {
        const peopleList = DataService.getPeople();
        const defaultPerson = peopleList.find(p => p.isDefault);
        return {
            amount: editExpense ? editExpense.amount : '',
            date: editExpense ? editExpense.date : new Date().toISOString().split('T')[0],
            description: editExpense ? editExpense.description : '',
            categoryId: editExpense ? editExpense.categoryId : '',
            subcategory: editExpense ? editExpense.subcategory : '',
            paidBy: editExpense ? (editExpense.paidBy || '') : (defaultPerson ? defaultPerson.name : ''),
            currency: editExpense ? (editExpense.currency || 'GBP') : 'GBP',
            tags: editExpense ? (editExpense.tags || []) : []
        };
    });
    const [tagInputRaw, setTagInputRaw] = useState(() => editExpense ? (editExpense.tags || []).join(', ') : '');
    const [errors, setErrors] = useState({});
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [showSuccess, setShowSuccess] = useState(false);
    const [recentlyUsed, setRecentlyUsed] = useState([]);
    const [isRecurring, setIsRecurring] = useState(false);
    const [recurringFreq, setRecurringFreq] = useState('monthly');
    const [recurringEndDate, setRecurringEndDate] = useState('');
    const [isSplit, setIsSplit] = useState(false);
    const [splitParticipants, setSplitParticipants] = useState([]);
    const [splitMethod, setSplitMethod] = useState('equal');
    const [customAmounts, setCustomAmounts] = useState({});

    useEffect(() => { setPeople(DataService.getPeople()); }, []);
    useEffect(() => { if (!editExpense) { DataService.getRecentlyUsedCategories(3).then(setRecentlyUsed); } }, []);
    useEffect(() => { if (!editExpense) { DataService.getSettings().then(s => { if (s && s.currency) setFormData(prev => prev.currency === 'GBP' ? { ...prev, currency: s.currency } : prev); }); } }, []);

    const handleInputChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
        if (errors[field]) setErrors(prev => ({ ...prev, [field]: '' }));
        if (field === 'categoryId') setFormData(prev => ({ ...prev, subcategory: '' }));
    };

    const handleTagInput = (raw) => {
        setTagInputRaw(raw);
        const tags = [...new Set(raw.split(',').map(t => t.trim().toLowerCase()).filter(t => t.length > 0))];
        if (tags.length > 10) { setErrors(prev => ({ ...prev, tags: 'Maximum 10 tags allowed per expense' })); return; }
        if (tags.some(t => t.length > 30)) { setErrors(prev => ({ ...prev, tags: 'Tags must be 30 characters or fewer' })); return; }
        setErrors(prev => ({ ...prev, tags: '' }));
        setFormData(prev => ({ ...prev, tags }));
    };

    const handleSubmit = (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        const tags = formData.tags || [];
        if (tags.length > 10) { setErrors({ tags: 'Maximum 10 tags allowed per expense' }); setIsSubmitting(false); return; }
        if (tags.some(t => t.length > 30)) { setErrors({ tags: 'Tags must be 30 characters or fewer' }); setIsSubmitting(false); return; }
        const validation = ValidationUtils.validateExpense({ ...formData, amount: parseFloat(formData.amount), categoryId: parseInt(formData.categoryId) });
        if (!validation.isValid) { setErrors(validation.errors); setIsSubmitting(false); return; }
        if (!editExpense && isSplit) {
            if (splitParticipants.length < 2) { setErrors({ general: 'Add at least 2 participants for a split expense.' }); setIsSubmitting(false); return; }
            if (splitMethod === 'custom') {
                const total = splitParticipants.reduce((sum, p) => sum + (parseFloat(customAmounts[p.id]) || 0), 0);
                const target = parseFloat(formData.amount);
                if (Math.abs(total - target) > 0.01) { setErrors({ general: `Custom amounts must sum to ${ValidationUtils.formatCurrency(target, formData.currency)}. Current total: ${ValidationUtils.formatCurrency(total, formData.currency)}.` }); setIsSubmitting(false); return; }
                if (splitParticipants.some(p => !(parseFloat(customAmounts[p.id]) > 0))) { setErrors({ general: 'Each participant must have an amount greater than 0.' }); setIsSubmitting(false); return; }
            }
        }
        try {
            let description = formData.description.trim();
            if (!description && selectedCategory) description = selectedCategory.name + ' - ' + formData.subcategory;
            const expenseData = { ...formData, description: description, amount: parseFloat(formData.amount), categoryId: parseInt(formData.categoryId) };
            if (editExpense) {
                DataService.updateExpense(editExpense.id, expenseData);
            } else if (isSplit && splitParticipants.length >= 2) {
                const splitGroupId = 'split_' + Date.now();
                const totalAmt = parseFloat(formData.amount);
                const n = splitParticipants.length;
                const baseShare = Math.round(totalAmt / n * 100) / 100;
                splitParticipants.forEach((p, i) => {
                    const share = splitMethod === 'equal'
                        ? (i === n - 1 ? Math.round((totalAmt - baseShare * (n - 1)) * 100) / 100 : baseShare)
                        : parseFloat(customAmounts[p.id] || 0);
                    DataService.addExpenseWithConversion({ ...expenseData, amount: share, paidBy: p.name, splitGroupId, isSplitRecord: true });
                });
                if (isRecurring) { DataService.addRecurring({ templateExpense: expenseData, frequency: recurringFreq, endDate: recurringEndDate, type: 'expense' }); }
            } else {
                DataService.addExpenseWithConversion(expenseData);
                if (isRecurring) { DataService.addRecurring({ templateExpense: expenseData, frequency: recurringFreq, endDate: recurringEndDate, type: 'expense' }); }
            }
            setShowSuccess(true);
            setTimeout(() => { onSave(); if (onCancel) onCancel(); }, 1000);
        } catch (error) { setErrors({ general: 'Failed to save expense. Please try again.' }); }
        setIsSubmitting(false);
    };

    const handleQuickFill = (recentExpense) => {
        setFormData({ amount: '', date: new Date().toISOString().split('T')[0], description: recentExpense.description, categoryId: recentExpense.categoryId, subcategory: recentExpense.subcategory, paidBy: recentExpense.paidBy || '', currency: formData.currency });
    };

    const selectedCategory = categories.find(cat => cat.id === parseInt(formData.categoryId));

    if (showSuccess) {
        return (<div className="screen"><div className="success-message"><i className="fas fa-check-circle"></i><h3>Expense {editExpense ? 'Updated' : 'Added'} Successfully!</h3></div></div>);
    }

    return (
        <div className="screen">
            <div className="screen-header">
                <button onClick={onCancel} className="btn btn-outline-secondary"><i className="fas fa-arrow-left"></i> Back</button>
                <h2>{editExpense ? 'Edit Expense' : 'Add New Expense'}</h2>
            </div>
            {recentlyUsed.length > 0 && !editExpense && (
                <div className="quick-fill-section">
                    <h6>Quick Fill from Recent:</h6>
                    <div className="quick-fill-buttons">
                        {recentlyUsed.map((item, index) => (
                            <button key={index} type="button" className="btn btn-sm btn-outline-primary" onClick={() => handleQuickFill({ description: item.category.name + ' - ' + item.subcategory, categoryId: item.category.id, subcategory: item.subcategory })}>
                                {item.category.name} - {item.subcategory}
                            </button>
                        ))}
                    </div>
                </div>
            )}
            <form onSubmit={handleSubmit} className="expense-form">
                {errors.general && (<div className="alert alert-danger">{errors.general}</div>)}
                <div className="form-group">
                    <label htmlFor="currency">Currency *</label>
                    <select id="currency" className="form-select" value={formData.currency} onChange={(e) => handleInputChange('currency', e.target.value)}>
                        <option value="USD">US Dollar ($)</option>
                        <option value="GBP">British Pound (£)</option>
                        <option value="EUR">Euro (€)</option>
                        <option value="INR">Indian Rupee (₹)</option>
                    </select>
                </div>
                <div className="form-group">
                    <label htmlFor="amount">Amount *</label>
                    <div className="input-group">
                        <span className="input-group-text">{ValidationUtils.getCurrencySymbol(formData.currency)}</span>
                        <input type="number" id="amount" className={'form-control ' + (errors.amount ? 'is-invalid' : '')} value={formData.amount} onChange={(e) => handleInputChange('amount', e.target.value)} placeholder="0.00" step="0.01" min="0" />
                    </div>
                    {errors.amount && <div className="invalid-feedback d-block">{errors.amount}</div>}
                </div>
                <div className="form-group">
                    <label htmlFor="date">Date *</label>
                    <input type="date" id="date" className={'form-control ' + (errors.date ? 'is-invalid' : '')} value={formData.date} onChange={(e) => handleInputChange('date', e.target.value)} max={new Date().toISOString().split('T')[0]} />
                    {errors.date && <div className="invalid-feedback">{errors.date}</div>}
                </div>
                <div className="form-group">
                    <label htmlFor="description">Description (Optional)</label>
                    <input type="text" id="description" className={'form-control ' + (errors.description ? 'is-invalid' : '')} value={formData.description} onChange={(e) => handleInputChange('description', e.target.value)} placeholder="Enter expense description" />
                    {errors.description && <div className="invalid-feedback">{errors.description}</div>}
                    <div className="form-text">Leave empty to auto-generate from category and subcategory</div>
                </div>
                <div className="form-group">
                    <label htmlFor="tags">Tags (Optional)</label>
                    <input type="text" id="tags" className={'form-control ' + (errors.tags ? 'is-invalid' : '')} value={tagInputRaw} onChange={(e) => handleTagInput(e.target.value)} placeholder="e.g. work, holiday, one-off (comma separated)" />
                    {errors.tags && <div className="invalid-feedback">{errors.tags}</div>}
                    {formData.tags && formData.tags.length > 0 && (
                        <div style={{marginTop:'0.4rem',display:'flex',flexWrap:'wrap',gap:'4px'}}>
                            {formData.tags.map(tag => <span key={tag} className="badge bg-secondary" style={{fontSize:'0.75rem'}}>{tag}</span>)}
                        </div>
                    )}
                </div>
                <div className="form-group">
                    <label htmlFor="category">Category *</label>
                    <select id="category" className={'form-select ' + (errors.categoryId ? 'is-invalid' : '')} value={formData.categoryId} onChange={(e) => handleInputChange('categoryId', e.target.value)}>
                        <option value="">Select a category</option>
                        {categories.map(category => (<option key={category.id} value={category.id}>{category.name}</option>))}
                    </select>
                    {errors.categoryId && <div className="invalid-feedback">{errors.categoryId}</div>}
                </div>
                {selectedCategory && selectedCategory.subcategories.length > 0 && (
                    <div className="form-group">
                        <label htmlFor="subcategory">Subcategory *</label>
                        <select id="subcategory" className={'form-select ' + (errors.subcategory ? 'is-invalid' : '')} value={formData.subcategory} onChange={(e) => handleInputChange('subcategory', e.target.value)}>
                            <option value="">Select a subcategory</option>
                            {selectedCategory.subcategories.map(sub => (<option key={sub} value={sub}>{sub}</option>))}
                        </select>
                        {errors.subcategory && <div className="invalid-feedback">{errors.subcategory}</div>}
                    </div>
