    <script type="text/babel">
const { useState, useEffect } = React;

class CurrencyService {
    static ratesCache = {};
    static API_KEY = null;
    
    static supportedCurrencies = {
        'GBP': { name: 'British Pound', symbol: '£' },
        'EUR': { name: 'Euro', symbol: '€' },
        'INR': { name: 'Indian Rupee', symbol: '₹' },
        'USD': { name: 'US Dollar', symbol: '$' }
    };

    static fallbackRates = {
        'GBP': { 'EUR': 1.17, 'USD': 1.27, 'INR': 106.5, 'GBP': 1 },
        'EUR': { 'GBP': 0.85, 'USD': 1.08, 'INR': 91.2, 'EUR': 1 },
        'USD': { 'GBP': 0.79, 'EUR': 0.92, 'INR': 84.1, 'USD': 1 },
        'INR': { 'GBP': 0.0094, 'EUR': 0.011, 'USD': 0.012, 'INR': 1 }
    };

    static async fetchExchangeRates(baseCurrency = 'GBP') {
        const cacheTime = 30 * 60 * 1000;
        const now = Date.now();
        if (this.ratesCache[baseCurrency] && (now - this.ratesCache[baseCurrency].timestamp) < cacheTime) {
            return this.ratesCache[baseCurrency].rates;
        }
        try {
            const response = await fetch('https://api.exchangerate-api.com/v4/latest/' + baseCurrency);
            if (response.ok) {
                const data = await response.json();
                this.ratesCache[baseCurrency] = { rates: data.rates, timestamp: now };
                localStorage.setItem('exchangeRates_' + baseCurrency, JSON.stringify({
                    rates: data.rates, timestamp: now
                }));
                return data.rates;
            }
        } catch (error) {
            console.warn('Failed to fetch live exchange rates for ' + baseCurrency + ':', error);
        }
        try {
            const cached = localStorage.getItem('exchangeRates_' + baseCurrency);
            if (cached) {
                const { rates, timestamp } = JSON.parse(cached);
                if ((now - timestamp) < 24 * 60 * 60 * 1000) {
                    this.ratesCache[baseCurrency] = { rates, timestamp };
                    return rates;
                }
            }
        } catch (error) {
            console.warn('Failed to load cached exchange rates:', error);
        }
        const fallback = this.fallbackRates[baseCurrency] || this.fallbackRates['GBP'];
        this.ratesCache[baseCurrency] = { rates: fallback, timestamp: now };
        return fallback;
    }

    static async convertCurrency(amount, fromCurrency, toCurrency) {
        if (fromCurrency === toCurrency) return amount;
        try {
            const rates = await this.fetchExchangeRates(fromCurrency);
            if (rates[toCurrency]) {
                return Math.round(amount * rates[toCurrency] * 100) / 100;
            }
            const fallback = this.fallbackRates[fromCurrency];
            if (fallback && fallback[toCurrency]) {
                return Math.round(amount * fallback[toCurrency] * 100) / 100;
            }
            return amount;
        } catch (error) {
            console.error('Currency conversion failed:', error);
            const fallback = this.fallbackRates[fromCurrency];
            if (fallback && fallback[toCurrency]) {
                return Math.round(amount * fallback[toCurrency] * 100) / 100;
            }
            return amount;
        }
    }

    static getCurrencySymbol(currencyCode) {
        const c = this.supportedCurrencies[currencyCode];
        return c ? c.symbol : currencyCode;
    }

    static getCurrencyName(currencyCode) {
        const c = this.supportedCurrencies[currencyCode];
        return c ? c.name : currencyCode;
    }

    static formatCurrency(amount, currencyCode) {
        const symbol = this.getCurrencySymbol(currencyCode);
        return symbol + amount.toFixed(2);
    }

    static async getConversionRate(fromCurrency, toCurrency) {
        if (fromCurrency === toCurrency) return 1;
        try {
            return await this.convertCurrency(1, fromCurrency, toCurrency);
        } catch (error) {
            return 1;
        }
    }
}
window.CurrencyService = CurrencyService;

const ValidationUtils = {
    validateExpense: (expense) => {
        const errors = {};
        if (!expense.amount || expense.amount <= 0) errors.amount = 'Amount must be greater than 0';
        if (!expense.date) { errors.date = 'Date is required'; } else { const date = new Date(expense.date); if (date > new Date()) errors.date = 'Date cannot be in the future'; }
        if (expense.description && expense.description.trim().length > 0 && expense.description.trim().length < 3) errors.description = 'Description must be at least 3 characters if provided';
        if (!expense.categoryId) errors.categoryId = 'Category is required';
        if (!expense.subcategory) errors.subcategory = 'Subcategory is required';
        if (expense.paidBy && expense.paidBy.trim().length > 0 && expense.paidBy.trim().length < 2) errors.paidBy = 'Name must be at least 2 characters if provided';
        return { isValid: Object.keys(errors).length === 0, errors };
    },
    validateIncome: (income) => {
        const errors = {};
        if (!income.amount || income.amount <= 0) errors.amount = 'Amount must be greater than 0';
        if (!income.date) errors.date = 'Date is required';
        if (!income.source || income.source.trim().length === 0) errors.source = 'Income source is required';
        return { isValid: Object.keys(errors).length === 0, errors };
    },
    validateCategory: (category) => {
        const errors = {};
        if (!category.name || category.name.trim().length === 0) errors.name = 'Category name is required';
        else if (category.name.trim().length < 2) errors.name = 'Category name must be at least 2 characters';
        return { isValid: Object.keys(errors).length === 0, errors };
    },
    formatCurrency: (amount, currency = 'USD') => {
        const currencyMap = {
            'USD': { locale: 'en-US', currency: 'USD' },
            'GBP': { locale: 'en-GB', currency: 'GBP' },
            'EUR': { locale: 'en-EU', currency: 'EUR' },
            'INR': { locale: 'en-IN', currency: 'INR' }
        };
        const config = currencyMap[currency] || currencyMap['USD'];
        return new Intl.NumberFormat(config.locale, { style: 'currency', currency: config.currency }).format(amount);
    },
    getCurrencySymbol: (currency = 'USD') => {
        const symbols = { 'USD': '$', 'GBP': '£', 'EUR': '€', 'INR': '₹' };
        return symbols[currency] || '$';
    },
    formatDate: (date) => {
        return new Date(date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }
};
window.ValidationUtils = ValidationUtils;

class DataService {
    static data = { expenses: [], income: [], settings: { currency: 'GBP' }, categories: [] };
    static isInitialized = false;

    static async initialize() {
        if (this.isInitialized) return;
        try {
            const savedExpenses = localStorage.getItem('financeApp_expenses');
            const savedIncome = localStorage.getItem('financeApp_income');
            const savedCategories = localStorage.getItem('financeApp_categories');
            const savedSettings = localStorage.getItem('financeApp_settings');
            if (savedExpenses) this.data.expenses = JSON.parse(savedExpenses);
            if (savedIncome) this.data.income = JSON.parse(savedIncome);
            if (savedCategories) {
                this.data.categories = JSON.parse(savedCategories);
            } else {
                this.data.categories = [
                    { id: 1, name: 'Food & Dining', subcategories: ['Restaurants', 'Groceries', 'Coffee', 'Fast Food'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 2, name: 'Transportation', subcategories: ['Gas', 'Public Transit', 'Parking', 'Uber/Lyft'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 3, name: 'Shopping', subcategories: ['Clothing', 'Electronics', 'Home', 'Personal Care'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 4, name: 'Entertainment', subcategories: ['Movies', 'Sports', 'Music', 'Games'], monthlyBudget: 0, subcategoryBudgets: {} },
                    { id: 5, name: 'Bills & Utilities', subcategories: ['Electric', 'Water', 'Internet', 'Phone'], monthlyBudget: 0, subcategoryBudgets: {} }
                ];
                this.saveCategories();
            }
            if (savedSettings) {
                const parsed = JSON.parse(savedSettings);
                if (parsed.defaultCurrency && !parsed.currency) { parsed.currency = parsed.defaultCurrency; delete parsed.defaultCurrency; }
                this.data.settings = { ...this.data.settings, ...parsed };
                this.saveSettings();
            }
            this.isInitialized = true;
        } catch (error) {
            console.error('Error initializing DataService:', error);
            this.initializeDefaultData();
            this.isInitialized = true;
        }
    }

    static initializeDefaultData() {
        this.data.categories = [
            { id: 1, name: 'Food & Dining', subcategories: ['Restaurants', 'Groceries', 'Coffee', 'Fast Food'] },
            { id: 2, name: 'Transportation', subcategories: ['Gas', 'Public Transit', 'Parking', 'Uber/Lyft'] },
            { id: 3, name: 'Shopping', subcategories: ['Clothing', 'Electronics', 'Home', 'Personal Care'] },
            { id: 4, name: 'Entertainment', subcategories: ['Movies', 'Sports', 'Music', 'Games'] },
            { id: 5, name: 'Bills & Utilities', subcategories: ['Electric', 'Water', 'Internet', 'Phone'] }
        ];
        this.saveCategories();
    }

    static saveExpenses() { localStorage.setItem('financeApp_expenses', JSON.stringify(this.data.expenses)); }
    static saveIncome() { localStorage.setItem('financeApp_income', JSON.stringify(this.data.income)); }
    static saveCategories() { localStorage.setItem('financeApp_categories', JSON.stringify(this.data.categories)); }
    static saveSettings() { localStorage.setItem('financeApp_settings', JSON.stringify(this.data.settings)); }

    static getPeople() { return (this.data.settings.people || []).slice().sort((a, b) => a.name.localeCompare(b.name)); }
    static addPerson({ name, relationship, isDefault }) {
        if (!name || name.trim().length < 2) throw new Error('Person name must be at least 2 characters');
        if (!this.data.settings.people) this.data.settings.people = [];
        const trimmed = name.trim();
        const duplicate = this.data.settings.people.find(p => p.name.toLowerCase() === trimmed.toLowerCase());
        if (duplicate) throw new Error('A person with this name already exists');
        if (isDefault) this.data.settings.people.forEach(p => { p.isDefault = false; });
        const person = { id: Date.now(), name: trimmed, relationship: (relationship || '').trim(), isDefault: !!isDefault };
        this.data.settings.people.push(person);
        this.saveSettings();
        return person;
    }
    static updatePerson(id, updates) {
        if (!this.data.settings.people) return null;
        const person = this.data.settings.people.find(p => p.id === id);
        if (!person) return null;
        const oldName = person.name;
        if (updates.name !== undefined) {
            const trimmed = updates.name.trim();
            if (trimmed.length < 2) throw new Error('Person name must be at least 2 characters');
            const duplicate = this.data.settings.people.find(p => p.id !== id && p.name.toLowerCase() === trimmed.toLowerCase());
            if (duplicate) throw new Error('A person with this name already exists');
            person.name = trimmed;
            if (oldName !== trimmed) this.migratePersonName(oldName, trimmed);
        }
        if (updates.relationship !== undefined) person.relationship = updates.relationship.trim();
        if (updates.isDefault) {
            this.data.settings.people.forEach(p => { p.isDefault = false; });
            person.isDefault = true;
        } else if (updates.isDefault === false) {
            person.isDefault = false;
        }
        this.saveSettings();
        return person;
    }
    static deletePerson(id) {
        if (!this.data.settings.people) return null;
        const index = this.data.settings.people.findIndex(p => p.id === id);
        if (index === -1) return null;
        const deleted = this.data.settings.people.splice(index, 1)[0];
        this.saveSettings();
        return deleted;
    }
    static migratePersonName(oldName, newName) {
        this.data.expenses.forEach(exp => { if (exp.paidBy === oldName) exp.paidBy = newName; });
        this.data.income.forEach(inc => { if (inc.paidBy === oldName) inc.paidBy = newName; });
        this.saveExpenses();
        this.saveIncome();
    }
    static setDefaultPerson(id) {
        if (!this.data.settings.people) return;
        this.data.settings.people.forEach(p => { p.isDefault = (p.id === id); });
        this.saveSettings();
    }

    static async getExpenses() { await this.initialize(); return [...this.data.expenses].sort((a, b) => new Date(b.date) - new Date(a.date)); }
    static async addExpense(expense) {
        await this.initialize();
        const newExpense = { id: Date.now(), ...expense, createdAt: new Date().toISOString() };
        this.data.expenses.push(newExpense);
        this.saveExpenses();
        return newExpense;
    }
    static async addExpenseWithConversion(expense) {
        await this.initialize();
        const expenseData = { ...expense, id: Date.now(), createdAt: new Date().toISOString() };
        this.data.expenses.push(expenseData);
        this.saveExpenses();
        return expenseData;
    }
    static async updateExpense(id, updates) {
        await this.initialize();
        const index = this.data.expenses.findIndex(expense => expense.id === id);
        if (index !== -1) { this.data.expenses[index] = { ...this.data.expenses[index], ...updates }; this.saveExpenses(); return this.data.expenses[index]; }
        return null;
    }
    static async deleteExpense(id) {
        await this.initialize();
        const index = this.data.expenses.findIndex(expense => expense.id === id);
        if (index !== -1) { const deleted = this.data.expenses.splice(index, 1)[0]; this.saveExpenses(); return deleted; }
        return null;
    }
    static async getExpensesByCategory(categoryId, subcategory = null) {
        await this.initialize();
        return this.data.expenses.filter(expense => {
            const matchesCategory = expense.categoryId === categoryId;
            const matchesSubcategory = !subcategory || expense.subcategory === subcategory;
            return matchesCategory && matchesSubcategory;
        });
    }
    static async getIncome() { await this.initialize(); return [...this.data.income].sort((a, b) => new Date(b.date) - new Date(a.date)); }
    static async addIncome(income) {
        await this.initialize();
        const newIncome = { id: Date.now(), ...income, createdAt: new Date().toISOString() };
        this.data.income.push(newIncome);
        this.saveIncome();
        return newIncome;
    }
    static async addIncomeWithConversion(income) {
        await this.initialize();
        const incomeData = { ...income, id: Date.now(), createdAt: new Date().toISOString() };
        this.data.income.push(incomeData);
        this.saveIncome();
        return incomeData;
    }
    static async updateIncome(id, updates) {
        await this.initialize();
        const index = this.data.income.findIndex(income => income.id === id);
        if (index !== -1) { this.data.income[index] = { ...this.data.income[index], ...updates }; this.saveIncome(); return this.data.income[index]; }
        return null;
    }
    static async deleteIncome(id) {
        await this.initialize();
        const index = this.data.income.findIndex(income => income.id === id);
        if (index !== -1) { const deleted = this.data.income.splice(index, 1)[0]; this.saveIncome(); return deleted; }
        return null;
    }
    static async getCategories() { await this.initialize(); return [...this.data.categories]; }
    static async addCategory(category) {
        await this.initialize();
        const newCategory = { id: Date.now(), ...category, subcategories: category.subcategories || [], monthlyBudget: category.monthlyBudget || 0, subcategoryBudgets: category.subcategoryBudgets || {} };
        this.data.categories.push(newCategory);
        this.saveCategories();
        return newCategory;
    }
    static async updateCategory(id, updates) {
        await this.initialize();
        const index = this.data.categories.findIndex(category => category.id === id);
        if (index !== -1) { this.data.categories[index] = { ...this.data.categories[index], ...updates }; this.saveCategories(); return this.data.categories[index]; }
        return null;
    }
    static async deleteCategory(id) {
        await this.initialize();
        const index = this.data.categories.findIndex(category => category.id === id);
        if (index !== -1) { const deleted = this.data.categories.splice(index, 1)[0]; this.saveCategories(); return deleted; }
        return null;
    }
    static async addSubcategory(categoryId, subcategoryName) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category && !category.subcategories.includes(subcategoryName)) { category.subcategories.push(subcategoryName); this.saveCategories(); return true; }
        return false;
    }
    static async removeSubcategory(categoryId, subcategoryName) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category) { const index = category.subcategories.indexOf(subcategoryName); if (index !== -1) { category.subcategories.splice(index, 1); this.saveCategories(); return true; } }
        return false;
    }
    static async getSettings() {
        await this.initialize();
        const settings = { ...this.data.settings };
        if (settings.defaultCurrency && !settings.currency) settings.currency = settings.defaultCurrency;
        return settings;
    }
    static async updateSettings(updates) {
        await this.initialize();
        if (updates.defaultCurrency) { updates.currency = updates.defaultCurrency; delete updates.defaultCurrency; }
        this.data.settings = { ...this.data.settings, ...updates };
        if (this.data.settings.defaultCurrency) { this.data.settings.currency = this.data.settings.defaultCurrency; delete this.data.settings.defaultCurrency; }
        this.saveSettings();
        return this.data.settings;
    }
    static async getCurrency() { await this.initialize(); return this.data.settings.currency || 'GBP'; }
    static async setCurrency(currency) { await this.initialize(); this.data.settings.currency = currency; this.saveSettings(); return currency; }
    static async setCategoryBudget(categoryId, budget, currency) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category) {
            category.monthlyBudget = parseFloat(budget) || 0;
            if (currency) { category.budgetCurrency = currency; }
            if (!category.budgetStartDate) { category.budgetStartDate = new Date().toISOString().split('T')[0]; }
            if (!category.budgetHistory) { category.budgetHistory = []; }
            this.saveCategories();
            return true;
        }
        return false;
    }
    static async setSubcategoryBudget(categoryId, subcategoryName, budget, currency) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category) {
            if (!category.subcategoryBudgets) category.subcategoryBudgets = {};
            if (!category.subcategoryBudgetCurrencies) category.subcategoryBudgetCurrencies = {};
            category.subcategoryBudgets[subcategoryName] = parseFloat(budget) || 0;
            if (currency) { category.subcategoryBudgetCurrencies[subcategoryName] = currency; }
            this.saveCategories();
            return true;
        }
        return false;
    }
    static async resetCategoryBudget(categoryId, newCurrency) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category) {
            if (!category.budgetHistory) category.budgetHistory = [];
            if (category.monthlyBudget > 0) {
                category.budgetHistory.push({
                    amount: category.monthlyBudget,
                    currency: category.budgetCurrency || 'GBP',
                    startDate: category.budgetStartDate || null,
                    endDate: new Date().toISOString().split('T')[0]
                });
            }
            category.monthlyBudget = 0;
            category.budgetCurrency = newCurrency;
            category.budgetStartDate = new Date().toISOString().split('T')[0];
            this.saveCategories();
            return true;
        }
        return false;
    }
    static async resetSubcategoryBudget(categoryId, subcategoryName, newCurrency) {
        await this.initialize();
        const category = this.data.categories.find(cat => cat.id === categoryId);
        if (category) {
            if (!category.subcategoryBudgetHistory) category.subcategoryBudgetHistory = {};
            if (!category.subcategoryBudgetHistory[subcategoryName]) category.subcategoryBudgetHistory[subcategoryName] = [];
            const oldBudget = (category.subcategoryBudgets && category.subcategoryBudgets[subcategoryName]) || 0;
            const oldCurrency = (category.subcategoryBudgetCurrencies && category.subcategoryBudgetCurrencies[subcategoryName]) || 'GBP';
            if (oldBudget > 0) {
                category.subcategoryBudgetHistory[subcategoryName].push({
                    amount: oldBudget, currency: oldCurrency, endDate: new Date().toISOString().split('T')[0]
                });
            }
            if (!category.subcategoryBudgets) category.subcategoryBudgets = {};
            if (!category.subcategoryBudgetCurrencies) category.subcategoryBudgetCurrencies = {};
            category.subcategoryBudgets[subcategoryName] = 0;
            category.subcategoryBudgetCurrencies[subcategoryName] = newCurrency;
            this.saveCategories();
            return true;
        }
        return false;
    }
    static async resetAllBudgets(newCurrency) {
        await this.initialize();
        const today = new Date().toISOString().split('T')[0];
        this.data.categories.forEach(category => {
            if (!category.budgetHistory) category.budgetHistory = [];
            if (category.monthlyBudget > 0) {
                category.budgetHistory.push({ amount: category.monthlyBudget, currency: category.budgetCurrency || 'GBP', startDate: category.budgetStartDate || null, endDate: today });
            }
            category.monthlyBudget = 0;
            category.budgetCurrency = newCurrency;
            category.budgetStartDate = today;
            if (category.subcategoryBudgets) {
                if (!category.subcategoryBudgetHistory) category.subcategoryBudgetHistory = {};
                Object.keys(category.subcategoryBudgets).forEach(subName => {
                    const oldBudget = category.subcategoryBudgets[subName] || 0;
                    const oldCurrency = (category.subcategoryBudgetCurrencies && category.subcategoryBudgetCurrencies[subName]) || 'GBP';
                    if (oldBudget > 0) {
                        if (!category.subcategoryBudgetHistory[subName]) category.subcategoryBudgetHistory[subName] = [];
                        category.subcategoryBudgetHistory[subName].push({ amount: oldBudget, currency: oldCurrency, endDate: today });
                    }
                    category.subcategoryBudgets[subName] = 0;
                });
                if (!category.subcategoryBudgetCurrencies) category.subcategoryBudgetCurrencies = {};
                Object.keys(category.subcategoryBudgetCurrencies).forEach(subName => { category.subcategoryBudgetCurrencies[subName] = newCurrency; });
            }
        });
        this.saveCategories();
        return true;
    }
    static async getBudgetSummary() {
        await this.initialize();
        const now = new Date();
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        const monthlyExpenses = this.data.expenses.filter(expense => { const expenseDate = new Date(expense.date); return expenseDate >= startOfMonth && expenseDate <= endOfMonth; });
        const budgetSummary = [];
        this.data.categories.forEach(category => {
            const categoryExpenses = monthlyExpenses.filter(expense => expense.categoryId === category.id);
            const totalSpent = categoryExpenses.reduce((sum, expense) => sum + expense.amount, 0);
            const categoryData = { id: category.id, name: category.name, budget: category.monthlyBudget || 0, spent: totalSpent, remaining: (category.monthlyBudget || 0) - totalSpent, percentage: category.monthlyBudget > 0 ? (totalSpent / category.monthlyBudget) * 100 : 0, subcategories: [] };
            category.subcategories.forEach(subcatName => {
                const subcatExpenses = categoryExpenses.filter(expense => expense.subcategory === subcatName);
                const subcatSpent = subcatExpenses.reduce((sum, expense) => sum + expense.amount, 0);
                const subcatBudget = (category.subcategoryBudgets && category.subcategoryBudgets[subcatName]) || 0;
                if (subcatBudget > 0 || subcatSpent > 0) { categoryData.subcategories.push({ name: subcatName, budget: subcatBudget, spent: subcatSpent, remaining: subcatBudget - subcatSpent, percentage: subcatBudget > 0 ? (subcatSpent / subcatBudget) * 100 : 0 }); }
            });
            if (categoryData.budget > 0 || categoryData.spent > 0) budgetSummary.push(categoryData);
        });
        return budgetSummary;
    }
    static async getRecentlyUsedCategories(limit = 5) {
        await this.initialize();
        const recentExpenses = (await this.getExpenses()).slice(0, 20);
        const categoryCount = {};
        recentExpenses.forEach(expense => { const key = expense.categoryId + '-' + expense.subcategory; categoryCount[key] = (categoryCount[key] || 0) + 1; });
        return Object.entries(categoryCount).sort(([,a], [,b]) => b - a).slice(0, limit).map(([key]) => { const [categoryId, subcategory] = key.split('-'); const category = this.data.categories.find(cat => cat.id === parseInt(categoryId)); return { category, subcategory }; }).filter(item => item.category);
    }
}

function ExpenseForm({ categories, onSave, onCancel, editExpense = null }) {
    const [people, setPeople] = useState([]);
    const [formData, setFormData] = useState(() => {
        const peopleList = DataService.getPeople();
        const defaultPerson = peopleList.find(p => p.isDefault);
        return {
            amount: editExpense ? editExpense.amount : '',
            date: editExpense ? editExpense.date : new Date().toISOString().split('T')[0],
            description: editExpense ? editExpense.description : '',
            categoryId: editExpense ? editExpense.categoryId : '',
            subcategory: editExpense ? editExpense.subcategory : '',
            paidBy: editExpense ? (editExpense.paidBy || '') : (defaultPerson ? defaultPerson.name : ''),
            currency: editExpense ? (editExpense.currency || 'GBP') : 'GBP'
        };
    });
    const [errors, setErrors] = useState({});
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [showSuccess, setShowSuccess] = useState(false);
    const [recentlyUsed, setRecentlyUsed] = useState([]);

    useEffect(() => { setPeople(DataService.getPeople()); }, []);
    useEffect(() => { if (!editExpense) { DataService.getRecentlyUsedCategories(3).then(setRecentlyUsed); } }, []);
    useEffect(() => { if (!editExpense) { DataService.getSettings().then(s => { if (s && s.currency) setFormData(prev => prev.currency === 'GBP' ? { ...prev, currency: s.currency } : prev); }); } }, []);

    const handleInputChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
        if (errors[field]) setErrors(prev => ({ ...prev, [field]: '' }));
        if (field === 'categoryId') setFormData(prev => ({ ...prev, subcategory: '' }));
    };

    const handleSubmit = (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        const validation = ValidationUtils.validateExpense({ ...formData, amount: parseFloat(formData.amount), categoryId: parseInt(formData.categoryId) });
        if (!validation.isValid) { setErrors(validation.errors); setIsSubmitting(false); return; }
        try {
            let description = formData.description.trim();
            if (!description && selectedCategory) description = selectedCategory.name + ' - ' + formData.subcategory;
            const expenseData = { ...formData, description: description, amount: parseFloat(formData.amount), categoryId: parseInt(formData.categoryId) };
            if (editExpense) { DataService.updateExpense(editExpense.id, expenseData); } else { DataService.addExpenseWithConversion(expenseData); }
            setShowSuccess(true);
            setTimeout(() => { onSave(); if (onCancel) onCancel(); }, 1000);
        } catch (error) { setErrors({ general: 'Failed to save expense. Please try again.' }); }
        setIsSubmitting(false);
    };

    const handleQuickFill = (recentExpense) => {
        setFormData({ amount: '', date: new Date().toISOString().split('T')[0], description: recentExpense.description, categoryId: recentExpense.categoryId, subcategory: recentExpense.subcategory, paidBy: recentExpense.paidBy || '', currency: formData.currency });
    };

    const selectedCategory = categories.find(cat => cat.id === parseInt(formData.categoryId));

    if (showSuccess) {
        return (<div className="screen"><div className="success-message"><i className="fas fa-check-circle"></i><h3>Expense {editExpense ? 'Updated' : 'Added'} Successfully!</h3></div></div>);
    }

    return (
        <div className="screen">
            <div className="screen-header">
                <button onClick={onCancel} className="btn btn-outline-secondary"><i className="fas fa-arrow-left"></i> Back</button>
                <h2>{editExpense ? 'Edit Expense' : 'Add New Expense'}</h2>
            </div>
            {recentlyUsed.length > 0 && !editExpense && (
                <div className="quick-fill-section">
                    <h6>Quick Fill from Recent:</h6>
                    <div className="quick-fill-buttons">
                        {recentlyUsed.map((item, index) => (
                            <button key={index} type="button" className="btn btn-sm btn-outline-primary" onClick={() => handleQuickFill({ description: item.category.name + ' - ' + item.subcategory, categoryId: item.category.id, subcategory: item.subcategory })}>
                                {item.category.name} - {item.subcategory}
                            </button>
                        ))}
                    </div>
                </div>
            )}
            <form onSubmit={handleSubmit} className="expense-form">
                {errors.general && (<div className="alert alert-danger">{errors.general}</div>)}
                <div className="form-group">
                    <label htmlFor="currency">Currency *</label>
                    <select id="currency" className="form-select" value={formData.currency} onChange={(e) => handleInputChange('currency', e.target.value)}>
                        <option value="USD">US Dollar ($)</option>
                        <option value="GBP">British Pound (£)</option>
                        <option value="EUR">Euro (€)</option>
                        <option value="INR">Indian Rupee (₹)</option>
                    </select>
                </div>
                <div className="form-group">
                    <label htmlFor="amount">Amount *</label>
                    <div className="input-group">
                        <span className="input-group-text">{ValidationUtils.getCurrencySymbol(formData.currency)}</span>
                        <input type="number" id="amount" className={'form-control ' + (errors.amount ? 'is-invalid' : '')} value={formData.amount} onChange={(e) => handleInputChange('amount', e.target.value)} placeholder="0.00" step="0.01" min="0" />
                    </div>
                    {errors.amount && <div className="invalid-feedback d-block">{errors.amount}</div>}
                </div>
                <div className="form-group">
                    <label htmlFor="date">Date *</label>
                    <input type="date" id="date" className={'form-control ' + (errors.date ? 'is-invalid' : '')} value={formData.date} onChange={(e) => handleInputChange('date', e.target.value)} max={new Date().toISOString().split('T')[0]} />
                    {errors.date && <div className="invalid-feedback">{errors.date}</div>}
                </div>
                <div className="form-group">
                    <label htmlFor="description">Description (Optional)</label>
                    <input type="text" id="description" className={'form-control ' + (errors.description ? 'is-invalid' : '')} value={formData.description} onChange={(e) => handleInputChange('description', e.target.value)} placeholder="Enter expense description" />
                    {errors.description && <div className="invalid-feedback">{errors.description}</div>}
                    <div className="form-text">Leave empty to auto-generate from category and subcategory</div>
                </div>
                <div className="form-group">
                    <label htmlFor="category">Category *</label>
                    <select id="category" className={'form-select ' + (errors.categoryId ? 'is-invalid' : '')} value={formData.categoryId} onChange={(e) => handleInputChange('categoryId', e.target.value)}>
                        <option value="">Select a category</option>
                        {categories.map(category => (<option key={category.id} value={category.id}>{category.name}</option>))}
                    </select>
                    {errors.categoryId && <div className="invalid-feedback">{errors.categoryId}</div>}
                </div>
                {selectedCategory && selectedCategory.subcategories.length > 0 && (
                    <div className="form-group">
                        <label htmlFor="subcategory">Subcategory *</label>
                        <select id="subcategory" className={'form-select ' + (errors.subcategory ? 'is-invalid' : '')} value={formData.subcategory} onChange={(e) => handleInputChange('subcategory', e.target.value)}>
                            <option value="">Select a subcategory</option>
                            {selectedCategory.subcategories.map(sub => (<option key={sub} value={sub}>{sub}</option>))}
                        </select>
                        {errors.subcategory && <div className="invalid-feedback">{errors.subcategory}</div>}
                    </div>
                )}
                <div className="form-group">
                    <label htmlFor="paidBy">Who's Expense (Optional)</label>
                    {people.length > 0 ? (
                        <select id="paidBy" className={'form-select ' + (errors.paidBy ? 'is-invalid' : '')} value={formData.paidBy} onChange={(e) => handleInputChange('paidBy', e.target.value)}>
                            <option value="">— Me / My Own —</option>
                            {people.map(p => (<option key={p.id} value={p.name}>{p.name}</option>))}
                        </select>
                    ) : (
                        <input type="text" id="paidBy" className={'form-control ' + (errors.paidBy ? 'is-invalid' : '')} value={formData.paidBy} onChange={(e) => handleInputChange('paidBy', e.target.value)} placeholder="e.g., John, Mary, Shared" />
                    )}
                    {errors.paidBy && <div className="invalid-feedback">{errors.paidBy}</div>}
                    <div className="form-text">{people.length > 0 ? 'Select who paid for this expense' : 'Enter who paid for this expense (leave empty if it\'s your own)'}</div>
                </div>
                <div className="form-actions">
                    <button type="button" className="btn btn-secondary" onClick={onCancel} disabled={isSubmitting}>Cancel</button>
                    <button type="submit" className="btn btn-primary" disabled={isSubmitting}>
                        {isSubmitting ? (<><span className="spinner-border spinner-border-sm me-2"></span>{editExpense ? 'Updating...' : 'Adding...'}</>) : (<><i className="fas fa-save me-2"></i>{editExpense ? 'Update Expense' : 'Add Expense'}</>)}
                    </button>
                </div>
            </form>
        </div>
    );
}

function ExpenseList({ expenses, categories, onUpdate }) {
    const [filteredExpenses, setFilteredExpenses] = useState(expenses);
    const [filterCategory, setFilterCategory] = useState('');
    const [filterSubcategory, setFilterSubcategory] = useState('');
    const [filterPerson, setFilterPerson] = useState('');
    const [editingExpense, setEditingExpense] = useState(null);
    const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
    const [searchTerm, setSearchTerm] = useState('');
    const [people, setPeople] = useState([]);

    useEffect(() => { setPeople(DataService.getPeople()); }, []);

    useEffect(() => {
        let filtered = expenses;
        if (filterCategory) filtered = filtered.filter(expense => expense.categoryId === parseInt(filterCategory));
        if (filterSubcategory) filtered = filtered.filter(expense => expense.subcategory === filterSubcategory);
        if (filterPerson === '__mine__') filtered = filtered.filter(expense => !expense.paidBy || expense.paidBy === '');
        else if (filterPerson) filtered = filtered.filter(expense => expense.paidBy === filterPerson);
        if (searchTerm) filtered = filtered.filter(expense => expense.description.toLowerCase().includes(searchTerm.toLowerCase()));
        setFilteredExpenses(filtered);
    }, [expenses, filterCategory, filterSubcategory, filterPerson, searchTerm]);

    const handleCategoryFilter = (categoryId) => { setFilterCategory(categoryId); setFilterSubcategory(''); };
    const handleDeleteExpense = (expenseId) => { DataService.deleteExpense(expenseId); setShowDeleteConfirm(null); onUpdate(); };
    const handleDuplicateExpense = (expense) => {
        const duplicatedExpense = { ...expense, date: new Date().toISOString().split('T')[0], description: expense.description + ' (Copy)' };
        delete duplicatedExpense.id; delete duplicatedExpense.createdAt;
        DataService.addExpense(duplicatedExpense); onUpdate();
    };
    const getCategoryName = (categoryId) => { const category = categories.find(cat => cat.id === categoryId); return category ? category.name : 'Unknown Category'; };
    const selectedCategory = categories.find(cat => cat.id === parseInt(filterCategory));
    const expensesByCurrency = filteredExpenses.reduce((acc, expense) => { const currency = expense.currency || 'USD'; if (!acc[currency]) acc[currency] = { total: 0, count: 0 }; acc[currency].total += expense.amount; acc[currency].count += 1; return acc; }, {});

    if (editingExpense) {
        return (<ExpenseForm categories={categories} editExpense={editingExpense} onSave={() => { setEditingExpense(null); onUpdate(); }} onCancel={() => setEditingExpense(null)} />);
    }

    return (
        <div className="screen">
            <div className="screen-header">
                <h2>Expense History</h2>
                <div className="expense-totals">
                    {Object.keys(expensesByCurrency).length === 1 ? (
                        <div className="expense-total">Total: {ValidationUtils.formatCurrency(Object.values(expensesByCurrency)[0].total, Object.keys(expensesByCurrency)[0])}</div>
                    ) : (
                        <div className="expense-total-multi">
                            {Object.entries(expensesByCurrency).map(([currency, data]) => (<div key={currency} className="expense-total-item">{ValidationUtils.formatCurrency(data.total, currency)}</div>))}
                        </div>
                    )}
                </div>
            </div>
            <div className="filters-section">
                <div className="search-box">
                    <div className="input-group">
                        <span className="input-group-text"><i className="fas fa-search"></i></span>
                        <input type="text" className="form-control" placeholder="Search expenses..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                    </div>
                </div>
                <div className="filter-row">
                    <select className="form-select" value={filterCategory} onChange={(e) => handleCategoryFilter(e.target.value)}>
                        <option value="">All Categories</option>
                        {categories.map(category => (<option key={category.id} value={category.id}>{category.name}</option>))}
                    </select>
                    {selectedCategory && selectedCategory.subcategories.length > 0 && (
                        <select className="form-select" value={filterSubcategory} onChange={(e) => setFilterSubcategory(e.target.value)}>
                            <option value="">All Subcategories</option>
                            {selectedCategory.subcategories.map(sub => (<option key={sub} value={sub}>{sub}</option>))}
                        </select>
                    )}
                    {people.length > 0 && (
                        <select className="form-select" value={filterPerson} onChange={(e) => setFilterPerson(e.target.value)}>
                            <option value="">All People</option>
                            <option value="__mine__">My Expenses Only</option>
                            {people.map(p => (<option key={p.id} value={p.name}>{p.name}</option>))}
                        </select>
                    )}
                </div>
                {(filterCategory || filterSubcategory || filterPerson || searchTerm) && (
                    <button className="btn btn-sm btn-outline-secondary" onClick={() => { setFilterCategory(''); setFilterSubcategory(''); setFilterPerson(''); setSearchTerm(''); }}>
                        <i className="fas fa-times me-1"></i>Clear Filters
                    </button>
                )}
            </div>
            <div className="expense-list">
                {filteredExpenses.length === 0 ? (
                    <div className="empty-state"><i className="fas fa-receipt fa-3x"></i><h4>No expenses found</h4><p>{expenses.length === 0 ? "Start by adding your first expense!" : "Try adjusting your filters or search term."}</p></div>
                ) : (
                    filteredExpenses.map(expense => (
                        <div key={expense.id} className="expense-item">
                            <div className="expense-main">
                                <div className="expense-info">
                                    <div className="expense-description">{expense.description}</div>
                                    <div className="expense-category"><i className="fas fa-tag"></i>{getCategoryName(expense.categoryId)} - {expense.subcategory}</div>
                                    {expense.paidBy && (<div className="expense-paid-by"><i className="fas fa-user"></i>Paid by: {expense.paidBy}</div>)}
                                    <div className="expense-date"><i className="fas fa-calendar"></i>{ValidationUtils.formatDate(expense.date)}</div>
                                </div>
                                <div className="expense-amount">{ValidationUtils.formatCurrency(expense.amount, expense.currency || 'USD')}</div>
                            </div>
                            <div className="expense-actions">
                                <button className="btn btn-sm btn-outline-primary" onClick={() => setEditingExpense(expense)} title="Edit"><i className="fas fa-edit"></i></button>
                                <button className="btn btn-sm btn-outline-success" onClick={() => handleDuplicateExpense(expense)} title="Duplicate"><i className="fas fa-copy"></i></button>
                                <button className="btn btn-sm btn-outline-danger" onClick={() => setShowDeleteConfirm(expense.id)} title="Delete"><i className="fas fa-trash"></i></button>
                            </div>
                        </div>
                    ))
                )}
            </div>
            {showDeleteConfirm && (
                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title">Confirm Delete</h5></div>
                            <div className="modal-body"><p>Are you sure you want to delete this expense? This action cannot be undone.</p></div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={() => setShowDeleteConfirm(null)}>Cancel</button>
                                <button type="button" className="btn btn-danger" onClick={() => handleDeleteExpense(showDeleteConfirm)}>Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

function CategoryManager({ categories, onUpdate, defaultCurrency }) {
    const [editingCategory, setEditingCategory] = useState(null);
    const [newCategoryName, setNewCategoryName] = useState('');
    const [newSubcategoryName, setNewSubcategoryName] = useState('');
    const [addingSubcategoryTo, setAddingSubcategoryTo] = useState(null);
    const [errors, setErrors] = useState({});
    const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
    const [showBudgets, setShowBudgets] = useState(false);
    const [budgetChanges, setBudgetChanges] = useState({});
    const [categoryBudgetModes, setCategoryBudgetModes] = useState(() => {
        const modes = {};
        categories.forEach(cat => { if (cat.useSubcategoryBudgets) modes[cat.id] = true; });
        return modes;
    });
    const hasBudgetCurrencyMismatch = categories.some(cat => cat.budgetCurrency && cat.budgetCurrency !== defaultCurrency && (cat.monthlyBudget > 0 || (cat.subcategoryBudgets && Object.values(cat.subcategoryBudgets).some(v => v > 0))));
    const handleResetAllBudgets = async () => { try { await DataService.resetAllBudgets(defaultCurrency); onUpdate(); } catch (error) { setErrors({ budget: 'Failed to reset budgets' }); } };

    const handleAddCategory = (e) => { e.preventDefault(); const validation = ValidationUtils.validateCategory({ name: newCategoryName }); if (!validation.isValid) { setErrors(validation.errors); return; } const existingCategory = categories.find(cat => cat.name.toLowerCase() === newCategoryName.trim().toLowerCase()); if (existingCategory) { setErrors({ name: 'Category name already exists' }); return; } DataService.addCategory({ name: newCategoryName.trim() }); setNewCategoryName(''); setErrors({}); onUpdate(); };
    const handleUpdateCategory = (categoryId, newName) => { const validation = ValidationUtils.validateCategory({ name: newName }); if (!validation.isValid) { setErrors({ [categoryId]: validation.errors.name }); return; } const existingCategory = categories.find(cat => cat.id !== categoryId && cat.name.toLowerCase() === newName.trim().toLowerCase()); if (existingCategory) { setErrors({ [categoryId]: 'Category name already exists' }); return; } DataService.updateCategory(categoryId, { name: newName.trim() }); setEditingCategory(null); setErrors({}); onUpdate(); };
    const handleDeleteCategory = async (categoryId) => { const expensesUsingCategory = await DataService.getExpensesByCategory(categoryId); if (expensesUsingCategory.length > 0) { setErrors({ delete: `Cannot delete category. It's being used by ${expensesUsingCategory.length} expense(s).` }); setShowDeleteConfirm(null); return; } await DataService.deleteCategory(categoryId); setShowDeleteConfirm(null); setErrors({}); onUpdate(); };
    const handleAddSubcategory = (categoryId) => { if (!newSubcategoryName.trim()) { setErrors({ subcategory: 'Subcategory name is required' }); return; } const category = categories.find(cat => cat.id === categoryId); if (category.subcategories.includes(newSubcategoryName.trim())) { setErrors({ subcategory: 'Subcategory already exists' }); return; } DataService.addSubcategory(categoryId, newSubcategoryName.trim()); setNewSubcategoryName(''); setAddingSubcategoryTo(null); setErrors({}); onUpdate(); };
    const handleDeleteSubcategory = async (categoryId, subcategoryName) => { const expensesUsingSubcategory = await DataService.getExpensesByCategory(categoryId, subcategoryName); if (expensesUsingSubcategory.length > 0) { setErrors({ delete: `Cannot delete subcategory. It's being used by ${expensesUsingSubcategory.length} expense(s).` }); return; } await DataService.removeSubcategory(categoryId, subcategoryName); setErrors({}); onUpdate(); };
    const handleBudgetChange = (categoryId, type, subcategory, value) => { const key = type === 'category' ? 'cat-' + categoryId : 'sub-' + categoryId + '-' + subcategory; setBudgetChanges(prev => ({ ...prev, [key]: value })); };
    const saveBudgetChanges = async () => { try { for (const [key, value] of Object.entries(budgetChanges)) { if (key.startsWith('cat-')) { const categoryId = parseInt(key.replace('cat-', '')); await DataService.setCategoryBudget(categoryId, value, defaultCurrency); } else if (key.startsWith('sub-')) { const parts = key.replace('sub-', '').split('-'); const categoryId = parseInt(parts[0]); const subcategory = parts.slice(1).join('-'); await DataService.setSubcategoryBudget(categoryId, subcategory, value, defaultCurrency); } } setBudgetChanges({}); onUpdate(); } catch (error) { setErrors({ budget: 'Failed to save budget changes' }); } };
    const toggleBudgetMode = async (categoryId) => { const newMode = !categoryBudgetModes[categoryId]; setCategoryBudgetModes(prev => ({ ...prev, [categoryId]: newMode })); await DataService.updateCategory(categoryId, { useSubcategoryBudgets: newMode }); const keysToRemove = Object.keys(budgetChanges).filter(key => key.startsWith('cat-' + categoryId) || key.startsWith('sub-' + categoryId + '-')); setBudgetChanges(prev => { const updated = { ...prev }; keysToRemove.forEach(key => delete updated[key]); return updated; }); onUpdate(); };
    const getCurrentBudgetValue = (categoryId, type, subcategory) => { const key = type === 'category' ? 'cat-' + categoryId : 'sub-' + categoryId + '-' + subcategory; if (budgetChanges[key] !== undefined) return budgetChanges[key]; const category = categories.find(c => c.id === categoryId); if (!category) return ''; if (type === 'category') return category.monthlyBudget || ''; else return (category.subcategoryBudgets && category.subcategoryBudgets[subcategory]) || ''; };
    const hasUnsavedChanges = Object.keys(budgetChanges).length > 0;
    const getCategoryTotalBudget = (category) => { if (categoryBudgetModes[category.id]) { return category.subcategories.reduce((sum, sub) => sum + (parseFloat(getCurrentBudgetValue(category.id, 'subcategory', sub)) || 0), 0); } return parseFloat(getCurrentBudgetValue(category.id, 'category')) || 0; };
    const totalBudget = categories.reduce((sum, category) => sum + getCategoryTotalBudget(category), 0);

    return (
        <div className="screen">
            <div className="screen-header">
                <h2>Category Management & Budgets</h2>
                {hasUnsavedChanges && (<button className="btn btn-success btn-sm" onClick={saveBudgetChanges}><i className="fas fa-save"></i> Save Budget Changes</button>)}
            </div>
            {errors.delete && (<div className="alert alert-danger">{errors.delete}</div>)}
            {hasBudgetCurrencyMismatch && (
                <div className="alert alert-warning d-flex align-items-center justify-content-between" style={{marginBottom: '1rem'}}>
                    <div><i className="fas fa-exclamation-triangle me-2"></i>Budgets were set in a different currency. Reset all to {defaultCurrency}?</div>
                    <button className="btn btn-warning btn-sm ms-2" onClick={handleResetAllBudgets}><i className="fas fa-sync-alt me-1"></i>Reset All Budgets</button>
                </div>
            )}
            <div className="add-category-section">
                <h5>Add New Category</h5>
                <form onSubmit={handleAddCategory} className="add-form">
                    <div className="input-group">
                        <input type="text" className={'form-control ' + (errors.name ? 'is-invalid' : '')} value={newCategoryName} onChange={(e) => { setNewCategoryName(e.target.value); if (errors.name) setErrors(prev => ({ ...prev, name: '' })); }} placeholder="Enter category name" />
                        <button type="submit" className="btn btn-primary"><i className="fas fa-plus"></i> Add</button>
                    </div>
                    {errors.name && <div className="invalid-feedback d-block">{errors.name}</div>}
                </form>
            </div>
            <div className="categories-list">
                {categories.length === 0 ? (
                    <div className="empty-state"><i className="fas fa-tags fa-3x"></i><h4>No categories found</h4><p>Start by adding your first category!</p></div>
                ) : (
                    categories.map(category => (
                        <div key={category.id} className="category-item">
                            <div className="category-header">
                                {editingCategory === category.id ? (
                                    <div className="edit-category-form">
                                        <input type="text" className={'form-control ' + (errors[category.id] ? 'is-invalid' : '')} defaultValue={category.name} onBlur={(e) => handleUpdateCategory(category.id, e.target.value)} onKeyPress={(e) => { if (e.key === 'Enter') handleUpdateCategory(category.id, e.target.value); }} autoFocus />
                                        {errors[category.id] && (<div className="invalid-feedback d-block">{errors[category.id]}</div>)}
                                    </div>
                                ) : (
                                    <div className="category-info"><h6>{category.name}</h6><span className="subcategory-count">{category.subcategories.length} subcategories</span></div>
                                )}
                                <div className="category-actions">

function IncomeForm({ income, onUpdate }) {
    const [people, setPeople] = useState([]);
    const [formData, setFormData] = useState(() => {
        const peopleList = DataService.getPeople();
        const defaultPerson = peopleList.find(p => p.isDefault);
        return { amount: '', date: new Date().toISOString().split('T')[0], source: '', description: '', paidBy: defaultPerson ? defaultPerson.name : '', currency: 'GBP' };
    });
    const [errors, setErrors] = useState({});
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [showSuccess, setShowSuccess] = useState(false);
    const [editingIncome, setEditingIncome] = useState(null);
    const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);

    useEffect(() => { setPeople(DataService.getPeople()); }, []);

    const handleInputChange = (field, value) => { setFormData(prev => ({ ...prev, [field]: value })); if (errors[field]) setErrors(prev => ({ ...prev, [field]: '' })); };

        e.preventDefault(); setIsSubmitting(true);

            setShowSuccess(true);
            setTimeout(() => { setFormData({ amount: '', date: new Date().toISOString().split('T')[0], source: '', description: '', paidBy: '', currency: 'GBP' }); setEditingIncome(null); setShowSuccess(false); onUpdate(); }, 1000);
        } catch (error) { setErrors({ general: 'Failed to save income. Please try again.' }); }
        setIsSubmitting(false);
    };
    const handleEdit = (incomeItem) => { setEditingIncome(incomeItem); setFormData({ amount: incomeItem.amount.toString(), date: incomeItem.date, source: incomeItem.source, description: incomeItem.description || '', paidBy: incomeItem.paidBy || '', currency: incomeItem.currency || 'GBP' }); };

                        </select>
                    </div>
                    <div className="form-group">

                            <span className="input-group-text">{ValidationUtils.getCurrencySymbol(formData.currency)}</span>
                            <input type="number" id="amount" className={'form-control ' + (errors.amount ? 'is-invalid' : '')} value={formData.amount} onChange={(e) => handleInputChange('amount', e.target.value)} placeholder="0.00" step="0.01" min="0" />

                        <label htmlFor="date">Date *</label>

                                    </div>

function Summary({ expenses, income, categories, defaultCurrency }) {
    const [timeRange, setTimeRange] = useState('month');
    const [selectedCategory, setSelectedCategory] = useState('');
    const [selectedPaidBy, setSelectedPaidBy] = useState('');
    const [budgetData, setBudgetData] = useState([]);
    const [convertedExpenses, setConvertedExpenses] = useState([]);
    const [convertedIncome, setConvertedIncome] = useState([]);

    const convertAmountSync = (amount, fromCurrency, toCurrency) => {
        if (!fromCurrency || !toCurrency || fromCurrency === toCurrency) return amount;
        const rates = CurrencyService.fallbackRates[fromCurrency];
        if (rates && rates[toCurrency]) return Math.round(amount * rates[toCurrency] * 100) / 100;
        return amount;
    };

    useEffect(() => {
        const convertAll = async () => {
            const newExpenses = await Promise.all(expenses.map(async (exp) => {
                const expCurrency = exp.currency || 'GBP';
                if (expCurrency === defaultCurrency) return exp;
                try {
                    const converted = await CurrencyService.convertCurrency(exp.amount, expCurrency, defaultCurrency);
                    return { ...exp, amount: converted, currency: defaultCurrency, originalDisplayAmount: exp.amount, originalDisplayCurrency: expCurrency };
                } catch (e) {
                    return { ...exp, amount: convertAmountSync(exp.amount, expCurrency, defaultCurrency), currency: defaultCurrency };
                }
            }));
            const newIncome = await Promise.all(income.map(async (inc) => {
                const incCurrency = inc.currency || 'GBP';
                if (incCurrency === defaultCurrency) return inc;
                try {
                    const converted = await CurrencyService.convertCurrency(inc.amount, incCurrency, defaultCurrency);
                    return { ...inc, amount: converted, currency: defaultCurrency };
                } catch (e) {
                    return { ...inc, amount: convertAmountSync(inc.amount, incCurrency, defaultCurrency), currency: defaultCurrency };
                }
            }));
            setConvertedExpenses(newExpenses);
            setConvertedIncome(newIncome);
        };
        convertAll();
    }, [expenses, income, defaultCurrency]);

    const getEffectiveBudget = (category, now) => {
        const currentMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const currentMonthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        if (category.budgetHistory && category.budgetHistory.length > 0) {
            const midMonthReset = category.budgetHistory.find(h => {
                const endDate = new Date(h.endDate);
                return endDate >= currentMonthStart && endDate <= currentMonthEnd;
            });
            if (midMonthReset) {
                return { amount: midMonthReset.amount, currency: midMonthReset.currency };
            }
        }
        if (category.useSubcategoryBudgets && category.subcategoryBudgets) {
            const total = Object.values(category.subcategoryBudgets).reduce((sum, v) => sum + (v || 0), 0);
            const currency = category.budgetCurrency || (category.subcategoryBudgetCurrencies ? Object.values(category.subcategoryBudgetCurrencies)[0] : null) || defaultCurrency;
            return { amount: total, currency: currency };
        }
        return { amount: category.monthlyBudget || 0, currency: category.budgetCurrency || defaultCurrency };
    };
    const getEffectiveSubcategoryBudget = (category, subcatName, now) => {
        const currentMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const currentMonthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        if (category.subcategoryBudgetHistory && category.subcategoryBudgetHistory[subcatName]) {
            const midMonthReset = category.subcategoryBudgetHistory[subcatName].find(h => {
                const endDate = new Date(h.endDate);
                return endDate >= currentMonthStart && endDate <= currentMonthEnd;
            });
            if (midMonthReset) {
                return { amount: midMonthReset.amount, currency: midMonthReset.currency };
            }
        }
        const amount = (category.subcategoryBudgets && category.subcategoryBudgets[subcatName]) || 0;
        const currency = (category.subcategoryBudgetCurrencies && category.subcategoryBudgetCurrencies[subcatName]) || defaultCurrency;
        return { amount, currency };
    };

    const convertBudgetAmount = async (amount, fromCurrency) => {
        if (!fromCurrency || fromCurrency === defaultCurrency || amount <= 0) return amount;
        try { return await CurrencyService.convertCurrency(amount, fromCurrency, defaultCurrency); }
        catch (e) { return convertAmountSync(amount, fromCurrency, defaultCurrency); }
    };

    useEffect(() => {
        if (timeRange === 'month') {
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            let monthlyExpenses = convertedExpenses.filter(exp => { const d = new Date(exp.date); return d >= startOfMonth && d <= endOfMonth; });
            if (selectedPaidBy) {
                if (selectedPaidBy === 'self') { monthlyExpenses = monthlyExpenses.filter(exp => !exp.paidBy || exp.paidBy.trim() === ''); }
                else { monthlyExpenses = monthlyExpenses.filter(exp => exp.paidBy && exp.paidBy === selectedPaidBy); }
            }
            const buildSummary = async () => {
                const summaryPromises = categories.map(async (category) => {
                    const catExpenses = monthlyExpenses.filter(exp => exp.categoryId === category.id);
                    const totalSpent = catExpenses.reduce((sum, exp) => sum + exp.amount, 0);
                    const effectiveBudget = getEffectiveBudget(category, now);
                    let budget = await convertBudgetAmount(effectiveBudget.amount, effectiveBudget.currency);
                    const subcats = [];
                    if (category.useSubcategoryBudgets) {
                        for (const subcatName of (category.subcategories || [])) {
                            const subcatSpent = catExpenses.filter(exp => exp.subcategory === subcatName).reduce((sum, exp) => sum + exp.amount, 0);
                            const effectiveSubBudget = getEffectiveSubcategoryBudget(category, subcatName, now);
                            let subcatBudget = await convertBudgetAmount(effectiveSubBudget.amount, effectiveSubBudget.currency);
                            if (subcatBudget > 0 || subcatSpent > 0) { subcats.push({ name: subcatName, budget: subcatBudget, spent: subcatSpent, remaining: subcatBudget - subcatSpent, percentage: subcatBudget > 0 ? (subcatSpent / subcatBudget) * 100 : 0 }); }
                        }
                    }
                    return { id: category.id, name: category.name, budget: budget, spent: totalSpent, remaining: budget - totalSpent, percentage: budget > 0 ? (totalSpent / budget) * 100 : 0, subcategories: subcats };
                });
                const summary = (await Promise.all(summaryPromises)).filter(item => item.budget > 0 || item.spent > 0);
                setBudgetData(summary);
            };
            buildSummary();
        } else { setBudgetData([]); }
    }, [timeRange, convertedExpenses, categories, selectedPaidBy, defaultCurrency]);

    const getDateRange = () => {
        const now = new Date(); let startDate, endDate = now;
        switch (timeRange) { case 'week': startDate = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000); break; case 'month': startDate = new Date(now.getFullYear(), now.getMonth(), 1); break; case 'year': startDate = new Date(now.getFullYear(), 0, 1); break; default: startDate = new Date(now.getFullYear(), now.getMonth(), 1); }
        return { startDate, endDate };
    };
    const filterByDateRange = (data) => { const { startDate, endDate } = getDateRange(); return data.filter(item => { const itemDate = new Date(item.date); return itemDate >= startDate && itemDate <= endDate; }); };

    let filteredExpenses = filterByDateRange(convertedExpenses);
    let filteredIncome = filterByDateRange(convertedIncome);
    if (selectedPaidBy) {
        if (selectedPaidBy === 'self') { filteredExpenses = filteredExpenses.filter(expense => !expense.paidBy || expense.paidBy.trim() === ''); filteredIncome = filteredIncome.filter(incomeItem => !incomeItem.paidBy || incomeItem.paidBy.trim() === ''); }
        else { filteredExpenses = filteredExpenses.filter(expense => expense.paidBy && expense.paidBy === selectedPaidBy); filteredIncome = filteredIncome.filter(incomeItem => incomeItem.paidBy && incomeItem.paidBy === selectedPaidBy); }
    }
    const expensePaidBy = convertedExpenses.filter(expense => expense.paidBy && expense.paidBy.trim() !== '').map(expense => expense.paidBy);
    const incomePaidBy = convertedIncome.filter(incomeItem => incomeItem.paidBy && incomeItem.paidBy.trim() !== '').map(incomeItem => incomeItem.paidBy);
    const uniquePaidBy = [...new Set([...expensePaidBy, ...incomePaidBy])].sort();
    const totalExpenses = filteredExpenses.reduce((sum, expense) => sum + expense.amount, 0);
    const totalIncome = filteredIncome.reduce((sum, inc) => sum + inc.amount, 0);
    const netAmount = totalIncome - totalExpenses;
    const expensesByCategory = categories.map(category => { const categoryExpenses = filteredExpenses.filter(expense => expense.categoryId === category.id); const total = categoryExpenses.reduce((sum, expense) => sum + expense.amount, 0); const percentage = totalExpenses > 0 ? (total / totalExpenses) * 100 : 0; return { ...category, total, percentage, count: categoryExpenses.length }; }).filter(category => category.total > 0).sort((a, b) => b.total - a.total);
    const getPreviousPeriodComparison = () => { const { startDate } = getDateRange(); const periodLength = new Date() - startDate; const previousEndDate = new Date(startDate.getTime() - 1); const previousStartDate = new Date(previousEndDate.getTime() - periodLength); const previousExpenses = convertedExpenses.filter(expense => { const expenseDate = new Date(expense.date); return expenseDate >= previousStartDate && expenseDate <= previousEndDate; }); const previousTotal = previousExpenses.reduce((sum, expense) => sum + expense.amount, 0); const change = totalExpenses - previousTotal; const changePercentage = previousTotal > 0 ? (change / previousTotal) * 100 : 0; return { change, changePercentage, previousTotal }; };
    const trendData = getPreviousPeriodComparison();
    const getTopSpendingDays = () => { const dailySpending = {}; filteredExpenses.forEach(expense => { const date = expense.date; dailySpending[date] = (dailySpending[date] || 0) + expense.amount; }); return Object.entries(dailySpending).sort(([,a], [,b]) => b - a).slice(0, 5).map(([date, amount]) => ({ date, amount })); };
    const topSpendingDays = getTopSpendingDays();
    const { startDate, endDate } = getDateRange();
    const daysDiff = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) || 1;
    const avgDailySpending = totalExpenses / daysDiff;

    return (
        <div className="screen">
            <div className="screen-header">
                <h2>Financial Summary</h2>
                <div className="summary-filters">
                    <div className="filter-group">
                        <label className="filter-label">Time Period:</label>
                        <select className="form-select form-select-sm" value={timeRange} onChange={(e) => setTimeRange(e.target.value)}>
                            <option value="week">This Week</option><option value="month">This Month</option><option value="year">This Year</option>
                        </select>
                    </div>
                    <div className="filter-group">
                        <label className="filter-label">Filter by Person:</label>
                        <select className="form-select form-select-sm" value={selectedPaidBy} onChange={(e) => setSelectedPaidBy(e.target.value)}>
                            <option value="">All People</option><option value="self">My Money Only</option>
                            {uniquePaidBy.map(person => (<option key={person} value={person}>{person}'s Money Only</option>))}
                        </select>
                    </div>
                </div>
            </div>
            <div className="summary-cards">
                <div className="summary-card income"><div className="card-icon"><i className="fas fa-arrow-up"></i></div><div className="card-content"><h6>Total Income</h6><div className="amount">{ValidationUtils.formatCurrency(totalIncome, defaultCurrency)}</div>{selectedPaidBy && (<div className="filter-info">{selectedPaidBy === 'self' ? 'Your income only' : selectedPaidBy + "'s income only"}</div>)}</div></div>
                <div className="summary-card expense"><div className="card-icon"><i className="fas fa-arrow-down"></i></div><div className="card-content"><h6>Total Expenses</h6><div className="amount">{ValidationUtils.formatCurrency(totalExpenses, defaultCurrency)}</div>{selectedPaidBy && (<div className="filter-info">{selectedPaidBy === 'self' ? 'Your expenses only' : selectedPaidBy + "'s expenses only"}</div>)}{trendData.changePercentage !== 0 && (<div className={'trend ' + (trendData.change > 0 ? 'negative' : 'positive')}><i className={'fas fa-arrow-' + (trendData.change > 0 ? 'up' : 'down')}></i>{Math.abs(trendData.changePercentage).toFixed(1)}% vs last period</div>)}</div></div>
                <div className={'summary-card ' + (netAmount >= 0 ? 'positive' : 'negative')}><div className="card-icon"><i className={'fas fa-' + (netAmount >= 0 ? 'plus' : 'minus')}></i></div><div className="card-content"><h6>Net Amount</h6><div className="amount">{ValidationUtils.formatCurrency(Math.abs(netAmount), defaultCurrency)}</div><div className="trend">{netAmount >= 0 ? 'Surplus' : 'Deficit'}</div></div></div>
                <div className="summary-card info"><div className="card-icon"><i className="fas fa-calendar-day"></i></div><div className="card-content"><h6>Daily Average</h6><div className="amount">{ValidationUtils.formatCurrency(avgDailySpending, defaultCurrency)}</div><div className="trend">{daysDiff} days</div></div></div>
            </div>
            {timeRange === 'month' && budgetData.length > 0 && (
                <div className="budget-overview">
                    <h5><i className="fas fa-calculator"></i> Monthly Budget Overview</h5>
                    <div className="budget-list">
                        {budgetData.map(budgetItem => (
                            <div key={budgetItem.id} className="budget-item">
                                <div className="budget-info">
                                    <div className="budget-name">{budgetItem.name}</div>
                                    <div className="budget-bar"><div className={'budget-bar-fill ' + (budgetItem.percentage > 100 ? 'over-budget' : budgetItem.percentage > 85 ? 'near-budget' : 'under-budget')} style={{ width: Math.min(budgetItem.percentage, 100) + '%' }}></div></div>
                                    <div className="budget-amounts">
                                        <span className="budget-spent">Spent: {ValidationUtils.formatCurrency(budgetItem.spent, defaultCurrency)}</span>
                                        <span className={'budget-remaining ' + (budgetItem.remaining >= 0 ? 'positive' : 'negative')}>{budgetItem.remaining >= 0 ? 'Remaining: ' : 'Over by: '}{ValidationUtils.formatCurrency(Math.abs(budgetItem.remaining), defaultCurrency)}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            )}
            {expensesByCategory.length > 0 && (
                <div className="category-breakdown">
                    <h5>Expenses by Category</h5>
                    <div className="category-list">
                        {expensesByCategory.map(category => (
                            <div key={category.id} className="category-breakdown-item">
                                <div className="category-info"><div className="category-name">{category.name}</div><div className="category-details">{category.count} transaction{category.count !== 1 ? 's' : ''}</div></div>
                                <div className="category-amount"><div className="amount">{ValidationUtils.formatCurrency(category.total, defaultCurrency)}</div><div className="percentage">{category.percentage.toFixed(1)}%</div></div>
                                <div className="category-bar"><div className="bar-fill" style={{ width: category.percentage + '%' }}></div></div>
                            </div>
                        ))}
                    </div>
                </div>
            )}
            {topSpendingDays.length > 0 && (
                <div className="top-spending-days">
                    <h5>Top Spending Days</h5>
                    <div className="spending-days-list">
                        {topSpendingDays.map((day, index) => (
                            <div key={day.date} className="spending-day-item"><div className="day-rank">#{index + 1}</div><div className="day-info"><div className="day-date">{ValidationUtils.formatDate(day.date)}</div></div><div className="day-amount">{ValidationUtils.formatCurrency(day.amount, defaultCurrency)}</div></div>
                        ))}
                    </div>
                </div>
            )}
            <div className="quick-stats">
                <h5>Quick Stats</h5>
                <div className="stats-grid">
                    <div className="stat-item"><div className="stat-label">Total Transactions</div><div className="stat-value">{filteredExpenses.length}</div></div>
                    <div className="stat-item"><div className="stat-label">Largest Expense</div><div className="stat-value">{filteredExpenses.length > 0 ? ValidationUtils.formatCurrency(Math.max(...filteredExpenses.map(e => e.amount)), defaultCurrency) : ValidationUtils.formatCurrency(0, defaultCurrency)}</div></div>
                    <div className="stat-item"><div className="stat-label">Categories Used</div><div className="stat-value">{expensesByCategory.length}</div></div>
                    <div className="stat-item"><div className="stat-label">Savings Rate</div><div className="stat-value">{totalIncome > 0 ? ((netAmount / totalIncome) * 100).toFixed(1) + '%' : 'N/A'}</div></div>
                </div>
            </div>
            {filteredExpenses.length === 0 && filteredIncome.length === 0 && (
                <div className="empty-state"><i className="fas fa-chart-bar fa-3x"></i><h4>No financial data for this period</h4><p>Add some income and expenses to see your financial summary.</p></div>
            )}
        </div>
    );
}
