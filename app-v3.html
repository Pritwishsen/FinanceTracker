}

function ProfileScreen({ currentUser, onLogout, onUpdate }) {
    const [user, setUser] = useState({ ...currentUser });
    const [editingName, setEditingName] = useState(false);
    const [newName, setNewName] = useState(user.displayName || '');
    const [nameError, setNameError] = useState('');
    const [nameSaving, setNameSaving] = useState(false);
    const [nameSuccess, setNameSuccess] = useState('');
    const [currPw, setCurrPw] = useState('');
    const [newPw, setNewPw] = useState('');
    const [confirmPw, setConfirmPw] = useState('');
    const [pwError, setPwError] = useState('');
    const [pwSuccess, setPwSuccess] = useState('');
    const [showCurrPw, setShowCurrPw] = useState(false);
    const [showNewPw, setShowNewPw] = useState(false);
    const [showConfirmPw, setShowConfirmPw] = useState(false);
    const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);

    const handleSaveName = async () => {
        const trimmed = newName.trim();
        if (!trimmed || trimmed.length < 2) { setNameError('Name must be at least 2 characters'); return; }
        if (trimmed.length > 50) { setNameError('Name must be 50 characters or fewer'); return; }
        if (!/^[a-zA-Z\s\-']+$/.test(trimmed)) { setNameError("Only letters, spaces, hyphens and apostrophes allowed"); return; }
        setNameSaving(true);
        try {
            const oldName = user.displayName;
            if (oldName && oldName !== trimmed) DataService.migratePersonName(oldName, trimmed);
            const people = DataService.getPeople();
            const match = people.find(p => p.name === oldName && p.systemManaged);
            if (match) { try { DataService.updatePerson(match.id, { name: trimmed }); } catch (_) {} }
            const updated = { ...user, displayName: trimmed };
            localStorage.setItem('financeApp_currentUser', JSON.stringify(updated));
            await DataService.updateSettings({ displayName: trimmed });
            setUser(updated);
            setEditingName(false);
            setNameSuccess('Display name updated.');
            setTimeout(() => setNameSuccess(''), 3000);
            if (onUpdate) onUpdate();
        } catch (e) { setNameError('Failed to save. Please try again.'); }
        setNameSaving(false);
    };

    const handleChangePw = () => {
        setPwError(''); setPwSuccess('');
        const stored = (() => { try { return JSON.parse(localStorage.getItem('financeApp_currentUser') || '{}'); } catch (_) { return {}; } })();
        if (stored.password !== currPw) { setPwError('Current password is incorrect.'); return; }
        if (!newPw || newPw.length < 8) { setPwError('New password must be at least 8 characters.'); return; }
        if (newPw !== confirmPw) { setPwError('New passwords do not match.'); return; }
        stored.password = newPw;
        localStorage.setItem('financeApp_currentUser', JSON.stringify(stored));
        setCurrPw(''); setNewPw(''); setConfirmPw('');
        setPwSuccess('Password changed successfully.');
        setTimeout(() => setPwSuccess(''), 4000);
    };

    const handleLogoutConfirm = () => {
        localStorage.removeItem('financeApp_session_expiry');
        sessionStorage.removeItem('financeApp_session_active');
        onLogout();
    };

    const gradientBtn = { background: 'linear-gradient(135deg,#4a6cf7,#6a3de8)', border: 'none' };
    const providerLabel = { email: 'Email & Password', google: 'Google', facebook: 'Facebook' };
    const createdDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : '—';

    return (
        <div className="p-3" style={{maxWidth: '480px', margin: '0 auto'}}>
            <div className="card mb-3 shadow-sm">
                <div className="card-header fw-semibold"><i className="fas fa-user-circle me-2 text-primary"></i>Profile Details</div>
                <div className="card-body">
                    {nameSuccess && <div className="alert alert-success py-2 small mb-3">{nameSuccess}</div>}
                    <div className="mb-3">
                        <label className="form-label fw-semibold small text-muted text-uppercase" style={{fontSize: '0.7rem', letterSpacing: '0.05em'}}>Display Name</label>
                        {editingName ? (
                            <div>
                                <input type="text" className={'form-control mb-2' + (nameError ? ' is-invalid' : '')} value={newName} onChange={e => { setNewName(e.target.value); setNameError(''); }} autoFocus />
                                {nameError && <div className="invalid-feedback d-block mb-2">{nameError}</div>}
                                <div className="d-flex gap-2">
                                    <button className="btn btn-primary btn-sm fw-semibold" onClick={handleSaveName} disabled={nameSaving} style={gradientBtn}>{nameSaving ? 'Saving…' : 'Save'}</button>
                                    <button className="btn btn-outline-secondary btn-sm" onClick={() => { setEditingName(false); setNewName(user.displayName || ''); setNameError(''); }}>Cancel</button>
                                </div>
                            </div>
                        ) : (
                            <div className="d-flex align-items-center gap-2">
                                <span className="fw-semibold">{user.displayName}</span>
                                <button className="btn btn-outline-secondary btn-sm" onClick={() => { setEditingName(true); setNewName(user.displayName || ''); }}><i className="fas fa-pencil-alt me-1"></i>Edit</button>
                            </div>
                        )}
                    </div>
                    <div className="mb-3">
                        <label className="form-label fw-semibold small text-muted text-uppercase" style={{fontSize: '0.7rem', letterSpacing: '0.05em'}}>Email</label>
                        <div className="p-2 rounded bg-light text-muted small">{user.email || '—'}</div>
                    </div>
                    <div className="mb-3">
                        <label className="form-label fw-semibold small text-muted text-uppercase" style={{fontSize: '0.7rem', letterSpacing: '0.05em'}}>Sign-in Method</label>
                        <div className="p-2 rounded bg-light text-muted small">{providerLabel[user.authProvider] || user.authProvider || '—'}</div>
                    </div>
                    <div>
                        <label className="form-label fw-semibold small text-muted text-uppercase" style={{fontSize: '0.7rem', letterSpacing: '0.05em'}}>Account Created</label>
                        <div className="p-2 rounded bg-light text-muted small">{createdDate}</div>
                    </div>
                </div>
            </div>

            {user.authProvider === 'email' && (
                <div className="card mb-3 shadow-sm">
                    <div className="card-header fw-semibold"><i className="fas fa-lock me-2 text-primary"></i>Change Password</div>
                    <div className="card-body">
                        {pwError && <div className="alert alert-danger py-2 small mb-3">{pwError}</div>}
                        {pwSuccess && <div className="alert alert-success py-2 small mb-3">{pwSuccess}</div>}
                        <div className="mb-3">
                            <label className="form-label fw-semibold small">Current Password</label>
                            <div className="input-group">
                                <input type={showCurrPw ? 'text' : 'password'} className="form-control" value={currPw} onChange={e => { setCurrPw(e.target.value); setPwError(''); }} autoComplete="current-password" />
                                <button type="button" className="btn btn-outline-secondary" onClick={() => setShowCurrPw(v => !v)} tabIndex={-1}><i className={'fas fa-' + (showCurrPw ? 'eye-slash' : 'eye')}></i></button>
                            </div>
                        </div>
                        <div className="mb-3">
                            <label className="form-label fw-semibold small">New Password <span className="text-muted fw-normal">(min. 8 characters)</span></label>
                            <div className="input-group">
                                <input type={showNewPw ? 'text' : 'password'} className="form-control" value={newPw} onChange={e => { setNewPw(e.target.value); setPwError(''); }} autoComplete="new-password" />
                                <button type="button" className="btn btn-outline-secondary" onClick={() => setShowNewPw(v => !v)} tabIndex={-1}><i className={'fas fa-' + (showNewPw ? 'eye-slash' : 'eye')}></i></button>
                            </div>
                        </div>
                        <div className="mb-3">
                            <label className="form-label fw-semibold small">Confirm New Password</label>
                            <div className="input-group">
                                <input type={showConfirmPw ? 'text' : 'password'} className="form-control" value={confirmPw} onChange={e => { setConfirmPw(e.target.value); setPwError(''); }} autoComplete="new-password" />
                                <button type="button" className="btn btn-outline-secondary" onClick={() => setShowConfirmPw(v => !v)} tabIndex={-1}><i className={'fas fa-' + (showConfirmPw ? 'eye-slash' : 'eye')}></i></button>
                            </div>
                        </div>
                        <button className="btn btn-primary w-100 fw-semibold" onClick={handleChangePw} style={gradientBtn}>Change Password</button>
                    </div>
                </div>
            )}

            <div className="card shadow-sm">
                <div className="card-body text-center">
                    <p className="text-muted small mb-3">Your expenses, income and settings stay on this device — only your session is cleared.</p>
                    <button className="btn btn-danger w-100 fw-semibold py-2" onClick={() => setShowLogoutConfirm(true)}><i className="fas fa-sign-out-alt me-2"></i>Log Out</button>
                </div>
            </div>

            {showLogoutConfirm && (
                <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}}>
                    <div className="modal-dialog modal-dialog-centered">
                        <div className="modal-content">
                            <div className="modal-header"><h5 className="modal-title"><i className="fas fa-sign-out-alt me-2"></i>Log Out</h5></div>
                            <div className="modal-body"><p className="mb-0">Are you sure you want to log out? Your data will remain safe on this device.</p></div>
                            <div className="modal-footer">
                                <button className="btn btn-secondary" onClick={() => setShowLogoutConfirm(false)}>Cancel</button>
                                <button className="btn btn-danger fw-semibold" onClick={handleLogoutConfirm}>Log Out</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

function MonthlyTrends({ expenses, income, categories, defaultCurrency, currentUser, onMonthSelect }) {
    const [timeWindow, setTimeWindow] = useState(() => sessionStorage.getItem('trends_timeWindow') || '6m');
    const [selectedPerson, setSelectedPerson] = useState(() => sessionStorage.getItem('trends_person') || '__me__');
    const [selectedCats, setSelectedCats] = useState(() => { try { return JSON.parse(sessionStorage.getItem('trends_cats') || '[]'); } catch(_) { return []; } });
    const [showCatFilter, setShowCatFilter] = useState(false);
    const [expanded, setExpanded] = useState({});
    const [people] = useState(() => DataService.getPeople());

    const setTw = (v) => { setTimeWindow(v); sessionStorage.setItem('trends_timeWindow', v); };
    const setPerson = (v) => { setSelectedPerson(v); sessionStorage.setItem('trends_person', v); };
    const setCats = (fn) => { setSelectedCats(prev => { const next = typeof fn === 'function' ? fn(prev) : fn; sessionStorage.setItem('trends_cats', JSON.stringify(next)); return next; }); };

    const toggle = (key) => setExpanded(prev => ({ ...prev, [key]: !prev[key] }));

    const convertSync = (amount, from, to) => {
        if (!from || !to || from === to) return amount;
        const rates = CurrencyService.fallbackRates[from];
        if (rates && rates[to]) return Math.round(amount * rates[to] * 100) / 100;
        return amount;
    };
    const fmt = (n) => ValidationUtils.formatCurrency(n, defaultCurrency);

    const getMonths = () => {
        const now = new Date();
        const months = [];
        if (timeWindow === 'year') {
            for (let m = 0; m <= now.getMonth(); m++) months.push({ year: now.getFullYear(), month: m });
        } else {
            const count = timeWindow === '3m' ? 3 : timeWindow === '12m' ? 12 : 6;
            for (let i = count - 1; i >= 0; i--) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                months.push({ year: d.getFullYear(), month: d.getMonth() });
            }
        }
        return months;
    };

    const months = getMonths();
    const now = new Date();
    const curYear = now.getFullYear(), curMonth = now.getMonth();
    const personName = currentUser ? (currentUser.displayName || 'Me') : 'Me';

    const myName = (currentUser ? (currentUser.displayName || '') : '').toLowerCase().trim();

    const filteredExpenses = (() => {
        let exps = expenses;
        if (selectedPerson === '__me__') {
            exps = exps.filter(e => {
                const pb = (e.paidBy || '').toLowerCase().trim();
                return !pb || (myName && pb === myName);
            });
        } else if (selectedPerson !== '__all__') {
            exps = exps.filter(e => (e.paidBy || '').trim() === selectedPerson);
        }
        if (selectedCats.length > 0) exps = exps.filter(e => selectedCats.includes(e.categoryId));
        return exps;
    })();

    const filteredIncome = (() => {
        if (selectedPerson === '__all__') return income;
        if (selectedPerson === '__me__') {
            return income.filter(i => {
                const wi = (i.whosIncome || i.paidBy || '').toLowerCase().trim();
                return !wi || (myName && wi === myName);
            });
        }
        return income.filter(i => (i.whosIncome || i.paidBy || '').trim() === selectedPerson);
    })();

    const monthData = months.map(({ year, month }) => {
        const mm = String(month + 1).padStart(2, '0');
        const prefix = `${year}-${mm}`;
        const me = filteredExpenses.filter(e => (e.date || '').startsWith(prefix));
        const mi = filteredIncome.filter(i => (i.date || '').startsWith(prefix));
        const totalExp = me.reduce((s, e) => s + convertSync(e.amount, e.currency || 'GBP', defaultCurrency), 0);
        const totalInc = mi.reduce((s, i) => s + convertSync(i.amount, i.currency || 'GBP', defaultCurrency), 0);
        const net = totalInc - totalExp;
        const savingsRate = totalInc > 0 ? ((totalInc - totalExp) / totalInc) * 100 : null;
        const isCurrent = year === curYear && month === curMonth;
        const lastDay = new Date(year, month + 1, 0).getDate();
        const from = `${year}-${mm}-01`;
        const to = `${year}-${mm}-${String(lastDay).padStart(2, '0')}`;
        const label = new Date(year, month, 1).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
        const shortLabel = new Date(year, month, 1).toLocaleDateString('en-GB', { month: 'short' });

        const catBreakdown = {};
        categories.forEach(cat => {
            const catExps = me.filter(e => e.categoryId === cat.id);
            if (catExps.length === 0) return;
            const total = catExps.reduce((s, e) => s + convertSync(e.amount, e.currency || 'GBP', defaultCurrency), 0);
            const subBreakdown = {};
            catExps.forEach(e => { if (e.subcategory) subBreakdown[e.subcategory] = (subBreakdown[e.subcategory] || 0) + convertSync(e.amount, e.currency || 'GBP', defaultCurrency); });
            catBreakdown[cat.id] = { total, subBreakdown, catName: cat.name };
        });

        const incomeBreakdown = {};
        mi.forEach(i => { const src = i.source || 'Other'; incomeBreakdown[src] = (incomeBreakdown[src] || 0) + convertSync(i.amount, i.currency || 'GBP', defaultCurrency); });

        return { year, month, prefix, label, shortLabel, totalExp, totalInc, net, savingsRate, isCurrent, from, to, catBreakdown, incomeBreakdown };
    });

    const completeMonths = monthData.filter(m => !m.isCurrent && (m.totalExp > 0 || m.totalInc > 0));

    const maxVal = Math.max(...monthData.flatMap(m => [m.totalInc, m.totalExp]), 1);
    const minNet = Math.min(...monthData.map(m => m.net), 0);
    const totalRange = maxVal - minNet;
    const svgW = 420, ChartH = 180, padL = 52, padR = 10, padT = 22, padB = 28;
    const chartW = svgW - padL - padR, chartH = ChartH - padT - padB;
    const n = monthData.length;
    const slotW = chartW / Math.max(n, 1);
    const barW = Math.min(slotW * 0.3, 13);
    const toY = (v) => padT + ((maxVal - v) / totalRange) * chartH;
    const zeroY = toY(0);
    const fmtTick = (v) => { if (v >= 1000000) return (v/1000000).toFixed(1)+'M'; if (v >= 1000) return (v/1000).toFixed(0)+'k'; return Math.round(v)+''; };

    const netPoints = monthData.map((m, i) => `${padL + (i + 0.5) * slotW},${toY(m.net)}`).join(' ');
    const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => minNet + f * totalRange);

    return (
        <div className="screen">
            <div className="screen-header"><h2><i className="fas fa-chart-line me-2"></i>Monthly Trends</h2></div>

            <div style={{padding:'0 1rem 0.6rem'}}>
                <div className="btn-group w-100" role="group">
                    {[['3m','3M'],['6m','6M'],['12m','12M'],['year','This Year']].map(([v,l]) => (
                        <button key={v} type="button" className={'btn btn-sm ' + (timeWindow === v ? 'btn-primary' : 'btn-outline-primary')} onClick={() => setTw(v)} style={{fontSize:'0.75rem'}}>{l}</button>
                    ))}
                </div>
            </div>

            <div style={{padding:'0 1rem 0.6rem',display:'flex',gap:'8px',flexWrap:'wrap'}}>
                <select className="form-select form-select-sm" style={{flex:'1',minWidth:'150px'}} value={selectedPerson} onChange={e => setPerson(e.target.value)}>
                    <option value="__me__">My expenses ({personName})</option>
                    <option value="__all__">Everyone</option>
                    {people.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                </select>
                <button type="button" className={'btn btn-sm ' + (selectedCats.length > 0 ? 'btn-primary' : 'btn-outline-secondary')} onClick={() => setShowCatFilter(v => !v)} style={{whiteSpace:'nowrap'}}>
                    <i className="fas fa-filter me-1"></i>Categories{selectedCats.length > 0 ? ` (${selectedCats.length})` : ''}
                </button>
            </div>

            {showCatFilter && (
                <div style={{padding:'0 1rem 0.75rem'}}>
                    <div style={{background:'#f8f9fa',borderRadius:'8px',padding:'0.5rem 0.6rem'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.4rem'}}>
                            <span style={{fontSize:'0.78rem',color:'#6c757d',fontWeight:600}}>Filter by category</span>
                            {selectedCats.length > 0 && <button type="button" className="btn btn-sm btn-link p-0" style={{fontSize:'0.75rem'}} onClick={() => setCats([])}>Clear all</button>}
                        </div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                            {categories.map(cat => (
                                <button key={cat.id} type="button"
                                    className={'btn btn-sm ' + (selectedCats.includes(cat.id) ? 'btn-primary' : 'btn-outline-secondary')}
                                    style={{fontSize:'0.73rem',padding:'2px 8px'}}
                                    onClick={() => setCats(prev => prev.includes(cat.id) ? prev.filter(id => id !== cat.id) : [...prev, cat.id])}>
                                    {cat.name}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            )}

            {completeMonths.length < 2 ? (
                <div style={{textAlign:'center',padding:'3rem 1rem'}}>
                    <i className="fas fa-chart-line fa-3x text-muted" style={{display:'block',marginBottom:'1rem'}}></i>
                    <h5 className="text-muted">Not enough data yet</h5>
                    <p className="text-muted small">Add expenses over at least 2 months to see trends.</p>
                </div>
            ) : (
                <React.Fragment>
                    <div style={{padding:'0 1rem 0.5rem',overflowX:'auto'}}>
                        <svg viewBox={`0 0 ${svgW} ${ChartH}`} style={{width:'100%',minWidth:Math.max(svgW, n*32)+'px',height:'auto',display:'block'}}>
                            {yTicks.map((val, fi) => {
                                const y = toY(val);
                                return (
                                    <React.Fragment key={fi}>
                                        <line x1={padL} y1={y} x2={svgW - padR} y2={y} stroke={val === 0 ? '#adb5bd' : '#e9ecef'} strokeWidth={val === 0 ? 1.5 : 1}/>
                                        <text x={padL - 3} y={y + 3.5} textAnchor="end" fontSize="8.5" fill="#6c757d">{fmtTick(val)}</text>
                                    </React.Fragment>
                                );
                            })}
                            {monthData.map((m, i) => {
                                const cx = padL + (i + 0.5) * slotW;
                                const incH = Math.max(0, (m.totalInc / totalRange) * chartH);
                                const expH = Math.max(0, (m.totalExp / totalRange) * chartH);
                                return (
                                    <React.Fragment key={`${m.year}-${m.month}`}>
                                        <rect x={cx - barW - 1} y={zeroY - incH} width={barW} height={incH} fill="#198754" opacity={m.isCurrent ? 0.4 : 0.82} rx="1.5"/>
                                        <rect x={cx + 1} y={zeroY - expH} width={barW} height={expH} fill="#fd7e14" opacity={m.isCurrent ? 0.4 : 0.82} rx="1.5"/>
                                        <text x={cx} y={ChartH - padB + 12} textAnchor="middle" fontSize="9" fill={m.isCurrent ? '#adb5bd' : '#495057'}>{m.shortLabel}</text>
                                    </React.Fragment>
                                );
                            })}
                            {n > 1 && <polyline points={netPoints} fill="none" stroke="#0d6efd" strokeWidth="2" strokeLinejoin="round"/>}
                            {n > 1 && monthData.map((m, i) => {
                                const cx = padL + (i + 0.5) * slotW;
                                return <circle key={i} cx={cx} cy={toY(m.net)} r="2.5" fill={m.net >= 0 ? '#0d6efd' : '#dc3545'}/>;
                            })}
                            <rect x={padL} y={padT - 16} width={7} height={7} fill="#198754" rx="1"/>
                            <text x={padL + 9} y={padT - 9} fontSize="9" fill="#495057">Income</text>
                            <rect x={padL + 48} y={padT - 16} width={7} height={7} fill="#fd7e14" rx="1"/>
                            <text x={padL + 57} y={padT - 9} fontSize="9" fill="#495057">Expenses</text>
                            <line x1={padL + 106} y1={padT - 12} x2={padL + 116} y2={padT - 12} stroke="#0d6efd" strokeWidth="2"/>
                            <circle cx={padL + 111} cy={padT - 12} r="2.5" fill="#0d6efd"/>
                            <text x={padL + 119} y={padT - 9} fontSize="9" fill="#495057">Net</text>
                        </svg>
                    </div>

                    <div style={{padding:'0 1rem 1rem'}}>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 70px 70px 62px 52px',gap:'4px',padding:'0 10px 0.3rem',fontSize:'0.7rem',color:'#6c757d',fontWeight:600}}>
                            <span>Month</span>
                            <span style={{textAlign:'right',color:'#198754'}}>Income</span>
                            <span style={{textAlign:'right',color:'#fd7e14'}}>Expenses</span>
                            <span style={{textAlign:'right'}}>Net</span>
                            <span style={{textAlign:'right'}}>Savings%</span>
                        </div>

                        {monthData.map(m => {
                            const expKey = `${m.prefix}:exp`;
                            const incKey = `${m.prefix}:inc`;
                            const hasCat = Object.keys(m.catBreakdown).length > 0;
                            const hasInc = Object.keys(m.incomeBreakdown).length > 0;
                            const paidByFilter = selectedPerson === '__all__' ? '' : selectedPerson === '__me__' ? '__mine__' : selectedPerson;
                            return (
                                <div key={m.prefix} style={{marginBottom:'6px',border:'1px solid',borderColor:m.isCurrent?'#adb5bd':'#dee2e6',borderStyle:m.isCurrent?'dashed':'solid',borderRadius:'8px',overflow:'hidden'}}>
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 70px 70px 62px 52px',gap:'4px',alignItems:'center',padding:'8px 10px',background:m.isCurrent?'#f8f9fa':'#fff'}}>
                                        <div style={{fontWeight:600,fontSize:'0.85rem'}}>
                                            {m.label}
                                            {m.isCurrent && <span className="badge bg-secondary ms-1" style={{fontSize:'0.6rem'}}>current</span>}
                                        </div>
                                        <div style={{fontSize:'0.8rem',color:'#198754',textAlign:'right'}}>{m.totalInc > 0 ? fmt(m.totalInc) : <span style={{color:'#adb5bd'}}>—</span>}</div>
                                        <div style={{fontSize:'0.8rem',color:'#fd7e14',textAlign:'right',cursor:m.totalExp>0?'pointer':'default',textDecoration:m.totalExp>0?'underline':'none',textDecorationColor:'#fd7e14',textUnderlineOffset:'2px'}}
                                            onClick={() => m.totalExp > 0 && onMonthSelect(m.from, m.to, paidByFilter)}
                                            title={m.totalExp > 0 ? `View ${m.label} expenses` : undefined}>
                                            {m.totalExp > 0 ? fmt(m.totalExp) : <span style={{color:'#adb5bd'}}>—</span>}
                                        </div>
                                        <div style={{fontSize:'0.8rem',fontWeight:600,textAlign:'right',color:(m.totalInc>0||m.totalExp>0)?(m.net>=0?'#198754':'#dc3545'):'#adb5bd'}}>
                                            {(m.totalInc > 0 || m.totalExp > 0) ? fmt(m.net) : '—'}
                                        </div>
                                        <div style={{fontSize:'0.78rem',color:'#6c757d',textAlign:'right'}}>
                                            {m.savingsRate !== null ? m.savingsRate.toFixed(0)+'%' : 'N/A'}
                                        </div>
                                    </div>
                                    {(hasCat || hasInc) && (
                                        <div style={{display:'flex',gap:'4px',padding:'3px 10px 5px',borderTop:'1px solid #f0f0f0',background:'#fafafa'}}>
                                            {hasCat && (
                                                <button type="button" className={'btn btn-sm ' + (expanded[expKey] ? 'btn-warning' : 'btn-outline-secondary')}
                                                    style={{fontSize:'0.7rem',padding:'1px 8px'}}
                                                    onClick={e => { e.stopPropagation(); toggle(expKey); }}>
                                                    <i className={'fas fa-' + (expanded[expKey] ? 'minus' : 'plus') + ' me-1'}></i>Expenses
                                                </button>
                                            )}
                                            {hasInc && (
                                                <button type="button" className={'btn btn-sm ' + (expanded[incKey] ? 'btn-success' : 'btn-outline-secondary')}
                                                    style={{fontSize:'0.7rem',padding:'1px 8px'}}
                                                    onClick={e => { e.stopPropagation(); toggle(incKey); }}>
                                                    <i className={'fas fa-' + (expanded[incKey] ? 'minus' : 'plus') + ' me-1'}></i>Income
                                                </button>
                                            )}
                                        </div>
                                    )}
                                    {expanded[expKey] && hasCat && (
                                        <div style={{borderTop:'1px solid #f0f0f0'}}>
                                            {Object.entries(m.catBreakdown).sort((a,b) => b[1].total - a[1].total).map(([catId, data]) => {
                                                const catKey = `${m.prefix}:cat:${catId}`;
                                                const hasSubs = Object.keys(data.subBreakdown).length > 0;
                                                return (
                                                    <div key={catId}>
                                                        <div style={{display:'flex',alignItems:'center',padding:'5px 10px 5px 18px',gap:'6px',background:'#fff9f0'}}>
                                                            {hasSubs
                                                                ? <button type="button" className="btn btn-sm btn-outline-secondary" style={{fontSize:'0.65rem',padding:'0 5px',lineHeight:'1.4',minWidth:'20px'}} onClick={e => { e.stopPropagation(); toggle(catKey); }}>
                                                                    <i className={'fas fa-' + (expanded[catKey] ? 'minus' : 'plus')}></i>
                                                                  </button>
                                                                : <span style={{width:'22px',display:'inline-block'}}></span>
                                                            }
                                                            <span style={{flex:1,fontSize:'0.8rem',fontWeight:500}}>{data.catName}</span>
                                                            <span style={{fontSize:'0.8rem',color:'#fd7e14',fontWeight:600}}>{fmt(data.total)}</span>
                                                        </div>
                                                        {expanded[catKey] && hasSubs && Object.entries(data.subBreakdown).sort((a,b) => b[1]-a[1]).map(([sub, amt]) => (
                                                            <div key={sub} style={{display:'flex',padding:'3px 10px 3px 46px',fontSize:'0.77rem',color:'#6c757d',background:'#fffdf8'}}>
                                                                <span style={{flex:1}}>{sub}</span>
                                                                <span>{fmt(amt)}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                    {expanded[incKey] && hasInc && (
                                        <div style={{borderTop:'1px solid #f0f0f0'}}>
                                            {Object.entries(m.incomeBreakdown).sort((a,b) => b[1]-a[1]).map(([src, amt]) => (
                                                <div key={src} style={{display:'flex',padding:'5px 10px 5px 18px',fontSize:'0.8rem',background:'#f0fff4'}}>
                                                    <span style={{flex:1,color:'#495057'}}><i className="fas fa-arrow-circle-down me-1 text-success"></i>{src}</span>
                                                    <span style={{color:'#198754',fontWeight:600}}>{fmt(amt)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </React.Fragment>
            )}
        </div>
    );
}

function App() {
    const [currentScreen, setCurrentScreen] = useState('expenses');
    const [expenses, setExpenses] = useState([]);
    const [income, setIncome] = useState([]);
    const [categories, setCategories] = useState([]);
    const [defaultCurrency, setDefaultCurrency] = useState('GBP');
    const [people, setPeople] = useState([]);
    const [budgetAlerts, setBudgetAlerts] = useState([]);
    const [billsDueSoon, setBillsDueSoon] = useState([]);
    const [expensesInitDateFrom, setExpensesInitDateFrom] = useState('');
    const [expensesInitDateTo, setExpensesInitDateTo] = useState('');
    const [expensesInitPaidBy, setExpensesInitPaidBy] = useState('');
    const [currentUser, setCurrentUser] = useState(() => {
        try {
            const expiry = parseInt(localStorage.getItem('financeApp_session_expiry') || '0');
            const sessionActive = sessionStorage.getItem('financeApp_session_active') === 'true';
            if (expiry > Date.now() || sessionActive) {
                return JSON.parse(localStorage.getItem('financeApp_currentUser') || 'null');
            }
            return null;
        } catch (_) { return null; }
    });

    useEffect(() => {
        const loadData = async () => {
            try {
                await DataService.processRecurringSchedules();
                const lastBackup = localStorage.getItem('financeApp_lastAutoBackup');
                const todayStr = new Date().toISOString().split('T')[0];
                const appSettings = await DataService.getSettings();
                if (appSettings.autoBackupEnabled !== false && lastBackup !== todayStr) {
                    DataService.downloadBackup();
                    localStorage.setItem('financeApp_lastAutoBackup', todayStr);
                    DataService.recordBackupEntry('auto-backup-' + todayStr + '.json');
                }
                const [expensesData, incomeData, categoriesData, settings] = await Promise.all([
                    DataService.getExpenses(), DataService.getIncome(), DataService.getCategories(), DataService.getSettings()
                ]);
                setExpenses(expensesData); setIncome(incomeData); setCategories(categoriesData); setDefaultCurrency(settings.currency || 'GBP');
                setPeople(DataService.getPeople());
                const notifSettings = JSON.parse(localStorage.getItem('financeApp_notifSettings') || '{}');
                if (notifSettings.budgetAlertsEnabled !== false) {
                    const alerts = await DataService.checkBudgetAlerts();
                    setBudgetAlerts(alerts);
                } else { setBudgetAlerts([]); }
                const today = new Date().toISOString().split('T')[0];
                setBillsDueSoon(DataService.getBills().filter(b => { if (!b.isActive) return false; const diff = Math.ceil((new Date(b.nextDueDate) - new Date(today)) / 86400000); return diff <= b.reminderDaysBefore; }));
            } catch (error) { console.error('Error loading data:', error); }
        };
        loadData();
    }, []);

    const handleDataUpdate = async () => {
        try {
            const [expensesData, incomeData, categoriesData, settings] = await Promise.all([
                DataService.getExpenses(), DataService.getIncome(), DataService.getCategories(), DataService.getSettings()
            ]);
            setExpenses(expensesData); setIncome(incomeData); setCategories(categoriesData); setDefaultCurrency(settings.currency || 'GBP');
            setPeople(DataService.getPeople());
            const notifSettings = JSON.parse(localStorage.getItem('financeApp_notifSettings') || '{}');
            if (notifSettings.budgetAlertsEnabled !== false) {
                const alerts = await DataService.checkBudgetAlerts();
                setBudgetAlerts(alerts);
            } else { setBudgetAlerts([]); }
            const todayStr = new Date().toISOString().split('T')[0];
            setBillsDueSoon(DataService.getBills().filter(b => { if (!b.isActive) return false; const diff = Math.ceil((new Date(b.nextDueDate) - new Date(todayStr)) / 86400000); return diff <= b.reminderDaysBefore; }));
            DataService.saveLatestBackup();
        } catch (error) { console.error('Error updating data:', error); }
    };

    const handleRegister = (user) => { setCurrentUser(user); };
    const handleLogout = () => { setCurrentUser(null); };

    const handleCurrencyChange = (newCurrency) => { setDefaultCurrency(newCurrency); handleDataUpdate(); };

    const renderScreen = () => {
        switch (currentScreen) {
            case 'expenses': return <ExpenseList expenses={expenses} categories={categories} onUpdate={handleDataUpdate} initialDateFrom={expensesInitDateFrom} initialDateTo={expensesInitDateTo} initialPaidBy={expensesInitPaidBy} />;
            case 'trends': return <MonthlyTrends expenses={expenses} income={income} categories={categories} defaultCurrency={defaultCurrency} currentUser={currentUser} onMonthSelect={(from, to, paidBy) => { setExpensesInitDateFrom(from); setExpensesInitDateTo(to); setExpensesInitPaidBy(paidBy || ''); setCurrentScreen('expenses'); }} />;
            case 'add-expense': return <ExpenseForm categories={categories} onSave={handleDataUpdate} onCancel={() => setCurrentScreen('expenses')} />;
            case 'categories': return <CategoryManager categories={categories} onUpdate={handleDataUpdate} defaultCurrency={defaultCurrency} />;
            case 'income': return <IncomeForm income={income} onUpdate={handleDataUpdate} />;
            case 'summary': return <Summary expenses={expenses} income={income} categories={categories} defaultCurrency={defaultCurrency} />;
            case 'goals': return <SavingsGoals defaultCurrency={defaultCurrency} />;
            case 'bills': return <BillTracker categories={categories} onUpdate={handleDataUpdate} />;
            case 'recurring': return <RecurringList onUpdate={handleDataUpdate} />;
            case 'bulk-upload': return <BulkUpload categories={categories} onUpdate={handleDataUpdate} />;
            case 'settings': return <SettingsScreen currentCurrency={defaultCurrency} onCurrencyChange={handleCurrencyChange} />;
            case 'export': return <ExportData expenses={expenses} income={income} categories={categories} defaultCurrency={defaultCurrency} onNavigate={setCurrentScreen} />;
            case 'profile': return <ProfileScreen currentUser={currentUser} onLogout={handleLogout} onUpdate={handleDataUpdate} />;
            default: return <ExpenseList expenses={expenses} categories={categories} onUpdate={handleDataUpdate} />;
        }
    };

    if (!currentUser) return <RegistrationScreen onRegister={handleRegister} onLogin={handleRegister} />;
    if (!currentUser.displayName) return <DisplayNamePrompt onRegister={handleRegister} />;

    return (
        <div className="mobile-app">
            <div className="app-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <h1 style={{margin:0}}><i className="fas fa-wallet"></i> Personal Finance</h1>
                <button className="btn btn-sm btn-outline-light" onClick={() => setCurrentScreen('profile')} title="My Profile"><i className="fas fa-user-circle"></i></button>
            </div>
            {budgetAlerts.map((alert, i) => (
                <div key={i} className={'alert ' + (alert.type === 'over' ? 'alert-danger' : 'alert-warning')} style={{margin: '0.5rem 1rem', fontSize: '0.85rem'}}>
                    <i className={'fas fa-' + (alert.type === 'over' ? 'exclamation-circle' : 'exclamation-triangle') + ' me-2'}></i>
                    {alert.type === 'over'
                        ? `${alert.name}: OVER BUDGET (${alert.pct.toFixed(0)}% spent)`
                        : `${alert.name}: ${alert.pct.toFixed(0)}% of budget used`}
                    <button className="btn-close btn-close-sm float-end" onClick={() => setBudgetAlerts(prev => prev.filter((_,j) => j !== i))}></button>
                </div>
            ))}
            {billsDueSoon.length > 0 && (
                <div className="alert alert-info" style={{margin: '0 1rem 0.5rem', fontSize: '0.85rem', cursor: 'pointer'}} onClick={() => setCurrentScreen('bills')}>
                    <i className="fas fa-clock me-2"></i>
                    ⏰ {billsDueSoon.length} bill{billsDueSoon.length !== 1 ? 's' : ''} due soon — {billsDueSoon.map(b => b.name).join(', ')}
                </div>
            )}
            <div className="app-content">{renderScreen()}</div>
            <Navigation currentScreen={currentScreen} onScreenChange={setCurrentScreen} />
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
